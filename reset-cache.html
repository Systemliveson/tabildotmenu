<!doctype html>
<html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tabildot Önbellek Temizleme</title><style>body{font-family:Segoe UI,Arial,sans-serif;background:#0f2742;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}.box{max-width:560px;background:#fff;color:#172b3f;padding:28px;border-radius:20px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.3)}h1{font-size:24px}p{line-height:1.55}.ok{color:#2f6f4e;font-weight:800}</style></head><body><div class="box"><h1>Sistem önbelleği temizleniyor</h1><p id="msg">Eski service worker ve önbellek kayıtları kaldırılıyor…</p></div><script>(async()=>{try{if('serviceWorker'in navigator){const rs=await navigator.serviceWorker.getRegistrations();await Promise.all(rs.map(r=>r.unregister()))}if(window.caches?.keys){const ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)))}document.getElementById('msg').innerHTML='<span class="ok">Temizlik tamamlandı.</span><br>Yeni sürüme yönlendiriliyorsunuz…';setTimeout(()=>location.replace('./?v=20260624-2'),800)}catch(e){document.getElementById('msg').textContent='Temizlik tamamlanamadı. Tarayıcı site verilerini manuel temizleyip tekrar deneyin.'}})();</script></body></html>
