<!DOCTYPE html>
<html lang="tr">
<head>

<title>TBMM Destek Hizmetleri Başkanlığı - Tabildot Menü Planlama</title>
<style>
:root{--bg:#edf2f8;--paper:#fffefa;--card:#ffffff;--text:#20304d;--muted:#64748b;--nav1:#304f86;--nav2:#243f74;--nav3:#1d3565;--gold:#c8a15a;--line:#d9e2ee;--green:#6f927d;--blue:#708bbd;--red:#b86d6d;--radius:22px;--shadow:0 16px 34px rgba(31,42,68,.10)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(135deg,#eaf1f8,#fbf8f1 45%,#eef4f8);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:300px 1fr;gap:22px;max-width:1560px;margin:0 auto;min-height:100vh;padding:16px}.sidebar{background:linear-gradient(180deg,var(--nav1),var(--nav2) 55%,var(--nav3));border:1px solid rgba(234,223,201,.30);border-radius:30px;padding:20px;color:#fff;box-shadow:0 24px 60px rgba(20,39,78,.22);position:sticky;top:16px;height:calc(100vh - 32px);overflow:auto}.brand{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.20);border-radius:22px;padding:12px;margin-bottom:18px}.brand-logo{width:62px;height:62px;min-width:62px;border-radius:18px;background:#fff;display:grid;place-items:center;padding:8px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06),0 10px 18px rgba(0,0,0,.12);overflow:hidden}.brand-logo img{width:100%;height:100%;object-fit:contain}.brand-title{font-family:Georgia,'Times New Roman',serif;font-weight:700;line-height:1.18;font-size:17px;color:#fff8e8;letter-spacing:.2px}.nav{display:grid;gap:10px}.nav button{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fffaf0;border-radius:17px;padding:13px 13px;display:grid;grid-template-columns:32px 1fr 12px;align-items:center;gap:10px;text-align:left;font-weight:800;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 8px 18px rgba(0,0,0,.06)}.nav button .ico{height:32px;width:32px;border-radius:12px;background:rgba(255,255,255,.13);display:grid;place-items:center;color:#f2dfb6}.nav button .arr{color:#f2dfb6}.nav button:hover,.nav button.active{background:linear-gradient(135deg,#6178ad,#526da2);transform:translateX(2px)}.side-card{margin-top:18px;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.16);border-radius:20px;padding:14px;color:#fffaf0}.side-card b{display:block;margin-bottom:8px;color:#ffecc2}.side-card small{line-height:1.5;display:block}.side-row{display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,.16);padding-top:9px;margin-top:9px;font-size:13px}.main{min-width:0;padding:10px 4px 30px}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin:6px 2px 22px}.topbar h1{font-family:Georgia,'Times New Roman',serif;font-weight:500;font-size:32px;margin:0;color:#1d2744}.topbar p{margin:7px 0 0;color:var(--muted)}.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn{border:1px solid rgba(85,112,165,.28);border-radius:14px;padding:11px 15px;background:linear-gradient(135deg,#7f96c3,#6f89bc);color:#fff;font-weight:800;box-shadow:0 8px 18px rgba(51,76,130,.12);display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;min-height:42px;white-space:nowrap;line-height:1.2}.btn:hover{background:linear-gradient(135deg,#8ea2cb,#7d96c5)}.btn.secondary{background:linear-gradient(135deg,#f7f4ee,#ece4d8);color:#2b3a55;border-color:#d7c8ae}.btn.green{background:linear-gradient(135deg,#6b917b,#7aa28b)}.btn.red{background:linear-gradient(135deg,#b76e6e,#c98282)}.btn.gold{background:linear-gradient(135deg,#c2a15e,#d2b574);color:#fff}.btn.small{padding:8px 11px;border-radius:12px;min-height:34px;font-size:13px}.btn:disabled{opacity:.6;cursor:not-allowed}.section{display:none}.section.active{display:block;animation:fade .18s ease}@keyframes fade{from{opacity:.45;transform:translateY(6px)}to{opacity:1;transform:none}}.grid{display:grid;gap:18px}.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}.card{background:rgba(255,255,255,.86);border:1px solid #e1d9ca;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}.card h2,.card h3{margin:0 0 12px;color:#1f2845}.card h3{font-size:21px}.muted{color:var(--muted)}.lead{font-size:15px;line-height:1.6;color:#475569}.kpi{display:flex;align-items:center;gap:16px;min-height:120px}.kpi .badge{width:58px;height:58px;border-radius:18px;background:linear-gradient(145deg,#304f89,#233f76);color:#f5e3bd;display:grid;place-items:center;font-size:24px}.kpi b{font-size:27px}.kpi span{display:block;color:var(--muted);font-size:13px;margin-top:4px}.hero{display:grid;grid-template-columns:1.18fr .82fr;align-items:center;min-height:250px;overflow:hidden}.plate{height:210px;width:210px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#eee7db 70%,#d5c5a7);display:grid;place-items:center;font-size:70px;margin:auto;box-shadow:0 26px 50px rgba(164,140,91,.18),inset 0 0 0 10px rgba(255,255,255,.7)}label{display:block;font-weight:800;font-size:13px;margin-bottom:7px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:#fbfdff;color:var(--text);padding:11px 12px;outline:none}textarea{min-height:88px;resize:vertical}input:focus,select:focus,textarea:focus{box-shadow:0 0 0 4px rgba(89,119,173,.15);border-color:#7891bd}.form{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.form.two{grid-template-columns:repeat(2,minmax(0,1fr))}.full{grid-column:1/-1}.option-row{display:flex;gap:10px;flex-wrap:wrap}.check-card{display:flex;gap:9px;align-items:center;background:#f7f4ee;border:1px solid #e3d9c7;border-radius:14px;padding:10px 12px;font-weight:800}.check-card input{width:18px;height:18px}.rules{display:grid;gap:9px;max-height:520px;overflow:auto;padding-right:4px}.rule{display:grid;grid-template-columns:22px 1fr;gap:10px;align-items:start;background:#f7f4ee;border:1px solid #e3d9c7;border-radius:14px;padding:10px}.rule input{width:18px;height:18px;margin-top:2px}.rule b{display:block;font-size:14px}.rule small{display:block;color:#64748b;margin-top:3px;line-height:1.35}table{width:100%;border-collapse:separate;border-spacing:0 8px}th{text-align:left;color:#64748b;font-size:12px;padding:0 10px}td{background:#fbfdff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px;vertical-align:top}td:first-child{border-left:1px solid var(--line);border-radius:12px 0 0 12px}td:last-child{border-right:1px solid var(--line);border-radius:0 12px 12px 0}.table-wrap{overflow:auto}.plan-day{border:1px solid #e2d7c7;border-radius:18px;background:#fffdf8;padding:14px;margin-bottom:12px}.day-head{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px}.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.meal-box{background:#f8fafc;border:1px solid #dfe7f0;border-radius:16px;padding:12px}.meal-box h4{margin:0 0 8px;color:#284880}.meal-box ol{margin:0;padding-left:22px;line-height:1.55}.meal-box li.fixed{font-weight:900;color:#284880}.chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:6px 10px;background:#efe7d8;color:#4b5c7e;font-weight:800;font-size:12px;border:1px solid #d8c9b3}.ok{background:#e8f3ee;color:#2b6b49;border-color:#bdd9ca}.warn{background:#fff4dd;color:#8a641e;border-color:#e4c992}.bad{background:#fae9e4;color:#9b4d3c;border-color:#e3b6ab}.bar{height:12px;background:#e5edf6;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,#6b917b,#7f96c3);width:0}.chart-row{display:grid;grid-template-columns:230px 1fr 70px;gap:10px;align-items:center;margin:8px 0}.chart-label{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast{position:fixed;right:24px;bottom:24px;background:#203a73;color:#fff;padding:13px 16px;border-radius:16px;box-shadow:var(--shadow);display:none;z-index:50;max-width:360px}.toast.show{display:block}.error-cloud{position:fixed;top:22px;left:50%;transform:translateX(-50%);background:rgba(184,45,45,.84);color:#fff;border:1px solid rgba(255,255,255,.35);box-shadow:0 18px 44px rgba(130,20,20,.22);backdrop-filter:blur(10px);border-radius:22px;padding:14px 18px;z-index:90;max-width:720px;display:none;font-weight:800;text-align:center;line-height:1.45}.error-cloud.show{display:block;animation:cloudIn .25s ease}@keyframes cloudIn{from{opacity:.2;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:40}.modal-bg.show{display:flex}.modal{max-width:1150px;width:100%;max-height:92vh;overflow:auto;background:#fff;border-radius:24px;padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.25)}.modal-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.print-only{display:none}.survey-choice{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.choice-pill{border:1px solid #d5deea;border-radius:12px;padding:8px;text-align:center;background:#f8fafc;font-weight:800;font-size:12px}.mail-box{white-space:pre-wrap;background:#f8fafc;border:1px solid #dce5ef;border-radius:16px;padding:14px;line-height:1.55}.hr{height:1px;background:#e2e8f0;margin:16px 0}@media(max-width:1050px){.app{grid-template-columns:1fr}.sidebar{height:auto;position:relative}.cols4,.cols3,.cols2,.form,.form.two,.hero,.meal-grid{grid-template-columns:1fr}.topbar{flex-direction:column}.chart-row{grid-template-columns:1fr}}@media print{.sidebar,.topbar,.actions,.no-print,.toast,.modal-bg,.error-cloud{display:none!important}.app{display:block;padding:0}body{background:#fff}.main{padding:0}.section{display:none!important}.section.print-target,.section.active{display:block!important}.card,.plan-day,.meal-box{box-shadow:none;border:1px solid #94a3b8;background:#fff}.print-only{display:block}.print-header{text-align:center;border:1px solid #94a3b8;background:#f1f5f9;padding:10px;margin-bottom:12px}td,th{border:1px solid #94a3b8!important;background:#fff!important;border-radius:0!important}.btn{display:none!important}}

/* Son düzenleme: kaydetmeden kayıt yok, manuel düzenleme ve yemek havuzu yönetimi */
.unsaved-note{background:rgba(255,244,221,.95);border:1px solid #e4c992;color:#7b5515;border-radius:16px;padding:10px 12px;margin:12px 0;font-weight:800}.meal-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.meal-head h4{margin:0!important}.edit-form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.edit-form .full{grid-column:1/-1}.pill-info{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;background:#f2f6fb;border:1px solid #d8e2ef;color:#284880;font-weight:800;font-size:12px}.meal-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}.manage-actions{display:flex;gap:8px;flex-wrap:wrap}.status-unsaved{background:#fff4dd!important;color:#8a641e!important;border-color:#e4c992!important}.dialog-info{background:#f8fafc;border:1px solid #dce5ef;border-radius:16px;padding:12px;margin:10px 0;color:#475569;line-height:1.5}@media(max-width:820px){.edit-form{grid-template-columns:1fr}}

.ayran-options{margin-top:10px;padding:12px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.45)}
/* Gelişmiş tarih aralığı seçimi */
.range-panel{margin-top:12px;background:#f8fafc;border:1px solid #dde6f0;border-radius:18px;padding:12px}
.range-panel-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.range-summary{font-weight:800;color:#284880;background:#eef4fb;border:1px solid #d8e3f0;border-radius:999px;padding:7px 11px;font-size:13px}
.range-strip{display:flex;gap:8px;overflow-x:auto;padding:8px 4px 10px;scrollbar-color:#9fb1cc transparent;user-select:none;cursor:grab}
.range-strip:active{cursor:grabbing}
.range-day{min-width:82px;border:1px solid #d7e0ec;background:#fff;border-radius:14px;padding:8px 7px;text-align:center;color:#334155;box-shadow:0 6px 14px rgba(51,76,130,.06);transition:.12s}
.range-day b{display:block;font-size:18px;color:#1f2845}.range-day span{display:block;font-size:11px;color:#64748b;margin-top:2px}.range-day small{display:block;font-size:11px;margin-top:2px;color:#64748b}
.range-day:hover{border-color:#7f96c3;transform:translateY(-1px)}
.range-day.in-range{background:linear-gradient(180deg,#eaf1fb,#f5f8fd);border-color:#91a9ce}
.range-day.range-start,.range-day.range-end{background:linear-gradient(135deg,#6f89bc,#7f96c3);color:#fff;border-color:#6178ad}
.range-day.range-start b,.range-day.range-start span,.range-day.range-start small,.range-day.range-end b,.range-day.range-end span,.range-day.range-end small{color:#fff}
.range-help{font-size:12px;color:#64748b;line-height:1.45;margin-top:6px}


/* Son düzeltme: tarih sürgüsü kaldırıldı, taslak silme, manuel arama önerileri */
.did-wrap{position:relative}
.did-suggestions{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.did-suggestions button{border:1px solid #d4c7ad;background:#f8f3e9;color:#263957;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:800;cursor:pointer}
.did-suggestions button:hover{background:#eee3d1}
.dialog-info.warn{border-left-color:#c98b52;background:#fff7ec;color:#6d4b1f}
.manual-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.manual-grid .full{grid-column:1/-1}
.manual-grid input{width:100%}
@media(max-width:800px){.manual-grid{grid-template-columns:1fr}}

</style>
</head>

ass="check-card"><input type="checkbox" id="optSalad" ${s.includeSalad?'checked':''}> Salata olsun</label><label class="check-card"><input type="checkbox" id="optDessert" ${s.includeDessert?'checked':''}> Tatlı olsun</label><label class="check-card"><input type="checkbox" id="optAyran" ${s.includeAyran?'checked':''}> Ayran planlansın</label></div><div class="form two ayran-options"><div><label>Ayran haftada kaç kez verilsin?</label><input type="number" id="ayranCountPerWeek" min="0" max="14" value="${Number(s.ayranCountPerWeek??2)}"></div><div><label>Ayran hangi öğünde verilsin?</label><select id="ayranMeal"><option value="balanced" ${s.ayranMeal==='balanced'?'selected':''}>Öğle / akşam dengeli dağıt</option><option value="lunch" ${s.ayranMeal==='lunch'?'selected':''}>Sadece öğle</option><option value="dinner" ${s.ayranMeal==='dinner'?'selected':''}>Sadece akşam</option></select></div></div><p class="muted">Seçili olmayan tamamlayıcı türü menüye eklenmez. Ayran seçilirse her güne otomatik eklenmez; belirlediğiniz haftalık sayı ve öğün tercihine göre dağıtılır. Beşinci ürün her zaman <b>Salata Bar</b> olarak yazılır.</p></div></div><div class="actions" style="margin-top:14px"><button class="btn green" onclick="generatePlan()">Akıllı Plan Oluştur</button><button class="btn secondary" onclick="checkDateOverlapUI()">Tarih Kontrolü Yap</button></div></div><div class="card"><h3>Kurallar</h3><p class="muted">Yönetici hangi kuralları işaretlerse plan o kurallara göre oluşturulur.</p><div class="rules">${RULE_DEFS.map(r=>`<label class="rule"><input type="checkbox" id="rule_${r[0]}" ${s.rules[r[0]]?'checked':''}><span><b>${r[1]}</b><small>${r[2]}</small></span></label>`).join('')}</div></div></div>`;setTimeout(initRangePicker,0)}
function dateDiffDays(start,end){const a=new Date(start+'T12:00:00'),b=new Date(end+'T12:00:00');return Math.round((b-a)/86400000)}
function getDateSelection(){let start=document.getElementById('genStart')?.value||todayISO();let end=document.getElementById('genEnd')?.value||start;if(end<start){const tmp=start;start=end;end=tmp;document.getElementById('genStart').value=start;document.getElementById('genEnd').value=end;}const days=dateDiffDays(start,end)+1;if(days<1)return{start,end,days:1};if(days>93){errorCloud('Seçilen tarih aralığı çok uzun. Sistem en fazla 93 günlük plan oluşturabilir.');return null}return{start,end,days}}
function syncDateInputs(which){const s=document.getElementById('genStart'),e=document.getElementById('genEnd');if(!s||!e)return;if(!e.value||e.value<s.value)e.value=s.value;renderRangeStrip();}
function resetRangeToToday(){const s=document.getElementById('genStart'),e=document.getElementById('genEnd');if(s&&e){s.value=todayISO();e.value=addDays(todayISO(),6);renderRangeStrip();}}
let rangeDrag=null;
function initRangePicker(){renderRangeStrip();document.addEventListener('pointerup',()=>{rangeDrag=null},{once:true});}
function renderRangeStrip(){const strip=document.getElementById('rangeStrip');if(!strip)return;const s=document.getElementById('genStart')?.value||todayISO();const e=document.getElementById('genEnd')?.value||s;const base=addDays(s,-7);const days=120;strip.innerHTML=Array.from({length:days},(_,i)=>{const d=addDays(base,i);const dd=new Date(d+'T12:00:00');const inRange=d>=s&&d<=e;const cls=['range-day',inRange?'in-range':'',d===s?'range-start':'',d===e?'range-end':''].filter(Boolean).join(' ');return `<div class="${cls}" data-date="${d}" onpointerdown="rangePointerDown(event,'${d}')" onpointerenter="rangePointerEnter(event,'${d}')"><span>${DAY_NAMES[dd.getDay()].slice(0,3)}</span><b>${String(dd.getDate()).padStart(2,'0')}</b><small>${MONTHS[dd.getMonth()]}</small></div>`}).join('');updateRangeSummary();}
function updateRangeSummary(){const box=document.getElementById('rangeSummary');const sel=getDateSelection();if(box&&sel)box.textContent=`${fmt(sel.start)} - ${fmt(sel.end)} • ${sel.days} gün`;}
function rangePointerDown(ev,date){ev.preventDefault();rangeDrag={anchor:date,current:date};setRangeDates(date,date);}
function rangePointerEnter(ev,date){if(!rangeDrag||ev.buttons!==1)return;rangeDrag.current=date;const a=rangeDrag.anchor,b=date;setRangeDates(a<b?a:b,a<b?b:a);}
function setRangeDates(start,end){const s=document.getElementById('genStart'),e=document.getElementById('genEnd');if(s&&e){s.value=start;e.value=end;}renderRangeStrip();}
function getSelectedRules(){const r={};RULE_DEFS.forEach(x=>r[x[0]]=!!document.getElementById('rule_'+x[0])?.checked);return r}
function getOptions(){return {includeSalad:!!document.getElementById('optSalad')?.checked,includeDessert:!!document.getElementById('optDessert')?.checked,includeAyran:!!document.getElementById('optAyran')?.checked,ayranCountPerWeek:Math.max(0,Math.min(14,Number(document.getElementById('ayranCountPerWeek')?.value||0))),ayranMeal:document.getElementById('ayranMeal')?.value||'balanced',sameDayMenuMode:document.getElementById('sameDayMenuMode')?.value||'different'}}
function selectedOptionTypes(opts){let a=[];if(opts.includeSalad)a.push('salata');if(opts.includeDessert)a.push('tatlı');return a}
function dateRange(start,days){return Array.from({length:days},(_,i)=>addDays(start,i))}
function findOverlap(start,days){const dates=new Set(dateRange(start,days));let hits=[];state.plans.forEach(p=>(p.days||[]).forEach(d=>{if(dates.has(d.date))hits.push({date:d.date,title:p.title})}));return hits}
function checkDateOverlapUI(){const sel=getDateSelection();if(!sel)return;const {start,days}=sel;const h=findOverlap(start,days);if(h.length)errorCloud(`Aynı tarihli plan bulundu: ${[...new Set(h.map(x=>fmt(x.date)))].slice(0,4).join(', ')}. Yeni plan oluşturmak için önce Tüm Planlar bölümünden ilgili planı silin veya farklı tarih seçin.`);else toast('Seçilen tarih aralığında çakışan plan bulunmadı.')} 
function generatePlan(){const sel=getDateSelection();if(!sel)return;const {start,end,days}=sel;const mode=document.getElementById('genMode').value;const opts=getOptions();state.settings.lastStart=start;state.settings.lastEnd=end;const overlaps=findOverlap(start,days);if(overlaps.length){errorCloud(`Aynı tarihli yemek planı oluşturulamaz. Çakışan ilk tarih: ${fmt(overlaps[0].date)}. Kaynak: ${overlaps[0].title}.`);return}if(state.draftPlan&&dateRange(start,days).some(d=>(state.draftPlan.days||[]).some(x=>x.date===d))){errorCloud('Kaydedilmemiş taslak planla aynı tarih aralığında yeni plan oluşturamazsınız. Önce mevcut taslağı kaydedin veya silin.');return}state.settings={...state.settings,...opts,mode,rules:getSelectedRules()};const usage={};const plan={id:uid(),title:`${fmt(start)} başlangıçlı yemek planı`,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),saved:false,start,daysCount:days,mode,options:opts,rules:{...state.settings.rules},days:[]};for(let i=0;i<days;i++){const date=addDays(start,i);let lunch=buildMenu(date,'Öğle',usage,null,mode,opts,i*2);commitUsage(lunch,usage);let same=false;if(opts.sameDayMenuMode==='same')same=true;else if(opts.sameDayMenuMode==='ask')same=confirm(`${fmt(date)} için öğle ve akşam menüsü aynı olsun mu?`);let dinner;if(same){dinner=cloneMenu(lunch,'Öğle menüsü yönetici tercihiyle akşam öğününe de uygulanmıştır.');}else{dinner=buildMenu(date,'Akşam',usage,lunch,mode,opts,i*2+1);}commitUsage(dinner,usage);plan.days.push({date,lunch,dinner})}state.draftPlan=plan;state.activePlanId=null;state.planDirty=true;renderAll(false);showSection('plan');toast('Yemek planı taslak olarak oluşturuldu. Kalıcı kayıt için Yemek Planı Kaydet butonuna basın.')}
function activeMeals(cat){return state.meals.filter(m=>m.active!==false&&m.category===cat)}
function sidePool(){return activeMeals('Yardımcı').filter(m=>{const n=(m.name||'').toLowerCase();const sg=(m.sourceGroup||'').toLowerCase();if(sg.includes('börek'))return false;if(/mantı|içli köfte|pizza|omlet|çılbır|krep|talaş|paçanga|sigara böreği|su böreği/i.test(m.name||''))return false;return /pilav|makarna|erişte|bulgur|pirinç|patates püresi/i.test(m.name||'')||sg.includes('pilavlar-makarnalar');});}
function isMainDish(m){if(!m)return false;return m.category==='Ana Yemek'}
function validateMenuItemIds(ids){const meals=ids.map(meal).filter(Boolean);const mainCount=meals.filter(isMainDish).length;if(mainCount>1)return 'Bir öğünde birden fazla ana yemek seçilemez.';return ''}

function optionalPool(type){if(type==='ayran')return state.meals.filter(m=>m.active!==false&&m.name==='Ayran');if(type==='tatlı')return state.meals.filter(m=>m.active!==false&&!isMainDish(m)&&(m.sourceGroup==='TATLILAR'||m.subCategory==='Tatlı'||m.group==='tatlı'));return state.meals.filter(m=>m.active!==false&&!isMainDish(m)&&m.sourceGroup==='SALATALAR-KOMPOSTOLAR'&&!/komposto|hoşaf/i.test(m.name)&&m.name!=='Ayran'&&m.name!=='Salata Bar')}

function cloneMenu(menu,note){return {...menu,items:[...(menu.items||[])],fixed:[...(menu.fixed||['Salata Bar'])],notes:[...(menu.notes||[]),note]}}
function ayranDays(count){count=Math.max(0,Math.min(7,Number(count)||0));if(count<=0)return[];if(count>=7)return[0,1,2,3,4,5,6];const out=[];for(let i=0;i<count;i++){let d=Math.round(i*6/Math.max(1,count-1));while(out.includes(d)&&d<6)d++;out.push(d)}return out.slice(0,count)}
function shouldUseAyran(index,slot,opts){if(!opts.includeAyran)return false;const count=Math.max(0,Math.min(14,Number(opts.ayranCountPerWeek)||0));if(count<=0)return false;const dayIndex=Math.floor(index/2);const weekDay=dayIndex%7;const days=ayranDays(Math.min(7,count));if(!days.includes(weekDay))return false;if(opts.ayranMeal==='lunch')return slot==='Öğle';if(opts.ayranMeal==='dinner')return slot==='Akşam';const order=days.indexOf(weekDay);return (order%2===0&&slot==='Öğle')||(order%2===1&&slot==='Akşam')}
function pickExtraType(index,slot,opts){if(shouldUseAyran(index,slot,opts))return 'ayran';const types=selectedOptionTypes(opts);return types.length?types[index%types.length]:''}
function buildMenu(date,slot,usage,lunch,mode,opts,index){const rules=state.settings.rules||{};const soup=pick(activeMeals('Çorba'),date,slot,usage,rules,mode,null);const main=pick(activeMeals('Ana Yemek'),date,slot,usage,rules,mode,lunch?.main);const side=pick(sidePool(),date,slot,usage,rules,mode,lunch?.side);const t=pickExtraType(index,slot,opts);const extra=t?pick(optionalPool(t),date,slot,usage,rules,mode,lunch?.extra):null;let items=[soup,main,side,extra].filter(Boolean);let notes=[];const err=validateMenuItemIds(items.map(m=>m.id));if(err)notes.push(err);if(items.length<4)notes.push('Yeterli yemek havuzu bulunamadığı için bazı ürünler eksik olabilir.');let totalCal=items.reduce((a,m)=>a+(m.calories||0),0);let score=Math.max(45,100-notes.length*8-Math.max(0,totalCal-1250)/30);if(rules.avoidHeavyDinner&&slot==='Akşam'&&totalCal>1100){score-=8;notes.push('Akşam menüsü kalori bakımından yüksek olabilir.')}return {items:items.map(m=>m.id),fixed:['Salata Bar'],main:main?.id,side:side?.id,extra:extra?.id,score:Math.round(score),totalCal:Math.round(totalCal),notes}}
function pick(list,date,slot,usage,rules,mode,compareId){if(!list.length)return null;let scored=list.map(m=>({m,score:mealScore(m,date,slot,usage,rules,mode,compareId)})).sort((a,b)=>b.score-a.score);const top=scored.slice(0,Math.min(8,scored.length));return top[Math.floor(Math.random()*top.length)]?.m||scored[0].m}
function mealScore(m,date,slot,usage,rules,mode,compareId){let sc=100-(usage[m.id]||0)*18;if(rules.noMainRepeat&&m.category==='Ana Yemek'&&(usage[m.id]||0)>0)sc-=35;if(rules.noSoupRepeat&&m.category==='Çorba'&&(usage[m.id]||0)>0)sc-=22;if(rules.noSideRepeat&&m.category==='Yardımcı'&&(usage[m.id]||0)>0)sc-=18;if(compareId){let c=meal(compareId);if(c&&rules.noSameGroupLunchDinner&&c.subCategory===m.subCategory)sc-=25;if(c&&c.group===m.group)sc-=18}if(rules.preferSurveyLiked&&m.ratingAvg)sc+=(m.ratingAvg-3)*12;if(rules.avoidLowRated&&m.ratingCount>0&&m.ratingAvg<3)sc-=35;if(rules.calorieBalance&&m.calories>480)sc-=10;if(mode==='Standart')sc+=(m.active!==false?3:0);if(mode==='Memnuniyet Odaklı'&&m.ratingAvg)sc+=m.ratingAvg*10;if(mode==='Memnuniyet Odaklı'&&m.ratingCount>0&&m.ratingAvg<3)sc-=25;if(mode==='Hafif Menü')sc-=m.weight*8;if(mode==='Hafif Menü'&&m.calories>420)sc-=16;return sc+Math.random()*5}
function commitUsage(menu,usage){menu.items.forEach(id=>usage[id]=(usage[id]||0)+1)}
function menuNames(menu){return (menu?.items||[]).map(id=>meal(id)?.name||id).concat(menu?.fixed||[])}
function renderPlan(){const p=activePlan();const unsaved=!!state.draftPlan||!!state.planDirty;document.getElementById('planSec').innerHTML=`<div class="print-only print-header"><h2>${esc(state.settings.organization)} Yemek Planı</h2><p>Kurumsal Yemek Planlama Sistemi</p></div><div class="card"><div class="actions" style="justify-content:space-between"><h3>Yemek Planı</h3><div class="actions">${p?`<button class="btn green" onclick="saveCurrentPlan()">Yemek Planı Kaydet</button>`:''}<button class="btn secondary" onclick="exportPlanWord()">Word</button><button class="btn secondary" onclick="exportPlanCSV()">Excel / CSV</button><button class="btn secondary" onclick="window.print()">PDF / Yazdır</button></div></div>${p?`${unsaved?'<div class="unsaved-note">Bu plan henüz kalıcı olarak kaydedilmedi veya üzerinde kaydedilmemiş değişiklikler var. Kalıcı kayıt için Yemek Planı Kaydet butonuna basın.</div>':''}<p class="lead"><b>${esc(p.title)}</b><br>${fmt(p.start)} - ${fmt(addDays(p.start,p.days.length-1))} • Menü: 5 ürün, 5. ürün sabit Salata Bar</p>${p.days.map(renderDay).join('')}`:'<p class="muted">Aktif plan yok.</p><button class="btn green" onclick="showSection(&quot;generate&quot;)">Plan Oluştur</button>'}</div>`}
function renderDay(d){return `<div class="plan-day"><div class="day-head"><b>${fmt(d.date)}</b><span class="chip ok">Kalite: ${Math.round(((d.lunch.score||0)+(d.dinner.score||0))/2)}</span></div><div class="meal-grid"><div class="meal-box"><div class="meal-head"><h4>Öğle</h4><button class="btn small secondary" onclick="editMenu('${d.date}','lunch')">Manuel Değiştir</button></div>${menuList(d.lunch)}</div><div class="meal-box"><div class="meal-head"><h4>Akşam</h4><button class="btn small secondary" onclick="editMenu('${d.date}','dinner')">Manuel Değiştir</button></div>${menuList(d.dinner)}</div></div></div>`}

function saveCurrentPlan(){const p=activePlan();if(!p){errorCloud('Kaydedilecek yemek planı bulunamadı.');return}p.updatedAt=new Date().toISOString();p.saved=true;if(state.draftPlan){const idx=state.plans.findIndex(x=>x.id===state.draftPlan.id);if(idx>=0)state.plans[idx]=state.draftPlan;else state.plans.push(state.draftPlan);state.activePlanId=state.draftPlan.id;state.draftPlan=null;}state.planDirty=false;saveState(true);renderAll();toast('Yemek planı kalıcı olarak kaydedildi ve Tüm Planlar bölümüne eklendi.');}
function mealOptions(list,selected){return ['<option value="">Seçiniz</option>'].concat(list.map(m=>`<option value="${m.id}" ${m.id===selected?'selected':''}>${esc(m.name)}${m.calories?' • '+m.calories+' kcal':''}</option>`)).join('')}
function editMenu(date,slot){const p=activePlan();if(!p)return errorCloud('Düzenlenecek aktif plan bulunamadı.');const day=(p.days||[]).find(x=>x.date===date);if(!day)return errorCloud('Seçilen gün planda bulunamadı.');const menu=day[slot];const current=menu.items||[];const soup=current[0]||'';const main=current[1]||'';const side=current[2]||'';const extra=current[3]||'';openModal(`<div class="modal-head"><div><h3>${fmt(date)} ${slot==='lunch'?'Öğle':'Akşam'} Menüsü</h3><p class="muted">Bu ekranda son planı onaydan önce veya sonra manuel olarak değiştirebilirsiniz. Bir öğünde yalnızca bir ana yemek seçilebilir; 5. ürün Salata Bar olarak sabit kalır.</p></div><button class="btn secondary" onclick="closeModal()">Kapat</button></div><div class="dialog-info">Değişiklikler hemen ekranda görünür; kalıcı olması için plan ekranında <b>Yemek Planı Kaydet</b> butonuna basın.</div><div class="edit-form"><div><label>1. Ürün - Çorba</label><select id="editSoup">${mealOptions(activeMeals('Çorba'),soup)}</select></div><div><label>2. Ürün - Ana Yemek</label><select id="editMain">${mealOptions(activeMeals('Ana Yemek'),main)}</select></div><div><label>3. Ürün - Yardımcı Yemek</label><select id="editSide">${mealOptions(sidePool(),side)}</select></div><div><label>4. Ürün - Tamamlayıcı</label><select id="editExtra">${mealOptions(activeMeals('Tamamlayıcı').filter(m=>m.name!=='Salata Bar'&&!isMainDish(m)),extra)}</select></div><div class="full"><span class="pill-info">5. Ürün sabit: Salata Bar</span></div></div><div class="actions" style="margin-top:14px"><button class="btn green" onclick="saveManualMenu('${date}','${slot}')">Değişikliği Uygula</button><button class="btn secondary" onclick="closeModal()">Vazgeç</button></div>`)}
function saveManualMenu(date,slot){const ids=[document.getElementById('editSoup').value,document.getElementById('editMain').value,document.getElementById('editSide').value,document.getElementById('editExtra').value].filter(Boolean);const err=validateMenuItemIds(ids);if(err){errorCloud(err);return}const p=activePlan();const day=(p.days||[]).find(x=>x.date===date);if(!day)return errorCloud('Gün kaydı bulunamadı.');const items=ids.map(meal).filter(Boolean);const totalCal=items.reduce((a,m)=>a+(m.calories||0),0);day[slot]={items:ids,fixed:['Salata Bar'],main:document.getElementById('editMain').value||'',side:document.getElementById('editSide').value||'',extra:document.getElementById('editExtra').value||'',score:Math.max(45,Math.round(100-Math.max(0,totalCal-1250)/30)),totalCal:Math.round(totalCal),notes:['Yönetici tarafından manuel düzenlendi.']};p.updatedAt=new Date().toISOString();state.planDirty=true;closeModal();renderAll(false);showSection('plan');toast('Manuel değişiklik uygulandı. Kalıcı kayıt için Yemek Planı Kaydet butonuna basın.');}
function menuList(menu){const names=menuNames(menu);return `<ol>${names.map((n,i)=>`<li class="${n==='Salata Bar'?'fixed':''}">${esc(n)}</li>`).join('')}</ol>${menu.notes?.length?`<p class="muted">${menu.notes.map(esc).join(' ')}</p>`:''}`}
function renderAllPlans(){document.getElementById('allplansSec').innerHTML=`<div class="card"><div class="actions" style="justify-content:space-between"><h3>Tüm Planlar</h3><button class="btn green" onclick="showSection('generate')">Yeni Plan Oluştur</button></div>${state.plans.length?`<div class="table-wrap"><table><thead><tr><th>Plan</th><th>Tarih Aralığı</th><th>Gün</th><th>Kalite</th><th>İşlem</th></tr></thead><tbody>${state.plans.slice().reverse().map(p=>`<tr><td><b>${esc(p.title)}</b><br><span class="muted">${new Date(p.createdAt).toLocaleString('tr-TR')}</span></td><td>${fmt(p.start)} - ${fmt(addDays(p.start,p.days.length-1))}</td><td>${p.days.length}</td><td>${qualityScore(p)}</td><td><div class="actions"><button class="btn small secondary" onclick="previewPlan('${p.id}')">Önizle</button><button class="btn small green" onclick="activatePlan('${p.id}')">Aktif Yap</button><button class="btn small red" onclick="deletePlan('${p.id}')">Sil</button></div></td></tr>`).join('')}</tbody></table></div>`:'<p class="muted">Henüz kayıtlı plan yok.</p>'}</div>`}
function previewPlan(id){const p=state.plans.find(x=>x.id===id);modal(`<div class="modal-head"><h3>${esc(p.title)}</h3><button class="btn secondary" onclick="closeModal()">Kapat</button></div>${p.days.map(renderDay).join('')}`)}
function activatePlan(id){if(state.planDirty||state.draftPlan){if(!confirm('Kaydedilmemiş plan değişiklikleri var. Devam ederseniz kaydedilmemiş değişiklikler kaybolabilir. Devam edilsin mi?'))return;state.draftPlan=null;state.planDirty=false;}state.activePlanId=id;saveState(true);showSection('plan')}
function deletePlan(id){if(!confirm('Bu plan silinsin mi?'))return;state.plans=state.plans.filter(p=>p.id!==id);if(state.activePlanId===id)state.activePlanId=state.plans[0]?.id||null;saveState(true);renderAllPlans();renderPlan()}
function renderMeals(){document.getElementById('mealsSec').innerHTML=`<div class="card"><div class="actions" style="justify-content:space-between"><h3>Yemek Havuzu</h3><div class="manage-actions"><button class="btn green" onclick="openMealEditor()">Yeni Yemek Ekle</button><button class="btn secondary" onclick="exportMealsCSV()">Yemek Havuzu Excel / CSV</button></div></div><p class="muted">Yönetici yemek adını, kategorisini, kalorisini, gramajını ve aktiflik durumunu değiştirebilir. Yemek Havuzu değişiklikleri kendi kaydet butonuyla kalıcı kaydedilir.</p><div class="form two"><input id="mealSearch" placeholder="Yemek ara" oninput="filterMeals()"><select id="mealGroup" onchange="filterMeals()"><option value="">Tüm gruplar</option>${[...new Set(state.meals.map(m=>m.sourceGroup))].filter(Boolean).sort().map(g=>`<option>${esc(g)}</option>`).join('')}</select></div><div class="table-wrap"><table id="mealTable"><thead><tr><th>Yemek</th><th>Grup</th><th>Kategori</th><th>Gram</th><th>Kalori</th><th>Durum</th><th>Anket</th><th>İşlem</th></tr></thead><tbody>${state.meals.map(m=>`<tr><td><b>${esc(m.name)}</b></td><td>${esc(m.sourceGroup||'')}</td><td>${esc(m.category)} / ${esc(m.subCategory)}</td><td>${m.grams||''}</td><td>${m.calories||''}</td><td>${m.active!==false?'<span class="chip ok">Aktif</span>':'<span class="chip bad">Pasif</span>'}</td><td>${m.ratingCount?m.ratingAvg.toFixed(1)+' / '+m.ratingCount:'—'}</td><td><div class="actions"><button class="btn small secondary" onclick="openMealEditor('${m.id}')">Düzenle</button><button class="btn small ${m.active!==false?'red':'green'}" onclick="toggleMealActive('${m.id}')">${m.active!==false?'Pasifleştir':'Aktifleştir'}</button></div></td></tr>`).join('')}</tbody></table></div></div>`}

function openMealEditor(id=''){const m=id?meal(id):{id:'',name:'',sourceGroup:'ÖZEL EKLENENLER',category:'Ana Yemek',subCategory:'Genel',group:'genel',grams:200,calories:250,cost:1,weight:2,difficulty:1,repeatDays:7,times:'Öğle,Akşam',season:'Tüm yıl',active:true,ratingAvg:0,ratingCount:0};openModal(`<div class="modal-head"><div><h3>${id?'Yemeği Düzenle':'Yeni Yemek Ekle'}</h3><p class="muted">Kategori seçimi algoritmanın doğru çalışması için önemlidir. Bir öğünde yalnızca Ana Yemek kategorisinden bir ürün kullanılır.</p></div><button class="btn secondary" onclick="closeModal()">Kapat</button></div><div class="edit-form"><div><label>Yemek adı</label><input id="mealName" value="${esc(m.name||'')}"></div><div><label>Kaynak grup</label><input id="mealSource" value="${esc(m.sourceGroup||'ÖZEL EKLENENLER')}"></div><div><label>Kategori</label><select id="mealCategory"><option ${m.category==='Çorba'?'selected':''}>Çorba</option><option ${m.category==='Ana Yemek'?'selected':''}>Ana Yemek</option><option ${m.category==='Yardımcı'?'selected':''}>Yardımcı</option><option ${m.category==='Tamamlayıcı'?'selected':''}>Tamamlayıcı</option></select></div><div><label>Alt kategori</label><input id="mealSub" value="${esc(m.subCategory||'')}"></div><div><label>Grup etiketi</label><input id="mealGroupTag" value="${esc(m.group||'')}"></div><div><label>Öğün</label><input id="mealTimes" value="${esc(m.times||'Öğle,Akşam')}"></div><div><label>Gram</label><input type="number" id="mealGrams" value="${m.grams||0}"></div><div><label>Kalori</label><input type="number" id="mealCalories" value="${m.calories||0}"></div><div><label>Tekrar günü</label><input type="number" id="mealRepeat" value="${m.repeatDays||7}"></div><div><label>Aktif mi?</label><select id="mealActive"><option value="true" ${m.active!==false?'selected':''}>Aktif</option><option value="false" ${m.active===false?'selected':''}>Pasif</option></select></div></div><div class="actions" style="margin-top:14px"><button class="btn green" onclick="saveMealRecord('${id}')">Yemeği Kaydet</button><button class="btn secondary" onclick="closeModal()">Vazgeç</button></div>`)}
function saveMealRecord(id=''){const name=document.getElementById('mealName').value.trim();if(!name){errorCloud('Yemek adı boş bırakılamaz.');return}let m=id?meal(id):null;if(!m){m={id:uid(),ratingAvg:0,ratingCount:0};state.meals.push(m)}m.name=name;m.sourceGroup=document.getElementById('mealSource').value.trim()||'ÖZEL EKLENENLER';m.category=document.getElementById('mealCategory').value;m.subCategory=document.getElementById('mealSub').value.trim()||m.category;m.group=document.getElementById('mealGroupTag').value.trim()||m.subCategory.toLowerCase();m.times=document.getElementById('mealTimes').value.trim()||'Öğle,Akşam';m.grams=Number(document.getElementById('mealGrams').value||0);m.calories=Number(document.getElementById('mealCalories').value||0);m.repeatDays=Number(document.getElementById('mealRepeat').value||7);m.cost=m.cost||1;m.weight=m.weight||2;m.difficulty=m.difficulty||1;m.season=m.season||'Tüm yıl';m.active=document.getElementById('mealActive').value==='true';saveState(true);closeModal();renderMeals();toast('Yemek Havuzu güncellendi.');}
function toggleMealActive(id){const m=meal(id);if(!m)return;m.active=m.active===false;saveState(true);renderMeals();}
function filterMeals(){const q=(document.getElementById('mealSearch')?.value||'').toLowerCase();const g=document.getElementById('mealGroup')?.value||'';document.querySelectorAll('#mealTable tbody tr').forEach(tr=>{const txt=tr.innerText.toLowerCase();tr.style.display=txt.includes(q)&&(!g||txt.includes(g.toLowerCase()))?'':'none'})}
function surveyPlanOptions(){return state.plans.slice().reverse().map(p=>`<option value="${p.id}">${esc(p.title)} (${fmt(p.start)} - ${fmt(addDays(p.start,p.days.length-1))})</option>`).join('')}
function renderSurvey(){const p=activePlan();document.getElementById('surveySec').innerHTML=`<div class="grid cols2"><div class="card"><h3>Kurumsal Anket Oluştur</h3><p class="lead">Seçilecek haftanın yemek listesi, çoktan seçmeli değerlendirme alanlarıyla dışa aktarılır.</p><label>Anket oluşturulacak plan</label><select id="surveyPlan">${surveyPlanOptions()}</select><div class="hr"></div><div class="survey-choice"><div class="choice-pill">Kötü = 1</div><div class="choice-pill">Orta = 2</div><div class="choice-pill">İyi = 3</div><div class="choice-pill">Güzel = 4</div><div class="choice-pill">Çok Güzel = 5</div></div><div class="actions" style="margin-top:14px"><button class="btn green" onclick="exportSurveyXLS()">Anket Excel</button><button class="btn secondary" onclick="exportSurveyCSV()">Yükleme CSV Şablonu</button><button class="btn gold" onclick="openSurveyMail()">Hazır E-posta</button></div></div><div class="card"><h3>Anket Sonucu Yükle</h3><p class="muted">CSV şablonunda Değerlendirme alanına Kötü, Orta, İyi, Güzel veya Çok Güzel yazılabilir. Alternatif olarak ilgili seçenek sütununa X konulabilir.</p><label class="btn secondary">Anket CSV Yükle<input type="file" accept=".csv,.txt" hidden onchange="importSurveyCSV(event)"></label></div></div><div class="card" style="margin-top:18px"><h3>Anket Veri Takibi</h3>${surveyTable()}</div>`}
function surveyRows(plan=state.plans.find(p=>p.id===document.getElementById('surveyPlan')?.value)||activePlan()){let rows=[];(plan?.days||[]).forEach(d=>['lunch','dinner'].forEach(k=>{menuNames(d[k]).forEach((name,i)=>rows.push({Tarih:d.date,Gün:fmt(d.date),Öğün:k==='lunch'?'Öğle':'Akşam',Ürün_No:i+1,Yemek:name,Kötü:'',Orta:'',İyi:'',Güzel:'',Çok_Güzel:'',Değerlendirme:'',Puan:'',Açıklama:''}))}));return rows}
function exportSurveyCSV(){const rows=surveyRows();downloadCSV(rows,'yemek_memnuniyet_anketi_yukleme_sablonu.csv')}
function exportSurveyXLS(){const rows=surveyRows();let body=`<h2>${esc(state.settings.organization)} - Yemek Memnuniyet Anketi</h2><p>Değerlendirme seçenekleri: Kötü=1, Orta=2, İyi=3, Güzel=4, Çok Güzel=5</p><table><tr>${Object.keys(rows[0]||{}).map(k=>`<th>${esc(k)}</th>`).join('')}</tr>${rows.map(r=>`<tr>${Object.keys(rows[0]||{}).map(k=>`<td>${esc(r[k])}</td>`).join('')}</tr>`).join('')}</table>`;download('yemek_memnuniyet_anketi.xls',excelHtml(body),'application/vnd.ms-excel')}
function openSurveyMail(){const plan=state.plans.find(p=>p.id===document.getElementById('surveyPlan')?.value)||activePlan();if(!plan)return errorCloud('E-posta oluşturmak için önce bir plan seçilmelidir.');const body=`Sayın ilgili,\n\n${state.settings.organization} yemek memnuniyet anketi için ${fmt(plan.start)} - ${fmt(addDays(plan.start,plan.days.length-1))} tarihli yemek listesi hazırlanmıştır.\n\nLütfen ekte/iletilen anket formunda her yemek için Kötü, Orta, İyi, Güzel veya Çok Güzel seçeneklerinden birini işaretleyiniz.\n\n${plan.days.map(d=>fmt(d.date)+'\nÖğle: '+menuNames(d.lunch).join(' | ')+'\nAkşam: '+menuNames(d.dinner).join(' | ')).join('\n\n')}\n\nİyi çalışmalar.`;modal(`<div class="modal-head"><h3>Hazır E-posta Metni</h3><button class="btn secondary" onclick="closeModal()">Kapat</button></div><p class="muted">Aşağıdaki buton e-posta uygulamanızı açar. Excel anket dosyasını ayrıca ekleyebilirsiniz.</p><div class="actions"><a class="btn green" href="mailto:?subject=${encodeURIComponent('Yemek Memnuniyet Anketi')}&body=${encodeURIComponent(body)}">E-posta Uygulamasında Aç</a><button class="btn secondary" onclick="navigator.clipboard?.writeText(\`${body.replace(/`/g,'')}\`);toast('E-posta metni kopyalandı.')">Metni Kopyala</button></div><div class="mail-box">${esc(body)}</div>`)}
function importSurveyCSV(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const rows=parseCSV(r.result);let added=0;rows.forEach(row=>{const name=row['Yemek']||row['Yemek Adı']||row['YemekAdi'];if(!name)return;let label=row['Değerlendirme']||row['Degerlendirme']||'';if(!label){for(const k of ['Kötü','Orta','İyi','Güzel','Çok_Güzel','Çok Güzel']){if(String(row[k]||'').trim()) {label=k.replace('_',' ');break}}}let score=Number(row['Puan']||SCORE_MAP[label]||0);if(!score)return;const rec={date:row['Tarih']||'',mealTime:row['Öğün']||row['Ogun']||'',name,score,label:label||Object.keys(SCORE_MAP).find(k=>SCORE_MAP[k]===score)||'',comment:row['Açıklama']||row['Aciklama']||'',createdAt:new Date().toISOString()};state.surveys.push(rec);applySurvey(rec);added++});saveState(true);toast(`${added} anket satırı sisteme işlendi.`)};r.readAsText(f,'utf-8')}
function applySurvey(rec){const m=state.meals.find(x=>x.name.toLowerCase()===rec.name.toLowerCase());if(m){m.ratingAvg=((m.ratingAvg||0)*(m.ratingCount||0)+rec.score)/((m.ratingCount||0)+1);m.ratingCount=(m.ratingCount||0)+1}}
function surveyTable(){return state.surveys.length?`<div class="table-wrap"><table><thead><tr><th>Tarih</th><th>Öğün</th><th>Yemek</th><th>Değerlendirme</th><th>Puan</th><th>Açıklama</th></tr></thead><tbody>${state.surveys.slice().reverse().slice(0,200).map(s=>`<tr><td>${esc(s.date)}</td><td>${esc(s.mealTime)}</td><td>${esc(s.name)}</td><td>${esc(s.label)}</td><td>${s.score}</td><td>${esc(s.comment)}</td></tr>`).join('')}</tbody></table></div>`:'<p class="muted">Henüz anket sonucu yüklenmedi.</p>'}
function usageStats(){const counts={};state.plans.forEach(p=>p.days.forEach(d=>['lunch','dinner'].forEach(k=>menuNames(d[k]).forEach(n=>counts[n]=(counts[n]||0)+1))));const surveyAgg={};state.surveys.forEach(s=>{surveyAgg[s.name]=surveyAgg[s.name]||{name:s.name,total:0,count:0};surveyAgg[s.name].total+=s.score;surveyAgg[s.name].count++});const usage=Object.entries(counts).map(([name,count])=>({name,count,avg:surveyAgg[name]?surveyAgg[name].total/surveyAgg[name].count:0,ratingCount:surveyAgg[name]?.count||0})).sort((a,b)=>b.count-a.count);const liked=Object.values(surveyAgg).map(x=>({name:x.name,avg:x.total/x.count,ratingCount:x.count,count:counts[x.name]||0})).sort((a,b)=>b.avg-a.avg||b.ratingCount-a.ratingCount);return{usage,liked,counts,surveyAgg}}
function renderStrategy(){const st=usageStats();document.getElementById('strategySec').innerHTML=`<div class="grid cols2"><div class="card"><h3>Hangi yemek kaç kez çıkmış?</h3>${barChart(st.usage.slice(0,15),'count')}</div><div class="card"><h3>Anketlerde en beğenilen yemekler</h3>${barChart(st.liked.slice(0,15),'avg')}</div></div><div class="card" style="margin-top:18px"><div class="actions" style="justify-content:space-between"><h3>Kullanım - Beğeni Karşılaştırması</h3><div class="actions"><button class="btn gold" onclick="printStrategyPDF()">Kurumsal Grafik PDF</button><button class="btn secondary" onclick="exportStrategyCSV()">İstatistik Excel / CSV</button></div></div>${comparisonTable(st)}</div>`}
function barChart(arr,type){if(!arr.length)return '<p class="muted">Veri yok.</p>';const max=Math.max(...arr.map(x=>type==='avg'?x.avg:x.count),1);return arr.map(x=>`<div class="chart-row"><div class="chart-label" title="${esc(x.name)}">${esc(x.name)}</div><div class="bar"><span style="width:${Math.max(4,((type==='avg'?x.avg:x.count)/max)*100)}%"></span></div><b>${type==='avg'?x.avg.toFixed(1):x.count}</b></div>`).join('')}
function comparisonTable(st){const rows=st.usage.slice(0,80);return rows.length?`<div class="table-wrap"><table><thead><tr><th>Yemek</th><th>Kaç kez çıktı</th><th>Anket ortalaması</th><th>Anket sayısı</th><th>Yorum</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${esc(x.name)}</td><td>${x.count}</td><td>${x.avg?x.avg.toFixed(1):'—'}</td><td>${x.ratingCount||0}</td><td>${x.avg>=4.5?'Sık kullanılan ve çok beğenilen yemek':x.count>=3&&!x.avg?'Sık kullanılmış; anket verisi yok':x.avg&&x.avg<3?'Beğeni düşük, dikkat edilmeli':'Normal'}</td></tr>`).join('')}</tbody></table></div>`:'<p class="muted">Plan oluşturulduğunda karşılaştırma tablosu oluşur.</p>'}
function printStrategyPDF(){showSection('strategy');document.getElementById('strategySec').classList.add('print-target');setTimeout(()=>window.print(),150);setTimeout(()=>document.getElementById('strategySec').classList.remove('print-target'),1000)}
function exportStrategyCSV(){const st=usageStats();downloadCSV(st.usage.map(x=>({'Yemek':x.name,'Kaç Kez Çıktı':x.count,'Anket Ortalaması':x.avg?x.avg.toFixed(2):'','Anket Sayısı':x.ratingCount||0})), 'strateji_istatistikleri.csv')}
function renderExports(){document.getElementById('exportsSec').innerHTML=`<div class="grid cols2"><div class="card"><h3>Kurumsal çıktılar</h3><p class="lead">Yemek planı, anket ve strateji raporlarını sade formatta dışa aktarın.</p><div class="actions"><button class="btn green" onclick="exportPlanWord()">Yemek Planı Word</button><button class="btn secondary" onclick="exportPlanCSV()">Yemek Planı Excel / CSV</button><button class="btn secondary" onclick="window.print()">PDF / Yazdır</button><button class="btn gold" onclick="printStrategyPDF()">Grafikli Strateji PDF</button><button class="btn secondary" onclick="exportSurveyXLS()">Anket Excel</button></div></div><div class="card"><h3>Yedekleme</h3><p class="muted">Tüm sistem verisini JSON olarak dışa aktarabilir veya geri yükleyebilirsiniz.</p><div class="actions"><button class="btn secondary" onclick="backupJSON()">JSON Yedek Al</button><label class="btn secondary">JSON Yedek Yükle<input type="file" accept=".json" hidden onchange="restoreJSON(event)"></label></div></div></div>`}
function exportPlanWord(){const p=activePlan();if(!p)return errorCloud('Word çıktısı için aktif plan bulunamadı.');download('yemek_plani.doc',wordHtml('Yemek Planı',planTableHtml(p)),'application/msword')}
function planRows(plan=activePlan()){let rows=[];(plan?.days||[]).forEach(d=>['lunch','dinner'].forEach(k=>{const names=menuNames(d[k]);rows.push({Tarih:d.date,Gün:fmt(d.date),Öğün:k==='lunch'?'Öğle':'Akşam',Ürün_1:names[0]||'',Ürün_2:names[1]||'',Ürün_3:names[2]||'',Ürün_4:names[3]||'',Ürün_5:names[4]||'Salata Bar',Kalori:d[k].totalCal||0,Kalite_Puanı:d[k].score||0,Uyarı:(d[k].notes||[]).join(' | ')})}));return rows}
function exportPlanCSV(){if(!activePlan())return errorCloud('Excel / CSV çıktısı için aktif plan bulunamadı.');downloadCSV(planRows(),'yemek_plani.csv')}
function exportMealsCSV(){downloadCSV(state.meals.map(m=>({Yemek:m.name,Grup:m.sourceGroup,Kategori:m.category,Alt_Kategori:m.subCategory,Gram:m.grams,Kalori:m.calories,Aktif:m.active?'Evet':'Hayır'})),'yemek_havuzu.csv')}
function wordHtml(title,body){return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:Calibri,Arial;margin:28px;color:#1f2937}h1{text-align:center;color:#0f2c5c;font-size:20pt}h2{text-align:center;font-size:15pt}.meta{border:1px solid #94a3b8;background:#f1f5f9;padding:10px;margin-bottom:18px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #94a3b8;padding:7px;font-size:10.5pt}th{background:#eaf1f8}.ayran-options{margin-top:10px;padding:12px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.45)}</style></head><body><h1>${esc(state.settings.organization)}</h1><h2>${esc(title)}</h2><div class="meta"><b>Hazırlayan:</b> ${esc(state.settings.createdBy)} &nbsp; <b>Tarih:</b> ${todayISO()}</div>${body}<p style="text-align:center;color:#64748b">TBMM Destek Hizmetleri Başkanlığı • Kurumsal Yemek Planlama Sistemi</p></body></html>`}
function planTableHtml(plan){return `<table><tr><th>Tarih</th><th>Öğün</th><th>Ürün 1</th><th>Ürün 2</th><th>Ürün 3</th><th>Ürün 4</th><th>Ürün 5</th><th>Kalori</th><th>Puan</th></tr>${planRows(plan).map(r=>`<tr><td>${r.Gün}</td><td>${r.Öğün}</td><td>${esc(r.Ürün_1)}</td><td>${esc(r.Ürün_2)}</td><td>${esc(r.Ürün_3)}</td><td>${esc(r.Ürün_4)}</td><td>${esc(r.Ürün_5)}</td><td>${r.Kalori}</td><td>${r.Kalite_Puanı}</td></tr>`).join('')}</table>`}
function renderSettings(){const size=new Blob([localStorage.getItem(APP_KEY)||'']).size;document.getElementById('settingsSec').innerHTML=`<div class="grid cols2"><div class="card"><h3>Genel ayarlar</h3><div class="form two"><div><label>Kurum adı</label><input id="setOrg" value="${esc(state.settings.organization)}"></div><div><label>Hazırlayan</label><input id="setBy" value="${esc(state.settings.createdBy)}"></div><div><label>Ana yemek tekrar günü</label><input type="number" id="setMain" value="${state.settings.repeatMain||7}"></div><div><label>Çorba tekrar günü</label><input type="number" id="setSoup" value="${state.settings.repeatSoup||3}"></div></div><button class="btn green" style="margin-top:14px" onclick="saveSettings()">Ayarları Kaydet</button></div><div class="card"><h3>Depolama bilgisi</h3><p class="lead">Bu uygulama tek HTML dosyası olarak çalışır. Yemek listesi, oluşturulan planlar, anketler ve ayarlar bu tarayıcının <b>localStorage</b> alanında saklanır. Veriler otomatik olarak herhangi bir sunucuya gönderilmez.</p><p><b>Yaklaşık kullanılan alan:</b> ${(size/1024).toFixed(1)} KB</p><div class="actions"><button class="btn secondary" onclick="backupJSON()">JSON Yedek Al</button><label class="btn secondary">JSON Yedek Yükle<input type="file" accept=".json" hidden onchange="restoreJSON(event)"></label><button class="btn red" onclick="resetSystem()">Sistemi Sıfırla</button></div></div></div>`}

function qualityScore(plan){if(!plan)return 0;let scores=[];plan.days.forEach(d=>scores.push(d.lunch.score,d.dinner.score));return scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0}
function downloadCSV(rows,name){const keys=Object.keys(rows[0]||{});const csv='\ufeff'+[keys.join(';'),...rows.map(r=>keys.map(k=>'"'+String(r[k]??'').replace(/"/g,'""')+'"').join(';'))].join('\n');download(name,csv,'text/csv;charset=utf-8')}
function parseCSV(txt){let lines=txt.replace(/^\ufeff/,'').split(/\r?\n/).filter(x=>x.trim());if(!lines.length)return[];const split=line=>{let a=[],cur='',q=false;for(let i=0;i<line.length;i++){let ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++}else q=!q}else if((ch===';'||ch===',')&&!q){a.push(cur);cur=''}else cur+=ch}a.push(cur);return a};const head=split(lines[0]).map(x=>x.trim());return lines.slice(1).map(l=>{let vals=split(l);let o={};head.forEach((h,i)=>o[h]=vals[i]||'');return o})}
function excelHtml(body){return `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>${body}</body></html>`}
function download(name,content,type){const b=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function backupJSON(){download('tabildot_yedek.json',JSON.stringify(state,null,2),'application/json')}
function restoreJSON(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);ensureDefaults();saveState(true);renderAll();toast('Yedek geri yüklendi.')}catch(e){errorCloud('Yedek dosyası okunamadı.')}};r.readAsText(f,'utf-8')}

function syncDateInputs(which){
  const s=document.getElementById('genStart'), e=document.getElementById('genEnd');
  if(!s||!e)return;
  if(!e.value||e.value<s.value)e.value=s.value;
}

function deleteDraftPlan(){
  if(!state.draftPlan&&!state.planDirty){errorCloud('Silinecek taslak plan bulunamadı.');return}
  if(!confirm('Kaydedilmemiş taslak plan silinsin mi?'))return;
  state.draftPlan=null;
  state.planDirty=false;
  state.activePlanId=state.plans[0]?.id||null;
  saveState(false);
  renderAll();
  showSection(state.activePlanId?'plan':'generate');
  toast('Taslak plan silindi.');
}

function saveCurrentPlan(){
  const p=activePlan();
  if(!p){errorCloud('Kaydedilecek yemek planı bulunamadı.');return}
  p.updatedAt=new Date().toISOString();
  p.saved=true;
  if(state.draftPlan){
    const idx=state.plans.findIndex(x=>x.id===state.draftPlan.id);
    const clean=JSON.parse(JSON.stringify(state.draftPlan));
    clean.saved=true;
    clean.updatedAt=new Date().toISOString();
    if(idx>=0)state.plans[idx]=clean;else state.plans.push(clean);
    state.activePlanId=clean.id;
    state.draftPlan=null;
  }else{
    const idx=state.plans.findIndex(x=>x.id===p.id);
    if(idx>=0)state.plans[idx]=JSON.parse(JSON.stringify(p));
    else {state.plans.push(JSON.parse(JSON.stringify(p)));state.activePlanId=p.id;}
  }
  state.planDirty=false;
  saveState(true);
  renderAll();
  showSection('plan');
  toast('Yemek planı kalıcı olarak kaydedildi ve Tüm Planlar bölümüne eklendi.');
}

function normalizeMealName(v){
  return String(v||'').toLocaleLowerCase('tr-TR').replace(/[^\p{L}\p{N}\s]/gu,' ').replace(/\s+/g,' ').trim();
}

function levenshtein(a,b){
  a=normalizeMealName(a);b=normalizeMealName(b);
  const m=a.length,n=b.length;
  if(!m)return n;if(!n)return m;
  let dp=Array.from({length:m+1},(_,i)=>[i]);
  for(let j=1;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      const cost=a[i-1]===b[j-1]?0:1;
      dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+cost);
    }
  }
  return dp[m][n];
}

function mealSearchResults(q,limit=7){
  q=normalizeMealName(q);
  if(!q)return [];
  return state.meals.filter(m=>m.active!==false).map(m=>{
    const name=normalizeMealName(m.name);
    let score=100;
    if(name===q)score=0;
    else if(name.startsWith(q))score=1;
    else if(name.includes(q))score=2;
    else score=levenshtein(q,name)+4;
    return {m,score};
  }).sort((a,b)=>a.score-b.score||a.m.name.localeCompare(b.m.name,'tr')).slice(0,limit).map(x=>x.m);
}

function mealDatalistHTML(){
  return `<datalist id="allMealList">${state.meals.filter(m=>m.active!==false).map(m=>`<option value="${esc(m.name)}"></option>`).join('')}</datalist>`;
}

function currentValue(id){
  const m=meal(id);
  return m?m.name:(id||'');
}

function manualField(inputId,label,value){
  return `<div class="did-wrap"><label>${label}</label><input id="${inputId}" list="allMealList" value="${esc(currentValue(value))}" placeholder="Yemek adı yazın veya listeden seçin" oninput="showMealSuggestions('${inputId}')"><div id="${inputId}_suggestions" class="did-suggestions"></div></div>`;
}

function showMealSuggestions(inputId){
  const input=document.getElementById(inputId);
  const box=document.getElementById(inputId+'_suggestions');
  if(!input||!box)return;
  const q=input.value;
  const res=mealSearchResults(q,5);
  if(!q||!res.length){box.innerHTML='';return;}
  box.innerHTML=res.map(m=>`<button type="button" onclick="setManualMeal('${inputId}', '${esc(String(m.name).replace(/'/g,'&#39;'))}')">${esc(m.name)}</button>`).join('');
}

function setManualMeal(inputId,name){
  const input=document.getElementById(inputId);
  if(input){input.value=name;showMealSuggestions(inputId);}
}

function resolveManualMealName(v){
  v=String(v||'').trim();
  if(!v)return '';
  const exact=state.meals.find(m=>normalizeMealName(m.name)===normalizeMealName(v));
  return exact?exact.id:v;
}

function editMenu(date,slot){
  const p=activePlan();
  if(!p)return errorCloud('Düzenlenecek aktif plan bulunamadı.');
  const day=(p.days||[]).find(x=>x.date===date);
  if(!day)return errorCloud('Seçilen gün planda bulunamadı.');
  const menu=day[slot]||{items:[]};
  const current=menu.items||[];
  const soup=current[0]||'', main=current[1]||'', side=current[2]||'', extra=current[3]||'';
  openModal(`<div class="modal-head"><div><h3>${fmt(date)} ${slot==='lunch'?'Öğle':'Akşam'} Menüsü</h3><p class="muted">Yönetici bu ekranda menüyü serbest biçimde değiştirebilir. Otomatik plan kuralları burada engel oluşturmaz.</p></div><button class="btn secondary" onclick="closeModal()">Kapat</button></div>
    <div class="dialog-info warn">Yazdığınız yemek adı havuzda yoksa yine de manuel kayıt olarak plana eklenir. Sistem benzer yemek adlarını altta önerir.</div>
    ${mealDatalistHTML()}
    <div class="manual-grid">
      ${manualField('editSoup','1. Ürün',soup)}
      ${manualField('editMain','2. Ürün',main)}
      ${manualField('editSide','3. Ürün',side)}
      ${manualField('editExtra','4. Ürün',extra)}
      <div class="full"><span class="pill-info">5. Ürün sabit: Salata Bar</span></div>
    </div>
    <div class="actions" style="margin-top:14px"><button class="btn green" onclick="saveManualMenu('${date}','${slot}')">Değişikliği Uygula</button><button class="btn secondary" onclick="closeModal()">Vazgeç</button></div>`);
}

function saveManualMenu(date,slot){
  const ids=[
    resolveManualMealName(document.getElementById('editSoup')?.value),
    resolveManualMealName(document.getElementById('editMain')?.value),
    resolveManualMealName(document.getElementById('editSide')?.value),
    resolveManualMealName(document.getElementById('editExtra')?.value)
  ].filter(Boolean);
  const p=activePlan();
  if(!p)return errorCloud('Aktif plan bulunamadı.');
  const day=(p.days||[]).find(x=>x.date===date);
  if(!day)return errorCloud('Gün kaydı bulunamadı.');
  const items=ids.map(x=>meal(x)).filter(Boolean);
  const totalCal=items.reduce((a,m)=>a+(m.calories||0),0);
  day[slot]={
    items:ids,
    fixed:['Salata Bar'],
    score:Math.max(45,Math.round(100-Math.max(0,totalCal-1250)/30)),
    totalCal:Math.round(totalCal),
    notes:['Yönetici tarafından manuel düzenlendi.']
  };
  p.updatedAt=new Date().toISOString();
  state.planDirty=true;
  closeModal();
  renderAll(false);
  showSection('plan');
  toast('Manuel değişiklik uygulandı. Kalıcı kayıt için Yemek Planı Kaydet butonuna basın.');
}

function menuNames(menu){
  return (menu?.items||[]).map(id=>meal(id)?.name||id).concat(menu?.fixed||[]);
}

document.addEventListener('DOMContentLoaded',init);
