<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBMM Destek Hizmetleri Başkanlığı - Akıllı Tabildot Menü</title>
<style>
:root{
  --navy:#233f73;--navy2:#2f538c;--cream:#f7f2e8;--gold:#c8a15a;--bg:#eef3f8;--card:#ffffff;--text:#182238;--muted:#667085;
  --line:#dde5ef;--green:#6d9278;--blue:#718bb9;--red:#ba5d5d;--amber:#c59b55;--shadow:0 16px 40px rgba(28,52,91,.12);
  --radius:22px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(135deg,#edf3f9,#fbf7ef 55%,#eef4f8);color:var(--text)}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh;max-width:1680px;margin:auto}
aside{background:linear-gradient(180deg,var(--navy2),var(--navy));color:#fff;padding:20px;position:sticky;top:0;height:100vh;overflow:auto;box-shadow:var(--shadow)}
.logoBox{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid rgba(255,255,255,.18);border-radius:22px;background:rgba(255,255,255,.1);margin-bottom:18px}
.logoWrap{width:60px;height:60px;border-radius:16px;background:#fff;display:grid;place-items:center;overflow:hidden;flex:0 0 60px;box-shadow:0 8px 18px rgba(0,0,0,.18)}
.logoWrap img{max-width:52px;max-height:52px;object-fit:contain}
.logoBox h1{font-size:16px;margin:0;line-height:1.25;font-weight:900}
.logoBox p{font-size:11px;margin:4px 0 0;color:#f2dfb8}
.nav{display:grid;gap:10px}
.nav button{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:#fff;border-radius:16px;padding:13px 14px;text-align:left;display:flex;align-items:center;gap:10px;font-weight:800;transition:.15s}
.nav button:hover,.nav button.active{background:linear-gradient(135deg,#657daf,#546fa3);transform:translateX(3px)}
.nav i{width:28px;height:28px;border-radius:10px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-style:normal;color:#f6e4bf}
.sideInfo{margin-top:18px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);border-radius:18px;padding:14px;line-height:1.55}
.sideInfo b{display:block;color:#fff3d8;margin-bottom:6px}.sideInfo small{color:#f4f6fb}.miniRow{display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,.15);padding-top:8px;margin-top:8px}
main{padding:26px;min-width:0}
.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}
.top h2{font-family:Georgia,serif;font-size:32px;margin:0;color:#1e2a44}.top p{margin:8px 0 0;color:var(--muted)}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:1px solid rgba(96,119,160,.25);background:linear-gradient(135deg,#7e96c1,#6f88ba);color:#fff;border-radius:13px;padding:11px 14px;font-weight:900;box-shadow:0 9px 18px rgba(44,74,124,.10);display:inline-flex;align-items:center;gap:7px;text-decoration:none;white-space:nowrap;min-height:40px}
.btn:hover{filter:brightness(1.04);transform:translateY(-1px)}
.btn.secondary{background:linear-gradient(135deg,#f7f2e8,#eee4d5);color:#2a3854;border-color:#d7c8ae}
.btn.green{background:linear-gradient(135deg,#6d9278,#7ba38c)}
.btn.red{background:linear-gradient(135deg,#b86363,#c77777)}
.btn.amber{background:linear-gradient(135deg,#c5a060,#d2b57c)}
.btn.small{padding:8px 10px;border-radius:11px;font-size:12px;min-height:34px}
.section{display:none}.section.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:.35;transform:translateY(5px)}to{opacity:1;transform:none}}
.grid{display:grid;gap:16px}.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:0 14px 36px rgba(25,48,86,.08)}
.card h3{font-family:Georgia,serif;font-size:22px;margin:0 0 12px;color:#1f2b46}.card h4{margin:16px 0 8px}
.cardTitle{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px}
.lead{line-height:1.65;color:#4d5a70}.muted{color:var(--muted)}.hint{font-size:12px;color:var(--muted);line-height:1.45}
.kpi{display:flex;align-items:center;gap:12px;min-height:112px}.kpi .badge{width:56px;height:56px;border-radius:18px;background:#edf3fb;display:grid;place-items:center;color:#2b4e82;font-size:24px}.kpi b{font-size:26px}.kpi span{display:block;color:var(--muted);font-size:13px;margin-top:3px}
label{display:block;font-weight:900;margin-bottom:7px;font-size:13px;color:#253049}
input,select,textarea{width:100%;border:1px solid #d8e2ef;background:#fbfdff;color:var(--text);border-radius:13px;padding:11px 12px;outline:none}
textarea{min-height:92px;resize:vertical} input:focus,select:focus,textarea:focus{box-shadow:0 0 0 4px rgba(47,83,140,.12);border-color:#7c96c0}
.form{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px}.form.two{grid-template-columns:repeat(2,minmax(0,1fr))}.form.three{grid-template-columns:repeat(3,minmax(0,1fr))}.full{grid-column:1/-1}
.checkGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.checkLine{display:flex;align-items:flex-start;gap:8px;border:1px solid #e2e8f0;border-radius:14px;padding:10px;background:#fbfdff}
.checkLine input{width:auto;margin-top:3px}.checkLine div{line-height:1.35}.checkLine small{display:block;color:var(--muted);font-weight:500;margin-top:2px}
table{width:100%;border-collapse:separate;border-spacing:0 8px}th{text-align:left;font-size:12px;color:#5e6a7e;padding:0 10px}td{background:#fbfdff;border-top:1px solid #e1e8f1;border-bottom:1px solid #e1e8f1;padding:10px;vertical-align:top}td:first-child{border-left:1px solid #e1e8f1;border-radius:14px 0 0 14px}td:last-child{border-right:1px solid #e1e8f1;border-radius:0 14px 14px 0}
.tableWrap{overflow:auto}.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;background:#edf3fb;color:#2c4d7b;font-size:12px;font-weight:900;border:1px solid #d7e2f1;margin:2px}.pill.ok{background:#e8f3ee;color:#286747}.pill.warn{background:#fff4de;color:#8a631c}.pill.bad{background:#fae9e4;color:#963d30}
.mealList{margin:0;padding-left:18px;line-height:1.62}.mealList li.fixed{font-weight:900;color:#416648}.mealHead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}.mealHead b{color:#243f73}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(184,75,75,.88);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:18px;padding:13px 18px;box-shadow:var(--shadow);display:none;z-index:9999;max-width:680px;backdrop-filter:blur(10px);font-weight:800}.toast.show{display:block;animation:toast .22s ease}@keyframes toast{from{opacity:.2;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}
.goodToast{background:rgba(67,130,91,.9)!important}
.modalBg{position:fixed;inset:0;background:rgba(10,20,40,.58);display:none;align-items:center;justify-content:center;padding:18px;z-index:9000}.modalBg.show{display:flex}.modal{background:#fff;border-radius:24px;border:1px solid #dce5f1;box-shadow:var(--shadow);max-width:1100px;width:100%;max-height:92vh;overflow:auto;padding:20px}.modalHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.close{border:0;background:#eef3f8;border-radius:12px;padding:8px 10px}
.suggestBox{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 0}.suggestBtn{border:1px solid #d8e2ef;background:#f8fafc;border-radius:999px;padding:5px 8px;font-size:12px;color:#2b4c7f}
.bar{height:22px;background:#edf3fb;border:1px solid #dbe5f1;border-radius:999px;overflow:hidden;min-width:160px}.bar span{display:block;height:100%;background:linear-gradient(90deg,#6d9278,#6f88ba);color:#fff;font-size:11px;text-align:right;padding-right:6px;line-height:22px;min-width:26px}
.chartRow{display:grid;grid-template-columns:220px 1fr 60px;gap:10px;align-items:center;margin:8px 0}.notice{border-left:5px solid var(--blue);background:#f8fbff;border-radius:12px;padding:12px;margin:10px 0;line-height:1.55}.warning{border-left-color:var(--red);background:#fff7f7}.oknote{border-left-color:var(--green);background:#f6fbf8}
.guide p,.guide li{line-height:1.75}.guide .step{border:1px solid #e2e8f0;background:#fbfdff;border-radius:16px;padding:14px;margin:12px 0}
.printOnly{display:none}
@media(max-width:1100px){.app{grid-template-columns:1fr}aside{position:relative;height:auto}.form,.form.two,.form.three,.cols2,.cols3,.cols4,.checkGrid{grid-template-columns:1fr}.top{flex-direction:column}.chartRow{grid-template-columns:1fr}.actions{justify-content:flex-start}}
@media print{
  aside,.top,.actions,.noPrint,.modalBg,.toast{display:none!important}
  .app{display:block}.section{display:none!important}.section.printTarget{display:block!important}
  main{padding:0}.card{box-shadow:none;border:1px solid #94a3b8;background:#fff}.printOnly{display:block;text-align:center;border:1px solid #94a3b8;background:#f1f5f9;margin-bottom:12px;padding:10px}
  table{border-collapse:collapse;border-spacing:0}td,th{border:1px solid #94a3b8;border-radius:0;background:#fff}th{background:#eaf1f8}
}

/* === Giriş paneli, ayarlar ve hazır menü ekleri === */
.login-screen{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e293b,#24364d 55%,#304967);padding:24px}
.login-card{width:min(430px,94vw);background:rgba(255,255,255,.96);border-radius:24px;box-shadow:0 22px 60px rgba(0,0,0,.28);padding:32px;text-align:center;border:1px solid rgba(255,255,255,.45)}
.login-card .logo-round{width:82px;height:82px;border-radius:50%;background:#fff;border:2px solid rgba(199,163,75,.85);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 24px rgba(0,0,0,.14);overflow:hidden;padding:6px}.login-card .logo-round img{width:100%;height:100%;object-fit:contain}.login-card h1{font-size:20px;margin:0;color:#1f2f4d}.login-card p{margin:8px 0 18px;color:#64748b}.login-card input{width:100%;padding:13px 14px;border-radius:14px;border:1px solid #cbd5e1;font-weight:700;text-align:center}.login-card .login-actions{margin-top:14px;display:grid;gap:10px}.login-error{display:none;color:#991b1b;background:#fff1f2;border:1px solid #fecaca;border-radius:12px;padding:9px;margin-top:12px;font-weight:800}.app.hidden-app{display:none!important}.settingsBox{border:1px solid var(--line);border-radius:18px;background:#fff;padding:16px;box-shadow:0 8px 20px rgba(15,23,42,.04)}.settingsBox h4{margin:0 0 10px;color:#203a73}.settingsInfo{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.infoTile{border:1px solid #e2e8f0;background:#f8fafc;border-radius:14px;padding:12px}.infoTile b{display:block;color:#203a73;font-size:20px}.quickMenuCard{border:1px solid #e2e8f0;background:#f8fafc;border-radius:16px;padding:12px;margin:10px 0}.quickMenuCard b{color:#1e3a68}.quickMenuMini{font-size:12px;color:#64748b}.quickMenuSelect{display:flex;gap:8px;flex-wrap:wrap;align-items:end}.quickMenuSelect>div{flex:1;min-width:220px}.loginFoot{font-size:11px;color:#64748b;margin-top:14px}.adminStatus{font-size:12px;border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:6px 10px;color:#fff;background:rgba(255,255,255,.08)}


/* === KURUMSAL Sade Tasarım V2 === */
body{background:linear-gradient(135deg,#eef3f8,#f8f6f1 45%,#edf2f7)!important;color:#1d2a3f!important}
.app{background:transparent!important}
aside{background:linear-gradient(180deg,#213f76,#18325f)!important;border-right:1px solid rgba(214,190,139,.35)!important;box-shadow:18px 0 45px rgba(31,56,99,.10)!important}
.brand{background:rgba(255,255,255,.10)!important;border:1px solid rgba(237,224,195,.28)!important;border-radius:22px!important;padding:14px!important;margin-bottom:18px!important}
.brand .logo{background:#fff!important;border:1px solid rgba(198,163,91,.65)!important;border-radius:16px!important;box-shadow:0 10px 22px rgba(0,0,0,.12)!important}
.brand h1{font-family:Georgia,'Times New Roman',serif!important;color:#fff9eb!important;font-size:18px!important;line-height:1.2!important}
.brand p{color:#ead7ad!important;letter-spacing:.9px!important}
.nav button{background:rgba(255,255,255,.075)!important;border:1px solid rgba(255,255,255,.12)!important;color:#fffaf0!important;border-radius:16px!important;margin-bottom:8px!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)!important}
.nav button.active,.nav button:hover{background:linear-gradient(135deg,#556fa3,#405d92)!important;color:#fff!important;border-color:rgba(237,224,195,.35)!important}
.sideInfo{background:rgba(255,255,255,.08)!important;border:1px solid rgba(237,224,195,.22)!important;color:#fffaf0!important;border-radius:18px!important}
.sideInfo small,.miniRow{color:#fffaf0!important}
main{background:transparent!important}
.top.compactTop{min-height:52px!important;padding:8px 8px 10px!important;border-bottom:0!important;background:transparent!important;box-shadow:none!important;justify-content:flex-end!important}
.top.compactTop h2,.top.compactTop p{display:none!important}
.topIconGroup{display:flex;gap:10px;align-items:center}
.iconAction{width:46px;height:46px;border-radius:15px;border:1px solid #d6c5a8;background:linear-gradient(135deg,#fffaf0,#eee3d1);color:#203a73;font-weight:900;font-size:19px;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 10px 22px rgba(32,58,115,.10);cursor:pointer}
.iconAction:hover{background:linear-gradient(135deg,#ffffff,#f1e7d7);transform:translateY(-1px)}
.dangerIcon{color:#8a1f1a}
.card,.settingsBox{background:rgba(255,255,255,.86)!important;border:1px solid #ded6c9!important;border-radius:22px!important;box-shadow:0 16px 36px rgba(31,56,99,.08)!important}
.cardTitle h3,.card h3,.settingsBox h4{font-family:Georgia,'Times New Roman',serif!important;color:#1f3154!important}
.btn{border-radius:13px!important;min-height:38px!important;font-weight:800!important;border:1px solid rgba(90,110,145,.25)!important;box-shadow:0 8px 18px rgba(31,56,99,.08)!important}
.btn.green{background:linear-gradient(135deg,#6d927e,#86aa95)!important;color:#fff!important}
.btn.secondary{background:linear-gradient(135deg,#faf6ee,#eee3d3)!important;color:#213653!important;border-color:#d8c6a9!important}
.btn.amber{background:linear-gradient(135deg,#c4a76e,#d7be86)!important;color:#fff!important}
.btn.red{background:linear-gradient(135deg,#ad6464,#c27c7c)!important;color:#fff!important}
.kpi .badge,.badge{background:#e9f0f8!important;color:#203a73!important}
.tableWrap table th{background:#243f70!important;color:#fff!important}
.notice{border-radius:15px!important}
.surveyPrintOnly{display:none}
@media print{
  body *{visibility:hidden!important}
  .surveyPrintOnly,.surveyPrintOnly *{visibility:visible!important}
  .surveyPrintOnly{display:block!important;position:absolute!important;left:0!important;top:0!important;width:100%!important;background:#fff!important;padding:10mm!important;color:#000!important}
  .surveyPrintOnly table{width:100%;border-collapse:collapse;font-size:10pt}
  .surveyPrintOnly th,.surveyPrintOnly td{border:1px solid #333;padding:5px;vertical-align:middle}
  .surveyPrintOnly th{background:#e9eef5!important}
  @page{size:A4 landscape;margin:8mm}
}

</style>

function createDraft(o){
 let schedule=[];let usage={};let dessertLeft=Math.ceil((datesBetween(o.start,o.end).length/7)*(o.includeDessert?o.dessertCount:0));let ayranLeft=Math.ceil((datesBetween(o.start,o.end).length/7)*(o.includeAyran?o.ayranCount:0));let dates=datesBetween(o.start,o.end);
 dates.forEach((d,idx)=>{
   let lunch=buildMeal(d,'Öğle',o,usage,{dessertLeft,ayranLeft,idx,total:dates.length});
   registerUsage(lunch,usage);
   if(lunch.hasDessert)dessertLeft--; if(lunch.hasAyran)ayranLeft--;
   let same=o.sameMode==='same'||(o.sameMode==='ask'&&o.sameDays&&o.sameDays[d]);
   let dinner=same?cloneMeal(lunch):buildMeal(d,'Akşam',o,usage,{dessertLeft,ayranLeft,idx,total:dates.length,lunch});
   if(!same){registerUsage(dinner,usage); if(dinner.hasDessert)dessertLeft--; if(dinner.hasAyran)ayranLeft--;}
   schedule.push({date:d,day:DAYS[new Date(d+'T12:00:00').getDay()],lunch,dinner});
 });

function scoreCandidate(m,slot,o,usage,ctx){
 let score=50;
 if(o.mode==='Memnuniyet Odaklı')score+=ratingOf(m)*8;
 if(o.mode==='Hafif Menü')score-=m.weight*7;
 if(o.rules.preferVariety)score-=(usage[m.id]||0)*18;
 if(o.rules.noSameGroupBackToBack)score-=(usage['g:'+m.group]||0)*8;
 if(slot==='Akşam'&&o.rules.avoidHeavyDinner)score-=m.weight*5;
 score+=Math.random()*8;
 return score;
}
function pick(list,slot,o,usage,ctx,exclude=[]){
 let candidates=list.filter(m=>m.active&&!exclude.includes(m.id));
 if(!candidates.length)candidates=list.filter(m=>m.active);
 candidates=candidates.map(m=>({m,score:scoreCandidate(m,slot,o,usage,ctx)})).sort((a,b)=>b.score-a.score);
 return candidates[0]?.m||null;
}
function shouldUse(kind,slot,o,ctx){
 if(kind==='dessert'){if(!o.includeDessert||ctx.dessertLeft<=0)return false;return (ctx.idx%Math.max(1,Math.floor(ctx.total/Math.max(1,ctx.dessertLeft)))===0)||ctx.idx>=ctx.total-ctx.dessertLeft}
 if(kind==='ayran'){if(!o.includeAyran||ctx.ayranLeft<=0)return false;if(o.ayranSlot==='lunch'&&slot!=='Öğle')return false;if(o.ayranSlot==='dinner'&&slot!=='Akşam')return false;return (ctx.idx%Math.max(1,Math.floor(ctx.total/Math.max(1,ctx.ayranLeft)))===0)||ctx.idx>=ctx.total-ctx.ayranLeft}
 return false
}
function buildMeal(date,slot,o,usage,ctx){
 if(o.quickMenuId){let qm=null;if(o.quickMenuId==='rotate'){let list=state.quickMenus||[];if(list.length)qm=list[(ctx.idx+(slot==='Akşam'?1:0))%list.length];}else qm=findQuickMenu(o.quickMenuId);if(qm){let m=quickMenuToMenu(qm);m.notes=[`Hazır menü kullanıldı: ${qm.name}`];return m;}}
 let soup=pick(activeMeals('Çorba'),slot,o,usage,ctx);
 let main=pick(activeMeals('Ana Yemek'),slot,o,usage,ctx);
 let sideList=activeMeals('Yardımcı').filter(m=>m.category!=='Ana Yemek');
 let side=pick(sideList,slot,o,usage,ctx);
 let extra=null, notes=[];
 let hasDessert=false,hasAyran=false;
 if(shouldUse('ayran',slot,o,ctx)){extra=state.meals.find(m=>m.name==='Ayran');hasAyran=true;}
 else if(shouldUse('dessert',slot,o,ctx)){extra=pick(activeMeals('Tamamlayıcı').filter(m=>m.subCategory==='Tatlı'),slot,o,usage,ctx);hasDessert=true;}
 else if(o.includeSalad){extra=pick(activeMeals('Tamamlayıcı').filter(m=>m.subCategory==='Salata'),slot,o,usage,ctx);}
 else {extra=pick(activeMeals('Tamamlayıcı').filter(m=>!['Tatlı','Salata','Ayran'].includes(m.subCategory)),slot,o,usage,ctx);}
 if(!extra) extra=pick(activeMeals('Tamamlayıcı').filter(m=>m.name!=='Ayran'),slot,o,usage,ctx);
 let items=[soup,main,side,extra].filter(Boolean).map(m=>m.id);
 // Kesin güvence: otomatik üretimde birden fazla ana yemek olmasın.
 let mains=items.map(getMeal).filter(m=>m&&m.category==='Ana Yemek');
 if(mains.length>1){items=items.filter(id=>id===main.id||getMeal(id).category!=='Ana Yemek');notes.push('İki ana yemek oluşmaması için yardımcı seçim düzeltildi.')}
 let cost=items.map(getMeal).filter(Boolean).reduce((a,m)=>a+(m.cost||0),0);
 let weight=items.map(getMeal).filter(Boolean).reduce((a,m)=>a+(m.weight||0),0);
 return {items,manualItems:null,fixed:'Salata Bar',score:Math.max(50,100-cost*2-weight),cost,weight,notes,hasDessert,hasAyran,manual:false};
}

function saveDraftPlan(){if(!state.draft){toast('Kaydedilecek taslak plan yok.');return}let editingId=state.draft.editingPlanId||null;let err=editingId?null:validateOptions({start:state.draft.start,end:state.draft.end});if(err){toast(err);return}let plan=clone(state.draft);plan.status='Kaydedildi';plan.savedAt=new Date().toISOString();delete plan.editingPlanId;if(editingId){let idx=state.plans.findIndex(p=>p.id===editingId);if(idx>=0){plan.id=editingId;plan.locked=!!state.plans[idx].locked;plan.changeLog=[...(state.plans[idx].changeLog||[]),...(state.draft.changeLog||[])];state.plans[idx]=plan;state.activePlanId=editingId;state.logs.push({date:new Date().toISOString(),action:'Plan düzenlendi',detail:plan.name});}else{plan.id=uid();state.plans.unshift(plan);state.activePlanId=plan.id;}}else{plan.id=uid();state.plans.unshift(plan);state.activePlanId=plan.id;state.logs.push({date:new Date().toISOString(),action:'Plan kaydedildi',detail:plan.name});}state.draft=null;save();showSection('plans');toast('Yemek planı kaydedildi.','ok');} function clearDraft(){state.draft=null;save();renderDraft();toast('Taslak silindi.','ok')}
function evaluatePlan(plan){

 let seenDate={};plan.schedule.forEach(d=>{

    let menu=d[k], meals=(menu.manualItems?menu.manualItems.map(name=>findMealByName(name)).filter(Boolean):menu.items.map(getMeal).filter(Boolean));

    if(mains.length>1)issues.push(`${fmt(d.date)} ${k==='lunch'?'öğle':'akşam'} menüsünde birden fazla ana yemek var.`);
   });

TBMM Destek Hizmetleri Başkanlığı`;openModal(`<div class="modalHead"><div><h3>Hazır e-posta metni</h3></div><button class="close" onclick="closeModal()">✕</button></div><textarea style="min-height:240px">${esc(body)}</textarea><div class="actions"><a class="btn green" href="mailto:?subject=${encodeURIComponent('Yemek Memnuniyet Anketi')}&body=${encodeURIComponent(body)}">Mail Programında Aç</a><button class="btn secondary" onclick="navigator.clipboard.writeText(document.querySelector('.modal textarea').value);toast('Metin kopyalandı.','ok')">Kopyala</button></div>`)}
function printSurveyForm(){let rows=selectedSurveyRows();if(!rows.length){toast('Yazdırılacak anket satırı yok.');return}let p=activePlan();let s=document.getElementById('surveyStart')?.value||p.start,e=document.getElementById('surveyEnd')?.value||p.end;let area=document.getElementById('surveyPrintArea');if(!area){area=document.createElement('div');area.id='surveyPrintArea';area.className='surveyPrintOnly';document.body.appendChild(area)}area.innerHTML=`<h2>TBMM Destek Hizmetleri Başkanlığı</h2><h3>Yemek Memnuniyet Anketi</h3><p><b>Tarih Aralığı:</b> ${fmt(s)} - ${fmt(e)}</p><p>Her yemek için bir seçenek işaretleyiniz.</p><table><tr><th>Tarih</th><th>Öğün</th><th>Yemek</th><th>Kötü</th><th>Orta</th><th>İyi</th><th>Güzel</th><th>Çok Güzel</th><th>Yorum</th></tr>${rows.map(r=>`<tr><td>${r.tarih}</td><td>${r.ogun}</td><td>${esc(r.yemek)}</td><td>☐</td><td>☐</td><td>☐</td><td>☐</td><td>☐</td><td></td></tr>`).join('')}</table>`;window.print()} function parseCsv(txt){let lines=txt.split(/\r?\n/).filter(Boolean);let headers=lines.shift().split(';').map(h=>h.trim().replace(/^"|"$/g,''));return lines.map(line=>{let vals=line.split(';').map(v=>v.replace(/^"|"$/g,'').replace(/""/g,'"'));let o={};headers.forEach((h,i)=>o[h]=vals[i]||'');return o})}

function usageStats(plan=null){let counts={}, ratings={};let plans=plan?[plan]:state.plans;plans.forEach(p=>p.schedule.forEach(d=>['lunch','dinner'].forEach(k=>mealText(d[k]).filter(food=>norm(food)!=='salata bar').forEach(food=>{counts[food]=(counts[food]||0)+1}))));state.surveys.forEach(s=>{if(norm(s.yemek)==='salata bar')return;if(!ratings[s.yemek])ratings[s.yemek]={sum:0,count:0};ratings[s.yemek].sum+=s.score;ratings[s.yemek].count++});let usage=Object.entries(counts).map(([name,count])=>({name,count,rating:ratings[name]?ratings[name].sum/ratings[name].count:0,ratingCount:ratings[name]?.count||0})).sort((a,b)=>b.count-a.count);let liked=Object.entries(ratings).map(([name,r])=>({name,avg:r.sum/r.count,count:r.count,usage:counts[name]||0})).sort((a,b)=>b.avg-a.avg||b.count-a.count);return {usage,liked,counts,ratings};} function renderStrategy(){
 let s=usageStats();let compare=s.usage.slice(0,25);
 document.getElementById('strategy').innerHTML=`<div class="grid cols3"><div class="card kpi"><div class="badge">▦</div><div><b>${s.usage.length}</b><span>Kullanılan farklı yemek</span></div></div><div class="card kpi"><div class="badge">↻</div><div><b>${s.usage[0]?.count||0}</b><span>En yüksek tekrar</span></div></div><div class="card kpi"><div class="badge">★</div><div><b>${s.liked[0]?.avg?.toFixed(1)||'—'}</b><span>En yüksek anket puanı</span></div></div></div>
 <div class="grid cols2" style="margin-top:16px"><div class="card"><div class="cardTitle"><h3>En çok çıkan yemekler</h3><button class="btn small secondary" onclick="printStrategy()">Grafikli PDF</button></div>${barChart(s.usage.slice(0,12),'count')}</div><div class="card"><h3>Anketlerde en beğenilenler</h3>${barChart(s.liked.slice(0,12),'avg')}</div></div>
 <div class="card" style="margin-top:16px"><h3>Kullanım / beğeni karşılaştırması</h3><div class="tableWrap"><table><thead><tr><th>Yemek</th><th>Kullanım</th><th>Anket ortalaması</th><th>Anket sayısı</th><th>Yorum</th></tr></thead><tbody>${compare.map(x=>`<tr><td>${esc(x.name)}</td><td>${x.count}</td><td>${x.rating?x.rating.toFixed(2):'—'}</td><td>${x.ratingCount}</td><td>${x.rating&&x.count>3&&x.rating<3?'Sık çıkıyor, memnuniyet düşük.':x.rating>=4?'Memnuniyet yüksek.':'Takip edilebilir.'}</td></tr>`).join('')}</tbody></table></div></div>`;
}
function barChart(arr,field){if(!arr.length)return '<p class="muted">Veri yok.</p>';let max=Math.max(...arr.map(x=>field==='avg'?x.avg:x.count),1);return arr.map(x=>{let v=field==='avg'?x.avg:x.count;let w=Math.max(6,Math.round(v/max*100));return `<div class="chartRow"><b>${esc(x.name)}</b><div class="bar"><span style="width:${w}%">${field==='avg'?v.toFixed(1):v}</span></div><span>${field==='avg'?(x.count+' oy'):(x.count+' kez')}</span></div>`}).join('')}
function printStrategy(){showSection('strategy');setTimeout(()=>window.print(),100)}
function renderPersonnel(){let p=activePlan();document.getElementById('personnel').innerHTML=`<div class="printOnly"><h2>TBMM Destek Hizmetleri Başkanlığı</h2><p>Personel Yemek Menüsü</p></div><div class="card"><div class="cardTitle"><h3>Personel için sade menü</h3><button class="btn secondary" onclick="window.print()">PDF / Yazdır</button></div>${p?renderPersonnelPlan(p):'<p class="muted">Aktif plan yok.</p>'}</div>`}
function renderPersonnelPlan(p){return p.schedule.map(d=>`<div class="notice"><h4>${fmt(d.date)}</h4><div class="grid cols2"><div><b>Öğle</b><ol>${mealText(d.lunch).map(x=>`<li>${esc(x)}</li>`).join('')}</ol></div><div><b>Akşam</b><ol>${mealText(d.dinner).map(x=>`<li>${esc(x)}</li>`).join('')}</ol></div></div></div>`).join('')}

function renderOutputs(){let p=activePlan();document.getElementById('outputs').innerHTML=`<div class="grid cols2"><div class="card"><h3>Kurumsal çıktı paketi</h3><p class="lead">Aktif plan için Word, Excel/CSV, PDF ve e-posta duyurusu alınabilir.</p><div class="actions"><button class="btn green" onclick="exportPlanCsv()">Plan Excel/CSV</button><button class="btn secondary" onclick="exportPlanWord()">Plan Word</button><button class="btn secondary" onclick="showAnnouncement()">Duyuru / E-posta</button><button class="btn secondary" onclick="showSection('personnel');setTimeout(()=>window.print(),100)">Personel PDF</button><button class="btn secondary" onclick="printStrategy()">Strateji PDF</button></div></div><div class="card"><h3>Aktif plan</h3>${p?`<p>${esc(p.name)}</p><p class="muted">${planRange(p)}</p>`:'<p class="muted">Aktif plan yok.</p>'}</div></div>`}
function exportPlanCsv(){let p=activePlan();if(!p){toast('Aktif plan yok.');return}let rows=[];p.schedule.forEach(d=>['lunch','dinner'].forEach(k=>rows.push({Kurum:state.settings.org,Tarih:d.date,Gün:d.day,Öğün:k==='lunch'?'Öğle':'Akşam',Menü:mealText(d[k]).join(' | ')})));downloadCsv(rows,`yemek_plani_${p.start}_${p.end}.csv`)}
function exportPlanWord(){let p=activePlan();if(!p){toast('Aktif plan yok.');return}let body=`<h1>${esc(state.settings.org)}</h1><h2>Yemek Planı</h2><p><b>Tarih Aralığı:</b> ${planRange(p)}</p><table><tr><th>Tarih</th><th>Öğün</th><th>Menü</th></tr>${p.schedule.map(d=>['lunch','dinner'].map(k=>`<tr><td>${fmt(d.date)}</td><td>${k==='lunch'?'Öğle':'Akşam'}</td><td>${esc(mealText(d[k]).join(' | '))}</td></tr>`).join('')).join('')}</table><p>TBMM Destek Hizmetleri Başkanlığı • Sistem çıktısıdır.</p>`;downloadBlob(`<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:Calibri,Arial;margin:30px}h1,h2{text-align:center}table{border-collapse:collapse;width:100%}td,th{border:1px solid #8ea0b8;padding:7px}th{background:#eaf1f8}</style></head><body>${body}</body></html>`,`yemek_plani_${p.start}_${p.end}.doc`,'application/msword')}
function showAnnouncement(){let p=activePlan();if(!p){toast('Aktif plan yok.');return}let body=`TBMM Destek Hizmetleri Başkanlığı\n\n${planRange(p)} tarihleri arasında uygulanacak yemek planı ekte/duyuru metninde sunulmuştur.\n\nBilgilerinize sunulur.\n\n${p.schedule.map(d=>`${fmt(d.date)}\nÖğle: ${mealText(d.lunch).join(', ')}\nAkşam: ${mealText(d.dinner).join(', ')}`).join('\n\n')}`;openModal(`<div class="modalHead"><div><h3>Kurumsal duyuru / e-posta metni</h3></div><button class="close" onclick="closeModal()">✕</button></div><textarea style="min-height:360px">${esc(body)}</textarea><div class="actions"><a class="btn green" href="mailto:?subject=${encodeURIComponent('Yemek Planı Duyurusu')}&body=${encodeURIComponent(body)}">Mail Programında Aç</a><button class="btn secondary" onclick="navigator.clipboard.writeText(document.querySelector('.modal textarea').value);toast('Metin kopyalandı.','ok')">Kopyala</button></div>`)}
function downloadCsv(rows,filename){let keys=Object.keys(rows[0]||{});let csv='\ufeff'+[keys.join(';'),...rows.map(r=>keys.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(';'))].join('\n');downloadBlob(csv,filename,'text/csv;charset=utf-8')}
function downloadBlob(content,filename,type){let blob=new Blob([content],{type});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function exportMealsCsv(){downloadCsv(state.meals.map(m=>({Yemek:m.name,Kategori:m.category,AltKategori:m.subCategory,Grup:m.group,Gram:m.gram,Kalori:m.calorie,Aktif:m.active?'Evet':'Hayır'})),'yemek_havuzu.csv')}

function renderSettings(){let size=new Blob([JSON.stringify(state)]).size;document.getElementById('settings').innerHTML=`
<div class="grid cols2">
  <div class="settingsBox"><h4>Güvenlik ve giriş paneli</h4><p class="muted">Giriş paneli, yönetici şifresiyle açılır. Bu yapı yüklediğiniz indexteki yönetici girişi mantığına uyarlanmıştır.</p><div class="form two"><div><label>Kurum adı</label><input id="setOrg" value="${esc(state.settings.org)}"></div><div><label>Hazırlayan</label><input id="setBy" value="${esc(state.settings.createdBy)}"></div><div><label>Yönetici şifresi</label><input id="setPass" type="password" value="${esc(state.settings.adminPassword||'1234')}"></div><div><label>Son giriş</label><input value="${esc(state.settings.lastLogin||'Henüz kayıt yok')}" disabled></div></div><button class="btn green" style="margin-top:12px" onclick="saveSettings()">Ayarları Kaydet</button></div>
  <div class="settingsBox"><h4>Depolama bilgisi</h4><p class="muted">Veriler tarayıcının yerel deposunda saklanır. Sunucuya gönderilmez. Düzenli JSON yedeği almanız önerilir.</p><div class="settingsInfo"><div class="infoTile"><b>${state.meals.length}</b><span>Yemek</span></div><div class="infoTile"><b>${state.plans.length}</b><span>Kayıtlı plan</span></div><div class="infoTile"><b>${state.surveys.length}</b><span>Anket kaydı</span></div><div class="infoTile"><b>${(size/1024).toFixed(1)} KB</b><span>Yaklaşık veri</span></div></div><div class="actions" style="margin-top:12px"><button class="btn secondary" onclick="backupJson()">JSON Yedek Al</button><label class="btn secondary">JSON Yedek Yükle<input type="file" accept=".json" style="display:none" onchange="restoreJson(event)"></label><button class="btn red" onclick="clearAll()">Tüm Verileri Sıfırla</button></div></div>
</div>
<div class="card" style="margin-top:16px"><div class="cardTitle"><h3>Hazır / Hızlı Menü Yönetimi</h3><span class="pill">Yönetici önceden menü hazırlayabilir</span></div><p class="muted">Bu menüler Plan Oluştur ekranında hızlı çizelge üretmek için kullanılabilir. Manuel değişiklik yaparken de seçili öğüne tek tıkla doldurulabilir.</p><div class="form two"><div><label>Menü adı</label><input id="qmName" placeholder="Örn: Cuma özel menüsü"></div><div><label>Açıklama</label><input id="qmNote" placeholder="Kısa not"></div>${[0,1,2,3].map(i=>`<div><label>${i+1}. ürün</label><input id="qmItem${i}" placeholder="Yemek adı"></div>`).join('')}<div><label>5. ürün</label><input value="Salata Bar" disabled></div></div><div class="actions" style="margin-top:12px"><button class="btn green" onclick="saveQuickMenu()">Hazır Menü Kaydet</button><button class="btn secondary" onclick="fillQuickMenuExample()">Örnek Doldur</button></div><div id="quickMenuList">${renderQuickMenuRows()}</div></div>
<div class="card" style="margin-top:16px"><h3>Algoritma özeti</h3><ol><li>Tarih aralığı seçilir ve çakışan kayıtlı plan varsa sistem uyarı verir.</li><li>Yönetici işaretlediği kurallara göre plan üretir; işaretlenmeyen kurallar algoritmaya uygulanmaz.</li><li>Hazır menü seçilirse sistem otomatik üretim yerine yönetici menüsünü kullanabilir.</li><li>Manuel değişiklikte yönetici kurallara takılmaz; hazır menü veya serbest yemek adı kullanabilir.</li><li>5. ürün her zaman Salata Bar olarak sabit kalır.</li></ol></div>`}
function saveSettings(){state.settings.org=val('setOrg')||'TBMM Destek Hizmetleri Başkanlığı';state.settings.createdBy=val('setBy')||'Yönetici';state.settings.adminPassword=val('setPass')||'1234';save();toast('Ayarlar kaydedildi.','ok')}

function renderQuickMenuRows(){return (state.quickMenus||[]).length?`<div class="tableWrap" style="margin-top:14px"><table><thead><tr><th>Hazır Menü</th><th>İçerik</th><th>Not</th><th>İşlem</th></tr></thead><tbody>${state.quickMenus.map(q=>`<tr><td><b>${esc(q.name)}</b></td><td>${safeMealNames(q.items).map(esc).join(' • ')} • <b>Salata Bar</b></td><td>${esc(q.note||'')}</td><td><button class="btn small secondary" onclick="editQuickMenu('${q.id}')">Düzenle</button><button class="btn small red" onclick="deleteQuickMenu('${q.id}')">Sil</button></td></tr>`).join('')}</tbody></table></div>`:'<p class="muted">Henüz hazır menü yok.</p>'}
function fillQuickMenuExample(){document.getElementById('qmName').value='Örnek Kurumsal Menü';document.getElementById('qmNote').value='Hızlı planlama için örnek menü';['Mercimek Çorba','İzmir Köfte','Pirinç Pilavı','Ayran'].forEach((v,i)=>document.getElementById('qmItem'+i).value=v)}
function saveQuickMenu(){let name=val('qmName').trim();let items=[0,1,2,3].map(i=>val('qmItem'+i).trim()).filter(Boolean);if(!name||items.length<2){toast('Hazır menü için ad ve en az iki ürün girin.');return}state.quickMenus=state.quickMenus||[];state.quickMenus.push({id:uid(),name,items,note:val('qmNote')});save();renderSettings();toast('Hazır menü kaydedildi.','ok')}
function editQuickMenu(id){let q=findQuickMenu(id);if(!q)return;document.getElementById('qmName').value=q.name;document.getElementById('qmNote').value=q.note||'';safeMealNames(q.items).forEach((v,i)=>document.getElementById('qmItem'+i).value=v);deleteQuickMenu(id,false);toast('Menü forma alındı. Düzenleyip tekrar kaydedin.','ok')}
function deleteQuickMenu(id,rerender=true){state.quickMenus=(state.quickMenus||[]).filter(q=>q.id!==id);save();if(rerender)renderSettings();}

function backupJson(){downloadBlob(JSON.stringify(state,null,2),`tabildot_yedek_${today()}.json`,'application/json')}
function restoreJson(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=e=>{try{state=JSON.parse(e.target.result);save();renderAll();toast('Yedek yüklendi.','ok')}catch(err){toast('Yedek dosyası okunamadı.')}};r.readAsText(f)}
function clearAll(){if(confirm('Tüm kayıtlar silinsin mi?')){localStorage.removeItem(STORE_KEY);location.reload()}}

function renderGuide(){document.getElementById('guide').innerHTML=`<div class="card"><h3>Detaylı Kullanım Kılavuzu</h3>
 <div class="step"><h4>1. Yemek havuzunu kontrol edin</h4><p>Yemek Havuzu ekranında sisteme entegre edilmiş yemekleri görebilir, düzenleyebilir, pasifleştirebilir veya yeni yemek ekleyebilirsiniz. Kategori alanı algoritma için önemlidir. Otomatik üretimde bir öğüne yalnızca bir adet <b>Ana Yemek</b> alınır.</p></div>
 <div class="step"><h4>2. Plan oluşturma</h4><p>Plan Oluştur ekranında başlangıç ve bitiş tarihini seçin. Üretim modu olarak <b>Standart</b>, <b>Memnuniyet Odaklı</b> veya <b>Hafif Menü</b> seçeneklerinden birini kullanın. Tatlı, salata ve ayran seçenekleri yönetici tarafından belirlenir.</p><p>Ayran her güne otomatik eklenmez. Haftalık kota ve öğün tercihi seçilir. 5. ürün her öğünde sabit olarak <b>Salata Bar</b> görünür.</p></div>
 <div class="step"><h4>3. Kurallar</h4><p>Kurallar tek tek onay kutusu şeklindedir. Yönetici hangi kuralları işaretlerse plan buna göre üretilir. Örneğin ana yemek tekrarını sınırla, çorba tekrarını sınırla, akşamı hafif tut veya anket puanlarını dikkate al gibi kurallar ayrı ayrı seçilebilir.</p></div>
 <div class="step"><h4>4. Taslak, kaydetme ve silme</h4><p>Akıllı Plan Oluştur butonu yalnızca taslak üretir. Planın kalıcı hale gelmesi için <b>Yemek Planı Kaydet</b> butonuna basılmalıdır. Hatalı taslaklar <b>Taslağı Sil</b> butonuyla kaldırılabilir.</p></div>
 <div class="step"><h4>5. Manuel değişiklik</h4><p>Taslak üzerindeki öğle veya akşam alanında <b>Manuel Değiştir</b> butonunu kullanın. Yönetici bu ekranda kurallara takılmadan tüm yemekleri serbestçe yazabilir. Sistem yemek adlarını yazarken benzer yemekleri önerir. Havuzda bulunmayan yemek adı da manuel metin olarak plana eklenebilir.</p></div>
 <div class="step"><h4>6. Hata raporu ve otomatik düzeltme</h4><p>Planı kaydetmeden önce Hata Raporu alınabilir. Sistem iki ana yemek, fazla tekrar ve benzer sorunları raporlar. Otomatik Düzelt butonu taslağı yeniden dengeler.</p></div>
 <div class="step"><h4>7. Tüm Planlar</h4><p>Kaydedilen tüm planlar Tüm Planlar ekranında tutulur. Buradan plan aktif yapılabilir, yönetici tarafından düzenlenebilir, kilitlenebilir veya silinebilir. Kilitli planlar kurumsal olarak kesinleşmiş planları temsil eder.</p></div>
 <div class="step"><h4>8. Anket</h4><p>Anket ekranında aktif plan için yemek bazlı kurumsal anket formu alınır. Şıklar <b>Kötü, Orta, İyi, Güzel, Çok Güzel</b> şeklindedir ve sistem bunları 1-5 puana dönüştürür. CSV sonuçları yüklendiğinde yemek puanları güncellenir.</p></div>
 <div class="step"><h4>9. Strateji ve grafikler</h4><p>Strateji ekranında hangi yemek kaç kez çıkmış, en çok tekrarlayan yemek hangisi, anketlerde en çok beğenilen yemekler neler ve kullanım-beğeni dengesi nasıl gibi veriler izlenir. Grafik ekranı PDF olarak yazdırılabilir.</p></div>
 <div class="step"><h4>10. Çıktılar ve duyuru</h4><p>Çıktılar ekranında plan CSV/Excel, Word, personel PDF, strateji PDF ve kurumsal duyuru/e-posta metni alınabilir. Personel ekranı sade günlük menü sunumu için hazırlanmıştır.</p></div>
 <div class="step"><h4>11. Giriş paneli ve hazır menüler</h4><p>Sisteme yönetici şifresiyle giriş yapılır. Ayarlar bölümünden şifre değiştirilebilir. Aynı bölümde Hazır / Hızlı Menü Yönetimi alanı bulunur. Yönetici sık kullanılan menüleri buraya kaydeder; Plan Oluştur ekranında bu menülerden yararlanabilir veya manuel değişiklik ekranında öğünü tek tıkla doldurabilir.</p></div><div class="step"><h4>12. Depolama ve yedekleme</h4><p>Veriler tarayıcının yerel deposunda saklanır. Sunucuya gönderilmez. Ayarlar ekranından JSON yedek alabilir veya daha önce aldığınız yedeği geri yükleyebilirsiniz.</p></div>
 </div>`}

function renderAll(){
 ensureState();
 const setText=(id,value)=>{const el=document.getElementById(id);if(el)el.textContent=value};
 setText('mealCount',(state.meals||[]).length);
 setText('planCount',(state.plans||[]).length);
 const activeId=document.querySelector('.section.active')?.id||'home';
 const todayPlan=(state.plans||[]).find(p=>(p.schedule||[]).some(d=>d.date===today()));
 if(todayPlan){
  const day=(todayPlan.schedule||[]).find(d=>d.date===today());
  setText('todayInfo',`${todayPlan.name||'Plan'}: Öğle ${mealText(day.lunch).slice(0,3).join(', ')} / Akşam ${mealText(day.dinner).slice(0,3).join(', ')}`);
 }else{
  setText('todayInfo','Bugün için kayıtlı plan yok.');
 }
 const renderers={home:renderHome,create:renderCreate,plans:renderPlans,meals:renderMeals,survey:renderSurvey,strategy:renderStrategy,personnel:renderPersonnel,outputs:renderOutputs,settings:renderSettings,guide:renderGuide};
 if(renderers[activeId])renderers[activeId]();
}
function init(){load();initNav();renderAll();if(sessionStorage.getItem('tabildotLoggedIn'))showApp();showSection('home')}
init();
</script>

 window.login=function(){ensureState();const r=document.getElementById('loginRole')?.value||'admin',uname=String(document.getElementById('loginUsername')?.value||'').trim(),pass=String(document.getElementById('loginPassword')?.value||'').trim(),err=document.getElementById('loginError');let ok=false,name='';if(r==='admin'){const au=String(state.settings.adminUsername||'admin'),ap=String(state.settings.adminPassword||'1234');ok=pass===ap&&(!uname||uname===au||uname.toLowerCase()==='admin');name=uname||au}else{const found=(state.settings.users||[]).find(x=>x.active&&x.username===uname&&x.password===pass);ok=!!found;name=found?.username||uname}if(!ok){if(err)err.style.display='block';document.getElementById('loginPassword')?.focus();return}if(err)err.style.display='none';sessionStorage.setItem('tabildotLoggedIn','1');sessionStorage.setItem('tabildotRole',r);sessionStorage.setItem('tabildotUser',name);state.settings.lastLogin=new Date().toLocaleString('tr-TR');save();showApp();toast(r==='admin'?'Yönetici girişi yapıldı.':'Kullanıcı girişi yapıldı.','ok')};

 window.showApp=function(){document.getElementById('loginScreen').style.display='none';document.getElementById('appShell')?.classList.remove('hidden-app');applyTheme();initNav();const active=document.querySelector('.section.active')?.id||'home';if(!isAdmin()&&ADMIN_ONLY.includes(active))showSection('home');else renderAll()};
 window.editSavedPlan=function(id){if(!requireAdmin())return;baseEditSavedPlan(id)};window.openManualEdit=function(){if(!requireAdmin())return;baseOpenManualEdit.apply(this,arguments)};window.saveDraftPlan=function(){if(!requireAdmin())return;baseSaveDraftPlan()};window.deletePlan=function(id){if(!requireAdmin())return;baseDeletePlan(id)};window.toggleLock=function(id){if(!requireAdmin())return;baseToggleLock(id)};window.makeActive=function(id){if(!requireAdmin())return;baseMakeActive(id)};
 window.renderHome=function(){const p=activePlan();document.getElementById('home').innerHTML=`<div class="grid cols4"><div class="card kpi"><div class="badge">☰</div><div><b>${state.meals.filter(m=>m.active).length}</b><span>Aktif yemek</span></div></div><div class="card kpi"><div class="badge">▦</div><div><b>${state.plans.length}</b><span>Kayıtlı plan</span></div></div><div class="card kpi"><div class="badge">◎</div><div><b>${p?qualityScore(p):'—'}</b><span>Kalite skoru</span></div></div><div class="card kpi"><div class="badge">✎</div><div><b>${state.surveys.length}</b><span>Anket kaydı</span></div></div></div><div class="grid cols2" style="margin-top:16px"><div class="card"><h3>Kurumsal işlem merkezi</h3><p class="lead">Planlama, anket, personel menüsü ve çıktı işlemleri tek merkezden yönetilir.</p><div class="notice">Aktif oturum: <b>${sessionText()}</b></div></div><div class="card"><h3>Aktif yemek çizelgesi</h3>${p?`<p><b>${esc(p.name)}</b></p><p class="muted">${planRange(p)}</p><div class="actions"><button class="btn secondary" onclick="showSection('personnel')">Personel Menüsü</button>${isAdmin()?`<button class="btn green" onclick="editSavedPlan('${p.id}')">Son Halini Düzenle</button>`:''}</div>`:'<p class="muted">Henüz aktif plan yok.</p>'}</div></div><div class="card" style="margin-top:16px"><h3>Yönetim özeti</h3>${p?buildAdvice(p).map(x=>`<div class="notice">${x}</div>`).join(''):'<p class="muted">Plan kaydedildiğinde öneriler burada görünür.</p>'}</div>`};
 window.renderPlans=function(){document.getElementById('plans').innerHTML=`<div class="card"><div class="cardTitle"><h3>Tüm Yemek Çizelgeleri</h3>${isAdmin()?'<button class="btn green" onclick="showSection(\'create\')">Yeni Plan Oluştur</button>':''}</div><p class="muted">Kaydedilen bütün çizelgeler bu ekranda listelenir. Yönetici, kilitli veya kesinleşmiş planların son halini de düzenlemeye açabilir.</p>${state.plans.length?`<div class="planCards">${state.plans.map(p=>`<div class="planCard"><h4 style="margin:0 0 5px">${esc(p.name)}</h4><div class="topMeta"><span class="pill ${state.activePlanId===p.id?'ok':'warn'}">${state.activePlanId===p.id?'Aktif':'Arşiv'}</span><span class="pill">${p.locked?'Kilitli':'Düzenlenebilir'}</span><span class="pill">Kalite ${qualityScore(p)}</span></div><p class="muted">${planRange(p)}<br>Kaydedilme: ${new Date(p.savedAt||p.createdAt).toLocaleString('tr-TR')}</p><div class="planCardActions"><button class="btn small secondary" onclick="showPlanPreview('${p.id}')">Görüntüle</button>${isAdmin()?`<button class="btn small secondary" onclick="makeActive('${p.id}')">Aktif Yap</button><button class="btn small green" onclick="editSavedPlan('${p.id}')">Son Halini Düzenle</button><button class="btn small amber" onclick="toggleLock('${p.id}')">${p.locked?'Kilidi Aç':'Kilitle'}</button><button class="btn small red" onclick="deletePlan('${p.id}')">Sil</button>`:''}</div></div>`).join('')}</div>`:'<p class="muted">Henüz kaydedilmiş plan yok.</p>'}</div>`};
 window.showPlanPreview=function(id){const p=state.plans.find(x=>x.id===id);if(!p){toast('Plan bulunamadı.');return}openModal(`<div class="modalHead"><div><h3>${esc(p.name)}</h3><p class="muted">${planRange(p)}</p></div><button class="close" onclick="closeModal()">✕</button></div>${renderPlanTable(p,false)}`)};
 function groupOf(name){const m=findMealByName(name),n=norm(name);if(m?.category==='Çorba'||/corba/.test(n))return'soup';if(m?.category==='Ana Yemek')return'main';if(/salata|zeytinyag/.test(n)||/salata|zeytinyagli/.test(norm(m?.subCategory||'')))return'salad';if(/tatli|baklava|sutlac|helva|revani|kadayif|kazandibi|profiterol|gullac/.test(n))return'dessert';if(m?.category==='Yardımcı'||/pilav|makarna|bulgur|borek|patates|cacik|tursu/.test(n))return'side';return'main'}
 function namesFor(rows,key){const a=[];rows.forEach(r=>{if(groupOf(r.yemek)===key&&!a.includes(r.yemek))a.push(r.yemek)});const shown=a.slice(0,8);return shown.join(' • ')+(a.length>8?` • +${a.length-8} yemek`:'')}
 function surveyRowsHtml(no,title,criteria,key,rows,counter){const names=namesFor(rows,key);let out=`<tr><td colspan="7" class="sectionTitle">${no}) ${title}</td></tr>`;if(names)out+=`<tr><td colspan="7" class="itemsLine"><b>Bu aralıkta değerlendirilenler:</b> ${esc(names)}</td></tr>`;criteria.forEach(c=>{counter.n++;out+=`<tr><td class="criteria">${esc(c)}</td>${[5,4,3,2,1].map(v=>`<td class="rate"><input type="radio" name="q${counter.n}" value="${v}"></td>`).join('')}<td></td></tr>`});return out}
 window.buildSurveySheet=function(rows,p,s,e){const c={n:0};return `<div class="survey-sheet"><div class="s-head"><h1>${esc(state.settings.org)}</h1><h2>Yemek Memnuniyet Anket Formu</h2><p>${esc(p.name)} • ${fmt(s)} - ${fmt(e)}</p></div><div class="meta"><div><b>Birim / Yer:</b> ....................................</div><div><b>Tarih:</b> ....................................</div><div><b>Katılımcı No:</b> ....................................</div></div><div class="legend"><b>İşaretleme:</b> Her satırda yalnızca bir seçeneği işaretleyiniz.</div><table><tr><th class="criteria">Değerlendirme Alanı</th><th>Çok İyi</th><th>İyi</th><th>Orta</th><th>Kötü</th><th>Çok Kötü</th><th>Yorum</th></tr>${surveyRowsHtml(1,'Menüler',['Genel olarak menüler','Menüde yer alan yemeklerin uyumu','Menüde yer alan yemeklerin çeşitliliği','Haftalık menülerin zamanında yayımlanması'],'main',rows,c)}${surveyRowsHtml(2,'Çorbalar',['Sunumu, tadı ve kıvamı','Sıcaklığı','Malzeme içeriği','Miktarı'],'soup',rows,c)}${surveyRowsHtml(3,'Ana Yemekler',['Sunumu, tadı ve kıvamı','Sıcaklığı','Miktarı'],'main',rows,c)}${surveyRowsHtml(4,'Yardımcı Yemekler',['Sunumu, tadı ve lezzeti','Sıcaklığı','Yağ oranı','Malzeme içeriği'],'side',rows,c)}${surveyRowsHtml(5,'Salata ve Zeytinyağlılar',['Sunumu, tadı ve lezzeti','Miktarı'],'salad',rows,c)}${surveyRowsHtml(6,'Tatlılar',['Sunumu, tadı ve kıvamı','Miktarı'],'dessert',rows,c)}</table><div class="footer"><div>Doküman No: FR-0451 • Revizyon Tarihi: ${today().split('-').reverse().join('.')} • Revizyon No: 04</div><div class="sign">İmza</div></div></div>`};
 window.renderSurvey=function(){const p=activePlan(),start=p?.start||today(),end=p?.end||start;document.getElementById('survey').innerHTML=`<div class="grid cols2"><div class="card"><h3>Kurumsal Anket Oluştur</h3><p class="lead">Paylaştığınız örneğe uygun, tek sayfalık ve hem ekranda hem kâğıt üzerinde işaretlenebilir form hazırlanır.</p>${p?`<p><b>${esc(p.name)}</b><br><span class="muted">${planRange(p)}</span></p><div class="form two"><div><label>Başlangıç tarihi</label><input type="date" id="surveyStart" value="${start}"></div><div><label>Bitiş tarihi</label><input type="date" id="surveyEnd" value="${end}"></div></div><div class="actions" style="margin-top:12px"><button class="btn green" onclick="createSurveyForm()">Anketi Hazırla</button><button class="btn secondary" onclick="printSurveyForm()">PDF / Yazdır</button><button class="btn secondary" onclick="exportSurveyCsv()">Excel / CSV</button><button class="btn secondary" onclick="showSurveyMail()">E-posta Metni</button></div><p class="hint" id="surveyInfo">A4 yatay düzende tek sayfaya sığacak şekilde düzenlenir.</p>`:'<p class="muted">Aktif plan yok.</p>'}</div><div class="card"><h3>Anket Sonucu Yükle</h3><p class="lead">CSV sonuçları yüklendiğinde seçimler puana dönüştürülür.</p><input type="file" accept=".csv" onchange="importSurveyCsv(event)"><p class="hint">Kolonlar: plan_id, tarih, ogun, yemek, secim, yorum</p></div></div><div id="surveyPreviewCard" class="card" style="display:none;margin-top:16px"></div><div class="card" style="margin-top:16px"><h3>Anket Kayıtları</h3>${state.surveys.length?surveyTable():'<p class="muted">Henüz anket sonucu yüklenmedi.</p>'}</div><div id="surveyPrintArea" class="surveyPrintOnly"></div>`};
 window.createSurveyForm=function(){const p=activePlan(),rows=selectedSurveyRows();if(!p||!rows.length){toast('Seçilen tarih aralığında anket verisi bulunamadı.');return}const s=document.getElementById('surveyStart')?.value||p.start,e=document.getElementById('surveyEnd')?.value||p.end,card=document.getElementById('surveyPreviewCard');card.style.display='block';card.innerHTML=`<div class="cardTitle"><h3>Anket Önizlemesi</h3><button class="btn small secondary" onclick="printSurveyForm()">PDF / Yazdır</button></div><div style="overflow:auto">${buildSurveySheet(rows,p,s,e)}</div>`;document.getElementById('surveyInfo').textContent='Anket hazırlandı. Seçenekler ekranda işaretlenebilir ve PDF çıktısına aktarılabilir.';toast('Kurumsal anket hazırlandı.','ok')};
 window.printSurveyForm=function(){const p=activePlan(),rows=selectedSurveyRows();if(!p||!rows.length){toast('Yazdırılacak anket bulunamadı.');return}const s=document.getElementById('surveyStart')?.value||p.start,e=document.getElementById('surveyEnd')?.value||p.end;let area=document.getElementById('surveyPrintArea');if(!area){area=document.createElement('div');area.id='surveyPrintArea';area.className='surveyPrintOnly';document.body.appendChild(area)}area.innerHTML=buildSurveySheet(rows,p,s,e);document.body.classList.add('print-survey');window.print();setTimeout(()=>document.body.classList.remove('print-survey'),500)};
 window.renderPersonnel=function(){const p=activePlan();document.getElementById('personnel').innerHTML=`<div class="personnelPrintHeader"><h2 style="margin:0;color:#142b50">${esc(state.settings.org)}</h2><p style="margin:3px 0">Kurumsal Personel Yemek Menüsü • ${p?planRange(p):''}</p></div><div class="card"><div class="cardTitle"><h3>Personel İçin Kurumsal Menü</h3><button class="btn secondary" onclick="printPersonnelCompact()">PDF / Yazdır</button></div>${p?renderPersonnelPlan(p):'<p class="muted">Aktif plan yok.</p>'}</div>`};
 window.printPersonnelCompact=function(){document.body.classList.add('print-personnel');window.print();setTimeout(()=>document.body.classList.remove('print-personnel'),500)};
 window.renderOutputs=function(){const p=activePlan();document.getElementById('outputs').innerHTML=`<div class="grid cols2"><div class="card"><h3>Kurumsal Çıktı Paketi</h3><p class="lead">Çizelge, anket ve personel menüsü kurumsal üst bilgiyle hazırlanır.</p><div class="actions"><button class="btn green" onclick="exportPlanCsv()">Plan Excel / CSV</button><button class="btn secondary" onclick="exportPlanWord()">Kurumsal Word</button><button class="btn secondary" onclick="showAnnouncement()">Duyuru / E-posta</button><button class="btn secondary" onclick="showSection('personnel')">Personel Menüsü</button><button class="btn secondary" onclick="showSection('survey')">Anket Formu</button></div></div><div class="card"><h3>Aktif Çizelge</h3>${p?`<p><b>${esc(p.name)}</b></p><p class="muted">${planRange(p)}</p>`:'<p class="muted">Aktif plan yok.</p>'}</div></div>`};
 window.exportPlanWord=function(){const p=activePlan();if(!p){toast('Aktif plan yok.');return}const rows=p.schedule.map(d=>['lunch','dinner'].map(k=>`<tr><td>${fmt(d.date)}</td><td>${k==='lunch'?'Öğle':'Akşam'}</td><td>${esc(mealText(d[k]).join(' • '))}</td></tr>`).join('')).join('');const doc=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:Arial,Helvetica,sans-serif;margin:26px;color:#17253b}.head{text-align:center;border-bottom:2px solid #142b50;padding-bottom:10px;margin-bottom:14px}.head h1{font-size:20px;color:#142b50;margin:0}.head h2{font-size:15px;color:#1d3e70;margin:5px 0}.head p{font-size:11px;margin:0}table{width:100%;border-collapse:collapse;font-size:11px}th,td{border:1px solid #8d9aae;padding:6px;vertical-align:top}th{background:#e9eef5}.foot{font-size:9px;margin-top:12px}</style></head><body><div class="head"><h1>${esc(state.settings.org)}</h1><h2>Kurumsal Yemek Çizelgesi</h2><p>${esc(p.name)} • ${planRange(p)}</p></div><table><tr><th>Tarih</th><th>Öğün</th><th>Menü</th></tr>${rows}</table><div class="foot">Hazırlayan: ${esc(state.settings.createdBy||'Yönetici')} • Oluşturulma: ${new Date().toLocaleString('tr-TR')}</div></body></html>`;downloadBlob(doc,`kurumsal_yemek_cizelgesi_${p.start}_${p.end}.doc`,'application/msword')};
 function userRows(){return (state.settings.users||[]).map(u=>`<tr><td><b>${esc(u.name||u.username)}</b><br><small>${esc(u.username)}</small></td><td>Kullanıcı</td><td>${u.active?'<span class="pill ok">Aktif</span>':'<span class="pill bad">Pasif</span>'}</td><td><button class="btn small ${u.active?'amber':'green'}" onclick="toggleManagedUser('${u.id}')">${u.active?'Pasifleştir':'Aktifleştir'}</button> <button class="btn small red" onclick="deleteManagedUser('${u.id}')">Sil</button></td></tr>`).join('')}
 window.renderSettings=function(){if(!isAdmin()){document.getElementById('settings').innerHTML='<div class="card"><div class="notice warning">Bu bölüm yalnızca yönetici hesabıyla kullanılabilir.</div></div>';return}const size=new Blob([JSON.stringify(state)]).size;document.getElementById('settings').innerHTML=`<div class="settingsSplit"><div class="settingsBox"><h4>Güvenlik ve Kurumsal Görünüm</h4><div class="form two"><div><label>Kurum adı</label><input id="setOrg" value="${esc(state.settings.org)}"></div><div><label>Hazırlayan</label><input id="setBy" value="${esc(state.settings.createdBy)}"></div><div><label>Yönetici kullanıcı adı</label><input id="setAdminUser" value="${esc(state.settings.adminUsername||'admin')}"></div><div><label>Yönetici şifresi</label><div class="passwordWrap"><input id="setPass" type="password" value="${esc(state.settings.adminPassword||'1234')}"><button id="setEye" class="eyeBtn" type="button" onclick="togglePasswordVisibility('setPass','setEye')">👁</button></div></div></div><label style="margin-top:12px">Sayfa tasarımı</label><div class="themePicker">${[['kurumsal-mavi','Kurumsal Mavi','#18345f','#b79a60','#edf2f7'],['kurumsal-koyu','Kurumsal Koyu','#0f172a','#334155','#cbd5e1'],['zümrüt','Zümrüt','#155a36','#2f9460','#e7f4eb'],['bordo','Bordo','#711f28','#a74759','#f7e9ec'],['gri','Sade Gri','#465365','#778598','#edf1f5']].map(t=>`<label class="themeTile"><input type="radio" name="themeOpt" value="${t[0]}" ${state.settings.theme===t[0]?'checked':''}><b>${t[1]}</b><span class="muted">Tüm sayfa tasarımı</span><div class="miniSwatch"><span style="background:${t[2]}"></span><span style="background:${t[3]}"></span><span style="background:${t[4]}"></span></div></label>`).join('')}</div><button class="btn green" style="margin-top:12px" onclick="saveSettings()">Ayarları Kaydet</button></div><div class="settingsBox"><h4>Depolama ve Yedek</h4><div class="settingsInfo"><div class="infoTile"><b>${state.meals.length}</b><span>Yemek</span></div><div class="infoTile"><b>${state.plans.length}</b><span>Plan</span></div><div class="infoTile"><b>${state.surveys.length}</b><span>Anket</span></div><div class="infoTile"><b>${(size/1024).toFixed(1)} KB</b><span>Veri</span></div></div><div class="actions" style="margin-top:12px"><button class="btn secondary" onclick="backupJson()">JSON Yedek Al</button><label class="btn secondary">JSON Yedek Yükle<input type="file" accept=".json" style="display:none" onchange="restoreJson(event)"></label><button class="btn red" onclick="clearAll()">Tüm Verileri Sıfırla</button></div></div></div><div class="card" style="margin-top:16px"><div class="cardTitle"><h3>Kullanıcı Yönetimi</h3><span class="pill ok">Yalnızca yönetici</span></div><div class="form three"><div><label>Ad Soyad</label><input id="newUserName" placeholder="Ad Soyad"></div><div><label>Kullanıcı adı</label><input id="newUsername" placeholder="Kullanıcı adı"></div><div><label>Şifre</label><input id="newUserPassword" placeholder="Şifre"></div></div><button class="btn green" style="margin-top:12px" onclick="addManagedUser()">Yeni Kullanıcı Oluştur</button><div class="tableWrap" style="margin-top:14px"><table><thead><tr><th>Kullanıcı</th><th>Rol</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>${userRows()||'<tr><td colspan="4">Kayıt yok</td></tr>'}</tbody></table></div></div><div class="card" style="margin-top:16px"><div class="cardTitle"><h3>Hazır / Hızlı Menü Yönetimi</h3><span class="pill">Yönetici menüleri</span></div><div class="form two"><div><label>Menü adı</label><input id="qmName" placeholder="Menü adı"></div><div><label>Açıklama</label><input id="qmNote" placeholder="Kısa not"></div>${[0,1,2,3].map(i=>`<div><label>${i+1}. ürün</label><input id="qmItem${i}" placeholder="Yemek adı"></div>`).join('')}<div><label>5. ürün</label><input value="Salata Bar" disabled></div></div><div class="actions" style="margin-top:12px"><button class="btn green" onclick="saveQuickMenu()">Hazır Menü Kaydet</button><button class="btn secondary" onclick="fillQuickMenuExample()">Örnek Doldur</button></div>${renderQuickMenuRows()}</div>`};
 window.saveSettings=function(){if(!requireAdmin())return;state.settings.org=val('setOrg')||'TBMM Destek Hizmetleri Başkanlığı';state.settings.createdBy=val('setBy')||'Yönetici';state.settings.adminUsername=val('setAdminUser')||'admin';state.settings.adminPassword=val('setPass')||'1234';state.settings.theme=document.querySelector('input[name="themeOpt"]:checked')?.value||'kurumsal-mavi';save();applyTheme();renderSettings();toast('Ayarlar kaydedildi.','ok')};
 window.addManagedUser=function(){if(!requireAdmin())return;const name=val('newUserName').trim(),username=val('newUsername').trim(),password=val('newUserPassword').trim();if(!username||!password){toast('Kullanıcı adı ve şifre zorunludur.');return}if(state.settings.users.some(u=>u.username===username)){toast('Bu kullanıcı adı zaten kayıtlı.');return}state.settings.users.push({id:uid(),name:name||username,username,password,role:'user',active:true});save();renderSettings();toast('Yeni kullanıcı oluşturuldu.','ok')};
 window.toggleManagedUser=function(id){if(!requireAdmin())return;const u=state.settings.users.find(x=>x.id===id);if(!u)return;u.active=!u.active;save();renderSettings();toast('Kullanıcı durumu güncellendi.','ok')};
 window.deleteManagedUser=function(id){if(!requireAdmin()||!confirm('Bu kullanıcı silinsin mi?'))return;state.settings.users=state.settings.users.filter(u=>u.id!==id);save();renderSettings();toast('Kullanıcı silindi.','ok')};
 window.renderAll=function(){baseRenderAll.apply(this,arguments);updateHeader(document.querySelector('.section.active')?.id||'home')};
 ensureState();injectLoginCard();applyTheme();initNav();if(sessionStorage.getItem('tabildotLoggedIn')&&!sessionStorage.getItem('tabildotRole')){sessionStorage.setItem('tabildotRole','admin');sessionStorage.setItem('tabildotUser',state.settings.adminUsername||'admin')}if(sessionStorage.getItem('tabildotLoggedIn'))showApp();else{document.getElementById('appShell')?.classList.add('hidden-app');document.getElementById('loginScreen').style.display='flex'}
})();
</script>
</body>
