<body>
<div class="app">
  <aside class="no-print">
    <div class="brand"><div class="logo">🍽️</div><div><h1>Akıllı Tabildot Menü Yönetimi</h1><p>Kural tabanlı + puanlamalı kurumsal çizelge motoru</p></div></div>

      <div class="mini-stat"><span>Kalite Skoru</span><b id="sideScore">-</b></div>
      <div class="mini-stat"><span>Yönetici Modu</span><b id="sideAdmin">Kapalı</b></div>
    </div>
    <div class="side-card">
      <b>Hızlı İşlemler</b>
      <div style="display:grid;gap:8px">
        <button class="btn small secondary" onclick="openFoodModal()">➕ Yemek Ekle</button>
        <button class="btn small secondary" onclick="generateSmart()">⚙️ Akıllı Çizelge</button>
        <button class="btn small secondary" onclick="exportExcel()">📊 Excel Çıktı</button>
        <button class="btn small secondary" onclick="backupData()">💾 Yedek Al</button>
      </div>
    </div>
  </aside>
  <main>
    <div class="topbar no-print">
      <div><h2 id="pageTitle">Genel Bakış</h2><p id="pageDesc">Menü kalitesi, stok, anket, israf ve üretim dengesini tek ekranda izleyin.</p></div>
      <div class="top-actions">
        <button class="btn secondary" onclick="toggleTheme()">🌓 Tema</button>
        <button class="btn warning" onclick="toggleAdmin()" id="adminBtn">🔐 Yönetici Modu</button>
        <button class="btn accent" onclick="generateSmart()">⚙️ Çizelge Oluştur</button>
      </div>
    </div>

    <section id="dashboard" class="section active"></section>
    <section id="planner" class="section"></section>
    <section id="schedule" class="section"></section>
    <section id="foods" class="section"></section>
    <section id="stock" class="section"></section>
    <section id="recipes" class="section"></section>
    <section id="surveys" class="section"></section>
    <section id="waste" class="section"></section>
    <section id="approvals" class="section"></section>
    <section id="reports" class="section"></section>
    <section id="guide" class="section"></section>
    <section id="settings" class="section"></section>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop"><div class="modal" id="modal"><div id="modalContent"></div></div></div>
<div class="toast" id="toast"></div>
<input type="file" id="hiddenFile" class="hide" accept=".xlsx,.xls,.csv,.json" />

function dayName(iso){ return DAY_NAMES[new Date(iso+'T00:00:00').getDay()]; }

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); renderAll(); }
function loadState(){
  try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return defaultState();
}

function smartGenerateCandidate(date, meal, tentativeSchedule){
  const mw=selectedModeWeights();
  const cats = {soup:activeFoods('soup'), main:activeFoods('main'), side:activeFoods('side'), comp:activeFoods('comp'), dessert:activeFoods('dessert')};
  const comps = [...cats.comp, ...cats.dessert];
  let best=null;
  for(let k=0;k<260;k++){
    const soup=rand(cats.soup), main=rand(cats.main), side=rand(cats.side), comp=rand(comps);
    if(!soup||!main||!side||!comp) continue;
    const candidate=[soup.id,main.id,side.id,comp.id];
    const sc=scoreMenu(candidate,date,meal,tentativeSchedule,mw);
    if(!best || sc.score>best.score) best={items:candidate,...sc};
  }
  return best;
}
function scoreMenu(items,date,meal,tentativeSchedule,mw={cost:1,satisfaction:1,stock:1,rich:1}){
  const fs=items.map(byId).filter(Boolean); let score=100; const warnings=[]; const reasons=[];
  const menu=menuObject(items);
  const sameDayOther = tentativeSchedule.find(s=>s.date===date && s.meal!==meal);
  if(meal==='dinner' && sameDayOther){
    const otherFoods=sameDayOther.items.map(byId).filter(Boolean); const otherGroups=otherFoods.map(f=>f.group);
    fs.forEach(f=>{ if(otherGroups.includes(f.group)){ score-= f.cat==='main'?28:14; warnings.push(`Aynı gün ${f.group} grubu tekrarı: ${f.name}`); } });
    const otherMenu=menuObject(sameDayOther.items);
    if(otherMenu.weight>=10 && menu.weight>=9){score-=18; warnings.push('Öğle ve akşam birlikte ağır görünüyor.');}
    if(otherMenu.cost>=18 && menu.cost>=18){score-=15; warnings.push('Günlük maliyet yüksek.');}
  }
  fs.forEach(f=>{
    if(!seasonOk(f)){ score-=10; warnings.push(`${f.name} mevsim dışı.`); } else score+=3;
    const last=recentUse(f,tentativeSchedule); const gap=daysBetween(last,date); const min=Number(f.repeatDays || (f.cat==='main'?state.settings.repeatMain:2));
    if(!state.ruleFree && gap<min){ score-= Math.max(10, (min-gap)*8); warnings.push(`${f.name} son ${min} gün içinde kullanılmış.`); }
    if(!state.ruleFree && groupCount(tentativeSchedule,f.group)>0){ const recentSameGroup=tentativeSchedule.filter(s=>s.items?.some(id=>byId(id)?.group===f.group)).slice(-4).length; if(recentSameGroup){ score-=recentSameGroup*3; } }
    score += (Number(f.satisfaction||3)-3)*4*mw.satisfaction;
    if(Number(f.wasteAvg||0)>20){ score-= Math.min(18, Number(f.wasteAvg)/2); warnings.push(`${f.name} için israf ortalaması yüksek.`); }
    const expBonus=stockBonusForFood(f); score += expBonus*mw.stock; if(expBonus>4) reasons.push(`${f.name} stok/SKT açısından öncelikli.`);
  });
  // Uyumluluklar ve uyumsuzluklar
  fs.forEach(a=>fs.forEach(b=>{ if(a.id===b.id) return; if(containsText(a.compatible,b)) score+=6; if(containsText(a.incompatible,b)){score-=22; warnings.push(`${a.name} ile ${b.name} uyumsuz olabilir.`);} }));
  const groups=fs.map(f=>f.group);
  if(groups.includes('rice') && groups.includes('pasta')){score-=24; warnings.push('Pilav ve makarna aynı öğünde kullanılmamalı.');}
  if(groups.filter(g=>g==='legume').length>=2){score-=24; warnings.push('Bakliyat yoğunluğu yüksek.');}
  if(['meat','meatveg'].some(g=>groups.includes(g)) && groups.includes('syrup')){score-=10; warnings.push('Etli/ağır ana yemek ile ağır tatlı aynı öğünde.');}
  if(state.planner.menuMode==='economic') score-=menu.cost*1.7;
  if(state.planner.menuMode==='rich') score+=fs.filter(f=>['meat','chicken','fish','dessert'].includes(f.group)).length*3;
  if(state.planner.menuMode==='light') score-=menu.weight*2;
  if(menu.cost > (meal==='lunch'?18:16)){score-= (menu.cost-(meal==='lunch'?18:16))*mw.cost; warnings.push('Öğün maliyet puanı yüksek.');}
  if(menu.difficulty > 8){score-= (menu.difficulty-8)*3; warnings.push('Üretim zorluğu yüksek.');}
  if(menu.weight > (meal==='lunch'?11:9)){score-= (menu.weight-(meal==='lunch'?11:9))*2;}
  if(!warnings.length) reasons.push('Tekrar, maliyet, ağırlık ve uyum kontrollerinden geçti.');
  reasons.push(`Toplam ağırlık ${menu.weight}, maliyet ${menu.cost}, zorluk ${menu.difficulty}.`);
  return {score:Math.max(0,Math.min(100,Math.round(score))), warnings:[...new Set(warnings)].slice(0,5), reasons:[...new Set(reasons)].slice(0,4), metrics:menu};
}
function stockBonusForFood(food){
  let bonus=0; const name=food.name.toLowerCase(); const recipe=state.recipes.find(r=>r.foodId===food.id || r.foodName===food.name);
  const terms=[food.name,...(recipe?.ingredients?.map(i=>i.name)||[])].join(' ').toLowerCase();
  state.stock.forEach(s=>{ const days=daysBetween(todayISO(),s.exp); if(terms.includes(s.name.toLowerCase()) && days<=7) bonus+=8; else if(terms.includes(s.name.toLowerCase()) && s.qty>s.min*2) bonus+=3; });
  return bonus;
}
function generateSmart(){
  const days=currentRange(); let tentative = state.schedule.filter(s=>!days.includes(s.date)); const generated=[];
  days.forEach(date=>['lunch','dinner'].forEach(meal=>{
    const candidate = state.ruleFree ? blankSlot(date,meal) : smartGenerateCandidate(date,meal,[...tentative,...generated]);
    const slot = candidate ? {id:uid(),date,meal,items:candidate.items,score:candidate.score,warnings:candidate.warnings,reasons:candidate.reasons,status:'Taslak',revision:1,lunchCount:state.planner.lunchCount,dinnerCount:state.planner.dinnerCount,createdAt:new Date().toISOString()} : blankSlot(date,meal);
    generated.push(slot);
  }));
  state.schedule=[...tentative,...generated].sort((a,b)=>a.date.localeCompare(b.date)||a.meal.localeCompare(b.meal));
  generated.forEach(s=>s.items.forEach(id=>{ const f=byId(id); if(f){f.lastUsed=s.date; f.useCount=(f.useCount||0)+1;} }));
  state.revisions.push({id:uid(),at:new Date().toISOString(),type:'Otomatik çizelge',detail:`${days.length} gün / ${days.length*2} öğün akıllı çizelge oluşturuldu.`,user:'Yönetici'});
  save(); showSection('schedule'); toast('Akıllı çizelge oluşturuldu.');
}

 <div class="grid cols-3" style="margin-top:18px">
  <div class="card"><h3>Algoritma Çekirdeği</h3><p class="lead">Her öğün için yüzlerce aday menü oluşturulur. Menü; tekrar, uyum, maliyet, ağırlık, zorluk, stok, anket ve israf verisine göre puanlanır.</p></div>

 </div>`;
}
function setPlannerMode(m){ state.planner.mode=m; state.planner.days=m==='day'?1:m==='week'?7:30; save(); }
function plannerAdminAction(v){ if(!v) return; if(v==='blank'){ const days=currentRange(); state.schedule=state.schedule.filter(s=>!days.includes(s.date)); days.forEach(d=>['lunch','dinner'].forEach(meal=>state.schedule.push(blankSlot(d,meal)))); state.revisions.push({id:uid(),at:new Date().toISOString(),type:'Boş çizelge',detail:'Seçili aralık için boş manuel çizelge oluşturuldu.',user:'Yönetici'}); save(); showSection('schedule'); }
 if(v==='clearRange'){ if(confirm('Seçili tarih aralığındaki çizelge temizlensin mi?')){ const days=currentRange(); state.schedule=state.schedule.filter(s=>!days.includes(s.date)); state.revisions.push({id:uid(),at:new Date().toISOString(),type:'Temizleme',detail:'Seçili aralık temizlendi.',user:'Yönetici'}); save(); }}
 if(v==='continue'){ showSection('schedule'); toast('Mevcut çizelgede devam ediliyor.'); }
}
function renderSchedule(){
 const sec=document.getElementById('schedule'); const days=currentRange();
 const filtered=state.schedule.filter(s=>days.includes(s.date));
 const body= state.planner.view==='calendar'?calendarHtml(days):tableScheduleHtml(days);
 sec.innerHTML=`<div class="print-only"><h2>${esc(state.settings.institution)}</h2><p>${fmtDate(days[0])} - ${fmtDate(days[days.length-1])}</p></div>
 <div class="card no-print"><div class="card-title"><h3>Çizelge İşlemleri</h3><div class="top-actions"><button class="btn small secondary" onclick="state.planner.view=state.planner.view==='table'?'calendar':'table'; save()">🔄 Görünüm Değiştir</button><button class="btn small secondary" onclick="exportExcel()">📊 Excel</button><button class="btn small secondary" onclick="exportWord()">📝 Word</button><button class="btn small secondary" onclick="window.print()">🖨️ PDF/Yazdır</button><button class="btn small purple" onclick="createSurveyPrint()">📝 Anket Çıktısı</button></div></div><p class="hint">Tarih aralığı: ${fmtDate(days[0])} - ${fmtDate(days[days.length-1])}. Her öğünde düzenleme butonu ile yönetici müdahalesi yapılabilir.</p></div>
 <div style="margin-top:18px">${body}</div>`;

function tableScheduleHtml(days){ return `<div class="card"><div class="table-wrap"><table class="schedule-table"><thead><tr><th>Gün</th><th>Öğle</th><th>Akşam</th></tr></thead><tbody>${days.map(d=>`<tr><td class="day-cell">${dayName(d)}<br><span class="muted">${fmtDate(d)}</span></td><td>${slotHtml(getScheduleSlot(d,'lunch'),d,'lunch')}</td><td>${slotHtml(getScheduleSlot(d,'dinner'),d,'dinner')}</td></tr>`).join('')}</tbody></table></div></div>`; }
function calendarHtml(days){ return `<div class="card"><div class="calendar">${days.map(d=>`<div class="cal-cell"><div class="cal-date"><span>${dayName(d)}</span><span>${fmtDate(d).slice(0,5)}</span></div>${['lunch','dinner'].map(m=>{const s=getScheduleSlot(d,m); return `<div class="cal-meal"><b>${MEAL_LABEL[m]}</b><br>${s?nameList(s.items).slice(0,4).join('<br>'):'Boş'}<br><button class="btn small secondary no-print" style="margin-top:7px" onclick="openSlotEditor('${d}','${m}')">Düzenle</button></div>`}).join('')}</div>`).join('')}</div></div>`; }
function slotHtml(s,date,meal){ if(!s) return `<div class="empty-cell">Henüz çizelge yok<br><button class="btn small secondary no-print" onclick="openSlotEditor('${date}','${meal}')">Manuel Ekle</button></div>`; const fs=nameList(s.items); return `<div class="meal-box"><div class="meal-head"><span class="meal-title">${MEAL_LABEL[meal]}</span><span class="chip ${s.score>=80?'ok':s.score>=60?'warn':'bad'}">${s.score||0}/100</span></div><ol class="meal-list">${fs.length?fs.map(x=>`<li>${esc(x)}</li>`).join(''):'<li>Boş</li>'}</ol><div class="progress"><span style="width:${s.score||0}%"></span></div>${(s.warnings||[]).map(w=>`<div class="warn-line">⚠️ ${esc(w)}</div>`).join('')}${(s.reasons||[]).slice(0,2).map(r=>`<div class="reason">ℹ️ ${esc(r)}</div>`).join('')}<div class="top-actions no-print"><button class="btn small secondary" onclick="openSlotEditor('${date}','${meal}')">✏️ Düzenle</button><button class="btn small secondary" onclick="showAlternatives('${date}','${meal}')">✨ Alternatif</button><button class="btn small secondary" onclick="approveSlot('${date}','${meal}','Onaylandı')">✅ Onayla</button></div><span class="chip purple">${esc(s.status||'Taslak')}</span></div>`; }
function openSlotEditor(date,meal){
 if(!state.admin){ toast('Manuel müdahale için yönetici modunu açın.'); return; }
 editingSlot={date,meal}; const s=getScheduleSlot(date,meal)||blankSlot(date,meal);
 const select = cat=>`<select data-cat="${cat}"><option value="">Seçiniz</option>${activeFoods(cat).map(f=>`<option value="${f.id}" ${s.items.includes(f.id)?'selected':''}>${esc(f.name)} (${esc(f.group)})</option>`).join('')}</select>`;
 openModal(`<div class="modal-head"><div><h3>${fmtDate(date)} ${MEAL_LABEL[meal]} Menüsü</h3><p class="muted">Yönetici manuel müdahalesi. Kaydedince sistem yeniden puanlar.</p></div><button class="close" onclick="closeModal()">✕</button></div><div class="form-grid two"><div class="field"><label>Çorba</label>${select('soup')}</div><div class="field"><label>Ana Yemek</label>${select('main')}</div><div class="field"><label>Yardımcı</label>${select('side')}</div><div class="field"><label>Tamamlayıcı / Tatlı</label><select data-cat="last"><option value="">Seçiniz</option>${[...activeFoods('comp'),...activeFoods('dessert')].map(f=>`<option value="${f.id}" ${s.items.includes(f.id)?'selected':''}>${esc(f.name)} (${CAT_LABEL[f.cat]})</option>`).join('')}</select></div></div><div class="hr"></div><div class="top-actions"><button class="btn accent" onclick="saveSlotEditor()">💾 Kaydet ve Yeniden Puanla</button><button class="btn secondary" onclick="showAlternatives('${date}','${meal}')">✨ Akıllı Alternatif Göster</button><button class="btn danger" onclick="clearSlot('${date}','${meal}')">🧹 Öğünü Boşalt</button></div>`,'wide');
}
function saveSlotEditor(){ const selects=[...document.querySelectorAll('#modalContent select')]; const ids=selects.map(x=>x.value).filter(Boolean); const {date,meal}=editingSlot; let schedule=state.schedule.filter(s=>!(s.date===date&&s.meal===meal)); const sc=scoreMenu(ids,date,meal,schedule); const old=getScheduleSlot(date,meal); const slot={...(old||blankSlot(date,meal)), id:old?.id||uid(), date,meal,items:ids,score:sc.score,warnings:sc.warnings,reasons:sc.reasons,status:'Taslak',revision:(old?.revision||0)+1, updatedAt:new Date().toISOString()}; state.schedule=[...schedule,slot].sort((a,b)=>a.date.localeCompare(b.date)||a.meal.localeCompare(b.meal)); state.revisions.push({id:uid(),at:new Date().toISOString(),type:'Manuel müdahale',detail:`${fmtDate(date)} ${MEAL_LABEL[meal]} menüsü değiştirildi: ${nameList(ids).join(', ')}`,user:'Yönetici'}); closeModal(); save(); toast('Menü güncellendi ve yeniden puanlandı.'); }
function clearSlot(date,meal){ if(!confirm('Bu öğün boşaltılsın mı?')) return; let s=getScheduleSlot(date,meal)||blankSlot(date,meal); s.items=[]; s.score=0; s.warnings=['Yönetici tarafından boşaltıldı.']; s.reasons=[]; s.status='Taslak'; s.revision=(s.revision||0)+1; state.schedule=state.schedule.filter(x=>!(x.date===date&&x.meal===meal)).concat(s); state.revisions.push({id:uid(),at:new Date().toISOString(),type:'Öğün boşaltma',detail:`${fmtDate(date)} ${MEAL_LABEL[meal]} boşaltıldı.`,user:'Yönetici'}); closeModal(); save(); }
function showAlternatives(date,meal){ const base=state.schedule.filter(s=>!(s.date===date&&s.meal===meal)); const alts=[]; for(let i=0;i<8;i++){ alts.push(smartGenerateCandidate(date,meal,base)); } alts.sort((a,b)=>b.score-a.score); openModal(`<div class="modal-head"><div><h3>Akıllı Alternatifler</h3><p class="muted">${fmtDate(date)} ${MEAL_LABEL[meal]} için en yüksek puanlı öneriler.</p></div><button class="close" onclick="closeModal()">✕</button></div><div class="grid">${alts.slice(0,5).map((a,i)=>`<div class="card"><div class="card-title"><h3>${i+1}. Alternatif</h3><span class="chip ${a.score>=80?'ok':'warn'}">${a.score}/100</span></div><ol>${nameList(a.items).map(x=>`<li>${esc(x)}</li>`).join('')}</ol>${a.reasons.map(r=>`<p class="reason">ℹ️ ${esc(r)}</p>`).join('')}<button class="btn small accent" onclick='applyAlternative(${JSON.stringify(date)},${JSON.stringify(meal)},${JSON.stringify(a.items)})'>Bu Menüyü Kullan</button></div>`).join('')}</div>`,'wide'); }
function applyAlternative(date,meal,items){ const sc=scoreMenu(items,date,meal,state.schedule.filter(s=>!(s.date===date&&s.meal===meal))); const old=getScheduleSlot(date,meal); const slot={...(old||blankSlot(date,meal)),items,score:sc.score,warnings:sc.warnings,reasons:sc.reasons,status:'Taslak',revision:(old?.revision||0)+1}; state.schedule=state.schedule.filter(s=>!(s.date===date&&s.meal===meal)).concat(slot).sort((a,b)=>a.date.localeCompare(b.date)||a.meal.localeCompare(b.meal)); state.revisions.push({id:uid(),at:new Date().toISOString(),type:'Alternatif uygulandı',detail:`${fmtDate(date)} ${MEAL_LABEL[meal]} için alternatif menü uygulandı.`,user:'Yönetici'}); closeModal(); save(); toast('Alternatif menü uygulandı.'); }
function approveSlot(date,meal,status){ const s=getScheduleSlot(date,meal); if(!s) return; s.status=status; state.approvals.push({id:uid(),at:new Date().toISOString(),date,meal,status,user:'Yönetici'}); state.revisions.push({id:uid(),at:new Date().toISOString(),type:'Onay',detail:`${fmtDate(date)} ${MEAL_LABEL[meal]} ${status}.`,user:'Yönetici'}); save(); toast('Durum güncellendi.'); }
function renderFoods(){
 document.getElementById('foods').innerHTML=`<div class="card"><div class="card-title"><h3>Yemek Havuzu</h3><div class="top-actions"><button class="btn small accent" onclick="openFoodModal()">➕ Yemek Ekle</button><button class="btn small secondary" onclick="downloadFoodTemplate()">📥 Excel Şablonu</button><button class="btn small secondary" onclick="importFoodsClick()">📤 Excel Yükle</button></div></div><p class="hint">Her yemek kategori, grup, mevsim, maliyet, ağırlık, zorluk, alerjen, uyum ve anket puanı ile tanımlanır.</p>${foodsTable()}</div>`;
}
function foodsTable(){ return `<div class="table-wrap"><table><thead><tr><th>Yemek</th><th>Kategori</th><th>Grup</th><th>Mevsim</th><th>Puan</th><th>Maliyet/Ağırlık</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>${state.foods.map(f=>`<tr><td><b>${esc(f.name)}</b><br><span class="tiny muted">${esc(f.allergens||'Alerjen yok')}</span></td><td>${CAT_LABEL[f.cat]}</td><td>${esc(f.group)}</td><td>${esc(f.season)}</td><td>${Number(f.satisfaction||0).toFixed(1)}</td><td>${f.cost}/${f.weight}</td><td><span class="chip ${f.active?'ok':'bad'}">${f.active?'Aktif':'Pasif'}</span></td><td><button class="btn small secondary" onclick="openFoodModal('${f.id}')">Düzenle</button> <button class="btn small ${f.active?'danger':'accent'}" onclick="toggleFood('${f.id}')">${f.active?'Pasifleştir':'Aktifleştir'}</button></td></tr>`).join('')}</tbody></table></div>`; }
function openFoodModal(id=''){ const f=id?byId(id):{id:'',name:'',cat:'main',group:'veg',season:'Tüm yıl',weight:3,cost:2,difficulty:2,satisfaction:4,allergens:'',diets:'',compatible:'',incompatible:'',repeatDays:7,active:true,note:''}; openModal(`<div class="modal-head"><div><h3>${id?'Yemek Düzenle':'Yeni Yemek Ekle'}</h3><p class="muted">Etiketler algoritmanın kalitesini doğrudan etkiler.</p></div><button class="close" onclick="closeModal()">✕</button></div><div class="form-grid"><input type="hidden" id="foodId" value="${f.id}"><div class="field"><label>Yemek Adı</label><input id="foodName" value="${esc(f.name)}"></div><div class="field"><label>Kategori</label><select id="foodCat">${Object.entries(CAT_LABEL).map(([k,v])=>`<option value="${k}" ${f.cat===k?'selected':''}>${v}</option>`).join('')}</select></div><div class="field"><label>Grup</label><input id="foodGroup" value="${esc(f.group)}" placeholder="meat, chicken, veg, legume..."></div><div class="field"><label>Mevsim</label><select id="foodSeason">${SEASONS.map(s=>`<option ${f.season===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>Ağırlık 1-5</label><input id="foodWeight" type="number" min="1" max="5" value="${f.weight}"></div><div class="field"><label>Maliyet 1-5</label><input id="foodCost" type="number" min="1" max="5" value="${f.cost}"></div><div class="field"><label>Zorluk 1-5</label><input id="foodDifficulty" type="number" min="1" max="5" value="${f.difficulty}"></div><div class="field"><label>Anket Puanı 1-5</label><input id="foodSat" type="number" min="1" max="5" step="0.1" value="${f.satisfaction}"></div><div class="field"><label>Tekrar Günü</label><input id="foodRepeat" type="number" min="0" value="${f.repeatDays}"></div><div class="field"><label>Alerjenler</label><input id="foodAllergens" value="${esc(f.allergens||'')}"></div><div class="field"><label>Diyet Etiketleri</label><input id="foodDiets" value="${esc(f.diets||'')}"></div><div class="field"><label>Aktif mi?</label><select id="foodActive"><option value="true" ${f.active?'selected':''}>Aktif</option><option value="false" ${!f.active?'selected':''}>Pasif</option></select></div><div class="field full"><label>Uyumlu Yemekler</label><input id="foodCompatible" value="${esc(f.compatible||'')}" placeholder="virgülle yazın"></div><div class="field full"><label>Uyumsuz Yemekler</label><input id="foodIncompatible" value="${esc(f.incompatible||'')}" placeholder="virgülle yazın"></div><div class="field full"><label>Not</label><textarea id="foodNote">${esc(f.note||'')}</textarea></div></div><div class="hr"></div><button class="btn accent" onclick="saveFoodModal()">💾 Kaydet</button>`,'wide'); }
function saveFoodModal(){ const id=foodId.value||uid(); const f={id,name:foodName.value.trim(),cat:foodCat.value,group:foodGroup.value.trim(),season:foodSeason.value,weight:+foodWeight.value,cost:+foodCost.value,difficulty:+foodDifficulty.value,satisfaction:+foodSat.value,allergens:foodAllergens.value,diets:foodDiets.value,compatible:foodCompatible.value,incompatible:foodIncompatible.value,repeatDays:+foodRepeat.value,active:foodActive.value==='true',note:foodNote.value,lastUsed:byId(id)?.lastUsed||'',useCount:byId(id)?.useCount||0,wasteAvg:byId(id)?.wasteAvg||0}; if(!f.name){toast('Yemek adı zorunlu.'); return;} state.foods=state.foods.filter(x=>x.id!==id).concat(f); closeModal(); save(); toast('Yemek kaydedildi.'); }
function toggleFood(id){ const f=byId(id); f.active=!f.active; save(); }
function importFoodsClick(){ hiddenFile.onchange=e=>importFoods(e.target.files[0]); hiddenFile.accept='.xlsx,.xls,.csv'; hiddenFile.click(); }
function importFoods(file){ if(!file) return; const reader=new FileReader(); reader.onload=e=>{ try{ let rows=[]; if(file.name.endsWith('.csv')){ rows=e.target.result.split(/\r?\n/).map(x=>x.split(',')); } else { if(!window.XLSX){toast('Excel kütüphanesi yüklenemedi.'); return;} const wb=XLSX.read(e.target.result,{type:'binary'}); rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1}); } const h=rows[0].map(x=>String(x).toLowerCase()); rows.slice(1).forEach(r=>{ if(!r[0]) return; const get=n=>r[h.indexOf(n)]??''; state.foods.push({id:uid(),name:get('yemek')||r[0],cat:get('kategori')||'main',group:get('grup')||'veg',season:get('mevsim')||'Tüm yıl',weight:+(get('ağırlık')||get('agirlik')||3),cost:+(get('maliyet')||2),difficulty:+(get('zorluk')||2),satisfaction:+(get('puan')||4),allergens:get('alerjen')||'',diets:get('diyet')||'',compatible:get('uyumlu')||'',incompatible:get('uyumsuz')||'',repeatDays:+(get('tekrar')||7),active:true,lastUsed:'',useCount:0,wasteAvg:0,note:''}); }); save(); toast('Yemek listesi içe aktarıldı.'); }catch(err){console.error(err); toast('İçe aktarma sırasında hata oluştu.');} }; if(file.name.endsWith('.csv')) reader.readAsText(file,'utf-8'); else reader.readAsBinaryString(file); }
function downloadFoodTemplate(){ const rows=[['Yemek','Kategori','Grup','Mevsim','Ağırlık','Maliyet','Zorluk','Puan','Alerjen','Diyet','Uyumlu','Uyumsuz','Tekrar'],['Örnek Köfte','main','meat','Tüm yıl',5,4,3,4.5,'gluten,yumurta','','salata,makarna','et sote',7]]; exportRows(rows,'yemek_listesi_sablonu.xlsx'); }
function renderStock(){
 const purchase=purchaseList(); document.getElementById('stock').innerHTML=`<div class="grid cols-2"><div class="card"><div class="card-title"><h3>Stok Yönetimi</h3><button class="btn small accent" onclick="openStockModal()">➕ Stok Ekle</button></div>${stockTable()}</div><div class="card"><div class="card-title"><h3>Satın Alma Listesi</h3><button class="btn small secondary" onclick="exportPurchaseExcel()">📊 Excel</button></div>${purchase.length?`<div class="table-wrap"><table><thead><tr><th>Malzeme</th><th>Gerekli</th><th>Stok</th><th>Alınacak</th></tr></thead><tbody>${purchase.map(p=>`<tr><td><b>${esc(p.name)}</b></td><td>${p.need.toFixed(1)} ${p.unit}</td><td>${p.stock.toFixed(1)} ${p.unit}</td><td><b>${p.buy.toFixed(1)} ${p.unit}</b></td></tr>`).join('')}</tbody></table></div>`:'<p class="lead">Seçili çizelge ve stoklara göre eksik malzeme görünmüyor.</p>'}<p class="hint">Satın alma listesi seçili tarih aralığı ve kişi sayısına göre reçete kayıtlarından hesaplanır.</p></div></div>`;
}
function stockTable(){ return `<div class="table-wrap"><table><thead><tr><th>Malzeme</th><th>Miktar</th><th>Min.</th><th>SKT</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>${state.stock.map(s=>{const days=daysBetween(todayISO(),s.exp); const status=s.qty<s.min?'Düşük':days<=7?'SKT Yakın':'Normal'; const cls=s.qty<s.min?'bad':days<=7?'warn':'ok'; return `<tr><td><b>${esc(s.name)}</b></td><td>${s.qty} ${esc(s.unit)}</td><td>${s.min} ${esc(s.unit)}</td><td>${fmtDate(s.exp)}</td><td><span class="chip ${cls}">${status}</span></td><td><button class="btn small secondary" onclick="openStockModal('${s.id}')">Düzenle</button></td></tr>`}).join('')}</tbody></table></div>`; }
function openStockModal(id=''){ const s=id?state.stock.find(x=>x.id===id):{id:'',name:'',qty:0,unit:'kg',exp:addDaysISO(todayISO(),30),min:0}; openModal(`<div class="modal-head"><h3>Stok Kaydı</h3><button class="close" onclick="closeModal()">✕</button></div><div class="form-grid"><input type="hidden" id="stockId" value="${s.id}"><div class="field"><label>Malzeme</label><input id="stockName" value="${esc(s.name)}"></div><div class="field"><label>Miktar</label><input id="stockQty" type="number" step="0.1" value="${s.qty}"></div><div class="field"><label>Birim</label><input id="stockUnit" value="${esc(s.unit)}"></div><div class="field"><label>Son Kullanma Tarihi</label><input id="stockExp" type="date" value="${s.exp}"></div><div class="field"><label>Minimum Stok</label><input id="stockMin" type="number" step="0.1" value="${s.min}"></div></div><div class="hr"></div><button class="btn accent" onclick="saveStockModal()">Kaydet</button>`,'smallm'); }
function saveStockModal(){ const id=stockId.value||uid(); const s={id,name:stockName.value.trim(),qty:+stockQty.value,unit:stockUnit.value,exp:stockExp.value,min:+stockMin.value}; state.stock=state.stock.filter(x=>x.id!==id).concat(s); closeModal(); save(); toast('Stok kaydedildi.'); }
function renderRecipes(){ document.getElementById('recipes').innerHTML=`<div class="grid cols-2"><div class="card"><div class="card-title"><h3>Reçeteler</h3><button class="btn small accent" onclick="openRecipeModal()">➕ Reçete Ekle</button></div>${recipeTable()}</div><div class="card"><div class="card-title"><h3>Malzeme İhtiyaç Hesabı</h3><button class="btn small secondary" onclick="exportNeedsExcel()">📊 Excel</button></div>${needsTable()}<p class="hint">Hesaplama, reçete miktarlarını 100 kişi baz alarak seçili çizelgedeki öğün kişi sayısına göre ölçekler.</p></div></div>`; }
function recipeTable(){ return `<div class="table-wrap"><table><thead><tr><th>Yemek</th><th>Malzemeler / 100 kişi</th><th>İşlem</th></tr></thead><tbody>${state.recipes.map(r=>`<tr><td><b>${esc(r.foodName)}</b></td><td>${r.ingredients.map(i=>`${esc(i.name)}: ${i.qty} ${esc(i.unit)}`).join('<br>')}</td><td><button class="btn small secondary" onclick="openRecipeModal('${r.foodId}')">Düzenle</button></td></tr>`).join('')}</tbody></table></div>`; }
function openRecipeModal(foodId=''){ const r=foodId?state.recipes.find(x=>x.foodId===foodId):null; const foodOpts=state.foods.map(f=>`<option value="${f.id}" ${r?.foodId===f.id?'selected':''}>${esc(f.name)}</option>`).join(''); const lines=r?r.ingredients.map(i=>`${i.name};${i.qty};${i.unit}`).join('\n'):''; openModal(`<div class="modal-head"><div><h3>Reçete</h3><p class="muted">Her satır: Malzeme;Miktar;Birim</p></div><button class="close" onclick="closeModal()">✕</button></div><div class="field"><label>Yemek</label><select id="recipeFood">${foodOpts}</select></div><div class="field" style="margin-top:12px"><label>100 Kişilik Malzeme Listesi</label><textarea id="recipeLines" style="min-height:220px">${esc(lines)}</textarea></div><div class="hr"></div><button class="btn accent" onclick="saveRecipeModal()">Kaydet</button>`); }
function saveRecipeModal(){ const fid=recipeFood.value; const food=byId(fid); const ingredients=recipeLines.value.split(/\r?\n/).map(l=>l.split(';')).filter(x=>x[0]).map(x=>({name:x[0].trim(),qty:+(x[1]||0),unit:(x[2]||'kg').trim()})); const r={foodId:fid,foodName:food.name,perPersonBase:100,ingredients}; state.recipes=state.recipes.filter(x=>x.foodId!==fid).concat(r); closeModal(); save(); toast('Reçete kaydedildi.'); }
function materialNeeds(){ const days=currentRange(); const needs={}; state.schedule.filter(s=>days.includes(s.date)).forEach(s=>{ const count=s.meal==='lunch'?Number(s.lunchCount||state.planner.lunchCount):Number(s.dinnerCount||state.planner.dinnerCount); s.items.forEach(id=>{ const r=state.recipes.find(x=>x.foodId===id); if(!r) return; r.ingredients.forEach(i=>{ const key=i.name.toLowerCase()+'|'+i.unit; if(!needs[key]) needs[key]={name:i.name,unit:i.unit,qty:0}; needs[key].qty += Number(i.qty||0)*count/100; }); }); }); return Object.values(needs).sort((a,b)=>a.name.localeCompare(b.name,'tr')); }
function needsTable(){ const needs=materialNeeds(); return needs.length?`<div class="table-wrap"><table><thead><tr><th>Malzeme</th><th>Gerekli Miktar</th></tr></thead><tbody>${needs.map(n=>`<tr><td><b>${esc(n.name)}</b></td><td>${n.qty.toFixed(1)} ${esc(n.unit)}</td></tr>`).join('')}</tbody></table></div>`:'<p class="lead">Seçili çizelge için reçeteye bağlı ihtiyaç bulunamadı.</p>'; }
function purchaseList(){ const needs=materialNeeds(); return needs.map(n=>{ const st=state.stock.find(s=>s.name.toLowerCase()===n.name.toLowerCase()); const stock=st?Number(st.qty||0):0; const buy=Math.max(0,n.qty-stock); return {name:n.name,unit:n.unit,need:n.qty,stock,buy}; }).filter(x=>x.buy>0); }
function renderSurveys(){ const avg=surveyAverages(); document.getElementById('surveys').innerHTML=`<div class="grid cols-2"><div class="card"><div class="card-title"><h3>Anket Üretimi</h3><div class="top-actions"><button class="btn small purple" onclick="createSurveyPrint()">📝 Anket Çıktısı</button><button class="btn small secondary" onclick="generateQr()">▦ QR Oluştur</button></div></div><div class="form-grid two"><div class="field"><label>Anket Tarihi</label><input type="date" id="surveyDate" value="${state.planner.start}"></div><div class="field"><label>Öğün</label><select id="surveyMeal"><option value="lunch">Öğle</option><option value="dinner">Akşam</option></select></div></div><div id="qrTarget" class="qrbox" style="margin-top:14px"><span class="muted">QR kod burada oluşur.</span></div><p class="hint">QR kod, seçili tarih ve öğün bilgisi içeren standart anket metni üretir. Harici anket linki kullanırsan sistemdeki metni linkle değiştirebilirsin.</p></div><div class="card"><div class="card-title"><h3>Anket Sonucu Geri Yükleme</h3><button class="btn small secondary" onclick="importSurveyClick()">📤 Excel/CSV Yükle</button></div><p class="lead">Beklenen kolonlar: Tarih, Öğün, Yemek, Lezzet, Doyuruculuk, Sıcaklık, Çeşitlilik, Tekrar, Yorum</p>${avg.length?`<div class="table-wrap"><table><thead><tr><th>Yemek</th><th>Ortalama</th><th>Kayıt</th></tr></thead><tbody>${avg.slice(0,10).map(a=>`<tr><td><b>${esc(a.food)}</b></td><td>${a.avg.toFixed(2)}</td><td>${a.count}</td></tr>`).join('')}</tbody></table></div>`:''}</div></div>`; }
function generateQr(){ const d=document.getElementById('surveyDate')?.value||todayISO(); const m=document.getElementById('surveyMeal')?.value||'lunch'; const s=getScheduleSlot(d,m); const text=`${state.settings.institution}\nAnket: ${fmtDate(d)} ${MEAL_LABEL[m]}\nMenü: ${s?nameList(s.items).join(', '):'Henüz menü yok'}\nLütfen lezzet, doyuruculuk, sıcaklık, çeşitlilik ve tekrar isteğini 1-5 arasında puanlayınız.`; const target=document.getElementById('qrTarget'); target.innerHTML=''; if(window.QRCode){ QRCode.toCanvas(text,{width:170},(err,canvas)=>{ if(err){target.textContent=text}else{target.appendChild(canvas); const p=document.createElement('p'); p.className='hint'; p.textContent='QR içeriği standart anket metnidir.'; target.appendChild(p);} }); } else target.textContent=text; }
function createSurveyPrint(){ const days=currentRange(); const rows=[]; days.forEach(d=>['lunch','dinner'].forEach(m=>{const s=getScheduleSlot(d,m); if(s) rows.push([fmtDate(d),dayName(d),MEAL_LABEL[m],nameList(s.items).join(', ')]); })); const html=`<html><head><meta charset="utf-8"><title>Anket Formu</title><style>body{font-family:Arial;padding:24px}h1{text-align:center}table{width:100%;border-collapse:collapse;margin-top:20px}td,th{border:1px solid #555;padding:8px}th{background:#eee}.box{height:26px}.small{font-size:12px}</style></head><body><h1>${esc(state.settings.institution)}<br>Memnuniyet Anket Formu</h1><p>Lezzet, doyuruculuk, sıcaklık, çeşitlilik ve tekrar isteği alanlarını 1-5 arasında puanlayınız.</p><table><thead><tr><th>Tarih</th><th>Gün</th><th>Öğün</th><th>Menü</th><th>Lezzet</th><th>Doyuruculuk</th><th>Sıcaklık</th><th>Çeşitlilik</th><th>Tekrar</th><th>Yorum</th></tr></thead><tbody>${rows.map(r=>`<tr>${r.map(x=>`<td>${esc(x)}</td>`).join('')}<td class="box"></td><td></td><td></td><td></td><td></td><td></td></tr>`).join('')}</tbody></table><p class="small">${esc(state.settings.footer)}</p></body></html>`; downloadBlob(html,'tabildot_anket_formu.doc','application/msword'); }
function importSurveyClick(){ hiddenFile.onchange=e=>importSurvey(e.target.files[0]); hiddenFile.accept='.xlsx,.xls,.csv'; hiddenFile.click(); }
function importSurvey(file){ if(!file)return; const reader=new FileReader(); reader.onload=e=>{ let rows=[]; try{ if(file.name.endsWith('.csv')) rows=e.target.result.split(/\r?\n/).map(x=>x.split(',')); else { if(!window.XLSX){toast('Excel kütüphanesi yüklenemedi.'); return;} const wb=XLSX.read(e.target.result,{type:'binary'}); rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1}); } const h=rows[0].map(x=>String(x).toLowerCase()); rows.slice(1).forEach(r=>{ const get=n=>r[h.indexOf(n)]??''; const food=get('yemek')||r[2]||''; if(!food) return; const scores=['lezzet','doyuruculuk','sıcaklık','sicaklik','çeşitlilik','cesitlilik','tekrar'].map(k=>Number(get(k))).filter(x=>x>0); const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0; state.surveys.push({id:uid(),date:get('tarih')||'',meal:get('öğün')||get('ogun')||'',food:String(food),avg,comment:get('yorum')||'',at:new Date().toISOString()}); }); applySurveyLearning(); save(); toast('Anket sonuçları yüklendi ve yemek puanlarına işlendi.'); }catch(err){console.error(err); toast('Anket yüklenemedi.');} }; if(file.name.endsWith('.csv')) reader.readAsText(file,'utf-8'); else reader.readAsBinaryString(file); }
function surveyAverages(){ const map={}; state.surveys.forEach(s=>{ const foods=String(s.food).split(',').map(x=>x.trim()).filter(Boolean); foods.forEach(food=>{ if(!map[food]) map[food]={food,total:0,count:0}; map[food].total+=Number(s.avg||0); map[food].count++; }); }); return Object.values(map).map(x=>({...x,avg:x.total/x.count})).sort((a,b)=>b.avg-a.avg); }
function applySurveyLearning(){ const avg=surveyAverages(); avg.forEach(a=>{ const f=state.foods.find(x=>a.food.toLowerCase().includes(x.name.toLowerCase()) || x.name.toLowerCase().includes(a.food.toLowerCase())); if(f && a.avg){ f.satisfaction = Math.round(((Number(f.satisfaction||4)*0.65)+(a.avg*0.35))*10)/10; } }); }
function renderWaste(){ document.getElementById('waste').innerHTML=`<div class="grid cols-2"><div class="card"><div class="card-title"><h3>İsraf Kaydı</h3><button class="btn small accent" onclick="openWasteModal()">➕ İsraf Gir</button></div>${wasteTable()}</div><div class="card"><h3>Porsiyon ve Sıklık Önerileri</h3>${wasteAdviceHtml()}</div></div>`; }
function wasteTable(){ return `<div class="table-wrap"><table><thead><tr><th>Tarih</th><th>Öğün</th><th>Yemek</th><th>Pişen</th><th>Kalan</th><th>Oran</th></tr></thead><tbody>${state.waste.map(w=>`<tr><td>${fmtDate(w.date)}</td><td>${esc(w.meal)}</td><td><b>${esc(w.food)}</b></td><td>${w.cooked}</td><td>${w.left}</td><td>%${Math.round(w.rate)}</td></tr>`).join('')}</tbody></table></div>`; }
function openWasteModal(){ openModal(`<div class="modal-head"><h3>İsraf Kaydı</h3><button class="close" onclick="closeModal()">✕</button></div><div class="form-grid"><div class="field"><label>Tarih</label><input type="date" id="wDate" value="${todayISO()}"></div><div class="field"><label>Öğün</label><select id="wMeal"><option>Öğle</option><option>Akşam</option></select></div><div class="field"><label>Yemek</label><select id="wFood">${state.foods.map(f=>`<option>${esc(f.name)}</option>`).join('')}</select></div><div class="field"><label>Pişen Porsiyon</label><input type="number" id="wCooked" value="250"></div><div class="field"><label>Kalan Porsiyon</label><input type="number" id="wLeft" value="0"></div></div><div class="hr"></div><button class="btn accent" onclick="saveWasteModal()">Kaydet</button>`,'smallm'); }
function saveWasteModal(){ const rate=+wLeft.value / Math.max(1,+wCooked.value)*100; state.waste.push({id:uid(),date:wDate.value,meal:wMeal.value,food:wFood.value,cooked:+wCooked.value,left:+wLeft.value,rate}); const f=state.foods.find(x=>x.name===wFood.value); if(f){ const records=state.waste.filter(w=>w.food===f.name); f.wasteAvg=records.reduce((a,b)=>a+b.rate,0)/records.length; } closeModal(); save(); toast('İsraf kaydı işlendi.'); }
function wasteAdviceHtml(){ const arr=state.foods.filter(f=>(f.wasteAvg||0)>0).sort((a,b)=>(b.wasteAvg||0)-(a.wasteAvg||0)).slice(0,8); if(!arr.length) return '<p class="lead">Henüz israf verisi yok. Veri girildikçe porsiyon ve menü sıklığı önerileri oluşur.</p>'; return arr.map(f=>`<p class="lead">♻️ <b>${esc(f.name)}</b>: Ortalama israf %${Math.round(f.wasteAvg)}. ${f.wasteAvg>25?'Porsiyon azaltma veya daha seyrek kullanma önerilir.':'Takip edilmeli.'}</p>`).join(''); }
function renderApprovals(){ document.getElementById('approvals').innerHTML=`<div class="grid cols-2"><div class="card"><div class="card-title"><h3>Onay Akışı</h3><div class="top-actions"><button class="btn small accent" onclick="bulkApprove('Onaylandı')">✅ Tümünü Onayla</button><button class="btn small purple" onclick="bulkApprove('Yayınlandı')">📣 Yayınla</button></div></div><p class="lead">Çizelge aşamaları: Taslak → Onaylandı → Yayınlandı → Arşivlendi. Her işlem revizyon geçmişine kaydedilir.</p>${approvalTable()}</div><div class="card"><h3>Revizyon Geçmişi</h3>${revisionTable()}</div></div>`; }
function approvalTable(){ return `<div class="table-wrap"><table><thead><tr><th>Tarih</th><th>Öğün</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>${state.schedule.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30).map(s=>`<tr><td>${fmtDate(s.date)}</td><td>${MEAL_LABEL[s.meal]}</td><td><span class="chip purple">${esc(s.status||'Taslak')}</span></td><td><button class="btn small secondary" onclick="approveSlot('${s.date}','${s.meal}','Onaylandı')">Onayla</button> <button class="btn small secondary" onclick="approveSlot('${s.date}','${s.meal}','Yayınlandı')">Yayınla</button></td></tr>`).join('')}</tbody></table></div>`; }
function revisionTable(){ return `<div class="table-wrap"><table><thead><tr><th>Zaman</th><th>İşlem</th><th>Detay</th></tr></thead><tbody>${state.revisions.slice().reverse().slice(0,40).map(r=>`<tr><td>${new Date(r.at).toLocaleString('tr-TR')}</td><td><b>${esc(r.type)}</b></td><td>${esc(r.detail)}</td></tr>`).join('')}</tbody></table></div>`; }
function bulkApprove(status){ currentRange().forEach(d=>['lunch','dinner'].forEach(m=>{ const s=getScheduleSlot(d,m); if(s) s.status=status; })); state.revisions.push({id:uid(),at:new Date().toISOString(),type:'Toplu durum',detail:`Seçili aralık ${status} durumuna alındı.`,user:'Yönetici'}); save(); }
function renderReports(){ const days=currentRange(); const slots=state.schedule.filter(s=>days.includes(s.date)); const groups={}; slots.forEach(s=>s.items.forEach(id=>{const f=byId(id); if(f) groups[f.group]=(groups[f.group]||0)+1;})); const warnings=allWarnings().filter(w=>days.includes(w.date)); document.getElementById('reports').innerHTML=`<div class="card"><div class="card-title"><h3>Aylık / Haftalık Strateji Raporu</h3><div class="top-actions"><button class="btn small secondary" onclick="exportReportWord()">📝 Word Rapor</button><button class="btn small secondary" onclick="exportExcel()">📊 Excel</button></div></div><div class="grid cols-4"><div class="kpi"><div class="icon">⭐</div><div><b>${averageScore()||'-'}</b><span>Kalite</span></div></div><div class="kpi"><div class="icon">💰</div><div><b>${Math.round(slots.reduce((a,s)=>a+(s.metrics?.cost||menuObject(s.items).cost),0))}</b><span>Maliyet puanı toplamı</span></div></div><div class="kpi"><div class="icon">⚠️</div><div><b>${warnings.length}</b><span>Uyarı</span></div></div><div class="kpi"><div class="icon">📝</div><div><b>${state.surveys.length}</b><span>Anket kaydı</span></div></div></div><div class="hr"></div><div class="grid cols-2"><div><h3>Grup Dağılımı</h3><div class="table-wrap"><table><thead><tr><th>Grup</th><th>Kullanım</th></tr></thead><tbody>${Object.entries(groups).sort((a,b)=>b[1]-a[1]).map(([g,c])=>`<tr><td><b>${esc(g)}</b></td><td>${c}</td></tr>`).join('')}</tbody></table></div></div><div><h3>Yöneticiye Yeni Fikirler</h3>${strategySuggestions().map(x=>`<p class="lead">💡 ${esc(x)}</p>`).join('')}</div></div></div>`; }
function renderGuide(){ document.getElementById('guide').innerHTML=`<div class="card"><h3>Kullanıcı Kılavuzu</h3><div class="lead"><p><b>1. Yemek Havuzu:</b> Önce yemekleri kategori, grup, mevsim, maliyet, ağırlık, zorluk, uyum ve uyumsuzluk bilgileriyle girin.</p><p><b>2. Reçete:</b> Kişi sayısına göre malzeme hesabı istiyorsanız yemeklerin 100 kişilik reçetelerini tanımlayın.</p><p><b>3. Stok:</b> Mevcut malzemeleri ve son kullanma tarihlerini girin. Sistem SKT yaklaşan malzemeleri kullanan menülere ek puan verir.</p><p><b>4. Çizelge Oluştur:</b> Başlangıç tarihi, gün sayısı ve menü modu seçilip akıllı çizelge oluşturulur.</p><p><b>5. Manuel Müdahale:</b> Yönetici modu açılarak her öğün elle değiştirilebilir. Sistem değişiklik sonrası yeniden puan verir.</p><p><b>6. Anket:</b> Çizelgeye göre anket formu oluşturulur. Sonuçlar Excel/CSV olarak geri yüklenince yemek memnuniyet puanları güncellenir.</p><p><b>7. İsraf:</b> Kalan porsiyonlar girilir. İsraf yüksek yemekler için sistem porsiyon/sıklık önerisi üretir.</p><p><b>8. Çıktılar:</b> Excel, Word ve yazdırma/PDF çıktıları kurumsal başlık bilgileriyle alınabilir.</p></div><div class="hr"></div><h3>Algoritma Puanlama Mantığı</h3><p class="lead">Her öğün 100 puan üzerinden değerlendirilir. Tekrar, uyumsuz yemek, maliyet yüksekliği, aşırı ağırlık, üretim zorluğu ve israf ceza puanı oluşturur. Mevsim uygunluğu, yüksek anket puanı, stok avantajı ve uyumlu yemek eşleşmeleri artı puan sağlar.</p></div>`; }
function renderSettings(){ document.getElementById('settings').innerHTML=`<div class="grid cols-2"><div class="card"><h3>Kural Ayarları</h3><div class="form-grid two"><div class="field"><label>Ana Yemek Tekrar Günü</label><input type="number" value="${state.settings.repeatMain}" onchange="state.settings.repeatMain=+this.value; save()"></div><div class="field"><label>Çorba Tekrar Günü</label><input type="number" value="${state.settings.repeatSoup}" onchange="state.settings.repeatSoup=+this.value; save()"></div><div class="field"><label>Yardımcı Tekrar Günü</label><input type="number" value="${state.settings.repeatSide}" onchange="state.settings.repeatSide=+this.value; save()"></div><div class="field"><label>Tatlı Tekrar Günü</label><input type="number" value="${state.settings.repeatDessert}" onchange="state.settings.repeatDessert=+this.value; save()"></div><div class="field"><label>Günlük Maliyet Limiti</label><input type="number" value="${state.settings.maxDailyCost}" onchange="state.settings.maxDailyCost=+this.value; save()"></div><div class="field"><label>Günlük Zorluk Limiti</label><input type="number" value="${state.settings.maxDailyDifficulty}" onchange="state.settings.maxDailyDifficulty=+this.value; save()"></div></div><div class="hr"></div><div class="switch-row"><div><b>Tüm kuralları kaldır</b><div class="hint">Yönetici tam manuel moduna geçer. Çizelge boş veya mevcut haliyle yönetilebilir.</div></div><button class="btn ${state.ruleFree?'danger':'warning'}" onclick="toggleRuleFree()">${state.ruleFree?'Kuralları Aç':'Kuralları Kaldır'}</button></div></div><div class="card"><h3>Kurumsal Çıktı Ayarları</h3><div class="field"><label>Kurum Başlığı</label><input value="${esc(state.settings.institution)}" onchange="state.settings.institution=this.value; save()"></div><div class="field"><label>Hazırlayan Birim</label><input value="${esc(state.settings.preparedBy)}" onchange="state.settings.preparedBy=this.value; save()"></div><div class="field"><label>Alt Bilgi</label><textarea onchange="state.settings.footer=this.value; save()">${esc(state.settings.footer)}</textarea></div><div class="hr"></div><div class="top-actions"><button class="btn secondary" onclick="backupData()">💾 Yedek Al</button><button class="btn secondary" onclick="restoreClick()">📤 Yedekten Yükle</button><button class="btn danger" onclick="resetData()">🧹 Sistemi Sıfırla</button></div></div></div>`; }
function toggleTheme(){ state.theme=state.theme==='dark'?'light':'dark'; save(); }
function toggleAdmin(){ state.admin=!state.admin; if(!state.admin) state.ruleFree=false; save(); toast(state.admin?'Yönetici modu açıldı.':'Yönetici modu kapatıldı.'); }
function toggleRuleFree(){ if(!state.admin){toast('Önce yönetici modunu açın.'); return;} if(!state.ruleFree){ if(confirm('Tüm algoritma kuralları kaldırılacak. Artık yönetici tam manuel modundadır. Devam edilsin mi?')){ state.ruleFree=true; toast('Artık yönetici tam manuel modundasınız.'); } } else { state.ruleFree=false; toast('Akıllı kurallar tekrar aktif.'); } save(); }
function openModal(html,wide=''){ modal.className='modal '+(wide||''); modalContent.innerHTML=html; modalBackdrop.classList.add('show'); }
function closeModal(){ modalBackdrop.classList.remove('show'); editingSlot=null; }
modalBackdrop.addEventListener('click',e=>{ if(e.target.id==='modalBackdrop') closeModal(); });
function downloadBlob(content,filename,type='text/plain'){ const blob=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
function exportRows(rows,filename){ if(window.XLSX){ const ws=XLSX.utils.aoa_to_sheet(rows); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Veri'); XLSX.writeFile(wb,filename); } else { downloadBlob(rows.map(r=>r.join(';')).join('\n'), filename.replace('.xlsx','.csv'), 'text/csv;charset=utf-8'); } }
function exportExcel(){ const days=currentRange(); const rows=[[state.settings.institution],['Tarih Aralığı',fmtDate(days[0])+' - '+fmtDate(days[days.length-1])],[],['Tarih','Gün','Öğün','Çorba','Ana Yemek','Yardımcı','Tamamlayıcı','Skor','Durum','Uyarılar']]; state.schedule.filter(s=>days.includes(s.date)).forEach(s=>{ const names=nameList(s.items); rows.push([fmtDate(s.date),dayName(s.date),MEAL_LABEL[s.meal],names[0]||'',names[1]||'',names[2]||'',names[3]||'',s.score||0,s.status||'',(s.warnings||[]).join(' | ')]); }); exportRows(rows,'tabildot_cizelge.xlsx'); }
function exportWord(){ const days=currentRange(); const rows=days.map(d=>`<tr><td><b>${dayName(d)}</b><br>${fmtDate(d)}</td><td>${slotWord(getScheduleSlot(d,'lunch'))}</td><td>${slotWord(getScheduleSlot(d,'dinner'))}</td></tr>`).join(''); const html=`<html><head><meta charset="utf-8"><style>body{font-family:Arial}h1{text-align:center}table{width:100%;border-collapse:collapse}td,th{border:1px solid #555;padding:8px;vertical-align:top}th{background:#e9eef5}</style></head><body><h1>${esc(state.settings.institution)}</h1><p><b>Hazırlayan:</b> ${esc(state.settings.preparedBy)}<br><b>Tarih:</b> ${fmtDate(days[0])} - ${fmtDate(days[days.length-1])}</p><table><thead><tr><th>Gün</th><th>Öğle</th><th>Akşam</th></tr></thead><tbody>${rows}</tbody></table><p>${esc(state.settings.footer)}</p></body></html>`; downloadBlob(html,'tabildot_cizelge.doc','application/msword'); }
function slotWord(s){ if(!s) return 'Boş'; return `<ol>${nameList(s.items).map(x=>`<li>${esc(x)}</li>`).join('')}</ol><b>Skor:</b> ${s.score||0}/100`; }
function exportNeedsExcel(){ const rows=[['Malzeme','Gerekli Miktar','Birim'],...materialNeeds().map(n=>[n.name,n.qty.toFixed(2),n.unit])]; exportRows(rows,'tabildot_malzeme_ihtiyac.xlsx'); }
function exportPurchaseExcel(){ const rows=[['Malzeme','Gerekli','Stok','Alınacak','Birim'],...purchaseList().map(p=>[p.name,p.need.toFixed(2),p.stock.toFixed(2),p.buy.toFixed(2),p.unit])]; exportRows(rows,'tabildot_satin_alma_listesi.xlsx'); }
function exportReportWord(){ const suggestions=strategySuggestions().map(x=>`<li>${esc(x)}</li>`).join(''); const html=`<html><head><meta charset="utf-8"><style>body{font-family:Arial;line-height:1.5}h1{text-align:center}</style></head><body><h1>${esc(state.settings.institution)}<br>Strateji Raporu</h1><p><b>Ortalama kalite:</b> ${averageScore()}/100</p><p><b>Toplam öğün:</b> ${state.schedule.length}</p><h2>Yöneticiye Öneriler</h2><ul>${suggestions}</ul><p>${esc(state.settings.footer)}</p></body></html>`; downloadBlob(html,'tabildot_strateji_raporu.doc','application/msword'); }
function backupData(){ downloadBlob(JSON.stringify(state,null,2),'tabildot_yedek_'+todayISO()+'.json','application/json'); }
function restoreClick(){ hiddenFile.onchange=e=>restoreData(e.target.files[0]); hiddenFile.accept='.json'; hiddenFile.click(); }
function restoreData(file){ if(!file)return; const r=new FileReader(); r.onload=e=>{ try{ state=JSON.parse(e.target.result); save(); toast('Yedek geri yüklendi.'); }catch(err){toast('Yedek dosyası okunamadı.');} }; r.readAsText(file); }
function resetData(){ if(confirm('Tüm veriler sıfırlansın mı?')){ localStorage.removeItem(STORAGE_KEY); state=defaultState(); save(); toast('Sistem sıfırlandı.'); } }
window.addEventListener('DOMContentLoaded',()=>{ renderAll(); });
</script>
</body>
</html>
