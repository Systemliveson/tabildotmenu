  window.calculateFinalAlgorithmExample=function(){const hard=val('faHard')==='yes';const rating=+val('faRating')||0,use=+val('faUse')||0,group=+val('faGroup')||0,weight=+val('faWeight')||0,compat=+val('faCompat')||0,color=+val('faColor')||0,climate=+val('faClimate')||0,calDiff=+val('faCalDiff')||0,diet=+val('faDiet')||0;const candidate=55+rating*3-use*21-group*8-weight*7;const final=candidate*.38+compat*1.35+color*.35+climate*1.35-Math.max(0,calDiff-120)/18+diet;const box=document.getElementById('finalScoreOutput');if(hard){box.innerHTML='<div class="total" style="color:#a33">ELENDİ</div><p>Kesin kurallardan biri ihlal edildiği için puan hesaplanmadan aday havuzdan çıkarıldı.</p>';return}const parts=[['Aday puanı',candidate],['Aday katkısı × 0,38',candidate*.38],['Tabldot uyumu × 1,35',compat*1.35],['Renk uyumu × 0,35',color*.35],['Hava/mevsim × 1,35',climate*1.35],['Kalori sapma cezası',-Math.max(0,calDiff-120)/18],['Özel beslenme güvenlik katkısı',diet]];box.innerHTML=`<div class="total">${Math.round(final)}</div><div>Örnek nihai menü puanı</div><div class="score-break">${parts.map(x=>`<span>${x[0]}</span><b>${x[1]>=0?'+':''}${x[1].toFixed(1)}</b>`).join('')}</div>`};
  window.renderAlgorithm=function(){document.getElementById('algorithm').innerHTML=`<div class="algorithm-final"><div class="alg-hero"><h3>Yemek Seçim Algoritması — Nihai Sürüm</h3><p>Algoritma önce sağlık, vejetaryen uygunluğu ve menü uyumu açısından kesin eleme yapar; ardından kalan adayları tekrar, memnuniyet, renk, kalori, hava, mevsim ve maliyet ölçütleriyle puanlar. Yönetici son kararı değiştirebilir ve işlem kayıt altına alınır.</p></div><div class="alg-grid"><div class="alg-card"><h4>1. Veri Hazırlama ve Sınıflandırma</h4><ol><li>Yemek havuzunda aktif, arşivli ve pasif kayıtlar ayrılır.</li><li>Her kayıt; çorba, ana yemek, yardımcı veya tamamlayıcı olarak değerlendirilir.</li><li>Kalori, porsiyon, ağırlık, maliyet, tekrar süresi, baskın renk ve memnuniyet puanı okunur.</li><li>Vejetaryen uygunluğu ve içerik notları değerlendirilir.</li><li>15 günlük hava tahmini ve plan tarihinin mevsimi hazırlanır.</li></ol></div><div class="alg-card"><h4>2. Kesin Eleme Kuralları</h4><ul><li>Pasif veya arşivli yemek seçilmez.</li><li>Aynı öğünde iki ana yemek veya iki yoğun tahıllı yardımcı oluşturulmaz.</li><li>Dolma/sarma + pilav/makarna/börek; pirinç pilavı + sütlaç; gendime + nohut/kuru fasulye gibi kesin uyumsuzluklar elenir.</li><li>Tamamen beyaz-krem menü ve aynı temel malzemenin aşırı tekrarı engellenir.</li><li>Vejetaryen modunda et, balık, kümes hayvanı ve bunların suları elenir.</li></ul></div><div class="alg-card"><h4>3. Aday Yemeğin Puanı</h4><div class="formula">Aday = 55<br>+ anket ortalaması × 3<br>− aynı yemek kullanımı × 21<br>− aynı grup kullanımı × 8<br>− akşam ağırlık puanı × 7<br>+ üretim modu katkısı<br>+ hava ve mevsim aday katkısı<br>+ 0–4 küçük çeşitlilik rastgeleliği</div><p class="muted">Memnuniyet Odaklı modda anket katsayısı yükselir; Ekonomik, Düşük Kalori, Yüksek Protein ve Sebze Ağırlıklı modları kendi ek puanlarını uygular.</p></div><div class="alg-card"><h4>4. Menü Kombinasyonu</h4><ol><li>Çorba, ana yemek, yardımcı ve tamamlayıcı ayrı aday havuzlarından seçilir.</li><li>Ana yemek seçildikten sonra yardımcı yemek uyumu kontrol edilir.</li><li>Renk aileleri, kıvam, pişirme yöntemi ve ana malzeme tekrarları değerlendirilir.</li><li>Öğle ağırsa akşam için ağırlık ve kalori cezası artırılır.</li><li>Hazır menü atanmış gün ve öğünlerde yönetici seçimi uygulanır; uyum uyarıları yine çalışır.</li></ol></div><div class="alg-card"><h4>5. Nihai Menü Puanı</h4><div class="formula">Nihai = Aday ortalaması × 0,38<br>+ tabldot uyumu × 1,35<br>+ renk uyumu × 0,35<br>+ hava/mevsim puanı × 1,35<br>− kalori hedefinin ±150 kcal dışındaki sapması için ceza<br>+ vejetaryen güvenlik katkısı</div><p>En yüksek puanlı birkaç kombinasyon karşılaştırılır. Kesin kural ihlali bulunan kombinasyon, yüksek puan alsa bile seçilemez.</p></div><div class="alg-card"><h4>6. Hava ve Mevsim</h4><ul><li>Open-Meteo üzerinden 15 günlük tahmin çekilir.</li><li>27°C ve üzerindeki günlerde hafif, sebzeli, yoğurtlu ve zeytinyağlı yemekler desteklenir; kızartma ve ağır yemekler cezalandırılır.</li><li>10°C ve altındaki günlerde çorba, bakliyat, güveç ve sıcak yemekler desteklenir.</li><li>Yağışlı günlerde sıcak ve sulu yemeklere ek puan verilir.</li><li>Tahmin aralığı dışındaki tarihlerde mevsimsel profil kullanılır.</li></ul></div><div class="alg-card"><h4>7. Vejetaryen Plan</h4><ul><li>Lacto-ovo vejetaryen yaklaşım kullanılır; süt ve yumurta yönetici isterse dahil edilir.</li><li>Ana yemekte bakliyat, yumurta, peynir veya benzeri protein kaynakları öne alınır.</li><li>Et suyu, tavuk suyu, jelatin ve gizli hayvansal katkılar reçeteden doğrulanır.</li><li>Haftalık çeşitlilikte bakliyat, sebze, süt/yumurta ve tahıl dengesi aranır.</li></ul></div><div class="alg-card"><h4>8. Son Kontrol ve Yönetici Yetkisi</h4><ol><li>Plan tamamlandığında tekrar, tür dağılımı, kalori, renk, uyum ve anket etkisi yeniden taranır.</li><li>Düşük puanlı veya uyumsuz öğün yeniden üretilir.</li><li>Yönetici manuel değişiklik yapabilir; sistem uyumsuzluğu uyarır ancak yönetici onayıyla kaydeder.</li><li>Vejetaryen çizelge normal planla aynı tarihlerde alternatif olarak saklanabilir.</li></ol></div></div><div class="alg-card"><h4>Canlı Puan Hesaplama Aracı</h4><div class="score-demo-grid"><div><label>Kesin ihlal var mı?</label><select id="faHard"><option value="no">Hayır</option><option value="yes">Evet</option></select></div><div><label>Anket ortalaması</label><input id="faRating" type="number" min="0" max="5" step="0.1" value="4.2"></div><div><label>Yemek kullanım sayısı</label><input id="faUse" type="number" min="0" value="0"></div><div><label>Grup kullanım sayısı</label><input id="faGroup" type="number" min="0" value="1"></div><div><label>Akşam ağırlık puanı</label><input id="faWeight" type="number" min="0" max="5" value="2"></div><div><label>Tabldot uyumu</label><input id="faCompat" type="number" min="0" max="100" value="90"></div><div><label>Renk uyumu</label><input id="faColor" type="number" min="0" max="100" value="85"></div><div><label>Hava/mevsim puanı</label><input id="faClimate" type="number" min="-30" max="100" value="15"></div><div><label>Kalori hedef sapması</label><input id="faCalDiff" type="number" min="0" value="90"></div><div><label>Vejetaryen güvenlik katkısı</label><input id="faDiet" type="number" min="0" max="30" value="0"></div></div><div class="actions" style="margin-top:12px"><button class="btn green" onclick="calculateFinalAlgorithmExample()">Puanı Hesapla</button></div><div id="finalScoreOutput" class="score-output"></div></div><div class="alg-card"><h4>Güvenlik Notu</h4><p>Vejetaryen planlarda et suyu, tavuk suyu, jelatin ve gizli hayvansal bileşenler reçeteden kontrol edilmelidir. Sistem karar desteği sağlar; diyetisyen veya kurum mutfak sorumlusunun onayının yerine geçmez.</p></div></div>`;calculateFinalAlgorithmExample()};

<script id="tbmm-premium-final-script">
(function(){
 const existingLogo=document.querySelector('#loginScreen .login-card img')?.src||document.querySelector('.logoWrap img')?.src||'';
 window.renderPremiumLogin=function(){
   const screen=document.getElementById('loginScreen'),card=screen?.querySelector('.login-card');if(!screen||!card)return;
   screen.classList.add('premium-login-screen');card.className='login-card premium-login-card';
   card.innerHTML=`<div class="premium-login-head"><div class="login-emblem">${existingLogo?`<img alt="TBMM Logo" src="${existingLogo}">`:'<strong style="font-size:28px;color:#0f2d52">TBMM</strong>'}</div><h1>TBMM Destek Hizmetleri Başkanlığı</h1></div><div class="premium-login-body"><form id="premiumLoginForm" novalidate><div><label for="loginRole">Giriş türü</label><select id="loginRole"><option value="admin">Yönetici Girişi</option><option value="user">Kullanıcı Girişi</option></select></div><div><label for="loginUsername">Kullanıcı adı</label><input id="loginUsername" autocomplete="username" placeholder="Kullanıcı adı"></div><div><label for="loginPassword">Şifre</label><div class="passwordWrap"><input id="loginPassword" type="password" autocomplete="current-password" placeholder="Şifre"><button id="loginEye" class="eyeBtn" type="button" aria-label="Şifreyi göster" title="Şifreyi göster/gizle">👁</button></div></div><button class="btn green login-submit" type="submit">Sisteme Giriş Yap</button><div id="loginError" class="login-error" role="alert">Kullanıcı adı veya şifre hatalı.</div></form></div>`;
   const form=document.getElementById('premiumLoginForm');form?.addEventListener('submit',e=>{e.preventDefault();window.login();});
   document.getElementById('loginEye')?.addEventListener('click',()=>{const i=document.getElementById('loginPassword'),b=document.getElementById('loginEye');if(!i)return;const show=i.type==='password';i.type=show?'text':'password';if(b){b.textContent=show?'🙈':'👁';b.setAttribute('aria-label',show?'Şifreyi gizle':'Şifreyi göster');}});
   setTimeout(()=>document.getElementById('loginUsername')?.focus(),40);
 };
 window.login=function(){
   ensureState();
   const type=document.getElementById('loginRole')?.value||'admin';
   const username=String(document.getElementById('loginUsername')?.value||'').trim();
   const password=String(document.getElementById('loginPassword')?.value||'').trim();
   const error=document.getElementById('loginError');
   let valid=false,account=username;
   if(type==='admin'){
     const adminName=String(state.settings?.adminUsername||'admin');
     valid=password===String(state.settings?.adminPassword||'1234')&&(!username||username===adminName||username.toLocaleLowerCase('tr-TR')==='admin');account=username||adminName;
   }else{
     const user=(state.settings?.users||[]).find(x=>x.active&&String(x.username)===username&&String(x.password)===password);valid=!!user;account=user?.username||username;
   }
   if(!valid){if(error)error.style.display='block';document.getElementById('loginPassword')?.focus();return;}
   if(error)error.style.display='none';
   sessionStorage.setItem('tabildotLoggedIn','1');sessionStorage.setItem('tabildotRole',type);sessionStorage.setItem('tabildotUser',account);
   state.settings.lastLogin=new Date().toLocaleString('tr-TR');try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){}
   showApp();toast(type==='admin'?'Yönetici girişi yapıldı.':'Kullanıcı girişi yapıldı.','ok');
 };
 window.logout=function(){sessionStorage.removeItem('tabildotLoggedIn');sessionStorage.removeItem('tabildotRole');sessionStorage.removeItem('tabildotUser');document.getElementById('appShell')?.classList.add('hidden-app');const s=document.getElementById('loginScreen');if(s)s.style.display='flex';renderPremiumLogin();};
 const oldRenderSettings=window.renderSettings;
 if(oldRenderSettings){window.renderSettings=function(){oldRenderSettings();if(typeof isAdmin==='function'&&!isAdmin())return;const picker=document.querySelector('#settings .themePicker');if(picker&&!picker.querySelector('input[value="premium"]')){picker.insertAdjacentHTML('afterbegin',`<label class="themeTile premiumThemeTile"><input type="radio" name="themeOpt" value="premium" ${(state.settings.theme||'corporate')==='premium'?'checked':''}><b>Premium Kurumsal</b><span class="muted">Lacivert, altın ve ferah kurumsal görünüm</span><div class="swatches"><i style="background:#0f2d52"></i><i style="background:#c5a462"></i></div></label>`);}}}
 // İlk kullanımda premium temayı önerilen varsayılan yap; daha önce farklı tema seçilmişse değiştirme.
 try{ensureState();if(!state.settings.theme||state.settings.theme==='corporate'){state.settings.theme='premium';localStorage.setItem(STORE_KEY,JSON.stringify(state));}}catch(e){}
 renderPremiumLogin();if(typeof applyTheme==='function')applyTheme();
})();
</script>

<script id="missing-features-final-script">
(function(){
  const persistSafe=()=>{try{if(typeof persistFinal==='function')persistFinal(false);else if(typeof save==='function')save();}catch(e){console.warn(e)}};
  const adminAllowed=()=>typeof isAdmin==='function'?isAdmin():sessionStorage.getItem('tabildotRole')==='admin';

  /* ===== Ekranın arkasında kalmayan, sabit ve yarı saydam bilgi baloncuğu ===== */
  let floatingTip=document.getElementById('floatingHelpTooltip');
  if(!floatingTip){floatingTip=document.createElement('div');floatingTip.id='floatingHelpTooltip';floatingTip.className='floating-help-tooltip';floatingTip.setAttribute('role','tooltip');document.body.appendChild(floatingTip)}
  let activeTipTarget=null;
  function positionFloatingTip(ev){if(!activeTipTarget||!floatingTip.classList.contains('show'))return;const pad=12,tw=floatingTip.offsetWidth||280,th=floatingTip.offsetHeight||60;let x=(ev?.clientX??activeTipTarget.getBoundingClientRect().right)+16;let y=(ev?.clientY??activeTipTarget.getBoundingClientRect().top)+14;if(x+tw>window.innerWidth-pad)x=Math.max(pad,(ev?.clientX??activeTipTarget.getBoundingClientRect().left)-tw-16);if(y+th>window.innerHeight-pad)y=Math.max(pad,window.innerHeight-th-pad);floatingTip.style.left=Math.max(pad,x)+'px';floatingTip.style.top=Math.max(pad,y)+'px'}
  function showFloatingTip(target,ev){const text=target?.dataset?.tip||target?.getAttribute('aria-label')||target?.getAttribute('title');if(!text)return;activeTipTarget=target;floatingTip.textContent=text;floatingTip.classList.add('show');positionFloatingTip(ev)}
  function hideFloatingTip(){activeTipTarget=null;floatingTip.classList.remove('show')}
  document.addEventListener('pointerover',e=>{const t=e.target.closest('[data-tip]');if(t)showFloatingTip(t,e)},true);
  let tipMoveFrame=0,lastTipMove=null;document.addEventListener('pointermove',e=>{if(!activeTipTarget)return;lastTipMove=e;if(tipMoveFrame)return;tipMoveFrame=requestAnimationFrame(()=>{tipMoveFrame=0;positionFloatingTip(lastTipMove)})},true);
  document.addEventListener('pointerout',e=>{if(activeTipTarget&&!activeTipTarget.contains(e.relatedTarget))hideFloatingTip()},true);
  document.addEventListener('scroll',hideFloatingTip,true);window.addEventListener('resize',hideFloatingTip);

  const buttonTipRules=[
    [/hazır menüleri yönet|hazır menü merkezi/i,'Sık kullanılan menüleri oluşturur, düzenler veya siler.'],
    [/hazır çizelge|hazır menü ataması/i,'Hazır menüyü seçilen tarihlerin öğle veya akşam öğünlerine atar.'],
    [/vejetaryen/i,'Et, balık ve kümes hayvanı içermeyen alternatif çizelge taslağı oluşturur.'],
    [/sonuçları csv/i,'Sisteme yüklenen anket sonuçlarını CSV dosyası olarak indirir.'],
    [/tüm anket yanıtlarını sil/i,'Sisteme aktarılmış tüm anket yanıtlarını ve memnuniyet hesaplarını siler.'],
    [/personel çizelgesi pdf/i,'Aktif personel çizelgesini kurumsal PDF/yazdırma görünümünde açar.'],
    [/strateji raporu pdf/i,'Seçili strateji analizini kurumsal rapor olarak yazdırır.'],
    [/günlük menü pdf/i,'Anasayfada seçilen günlük menüyü kurumsal formatta yazdırır.']
  ];
  function annotateActionTips(root=document){root.querySelectorAll('button,a.btn').forEach(b=>{if(b.dataset.tip)return;const txt=(b.textContent||'').trim();const rule=buttonTipRules.find(([rx])=>rx.test(txt));if(rule)b.dataset.tip=rule[1];else if(b.title)b.dataset.tip=b.title})}
  window.__tbmmAnnotateActionTips=annotateActionTips;
  requestAnimationFrame(()=>annotateActionTips(document));

  /* ===== Hazır çizelge tarih aralığı merkezi ===== */
  const oldSelectedPlanDates=window.selectedPlanDates;
  window.selectedPlanDates=function(){const r=state.readyPlannerRange;if(r?.start&&r?.end&&r.end>=r.start)return datesBetween(r.start,r.end);return typeof oldSelectedPlanDates==='function'?oldSelectedPlanDates():datesBetween(today(),addDays(today(),6))};
  window.openReadyScheduleCenter=function(){
    const r=state.readyPlannerRange||{start:today(),end:addDays(today(),6)};
    openModal(`<div class="modalHead"><div><h3>Hazır Çizelge Oluşturma</h3><p class="muted">Hazır menüleri belirtilen tarih aralığında seçtiğiniz öğünlere atayın.</p></div><button class="close" onclick="closeModal()">✕</button></div><div class="form two"><div><label>Başlangıç tarihi</label><input id="readyRangeStart" type="date" value="${r.start}"></div><div><label>Bitiş tarihi</label><input id="readyRangeEnd" type="date" value="${r.end}"></div></div><div class="ready-range-note"><b>İşleyiş:</b> Önce hazır menü havuzunu oluşturun. Ardından tarih aralığını belirleyip menüyü gün ve öğün bazında atayın. Atamalar Plan Oluştur ekranındaki yeni taslağa uygulanır.</div><div class="actions"><button class="btn secondary" data-tip="Hazır menü havuzunu açar; menü ekleme, düzenleme ve silme yapılabilir." onclick="openQuickMenuCenter()">Hazır Menüleri Yönet</button><button class="btn green" data-tip="Tarih aralığını kaydeder ve gün/öğün atama tablosunu açar." onclick="continueReadyScheduleCenter()">Gün ve Öğün Atamasına Geç</button></div>`);annotateActionTips(document.getElementById('modal'));
  };
  window.continueReadyScheduleCenter=function(){const start=val('readyRangeStart'),end=val('readyRangeEnd');if(!start||!end||end<start){toast('Geçerli bir tarih aralığı seçin.');return}if(diffDays(start,end)>62){toast('Hazır çizelge en fazla 63 günlük olabilir.');return}state.readyPlannerRange={start,end};persistSafe();closeModal();if(!(state.quickMenus||[]).length){toast('Önce en az bir hazır menü oluşturun.');openQuickMenuCenter();return}openReadyMenuPlanner()};

  function scheduleCreationCenterHtml(){
    if(!adminAllowed())return '';
    const veg=(state.meals||[]).filter(m=>m.active&&!m.archived&&m.vegetarianStatus==='yes').length;
    const qm=(state.quickMenus||[]).length;
    return `<div class="card schedule-create-center"><div class="center-head"><div><h3>Çizelge Oluşturma Merkezi</h3><p class="muted" style="margin:5px 0 0">Hazır ve vejetaryen alternatif çizelgeleri bu bölümden oluşturabilirsiniz.</p></div><span class="pill ok">Yalnızca yönetici</span></div><div class="center-grid"><div class="center-item"><div><h4>Hazır Menü Havuzu</h4><p>Sık kullanılan menüleri oluşturun; mevcut menüleri değiştirin veya kaldırın.</p><div class="count-line"><span class="pill">${qm} hazır menü</span></div></div><button class="btn secondary" data-tip="Hazır menü havuzunu açar; menü ekleme, düzenleme ve silme yapılabilir." onclick="openQuickMenuCenter()">Hazır Menüleri Yönet</button></div><div class="center-item"><div><h4>Hazır Çizelge Oluştur</h4><p>Hazır menüyü seçilen günlerin yalnızca öğle, yalnızca akşam veya iki öğününe atayın.</p><div class="count-line"><span class="pill warn">Gün / öğün bazlı</span></div></div><button class="btn green" data-tip="Tarih aralığı seçerek hazır menüleri gün ve öğünlere atar." onclick="openReadyScheduleCenter()">Hazır Çizelge Ataması</button></div><div class="center-item"><div><h4>Vejetaryen Çizelge</h4><p>Lacto-ovo vejetaryen ön sınıflandırmasına göre ayrı alternatif taslak oluşturur.</p><div class="count-line"><span class="pill ok">${veg} uygun yemek</span></div></div><button class="btn secondary" data-tip="Vejetaryen alternatif çizelge sihirbazını açar." onclick="openSpecialDietPlanner('vegetarian')">Vejetaryen Çizelge Oluştur</button></div></div></div>`;
  }

  /* Önceki Çıktılar sarmalayıcısındaki kapsam hatasını da ortadan kaldıran tam çıktı görünümü. */
  window.renderOutputs=function(){
    const p=activePlan(),out=document.getElementById('outputs');if(!out)return;
    out.innerHTML=`${scheduleCreationCenterHtml()}<div class="grid cols2"><div class="card"><h3>Kurumsal Çıktı Merkezi</h3><p class="lead">Aktif çizelge için kurumsal Excel/CSV, Word, personel, günlük menü ve strateji çıktıları oluşturulur.</p><div class="actions"><button class="btn green" onclick="exportPlanCsv()">Plan Excel/CSV</button><button class="btn secondary" onclick="exportPlanWord()">Kurumsal Plan Word</button><button class="btn secondary" onclick="showAnnouncement()">Duyuru / E-posta</button><button class="btn secondary" onclick="printPersonnelPlan()">Personel Çizelgesi PDF</button><button class="btn secondary" onclick="printHomeDay()">Günlük Menü PDF</button><button class="btn secondary" onclick="printStrategyReport()">Strateji Raporu PDF</button></div></div><div class="card"><h3>Aktif Plan</h3>${p?`<p><b>${esc(p.name)}</b></p><p class="muted">${planRange(p)}</p><div class="notice oknote">Çıktılar aktif plan veya Strateji bölümünde seçilen analiz kapsamı üzerinden hazırlanır.</div>`:'<p class="muted">Aktif plan yok.</p>'}</div></div>`;
    annotateActionTips(out);
  };

  /* ===== Yüklenmiş anketleri kayıt veya dosya bazında silme ===== */
  function ensureSurveyIds(){let changed=false;(state.surveys||[]).forEach((s,i)=>{if(!s._surveyId){s._surveyId=`sv_${Date.now().toString(36)}_${i}_${Math.random().toString(36).slice(2,7)}`;changed=true}});if(changed)persistSafe()}
  function surveyMeal(name){if(typeof mealObjectByName==='function')return mealObjectByName(name);if(typeof findMealByName==='function')return findMealByName(name);return (state.meals||[]).find(m=>norm(m.name)===norm(name))}
  function recalculateSurveyRatings(){(state.meals||[]).forEach(m=>{m.ratingAvg=0;m.ratingCount=0});(state.surveys||[]).forEach(s=>{const score=+s.score||0,m=surveyMeal(s.yemek);if(m&&score>=1&&score<=5){m.ratingAvg=((m.ratingAvg||0)*(m.ratingCount||0)+score)/((m.ratingCount||0)+1);m.ratingCount=(m.ratingCount||0)+1}})}
  window.deleteSurveyRecord=function(id){ensureSurveyIds();const rec=(state.surveys||[]).find(s=>s._surveyId===id);if(!rec)return;if(!confirm(`“${rec.yemek||'Anket kaydı'}” değerlendirmesi silinsin mi?`))return;const responseId=rec.responseId;state.surveys=state.surveys.filter(s=>s._surveyId!==id);if(responseId&&!state.surveys.some(s=>s.responseId===responseId))state.surveyResponseIds=(state.surveyResponseIds||[]).filter(x=>x!==responseId);recalculateSurveyRatings();persistSafe();renderSurvey();toast('Anket değerlendirmesi silindi.','ok')};
  window.deleteSurveyBatch=function(responseId){const rows=(state.surveys||[]).filter(s=>s.responseId===responseId);if(!rows.length)return;const person=rows[0].respondent||'Anonim katılımcı';if(!confirm(`${person} adına yüklenen ${rows.length} değerlendirme silinsin mi?`))return;state.surveys=state.surveys.filter(s=>s.responseId!==responseId);state.surveyResponseIds=(state.surveyResponseIds||[]).filter(x=>x!==responseId);recalculateSurveyRatings();persistSafe();renderSurvey();toast('Yüklenen anket yanıt dosyası silindi.','ok')};
  window.deleteAllSurveyResponses=function(){if(!(state.surveys||[]).length)return;if(!confirm(`Sisteme yüklenmiş ${state.surveys.length} anket değerlendirmesinin tamamı silinsin mi? Bu işlem geri alınamaz.`))return;state.surveys=[];state.surveyResponseIds=[];recalculateSurveyRatings();persistSafe();renderSurvey();toast('Tüm anket yanıtları silindi.','ok')};
  window.surveyTable=function(){
    ensureSurveyIds();const all=state.surveys||[],last=all.slice(-150).reverse();const batches=new Map();all.forEach(s=>{if(!s.responseId)return;if(!batches.has(s.responseId))batches.set(s.responseId,[]);batches.get(s.responseId).push(s)});
    const batchHtml=[...batches.entries()].slice(-20).reverse().map(([id,rows])=>{const r=rows[0],label=r.respondent||'Anonim katılımcı';return `<div class="survey-batch-card"><b>${esc(label)}</b><small>${r.unit?`${esc(r.unit)} • `:''}${rows.length} değerlendirme<br>${r.importedAt?new Date(r.importedAt).toLocaleString('tr-TR'):'Yüklenme tarihi yok'}</small><button class="btn small red" data-tip="Bu JSON yanıt dosyasına ait bütün değerlendirmeleri siler." onclick="deleteSurveyBatch(decodeURIComponent('${encodeURIComponent(id)}'))">Yüklenen Dosyayı Sil</button></div>`}).join('');
    return `<div class="response-summary"><div><b>${(state.surveyResponseIds||[]).length}</b><span>İçe aktarılan yanıt dosyası</span></div><div><b>${all.length}</b><span>Toplam değerlendirme</span></div><div><b>${all.length?(all.reduce((a,x)=>a+(+x.score||0),0)/all.length).toFixed(2):'—'}</b><span>Genel ortalama</span></div><div><b>${new Set(all.map(x=>x.yemek)).size}</b><span>Değerlendirilen yemek</span></div></div><div class="survey-delete-toolbar"><b>Yüklenen anket yönetimi</b><button class="btn small red" data-tip="Yüklenen tüm anket yanıtlarını ve bunların memnuniyet puanlarını temizler." onclick="deleteAllSurveyResponses()">Tüm Anket Yanıtlarını Sil</button></div>${batchHtml?`<div class="survey-batch-list">${batchHtml}</div>`:''}<div class="tableWrap"><table class="simple-plan-table"><thead><tr><th>Katılımcı</th><th>Tarih / Öğün</th><th>Yemek</th><th>Seçim</th><th>Yorum</th><th>İşlem</th></tr></thead><tbody>${last.map(s=>`<tr><td>${esc(s.respondent||'Anonim')}${s.unit?`<br><small>${esc(s.unit)}</small>`:''}</td><td>${esc(s.tarih)}<br><small>${esc(s.ogun)}</small></td><td>${esc(s.yemek)}</td><td><b>${esc(s.secim)}</b><br><small>${s.score}/5</small></td><td>${esc(s.comment||'')}</td><td><button class="btn small red survey-row-delete" data-tip="Yalnızca bu yemek değerlendirmesini siler." onclick="deleteSurveyRecord('${s._surveyId}')">Sil</button></td></tr>`).join('')}</tbody></table></div>`;
  };
  const formerRenderSurvey=window.renderSurvey;
  window.renderSurvey=function(){formerRenderSurvey();annotateActionTips(document.getElementById('survey'))};

  annotateActionTips(document);
})();
</script>


<style id="tbmm-performance-cleanup">
/* Görünüm değişmez; yalnızca büyük yemek tablosunun yerleşim maliyeti azaltılır. */
.meal-table-advanced tbody tr{content-visibility:auto;contain-intrinsic-size:58px}

<script id="tbmm-performance-cleanup-script">
(function(){
'use strict';
/* Özellik yamaları korunur; ancak aynı state nesnesi her çizimde 700+ yemek üzerinden tekrar normalize edilmez. */
const fullEnsureState=window.ensureState;
let normalizedState=null;
window.ensureState=function(force=false){
  if(!force&&normalizedState===state)return state;
  fullEnsureState();
  normalizedState=state;
  return state;
};
window.invalidateStateNormalization=function(){normalizedState=null};

/* JSON yükleme gibi state nesnesini değiştiren işlemler yeni nesnede otomatik olarak tekrar normalize edilir. */
const oldRestoreJson=window.restoreJson;
if(oldRestoreJson)window.restoreJson=function(ev){normalizedState=null;return oldRestoreJson(ev)};

/* Yemek havuzu araması, her tuşta yüzlerce satırı eşzamanlı taramak yerine kısa bir gecikmeyle tek kez çalışır. */
const immediateMealFilter=window.filterMealRowsAdvanced;
let mealFilterTimer=0;
if(immediateMealFilter)window.filterMealRowsAdvanced=function(){clearTimeout(mealFilterTimer);mealFilterTimer=setTimeout(immediateMealFilter,90)};

/* persistFinal çağrıları aynı anda üst üste gelirse tek kayıt/tek çizim olarak birleştirilir. */
let persistTimer=0,persistNeedsRender=false;
window.persistFinal=function(render=true){
  persistNeedsRender=persistNeedsRender||render;
  clearTimeout(persistTimer);
  persistTimer=setTimeout(()=>{
    persistTimer=0;
    try{if(typeof __tbmmFlushSave==='function')__tbmmFlushSave();else localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){console.warn('Kayıt yapılamadı',e)}
    if(persistNeedsRender&&typeof renderAll==='function')requestAnimationFrame(()=>renderAll(false));
    persistNeedsRender=false;
  },180);
};
window.addEventListener('beforeunload',()=>{if(persistTimer){clearTimeout(persistTimer);try{if(typeof __tbmmFlushSave==='function')__tbmmFlushSave();else localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){}}});

function finalBootstrap(){
  ensureState(true);
  if(typeof ensureFinalSections==='function')ensureFinalSections();
  if(typeof ensureLoader==='function')ensureLoader();
  if(typeof renderPremiumLogin==='function')renderPremiumLogin();
  else if(typeof enhanceLogin==='function')enhanceLogin();
  if(typeof applyTheme==='function')applyTheme();
  if(typeof initNav==='function')initNav();
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active','printTarget'));
  const home=document.getElementById('home');if(home)home.classList.add('active','printTarget');
  if(typeof renderAll==='function')renderAll(false);
  if(typeof annotateActionTips==='function')annotateActionTips(document);
  document.querySelectorAll('.nav button.groupedAdminBtn').forEach(b=>b.classList.remove('active'));
  const logged=!!sessionStorage.getItem('tabildotLoggedIn');
  const shell=document.getElementById('appShell'),screen=document.getElementById('loginScreen');
  if(logged){if(screen)screen.style.display='none';if(shell)shell.classList.remove('hidden-app');if(typeof updateTop==='function')updateTop('home')}
  else{if(shell)shell.classList.add('hidden-app');if(screen)screen.style.display='flex'}
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',finalBootstrap,{once:true});else finalBootstrap();
})();
</script>

<script id="meal-pagination-fix-script">

  }
  window.renderMealsPage=function(){
    const body=document.getElementById('mealPageBody'),foot=document.getElementById('mealPageFooter'),count=document.getElementById('mealFilteredCount');
    if(!body||!foot)return;
    const filtered=allFilteredMeals();
    const total=filtered.length;
    const totalPages=Math.max(1,Math.ceil(total/pager.pageSize));
    pager.page=Math.min(Math.max(1,Number(pager.page)||1),totalPages);
    const start=(pager.page-1)*pager.pageSize;
    const end=Math.min(total,start+pager.pageSize);
    const pageRows=filtered.slice(start,end);
    body.innerHTML=pageRows.length?pageRows.map(mealRow).join(''):'<tr class="meal-empty-row"><td colspan="6">Arama ölçütlerine uygun yemek bulunamadı.</td></tr>';
    foot.innerHTML=pagerHtml(total,totalPages,start,end);
    if(count)count.value=`${total} eşleşme • ${(state.meals||[]).length} toplam • ${(state.meals||[]).filter(x=>x.active&&!x.archived).length} aktif`;
  };
  window.renderMeals=function(){
    if(typeof window.ensureDietMetadata==='function')window.ensureDietMetadata(false);
    const root=document.getElementById('meals');
    if(!root)return;
    root.innerHTML=`<div class="card"><div class="cardTitle"><h3>Yemek Havuzu</h3><div class="actions"><button class="btn green" onclick="editMealAdvanced('')">＋ Yeni Yemek Ekle</button><button class="btn secondary" onclick="exportMealsCsv()">CSV Al</button></div></div><div class="notice">Vejetaryen uygunluk alanı otomatik ön sınıflandırmadır. Et suyu, tavuk suyu, jelatin ve benzeri gizli hayvansal içerikler reçeteden yönetici tarafından doğrulanmalıdır.</div><div class="form three"><div><label>Arama</label><input id="mealSearchAdvanced" value="${esc(pager.query||'')}" oninput="filterMealRowsAdvanced()" placeholder="Yemek adı, tür veya vejetaryen uygunluğu ara" autocomplete="off"></div><div><label>Kategori</label><select id="mealCatAdvanced" onchange="filterMealRowsAdvanced(true)"><option value="">Tümü</option><option ${pager.category==='Çorba'?'selected':''}>Çorba</option><option ${pager.category==='Ana Yemek'?'selected':''}>Ana Yemek</option><option ${pager.category==='Yardımcı'?'selected':''}>Yardımcı</option><option ${pager.category==='Tamamlayıcı'?'selected':''}>Tamamlayıcı</option></select></div><div><label>Kayıt</label><input id="mealFilteredCount" disabled></div></div><div class="tableWrap"><table class="meal-table-advanced"><thead><tr><th>Yemek</th><th>Kategori</th><th>Kalori</th><th>Vejetaryen</th><th>Durum</th><th>İşlem</th></tr></thead><tbody id="mealPageBody"></tbody></table></div><div id="mealPageFooter"></div></div>`;
    window.renderMealsPage();
  };
  window.filterMealRowsAdvanced=function(immediate=false){
    clearTimeout(window._mealFilterTimer);
    const run=()=>{
      pager.query=document.getElementById('mealSearchAdvanced')?.value||'';
      pager.category=document.getElementById('mealCatAdvanced')?.value||'';

  window.setMealPageSize=function(size){pager.pageSize=[25,40,75,100].includes(Number(size))?Number(size):40;pager.page=1;sessionStorage.setItem(PAGE_KEY,String(pager.pageSize));window.renderMealsPage()};

  const previousRenderSettings=window.renderSettings;
  if(typeof previousRenderSettings==='function'){
    window.renderSettings=function(){previousRenderSettings();document.querySelectorAll('.firebase-sync-card').forEach(el=>el.remove())};
  }
})();

<script id="tbmm-version-reporting-v1-script">
(function(){
'use strict';
if(window.__TBMM_VERSION_REPORTING_V1__)return;
window.__TBMM_VERSION_REPORTING_V1__=true;

const q=s=>document.querySelector(s);
const qa=s=>Array.from(document.querySelectorAll(s));
const deepClone=v=>JSON.parse(JSON.stringify(v));
const escapeHtml=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const isVegPlan=p=>p?.planType==='vegetarian'||p?.specialDiet==='vegetarian'||p?.settings?.specialDiet==='vegetarian';
const planTypeLabel=p=>isVegPlan(p)?'Vejetaryen':'Tabildot';
const isoNow=()=>new Date().toISOString();
const localDateTime=v=>{try{return new Date(v).toLocaleString('tr-TR')}catch(_){return String(v||'')}};
const dateLabel=v=>{if(!v)return '—';try{return new Date(v+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'})}catch(_){return v}};
function persistVersionState(render=true){
  try{
    if(typeof persistFinal==='function')persistFinal(false);
    else if(typeof save==='function')save();
    else localStorage.setItem(STORE_KEY,JSON.stringify(state));
  }catch(e){console.warn('Sürüm verisi kaydedilemedi:',e)}
  if(render&&typeof renderAll==='function')requestAnimationFrame(()=>renderAll(false));
}
function menuNames(menu){
  if(!menu)return[];
  try{if(typeof mealText==='function')return mealText(menu).filter(Boolean)}catch(_){ }
  const manual=(menu.manualItems||[]).map(String).filter(Boolean);
  const ids=(menu.items||[]).map(id=>{try{return typeof mealName==='function'?mealName(id):id}catch(_){return id}}).filter(Boolean);
  const fixed=menu.fixed?[String(menu.fixed)]:[];
  return [...manual,...ids,...fixed];
}
function menuSignature(menu){return menuNames(menu).join(' • ')}
function compactPlanSnapshot(plan){
  return {
    id:plan.id,
    name:plan.name,
    start:plan.start,
    end:plan.end,
    createdAt:plan.createdAt,
    savedAt:plan.savedAt,
    status:plan.status,
    locked:!!plan.locked,
    planType:plan.planType,
    specialDiet:plan.specialDiet,
    excludeFromStrategy:plan.excludeFromStrategy,
    allowOverlap:plan.allowOverlap,
    settings:deepClone(plan.settings||{}),
    schedule:deepClone(plan.schedule||[]),
    changeLog:deepClone(plan.changeLog||[])
  };
}
function normalizeVersionEntry(entry,index){
  const snapshot=entry?.snapshot||entry?.plan||entry?.data||entry;
  return {
    versionNo:Number(entry?.versionNo)||index+1,
    savedAt:entry?.savedAt||snapshot?.savedAt||snapshot?.createdAt||isoNow(),
    reason:entry?.reason||entry?.note||(index===0?'İlk kayıt':'Çizelge kaydı'),
    actor:entry?.actor||state.settings?.createdBy||'Yönetici',
    sourceVersion:Number(entry?.sourceVersion)||null,
    snapshot:compactPlanSnapshot(snapshot||{})
  };
}
function ensurePlanVersions(plan){
  if(!plan)return plan;
  if(plan.__tbmmVersionNormalized===true)return plan;
  let changed=false;
  let history=Array.isArray(plan.versionHistory)?plan.versionHistory:(Array.isArray(plan.versions)?plan.versions:[]);
  const canonical=history.length&&history.every(v=>v&&Number(v.versionNo)>0&&v.snapshot&&Array.isArray(v.snapshot.schedule));
  if(canonical)history=[...history].sort((a,b)=>Number(a.versionNo)-Number(b.versionNo));
  else{history=history.map(normalizeVersionEntry).sort((a,b)=>a.versionNo-b.versionNo);changed=true}
  if(!history.length){
    history=[{versionNo:1,savedAt:plan.savedAt||plan.createdAt||isoNow(),reason:'İlk kayıt',actor:state.settings?.createdBy||'Yönetici',sourceVersion:null,snapshot:compactPlanSnapshot(plan)}];
    changed=true;
  }
  if(history.length>20){history=history.slice(-20);changed=true}
  const max=Math.max(1,...history.map(v=>Number(v.versionNo)||0));
  plan.versionHistory=history;
  if(plan.versions){delete plan.versions;changed=true}
  plan.currentVersion=Math.min(Number(plan.currentVersion)||max,max);
  try{Object.defineProperty(plan,'__tbmmVersionNormalized',{value:true,writable:true,configurable:true,enumerable:false})}catch(_){plan.__tbmmVersionNormalized=true}
  if(changed)plan.__tbmmVersionChanged=true;
  return plan;
}
function ensureAllPlanVersions(){
  let changed=false;
  (state.plans||[]).forEach(p=>{ensurePlanVersions(p);if(p.__tbmmVersionChanged){changed=true;try{delete p.__tbmmVersionChanged}catch(_){}}});
  return changed;
}
function appendPlanVersion(plan,reason,sourceVersion=null){
  ensurePlanVersions(plan);
  const next=Math.max(0,...plan.versionHistory.map(v=>Number(v.versionNo)||0))+1;
  plan.currentVersion=next;
  plan.versionHistory.push({versionNo:next,savedAt:plan.savedAt||isoNow(),reason:reason||'Çizelge kaydı',actor:state.settings?.createdBy||'Yönetici',sourceVersion,snapshot:compactPlanSnapshot(plan)});
  return next;
}

const previousEnsureState=window.ensureState;
window.ensureState=function(){
  if(typeof previousEnsureState==='function')previousEnsureState.apply(this,arguments);
  ensureAllPlanVersions();
};
if(ensureAllPlanVersions()){
 try{if(typeof __tbmmFlushSave==='function')__tbmmFlushSave();else localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(_){ }
}

window.saveDraftPlan=function(){
  if(!state.draft){toast('Kaydedilecek taslak plan yok.');return}
  const draft=deepClone(state.draft);
  const editingId=draft.editingPlanId||null;
  const veg=isVegPlan(draft);
  const regularActiveBefore=(state.plans||[]).find(p=>p.id===state.activePlanId&&!isVegPlan(p))?.id||'';
  if(!editingId&&typeof validateOptions==='function'){
    const err=validateOptions({start:draft.start,end:draft.end});
    if(err){toast(err);return}
  }
  delete draft.editingPlanId;
  draft.status='Kaydedildi';
  draft.savedAt=isoNow();
  let versionNo=1;
  if(editingId){
    const idx=(state.plans||[]).findIndex(p=>p.id===editingId);
    if(idx<0){toast('Düzenlenen çizelge bulunamadı.');return}
    const old=state.plans[idx];
    ensurePlanVersions(old);
    draft.id=old.id;
    draft.name=old.name;
    draft.locked=!!old.locked;
    draft.planType=old.planType||draft.planType;
    draft.specialDiet=old.specialDiet||draft.specialDiet;
    draft.excludeFromStrategy=old.excludeFromStrategy??draft.excludeFromStrategy;
    draft.allowOverlap=old.allowOverlap??draft.allowOverlap;
    draft.versionHistory=deepClone(old.versionHistory);
    draft.currentVersion=old.currentVersion;
    draft.changeLog=[...(old.changeLog||[]),...(draft.changeLog||[])];
    versionNo=appendPlanVersion(draft,'Yönetici düzenlemesi');
    state.plans[idx]=draft;
    state.logs.push({date:isoNow(),action:'Plan sürümü kaydedildi',detail:`${draft.name} • v${versionNo}`});
  }else{
    draft.id=(state.plans||[]).some(p=>p.id===draft.id)?(typeof uid==='function'?uid():'p_'+Date.now()):draft.id||(typeof uid==='function'?uid():'p_'+Date.now());
    draft.versionHistory=[];
    draft.currentVersion=0;
    versionNo=appendPlanVersion(draft,'İlk kayıt');
    state.plans.unshift(draft);
    state.logs.push({date:isoNow(),action:'Plan kaydedildi',detail:`${draft.name} • v${versionNo}`});
  }
  if(veg){
    draft.planType='vegetarian';
    draft.excludeFromStrategy=true;
    draft.allowOverlap=false;
    draft.settings={...(draft.settings||{}),specialDiet:'vegetarian',separateFromTabildot:true,excludeFromStrategy:true,allowOverlap:false};
    state.activePlanId=regularActiveBefore||(state.plans||[]).find(p=>!isVegPlan(p))?.id||'';
  }else state.activePlanId=draft.id;
  state.pendingReadyMenuAssignments={};
  state.draft=null;
  if(typeof normalizePlanSeparation==='function')normalizePlanSeparation();
  persistVersionState(false);
  if(typeof showSection==='function')showSection('plans');else if(typeof renderPlans==='function')renderPlans();
  toast(`Yemek planı kaydedildi. Otomatik sürüm: v${versionNo}.`,'ok');
};

  const root=document.getElementById('plans');if(!root)return;
  const admin=typeof isAdmin==='function'?isAdmin():!!sessionStorage.getItem('tabildotLoggedIn');
  const plans=state.plans||[];
  root.innerHTML=`<div class="card"><div class="cardTitle"><div><h3>Tüm Planlar</h3><p class="muted" style="margin:4px 0 0">Kayıtlı tabildot ve vejetaryen çizelgeleri görüntüleyebilir, aktif planı belirleyebilir ve yönetici düzenlemesi yapabilirsiniz.</p></div>${admin?'<button class="btn green" onclick="showSection(\'create\')">Yeni Plan</button>':''}</div>${plans.length?`<div class="planCards">${plans.map(p=>{const veg=isVegPlan(p),active=state.activePlanId===p.id&&!veg;return `<div class="planCard ${active?'active-plan-card':''}"><div class="planCardHead"><div><h4 style="margin:0 0 6px">${escapeHtml(p.name)}</h4><span class="pill ${active?'ok':'warn'}">${active?'Aktif Plan':veg?'Ayrı Vejetaryen Plan':'Arşiv Plan'}</span> <span class="pill">${planTypeLabel(p)}</span> <span class="pill">${p.locked?'Kilitli':'Düzenlenebilir'}</span><p class="muted">${typeof planRange==='function'?planRange(p):dateLabel(p.start)+' - '+dateLabel(p.end)}</p></div><b>${typeof qualityScore==='function'?qualityScore(p):'—'}</b></div><div class="planCardActions">${!veg?`<button class="btn small secondary" ${active?'disabled':''} onclick="makeActive('${p.id}')">${active?'✓ Aktif Çizelge':'Aktif Yap'}</button>`:''}<button class="btn small secondary" onclick="showPlanPreview('${p.id}')">Görüntüle</button>${admin?`<button class="btn small green" onclick="editSavedPlan('${p.id}')">Son Halini Düzenle</button><button class="btn small amber" onclick="toggleLock('${p.id}')">${p.locked?'Kilidi Aç':'Kilitle'}</button><button class="btn small red" onclick="deletePlan('${p.id}')">Sil</button>`:''}</div></div>`}).join('')}</div>`:'<p class="muted">Henüz kaydedilmiş plan yok.</p>'}</div>`;
};

/* Plan oluşturma alanı için gömülü tarih takvimi */
let inlinePlanCalendarMonth=null,inlineCalendarPickMode='start';
function displayShortDate(iso){if(!iso)return '';const parts=String(iso).split('-');return parts.length===3?`${parts[2]}.${parts[1]}.${parts[0]}`:iso}
function occupiedDates(){
  const map=new Map();
  (state.plans||[]).forEach(p=>{
    const dates=(p.schedule||[]).map(d=>d.date);
    if(!dates.length&&p.start&&p.end&&typeof datesBetween==='function')dates.push(...datesBetween(p.start,p.end));
    dates.forEach(d=>{if(!map.has(d))map.set(d,[]);map.get(d).push({id:p.id,name:p.name,type:isVegPlan(p)?'vegetarian':'regular'})});
  });
  return map;
}
function monthIso(date){const d=new Date(date+'T12:00:00');return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`}
function shiftMonth(iso,delta){const d=new Date(iso+'T12:00:00');d.setMonth(d.getMonth()+delta);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`}
function syncInlineDateDisplays(){
  const s=q('#startDate'),e=q('#endDate'),sd=q('#startDateDisplay'),ed=q('#endDateDisplay');
  if(sd&&s)sd.value=displayShortDate(s.value);
  if(ed&&e)ed.value=displayShortDate(e.value);
  sd?.classList.toggle('active',inlineCalendarPickMode==='start');
  ed?.classList.toggle('active',inlineCalendarPickMode==='end');
}
window.focusInlineCalendarField=function(mode){
  inlineCalendarPickMode=mode==='end'?'end':'start';
  const base=(inlineCalendarPickMode==='end'?q('#endDate')?.value:q('#startDate')?.value)||q('#startDate')?.value||today();
  inlinePlanCalendarMonth=monthIso(base);
  syncInlineDateDisplays();
  renderInlinePlanCalendar();
};
function renderInlinePlanCalendar(){
  const host=document.getElementById('inlinePlanCalendar');
  if(!host)return;
  document.getElementById('occupiedDateCalendar')?.remove();
  const start=q('#startDate')?.value||today(),end=q('#endDate')?.value||start;
  if(!inlinePlanCalendarMonth)inlinePlanCalendarMonth=monthIso(start);
  syncInlineDateDisplays();
  const first=new Date(inlinePlanCalendarMonth+'T12:00:00'),month=first.getMonth();
  const monthTitle=first.toLocaleDateString('tr-TR',{month:'long',year:'numeric'});
  const mondayOffset=(first.getDay()+6)%7;
  const gridStart=new Date(first);gridStart.setDate(first.getDate()-mondayOffset);
  const busy=occupiedDates();
  const cells=[];
  for(let i=0;i<42;i++){
    const d=new Date(gridStart);d.setDate(gridStart.getDate()+i);const iso=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const entries=busy.get(iso)||[],outside=d.getMonth()!==month,selected=start&&end&&iso>=start&&iso<=end;
    const cls=['inlinePlanCalendarDay',outside?'outside':'',entries.length?'busy':'free',selected?'selected':''].filter(Boolean).join(' ');
    const title=entries.length?entries.map(x=>`${x.type==='vegetarian'?'Vejetaryen':'Tabildot'}: ${x.name}`).join('\n'):'Uygun tarih';
    const stateLabel=entries.length?'Dolu':'Uygun';
    cells.push(`<button type="button" class="${cls}" title="${escapeHtml(title)}" onclick="pickInlineCalendarDate('${iso}')"><span>${d.getDate()}</span><small>${stateLabel}</small></button>`);
  }
  host.innerHTML=`<div class="inlinePlanCalendarBox"><div class="inlinePlanCalendarHead"><button class="btn small secondary" type="button" onclick="changeInlineCalendarMonth(-1)">‹ Önceki</button><b>${escapeHtml(monthTitle)}</b><button class="btn small secondary" type="button" onclick="changeInlineCalendarMonth(1)">Sonraki ›</button></div><div class="inlinePlanCalendarToolbar"><span class="summary">Seçim hedefi:</span><span class="inlinePlanCalendarTarget">${inlineCalendarPickMode==='start'?'Başlangıç tarihi':'Bitiş tarihi'}</span><button class="btn small ${inlineCalendarPickMode==='start'?'green':'secondary'}" type="button" onclick="focusInlineCalendarField('start')">Başlangıç</button><button class="btn small ${inlineCalendarPickMode==='end'?'green':'secondary'}" type="button" onclick="focusInlineCalendarField('end')">Bitiş</button></div><div class="inlinePlanCalendarWeekdays">${['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].map(x=>`<b>${x}</b>`).join('')}</div><div class="inlinePlanCalendarGrid">${cells.join('')}</div><div class="inlinePlanCalendarLegend"><span><i class="inlineLegendBusy"></i>Dolu tarih</span><span><i class="inlineLegendSelected"></i>Seçilen aralık</span><span><i class="inlineLegendFree"></i>Uygun tarih</span></div><p class="inlinePlanCalendarHint">Önce başlangıç, ardından bitiş tarihini seçin. Dolu günler seçilemez.</p></div>`;
}
window.changeInlineCalendarMonth=function(delta){inlinePlanCalendarMonth=shiftMonth(inlinePlanCalendarMonth||monthIso(q('#startDate')?.value||today()),delta);renderInlinePlanCalendar()};
window.setInlineCalendarPickMode=function(mode){window.focusInlineCalendarField(mode)};
window.pickInlineCalendarDate=function(iso){
  const entries=occupiedDates().get(iso)||[];
  if(entries.length){toast(`${dateLabel(iso)} dolu: ${entries.map(x=>x.name).join(', ')}`);return}
  const start=q('#startDate'),end=q('#endDate');if(!start||!end)return;
  if(inlineCalendarPickMode==='start'){
    start.value=iso;
    if(!end.value||end.value<iso)end.value=iso;
    inlineCalendarPickMode='end';
  }else{
    if(start.value&&iso<start.value){end.value=start.value;start.value=iso;}
    else end.value=iso;
  }
  inlinePlanCalendarMonth=monthIso(iso);
  syncInlineDateDisplays();
  renderInlinePlanCalendar();
};
function cleanupOldOccupiedCalendar(){document.getElementById('occupiedDateCalendar')?.remove();document.getElementById('occupiedCalendarBody')?.closest('.card')?.remove()}
const previousRenderCreateFinal=window.renderCreate;
window.renderCreate=function(){if(typeof previousRenderCreateFinal==='function')previousRenderCreateFinal.apply(this,arguments);cleanupOldOccupiedCalendar();inlinePlanCalendarMonth=monthIso(q('#startDate')?.value||today());syncInlineDateDisplays();renderInlinePlanCalendar()};

/* Yönetici rapor yoğunlukları — anket grubu ve güven göstergesi kullanılmaz. */
const MODE_LABELS={summary:'Kısa Özet',detailed:'Detaylı Rapor',executive:'Üst Yönetim Sunumu'};
function selectedManagementMode(){return state.settings?.managementReportMode||'summary'}
function activeRegularPlan(){
  try{if(typeof regularActivePlan==='function')return regularActivePlan()}catch(_){ }
  try{const p=typeof activePlan==='function'?activePlan():null;return p&&!isVegPlan(p)?p:(state.plans||[]).find(x=>!isVegPlan(x))||null}catch(_){return null}
}
function reportSurveyStats(plan){
  const valid=(state.surveys||[]).filter(r=>{const score=+r.score||0;return score>=1&&score<=5&&(!plan||!r.plan_id||r.plan_id===plan.id)});
  const average=valid.length?valid.reduce((a,r)=>a+(+r.score||0),0)/valid.length:0;
  const people=new Set(valid.map(r=>r.responseId||r.respondent||r._surveyId).filter(Boolean)).size;
  const foods=new Map();
  valid.forEach(r=>{const k=String(r.yemek||'').trim();if(!k)return;const x=foods.get(k)||{name:k,sum:0,count:0};x.sum+=+r.score||0;x.count++;foods.set(k,x)});
  const list=[...foods.values()].map(x=>({...x,avg:x.sum/x.count})).sort((a,b)=>b.avg-a.avg||b.count-a.count);
  return{rows:valid.length,people,average,list,top:list[0]||null,bottom:list.slice().sort((a,b)=>a.avg-b.avg||b.count-a.count)[0]||null};
}
function planMetricsForReport(plan){
  const lunches=[],dinners=[],freq=new Map(),categories=new Map();
  (plan?.schedule||[]).forEach(d=>{
    try{lunches.push(typeof menuCalorieSummary==='function'?menuCalorieSummary(d.lunch).total:0)}catch(_){lunches.push(0)}
    try{dinners.push(typeof menuCalorieSummary==='function'?menuCalorieSummary(d.dinner).total:0)}catch(_){dinners.push(0)}
    [d.lunch,d.dinner].forEach(menu=>menuNames(menu).filter(n=>!String(n).toLocaleLowerCase('tr-TR').startsWith('salata bar')).forEach(n=>{freq.set(n,(freq.get(n)||0)+1);let cat='Diğer';try{cat=(typeof findMealByName==='function'?findMealByName(n):null)?.category||cat}catch(_){ }categories.set(cat,(categories.get(cat)||0)+1)}));
  });
  const avg=a=>{const x=a.filter(Number.isFinite);return x.length?Math.round(x.reduce((p,c)=>p+c,0)/x.length):0};
  const repeats=[...freq.entries()].map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name,'tr')).slice(0,10);
  const categoryList=[...categories.entries()].map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
  let issues=[];try{if(typeof evaluatePlan==='function')issues=evaluatePlan(plan)||[]}catch(_){ }
  return{days:plan?.schedule?.length||0,meals:(plan?.schedule?.length||0)*2,quality:plan&&typeof qualityScore==='function'?qualityScore(plan):0,lunchAvg:avg(lunches),dinnerAvg:avg(dinners),repeats,categoryList,issues,unique:freq.size};
}
function managementBase(plan){const m=planMetricsForReport(plan),s=reportSurveyStats(plan);return{m,s}}
function reportHeaderHtml(title,subtitle){return `<header class="r-head"><div><b>${escapeHtml(state.settings?.org||'TBMM Destek Hizmetleri Başkanlığı')}</b><h1>${escapeHtml(title)}</h1><p>${escapeHtml(subtitle)}</p></div><div class="r-code">${new Date().toLocaleDateString('tr-TR')}<br>${escapeHtml(state.settings?.createdBy||'Yönetici')}</div></header>`}
function kpiHtml(items){return `<div class="r-kpis">${items.map(x=>`<div><b>${escapeHtml(x.value)}</b><span>${escapeHtml(x.label)}</span></div>`).join('')}</div>`}
function reportBars(items,max,key='count'){const m=max||Math.max(1,...items.map(x=>+x[key]||0));return items.map(x=>`<div class="r-bar"><span>${escapeHtml(x.name)}</span><i><em style="width:${Math.max(4,Math.min(100,(+x[key]||0)/m*100))}%"></em></i><b>${key==='avg'?(+x[key]||0).toFixed(2):Math.round(+x[key]||0)}</b></div>`).join('')||'<p>Gösterilecek veri bulunmuyor.</p>'}
function reportFindings(plan,m,s){const out=[];out.push(m.quality>=85?`Kalite skoru ${m.quality}/100 ile güçlü seviyededir.`:m.quality>=70?`Kalite skoru ${m.quality}/100; kontrollü iyileştirme önerilir.`:`Kalite skoru ${m.quality}/100; yönetici revizyonu gerektirir.`);out.push(m.issues.length?`${m.issues.length} plan uyarısı ayrıntılı kontrolde değerlendirilmelidir.`:'Temel plan kontrollerinde kritik uyarı bulunmamaktadır.');if(m.repeats[0])out.push(`En sık kullanılan yemek “${m.repeats[0].name}” (${m.repeats[0].count} kullanım).`);out.push(s.rows?`${s.people||'—'} katılımcıdan ${s.rows} yemek değerlendirmesi alınmış, ortalama ${s.average.toFixed(2)}/5 olmuştur.`:'Aktif çizelge için henüz anket sonucu bulunmamaktadır.');return out}
function managementSummaryBody(plan){const {m,s}=managementBase(plan),findings=reportFindings(plan,m,s);return `${kpiHtml([{value:m.days,label:'Planlanan gün'},{value:m.quality,label:'Kalite / 100'},{value:m.lunchAvg+' kcal',label:'Öğle ortalaması'},{value:m.dinnerAvg+' kcal',label:'Akşam ortalaması'},{value:m.unique,label:'Farklı yemek'},{value:s.rows?s.average.toFixed(2):'—',label:'Memnuniyet / 5'}])}<section><h2>Yönetici Özeti</h2>${findings.map(x=>`<div class="r-note">${escapeHtml(x)}</div>`).join('')}</section><section><h2>Karar Notu</h2><div class="r-decision">${m.issues.length?'Uyarılı öğünler revize edilmeli ve değişiklik yeni sürüm olarak kaydedilmelidir.':'Plan uygulanabilir durumdadır; uygulama sonrası anket sonuçlarıyla takip edilmelidir.'}</div></section>`}
function scheduleRows(plan){return (plan.schedule||[]).map(d=>`<tr><td>${dateLabel(d.date)}</td><td>${escapeHtml(menuSignature(d.lunch))}</td><td>${escapeHtml(menuSignature(d.dinner))}</td></tr>`).join('')}
function managementDetailedBody(plan){const {m,s}=managementBase(plan);return `${managementSummaryBody(plan)}<section><h2>Sürüm Bilgisi</h2><p>Güncel sürüm <b>v${plan.currentVersion||1}</b>; toplam sürüm sayısı <b>${plan.versionHistory?.length||1}</b>. Sürüm karşılaştırmaları yalnızca bu çizelgenin kendi geçmişinde yapılır.</p></section><section><h2>Çizelge</h2><table><thead><tr><th>Tarih</th><th>Öğle</th><th>Akşam</th></tr></thead><tbody>${scheduleRows(plan)}</tbody></table></section><section class="two-col"><div><h2>Tekrar Analizi</h2>${reportBars(m.repeats.slice(0,8),m.repeats[0]?.count||1)}</div><div><h2>Kategori Dağılımı</h2>${reportBars(m.categoryList.slice(0,8),m.categoryList[0]?.count||1)}</div></section><section><h2>Anket Sonuçları</h2>${s.rows?`<p>${s.people||'—'} katılımcı • ${s.rows} değerlendirme • Ortalama ${s.average.toFixed(2)}/5</p>${reportBars(s.list.slice(0,8),5,'avg')}`:'<div class="r-note">Anket sonucu bulunmuyor.</div>'}</section><section><h2>Kontrol Uyarıları</h2>${m.issues.length?m.issues.map(x=>`<div class="r-warning">${escapeHtml(typeof x==='string'?x:(x.message||JSON.stringify(x)))}</div>`).join(''):'<div class="r-note">Kritik uyarı bulunmadı.</div>'}</section>`}
function managementExecutiveBody(plan){const {m,s}=managementBase(plan),findings=reportFindings(plan,m,s);const risk=Math.min(100,Math.max(0,100-m.quality+(m.issues.length*4)));return `<section class="exec-page"><div class="exec-title"><div><small>ÜST YÖNETİM SUNUMU</small><h2>Yemek Hizmeti Performans Özeti</h2><p>${escapeHtml(plan.name)} • ${dateLabel(plan.start)} – ${dateLabel(plan.end)}</p></div><div class="donut" style="--p:${m.quality}"><b>${m.quality}</b><span>Kalite</span></div></div><div class="exec-kpis">${[{v:m.days,l:'Planlanan Gün',i:'▦'},{v:m.unique,l:'Farklı Yemek',i:'◈'},{v:m.lunchAvg,l:'Öğle kcal',i:'☀'},{v:m.dinnerAvg,l:'Akşam kcal',i:'☾'},{v:s.rows?s.average.toFixed(2):'—',l:'Memnuniyet / 5',i:'★'},{v:m.issues.length,l:'Kontrol Uyarısı',i:'!'}].map(x=>`<div><i>${x.i}</i><b>${x.v}</b><span>${x.l}</span></div>`).join('')}</div><div class="exec-grid"><article><h3>Kalori Dengesi</h3><div class="cal-pair"><div><span>Öğle</span><i><em style="width:${Math.min(100,m.lunchAvg/11)}%"></em></i><b>${m.lunchAvg}</b></div><div><span>Akşam</span><i><em style="width:${Math.min(100,m.dinnerAvg/11)}%"></em></i><b>${m.dinnerAvg}</b></div></div><p class="chart-comment">Öğle ve akşam ortalamaları birlikte izlenerek günlük enerji yükünün tek öğünde yoğunlaşması önlenmelidir.</p></article><article><h3>Risk Göstergesi</h3><div class="risk-meter"><i style="width:${risk}%"></i></div><b class="risk-value">%${risk}</b><p class="chart-comment">Risk oranı kalite skoru ve kontrol uyarılarından türetilmiştir; yüksek değer revizyon ihtiyacını gösterir.</p></article><article><h3>Kategori Dağılımı</h3>${reportBars(m.categoryList.slice(0,5),m.categoryList[0]?.count||1)}<p class="chart-comment">Kategori çeşitliliği, menünün tek bir yemek grubuna aşırı yüklenip yüklenmediğini gösterir.</p></article><article><h3>Memnuniyet Görünümü</h3>${s.rows?reportBars(s.list.slice(0,5),5,'avg'):'<p>Henüz anket verisi yok.</p>'}<p class="chart-comment">Memnuniyet sonuçları yalnızca aktif çizelgenin y const SALAD_FALLBACK=['Çoban Salata','Mevsim Yeşillikleri','Akdeniz Salatası','Roka ve Kırmızı Soğan','Mor Lahana Salatası','Havuç Tarator','Yoğurtlu Semizotu','Cacık','Pancar Salatası','Gavurdağı Salatası','Sumaklı Soğan Salatası','Mevsim Turşusu'];
function saladCandidates(){
  const fromPool=(state.meals||[]).filter(m=>m.active!==false&&(m.subCategory==='Salata'||/salata|cacık|cacik|tarator|roka|semizotu|pancar|turşu|tursu|sumaklı soğan|sumakli sogan/i.test(m.name||''))).map(m=>m.name);

}

function mainProfile(menu){const txt=n(coreMealNames(menu).join(' '));return{txt,fish:/balik|somon|levrek|hamsi|palamut/.test(txt),legume:/fasulye|nohut|mercimek|barbunya|bakla/.test(txt),meat:/et |kofte|kebap|doner|kuzu|dana/.test(txt),chicken:/tavuk|pilic|hindi/.test(txt),vegetable:/sebze|zeytinyagli|kabak|patlican|bamya|ispanak|pirasa|enginar|kereviz|semizotu/.test(txt),heavy:/kizart|tava|kavurma|borek|kebap|doner|icli kofte/.test(txt),yogurt:/yogurt|ayran|cacik|yayla/.test(txt)}}
function seasonalBoost(name,date){const m=new Date((date||today())+'T12:00:00').getMonth()+1,t=n(name);if([6,7,8].includes(m)&&/coban|akdeniz|cacik|semizotu|roka|yesillik/.test(t))return 14;if([12,1,2].includes(m)&&/lahana|havuc|pancar|tursu/.test(t))return 14;if([3,4,5].includes(m)&&/roka|yesillik|semizotu|akdeniz/.test(t))return 10;if([9,10,11].includes(m)&&/pancar|lahana|havuc|tursu/.test(t))return 10;return 0}

function generateSaladBar(menu,date,slot,o={},usage={}){

<script id="tbmm-guide-algorithm-cleanup-script">
(function(){
'use strict';

function proteinIconByName(name){
  const n=String(name||'').toLocaleLowerCase('tr-TR');
  if(n.includes('kırmızı')||n.includes('kirmizi')||n.includes('et'))return '🥩';
  if(n.includes('balık')||n.includes('balik'))return '🐟';
  if(n.includes('tavuk')||n.includes('hindi'))return '🍗';
  if(n.includes('sebze')||n.includes('bakliyat'))return '🥬';
  return '🍽️';
}

const previousStrategyRenderer=window.renderStrategy;

  if(typeof previousStrategyRenderer==='function')previousStrategyRenderer.apply(this,arguments);
  document.querySelectorAll('#strategy .protein-tile').forEach(tile=>{
    const label=tile.querySelector('span')?.textContent||'';
    const icon=tile.querySelector('i');if(icon)icon.textContent=proteinIconByName(label);
  });
  document.querySelectorAll('#strategy .info-chart').forEach(card=>{
    const title=card.querySelector('h4')?.textContent||'';
    if(/Risk ve (Sürüm|Kontrol)/i.test(title)){
      const qualityText=[...document.querySelectorAll('#strategy .strategy-kpi')].find(x=>/Kalite/i.test(x.textContent||''))?.querySelector('b')?.textContent||'—';
      const warningText=[...document.querySelectorAll('#strategy .strategy-kpi')].find(x=>/uyarı/i.test(x.textContent||''))?.querySelector('b')?.textContent||'0';
      const q=Number(qualityText)||0,w=Number(warningText)||0;
      card.innerHTML=`<h4>Risk ve Kontrol</h4><div class="survey-summary-grid"><div><b>${w}</b><span>Kontrol uyarısı</span></div><div><b>${q>=80&&w===0?'Düşük':q>=65?'İzlenecek':'Yüksek'}</b><span>Yönetim riski</span></div><div><b>${q}</b><span>Kalite puanı</span></div><div><b>${q>=80?'Uygun':'Kontrol'}</b><span>Onay durumu</span></div></div><p class="chart-comment">Risk değeri yalnızca aktif tabildot çizelgesinin kalite puanı ve hata kontrollerinden hesaplanır.</p>`;
    }
  });
  document.querySelectorAll('#strategy .chart-comment').forEach(p=>{p.textContent=p.textContent.replace(/sonraki plan sürümünde|sonraki sürümde/gi,'sonraki planlamada')});
};

  <div class="guide-index"><a href="#g1">1. Giriş</a><a href="#g2">2. Plan Oluşturma</a><a href="#g3">3. Üretim Modları</a><a href="#g4">4. Salata Bar</a><a href="#g5">5. Taslak ve Düzenleme</a><a href="#g6">6. Tüm Planlar</a><a href="#g7">7. Anket</a><a href="#g8">8. Strateji</a><a href="#g9">9. Çıktılar</a><a href="#g10">10. Yedekleme</a></div>
  <div id="g1" class="guide-section"><h4>1. Giriş ve Yetkiler</h4><ol><li>Giriş türünü seçin, kullanıcı adı ve şifrenizi yazın.</li><li>Yönetici; planlama, düzenleme, yemek havuzu, ayarlar ve kullanıcı işlemlerini yönetir.</li><li>Kullanıcı; izin verilen çizelge, anket, strateji ve çıktı ekranlarını görüntüler.</li></ol></div>
  <div id="g2" class="guide-section"><h4>2. Plan Oluşturma</h4><ol><li><b>Tarih</b> sekmesinde başlangıç ve bitiş tarihini takvimden seçin. Kırmızı günler doludur ve seçilemez.</li><li>Takvimde mevcut 15 günlük tahmine denk gelen günlerde hava ikonu, sıcaklık ve yağış bilgisi görünür.</li><li><b>Menü</b> sekmesinde üretim modu, öğle–akşam ilişkisi, tatlı ve ayran kotası belirlenir.</li><li><b>Salata Bar</b> sekmesinde otomatik, hafif/mevsimsel, yoğurtlu denge, sabit içerik veya yer tutucu seçilir.</li><li><b>Gelişmiş</b> sekmesinde şehir, hava etkisi, kalori hedefleri ve sıcak/soğuk eşikleri ayarlanır.</li><li><b>Kurallar</b> sekmesinde tekrar, çeşitlilik, ağır akşam, tatlı ve ayran sınırları belirlenir.</li><li>“Akıllı Plan Oluştur” taslak üretir; kalıcı kayıt için ayrıca “Yemek Planı Kaydet” düğmesine basılır.</li></ol></div>
  <div id="g3" class="guide-section"><h4>3. Üretim Modları</h4><div class="algorithm-option-grid">
  <div class="algorithm-option-card"><h5>Standart</h5><p>Çeşitlilik, tekrar, öğün dengesi, renk, uyum ve temel kalori kontrolünü dengeli uygular.</p></div>
  <div class="algorithm-option-card"><h5>Memnuniyet Odaklı</h5><p>Anket puanı yüksek yemeklerin aday puanını artırır; tekrar ve kesin uyumsuzluk kuralları yine geçerlidir.</p></div>
  <div class="algorithm-option-card"><h5>Hafif Menü</h5><p>Ağırlık ve yüksek kalori değerlerine ek ceza verir; özellikle akşam daha hafif seçim yapar.</p></div>
  <div class="algorithm-option-card"><h5>Mevsimsel</h5><p>Plan tarihinin mevsimine uygun yemek ve Salata Bar ürünlerine öncelik verir.</p></div>
  <div class="algorithm-option-card"><h5>Günlük Hava Durumuna Göre</h5><p>15 günlük tahmini kullanır; sıcakta hafif/soğuk, soğukta sıcak, yağışta sulu yemekleri destekler.</p></div>
  <div class="algorithm-option-card"><h5>Kalori Dengesine Göre</h5><p>Her öğün için birden fazla aday üretir ve hedefe en yakın olanı seçer. Tolerans sabit ±150 kcal’dir.</p></div>
  <div class="algorithm-option-card"><h5>Ekonomik</h5><p>Maliyet puanı yüksek yemeklere ceza verir; kalite ve zorunlu uyum kurallarını kaldırmaz.</p></div>
  <div class="algorithm-option-card"><h5>Yüksek Protein</h5><p>Et, tavuk, balık, yumurta, süt ürünleri ve bakliyat kaynaklarına ek puan verir.</p></div>
  <div class="algorithm-option-card"><h5>Sebze Ağırlıklı</h5><p>Sebze, zeytinyağlı, bakliyat ve hafif tamamlayıcıların kullanımını artırır.</p></div></div></div>
  <div id="g4" class="guide-section"><h4>4. Salata Bar</h4><ol><li>Salata Bar ana menüden ayrı üretilir.</li><li>Otomatik mod; ana yemek türü, menü ağırlığı, yoğurt kullanımı, mevsim, renk çeşitliliği ve yakın tarih tekrarlarını değerlendirir.</li><li>Çizelgede <b>Salata Bar (ürün - ürün - ürün)</b> biçiminde gösterilir.</li><li>Salata Bar üretimi zorunludur; sistem gerçek ürün adlarını otomatik oluşturur.</li><li>“Tüm çizelgeyi düzenle” veya öğün düzenleme ekranında Salata Bar ürünleri manuel değiştirilebilir.</li></ol></div>
  <div id="g5" class="guide-section"><h4>5. Taslak, Kontrol ve Düzenleme</h4><ol><li>Taslakta her günün öğle ve akşam menüsünü inceleyin.</li><li>Hata Raporu; tekrar, kategori, malzeme, renk, pişirme, kalori ve öğün uyumunu tarar.</li><li>Otomatik Düzelt uygun bulunan sorunları yeniden üretir.</li><li>Yönetici manuel değişiklik yapabilir; sistem uyarı verir ancak yönetici onayıyla kaydeder.</li></ol></div>
  <div id="g6" class="guide-section"><h4>6. Tüm Planlar</h4><ol><li>Aktif Yap, Görüntüle, Son Halini Düzenle, Kilitle ve Sil işlemleri bulunur.</li><li>Vejetaryen planlar normal tabildot planından ayrı tutulur ve stratejik karşılaştırmaya alınmaz.</li><li>Sürüm karşılaştırma seçeneği kaldırılmıştır.</li></ol></div>
  <div id="g7" class="guide-section"><h4>7. Sanal Çoktan Seçmeli Anket</h4><ol><li>Aktif plan ve tarih aralığı üzerinden anketi önizleyin.</li><li>Bağımsız HTML anket dosyasını e-postayla gönderin.</li><li>Katılımcının indirdiği JSON yanıtını sisteme yükleyin.</li><li>Sonuçlar yemek memnuniyeti ve strateji grafiklerine yansır.</li><li>Anket grubu, bağlı sürüm veya güven düzeyi seçimi kullanılmaz.</li></ol></div>
  <div id="g8" class="guide-section"><h4>8. Strateji</h4><ol><li>En sık yemek, çorba, tatlı, tamamlayıcı ve ana yemek sonuçlarını inceleyin.</li><li>Kırmızı et, balık, tavuk ve sebze/bakliyat dağılımı doğru ikonlarla gösterilir.</li><li>Kalori dengesi, tekrarlar, kalite ve kontrol uyarıları ayrı grafiklerde değerlendirilir.</li><li>Özet Rapor ve Üst Yönetim Sunumu seçenekleri kullanılabilir.</li><li>Strateji yalnızca aktif normal tabildot çizelgesini değerlendirir.</li></ol></div>
  <div id="g9" class="guide-section"><h4>9. Çıktılar</h4><ul><li>Plan Excel/CSV</li><li>Kurumsal Plan Word</li><li>Günlük Menü PDF</li><li>Personel Çizelgesi PDF</li><li>Strateji Özet Raporu PDF/Word</li><li>İnfografik Üst Yönetim Sunumu</li></ul><div class="guide-note">Çıktılarda tablo başlıkları yeni sayfada tekrar eder; başlıkların sayfa sonunda yalnız kalmaması ve gereksiz boş sayfa oluşmaması için kompakt yazdırma düzeni kullanılır.</div></div>
  <div id="g10" class="guide-section"><h4>10. Ayarlar ve Yedekleme</h4><ol><li>Kurum adı, hazırlayan, kullanıcılar ve tema Ayarlar bölümünden yönetilir.</li><li>JSON yedeğini düzenli alın.</li><li>Tarayıcı verilerini temizlemeden veya yeni bilgisayara geçmeden önce yedek dosyası oluşturun.</li></ol></div>`;
};

window.renderAlgorithm=function(){
  const el=document.getElementById('algorithm');if(!el)return;
  el.innerHTML=`<div class="card algorithm-hero"><h3>Yemek Seçim Algoritması</h3><p>Sistem doğrudan rastgele menü oluşturmaz. Her öğün için uygun adayları hazırlar, kesin yasakları eler, kalan seçenekleri puanlar, menü kombinasyonlarını kontrol eder ve en yüksek uygunluk puanına sahip sonucu seçer.</p></div>
  <div class="algorithm-step-list">
    <div><b>Verileri oku</b><span>Aktif yemekler; kategori, alt kategori, grup, kalori, ağırlık, maliyet, anket puanı, renk, malzeme, pişirme yöntemi ve mevsim bilgileriyle hazırlanır.</span></div>
    <div><b>Tarih ve bağlamı hazırla</b><span>Öğün, gün, mevsim, 15 günlük hava tahmini, öğle menüsü, önceki kullanımlar, tatlı/ayran kotası ve kalori hedefi okunur.</span></div>
    <div><b>Aday havuzlarını ayır</b><span>Çorba, ana yemek, yardımcı ve tamamlayıcı adayları ayrı listelerde değerlendirilir. Pasif yemekler havuza alınmaz.</span></div>
    <div><b>Kesin yasakları ele</b><span>Bir öğünde iki ana yemek, iki yoğun tahıllı yardımcı, yasak malzeme eşleşmeleri ve özel beslenmeye aykırı kayıtlar seçilmez.</span></div>
    <div><b>Her adayı puanla</b><span>Memnuniyet, tekrar, grup tekrarı, ağırlık, maliyet, protein/sebze tercihi, hava ve mevsim katkıları ayrı ayrı hesaplanır.</span></div>
    <div><b>Kombinasyon kur</b><span>Çorba + ana yemek + yardımcı + tamamlayıcı birleştirilir; renk, kıvam, malzeme, pişirme, kalori ve tabildot uyumu yeniden kontrol edilir.</span></div>
    <div><b>Salata Bar üret</b><span>Ana yemekten bağımsız olarak seçilen Salata Bar moduna göre ürünler belirlenir; menü rengi ve tekrar geçmişi dikkate alınır.</span></div>
    <div><b>En iyi sonucu seç</b><span>Kesin kural ihlali olmayan adaylar arasından en yüksek toplam puanlı menü seçilir. Kalori modunda hedefe en yakın dört deneme karşılaştırılır.</span></div>
  </div>
  <div class="card algorithm-section"><h4>Aday yemek puanı</h4><div class="algorithm-formula">Başlangıç: 55\n+ Anket ortalaması × 3\n  (Memnuniyet Odaklı: yaklaşık × 7)\n− Aynı yemek kullanımı × 21\n− Aynı grup kullanımı × 8\n− Akşam ağırlık puanı × 7\n+ Üretim modu katkısı\n+ Hava ve mevsim katkısı\n+ 0–4 kontrollü çeşitlilik payı</div><p class="muted">Çeşitlilik veya grup tekrarı kuralları kapatılırsa ilgili ceza azaltılır; kesin yasaklar kapatılamaz.</p></div>
  <div class="card algorithm-section"><h4>Üretim modlarının puana etkisi</h4><table class="rule-detail-table"><thead><tr><th>Mod</th><th>Algoritma davranışı</th></tr></thead><tbody>
  <tr><td>Standart</td><td>Temel puanlama, çeşitlilik, renk, uyum ve kalori kontrolü dengeli uygulanır.</td></tr>
  <tr><td>Memnuniyet Odaklı</td><td>Anket katsayısı yükselir; yüksek puanlı yemekler öne çıkar.</td></tr>
  <tr><td>Hafif Menü</td><td>Ağırlık ve yüksek kaloriye ceza verir; akşam cezası ayrıca uygulanır.</td></tr>
  <tr><td>Mevsimsel</td><td>Tarihin mevsimine uygun yemeklere ve Salata Bar ürünlerine ek puan verir.</td></tr>
  <tr><td>Günlük Hava Durumuna Göre</td><td>27°C üzeri hafif/yoğurtlu/zeytinyağlı; 10°C altı çorba/bakliyat/güveç; yağışta sıcak-sulu yemekleri destekler.</td></tr>
  <tr><td>Kalori Dengesine Göre</td><td>Dört aday menü üretir. Hedefe en yakın menüyü seçer; kabul aralığı hedef ±150 kcal’dir.</td></tr>
  <tr><td>Ekonomik</td><td>Maliyet puanını yaklaşık 3 katsayısıyla cezaya dönüştürür.</td></tr>
  <tr><td>Yüksek Protein</td><td>Et, tavuk, balık, yumurta, süt ürünleri ve bakliyat içeren adaylara ek puan verir.</td></tr>
  <tr><td>Sebze Ağırlıklı</td><td>Sebze, zeytinyağlı ve bitkisel seçeneklere ek puan verir.</td></tr></tbody></table></div>
  <div class="card algorithm-section"><h4>Kesin engellenen veya ağır ceza alan durumlar</h4><ul><li>Pasif yemek veya aynı yemeğin aynı öğünde tekrarı.</li><li>Bir öğünde iki ana yemek.</li><li>İki yoğun tahıllı yardımcının birlikte bulunması.</li><li>Dolma/sarma ile pilav, makarna veya börek.</li><li>Pirinç pilavı ile sütlaç; yayla çorbası + pilav + sütlaç yoğunluğu.</li><li>Gendime/buğday çorbası ile nohut veya kuru fasulye.</li><li>Çorba ve ana yemekte aynı temel proteinin tekrarı.</li><li>Aynı ana malzemenin aşırı kullanımı, çok sayıda kızartma veya ağır ürün.</li><li>Tamamen aynı renk ailesinden oluşan menü.</li><li>Vejetaryen planda et, balık, kümes hayvanı ve bunların suları.</li></ul></div>
  <div class="card algorithm-section"><h4>Plan seçenekleri</h4><table class="rule-detail-table"><thead><tr><th>Seçenek</th><th>Anlamı</th></tr></thead><tbody>
  <tr><td>Öğle ve akşam farklı</td><td>Her iki öğün ayrı üretilir; akşamda öğle grubunu tekrar etmeme ve daha hafif olma kontrolleri çalışır.</td></tr>
  <tr><td>Öğle ve akşam aynı</td><td>Öğle menüsü akşama kopyalanır.</td></tr>
  <tr><td>Her gün için sor</td><td>Aynı menü uygulanacak günleri yönetici tek tek seçer.</td></tr>
  <tr><td>Hazır menü</td><td>Yönetici tarafından kaydedilmiş menü doğrudan atanır; hata ve uyum kontrolleri devam eder.</td></tr>
  <tr><td>Tatlı / Ayran kotası</td><td>Seçilen haftalık sayı günlere dengeli dağıtılır; ayran öğün tercihi uygulanır.</td></tr>
  <tr><td>Kalori hedefi</td><td>Öğle ve akşam hedefleri ayrı okunur; esneklik sabit ±150 kcal’dir.</td></tr>
  <tr><td>Hava etkisi</td><td>Düşük, normal ve yüksek düzeyleri hava puanının seçim üzerindeki ağırlığını değiştirir.</td></tr>
  <tr><td>Salata Bar modu</td><td>Otomatik, hafif/mevsimsel, yoğurtlu, sabit içerik veya yer tutucu seçeneklerinden biridir.</td></tr></tbody></table></div>
  <div class="card algorithm-section"><h4>Son kontrol</h4><p>Plan tamamlandıktan sonra tekrar, yemek türü dağılımı, renk, malzeme, pişirme, tabildot uyumu, kalori hedefi, Salata Bar ve anket etkisi yeniden taranır. Yönetici değişiklik yaptığında aynı kontroller tekrar uygulanır.</p></div>`;
};

// Removed feature stubs: old links cannot reopen the retired comparison screen.
try{delete window.openPlanVersions;delete window.comparePlanVersions;delete window.previewPlanVersion;delete window.restorePlanVersion}catch(_){ }

if(document.getElementById('guide')?.classList.contains('active'))window.renderGuide();
if(document.getElementById('algorithm')?.classList.contains('active'))window.renderAlgorithm();
})();
</script>

<script id="tbmm-wizard-excel-final-script">
(function(){
'use strict';
if(window.__TBMM_WIZARD_EXCEL_FINAL__)return;window.__TBMM_WIZARD_EXCEL_FINAL__=true;
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const norm=v=>String(v??'').toLocaleLowerCase('tr-TR').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ı/g,'i').replace(/[^a-z0-9]+/g,' ').trim();
const clone=v=>JSON.parse(JSON.stringify(v));
const $=s=>document.querySelector(s);
const dmy=iso=>{if(!iso)return'';const p=String(iso).split('-');return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:iso};
const isoToday=()=>new Date().toISOString().slice(0,10);
function plusDays(iso,n){const d=new Date((iso||isoToday())+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function persistOnce(){try{if(typeof save==='function')save();else localStorage.setItem(typeof STORE_KEY!=='undefined'?STORE_KEY:'tbmmTabildotState',JSON.stringify(state))}catch(e){console.warn('Kayıt hatası',e)}}

/* Excel uyumlu yemek havuzu: örnek, dışa aktarma ve aynı şablondan içe aktarma. */
const EXCEL_COLUMNS=[
 ['id','ID'],['name','Yemek'],['category','Kategori'],['subCategory','Alt Kategori'],['group','Grup'],['sourceCategory','Kaynak Kategori'],['gram','Gram'],['unit','Birim'],['calorie','Kalori'],['weight','Ağırlık'],['cost','Maliyet'],['repeatDays','Tekrar Günü'],['active','Aktif'],['vegetarianStatus','Vejetaryen Durumu'],['allergenNotes','İçerik/Reçete Notu']
];
function excelValue(m,key){if(key==='active')return m.active===false?'Hayır':'Evet';if(key==='vegetarianStatus')return m.vegetarianStatus==='no'?'Uygun Değil':m.vegetarianStatus==='review'?'Kontrol Gerekli':'Uygun';return m[key]??''}
function excelWorkbook(rows,title='Yemek Havuzu'){
 const head=EXCEL_COLUMNS.map(x=>`<th>${esc(x[1])}</th>`).join('');
 const body=rows.map(m=>`<tr>${EXCEL_COLUMNS.map(([key])=>`<td>${esc(excelValue(m,key))}</td>`).join('')}</tr>`).join('');

function saladClean(arr){return (arr||[]).map(x=>String(x).trim()).filter(x=>x&&!/^ürün adı$/i.test(x))}
function actualSaladItems(menu,date,slot,settings,usage){
  let count=clamp(+(settings?.saladBarCount||menu?.saladBar?.items?.length||3),2,4);
  let items=saladClean(menu?.saladBar?.items).slice(0,count);
  if(items.length>=2)return items;
  try{if(typeof realSalad==='function')items=saladClean(realSalad(menu,date,slot,settings||{},usage||{})?.items).slice(0,count)}catch(_){ }
  if(items.length<2){try{items=saladClean(window.generateSaladBar?.(menu,date,slot,settings||{},usage||{})?.items).slice(0,count)}catch(_){ }}
  if(items.length<2){try{if(typeof fallbackSalad==='function')items=saladClean(fallbackSalad(menu,count)).slice(0,count)}catch(_){ }}
  if(items.length<2)items=['Çoban Salata','Cacık','Mevsim Yeşillikleri','Pancar Salatası'].slice(0,count);
  menu.saladBar={...(menu.saladBar||{}),items,profile:menu?.saladBar?.profile||'Gerçek ürünlerle otomatik oluşturuldu',mode:menu?.saladBar?.mode||'auto'};
  menu.fixed='Salata Bar';
  return items;
}
function ensurePlanSaladsDeep(plan){
  if(!plan?.schedule)return false;
  let changed=false; const usage={};
  for(const day of plan.schedule){
    for(const [key,slot] of [['lunch','Öğle'],['dinner','Akşam']]){
      const menu=day?.[key]; if(!menu)continue;
      const before=JSON.stringify(saladClean(menu?.saladBar?.items));
      const items=actualSaladItems(menu,day.date,slot,plan.settings||{},usage);
      items.forEach(x=>usage['salad:'+norm2(x)]=(usage['salad:'+norm2(x)]||0)+1);
      if(JSON.stringify(items)!==before)changed=true;
    }
  }
  return changed;
}
window.ensureAllStoredSalads=function(){
  let changed=false;
  for(const p of (state?.plans||[]))changed=ensurePlanSaladsDeep(p)||changed;
  if(changed&&typeof save==='function')save();
  return changed;
};

window.mealText=function(menu){

  base=(base||[]).filter(x=>!norm2(x).startsWith('salata bar'));
  const items=menu?actualSaladItems(menu,'','',{},{}):['Çoban Salata','Cacık','Mevsim Yeşillikleri'];

};

function pie3DChart(items){
  const data=(items||[]).map(x=>({name:x.name,count:+x.count||0}));
  const total=Math.max(1,data.reduce((s,x)=>s+x.count,0));
  const cols=['#8f4f52','#3f6f91','#b68a50','#55796f'];
  const dark=['#67383b','#2d526d','#836238','#3d5a52'];
  const cx=108,cy=88,r=72,depth=16;
  const polar=(a)=>({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});
