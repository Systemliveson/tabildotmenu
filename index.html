const SURVEY_SCHEMA_V2='tbmm_virtual_survey_response_v1';
const SURVEY_OPTIONS_V2=[{label:'Çok İyi',score:5},{label:'İyi',score:4},{label:'Orta',score:3},{label:'Kötü',score:2},{label:'Çok Kötü',score:1}];
function groupSurveyRows(rows){const map=new Map();rows.forEach((r,i)=>{if(!map.has(r.tarih))map.set(r.tarih,{Öğle:[],Akşam:[]});const key=r.ogun==='Akşam'?'Akşam':'Öğle';map.get(r.tarih)[key].push({...r,_index:i})});return map}
function surveyMealTable(items){return `<table class="survey-choice-table"><thead><tr><th>Yemek</th>${SURVEY_OPTIONS_V2.map(o=>`<th>${o.label}</th>`).join('')}<th>Yorum</th></tr></thead><tbody>${items.map(r=>`<tr><td><b>${esc(r.yemek)}</b>${Number.isFinite(+r.calorie)?`<br><small>${Math.round(+r.calorie)} kcal</small>`:''}</td>${SURVEY_OPTIONS_V2.map(o=>`<td class="opt"><input type="radio" name="survey_q_${r._index}" value="${o.score}" title="${o.label}"></td>`).join('')}<td><textarea data-comment="${r._index}" placeholder="İsteğe bağlı"></textarea></td></tr>`).join('')}</tbody></table>`}
function groupedSurveyPreview(rows){const groups=groupSurveyRows(rows);return `<div class="survey-group-preview">${[...groups.entries()].map(([date,g])=>`<div class="survey-date-group"><div class="survey-date-head">${trDate(date)}</div><div class="survey-meal-block"><div class="survey-meal-title">Öğle Yemeği <span>${g.Öğle.length} yemek</span></div>${g.Öğle.length?surveyMealTable(g.Öğle):'<p class="muted">Öğle yemeği bulunmuyor.</p>'}</div><div class="survey-meal-block"><div class="survey-meal-title">Akşam Yemeği <span>${g.Akşam.length} yemek</span></div>${g.Akşam.length?surveyMealTable(g.Akşam):'<p class="muted">Akşam yemeği bulunmuyor.</p>'}</div></div>`).join('')}</div>`}
function standaloneSurveyHtml(rows,plan,start,end){const payload={schema:SURVEY_SCHEMA_V2,surveyId:'survey_'+Date.now().toString(36),planId:plan.id,planName:plan.name,start,end,org:state.settings.org,rows};return `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Yemek Memnuniyet Anketi</title><style>*{box-sizing:border-box}body{margin:0;background:#eef3f8;color:#172033;font-family:Arial,Helvetica,sans-serif}.wrap{max-width:1120px;margin:24px auto;padding:0 16px}.head{background:linear-gradient(135deg,#17345f,#244d82);color:#fff;border-radius:18px;padding:24px;text-align:center}.head h1{margin:0;font-size:23px}.head h2{margin:7px 0 0;font-size:17px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}.card{background:#fff;border:1px solid #d8e1ec;border-radius:16px;padding:16px;margin-bottom:16px}.date{background:#17345f;color:#fff;border-radius:12px 12px 0 0;padding:12px 15px;font-weight:bold}.meal{border:1px solid #d8e1ec;border-top:0;padding:15px}.meal+.meal{border-top:4px solid #e4eaf2}.meal h3{color:#17345f;margin:0 0 12px}.tableWrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:790px;font-size:12px}th,td{border:1px solid #d8e1ec;padding:8px}th{background:#eef3f8;color:#17345f}td:not(:first-child),th:not(:first-child){text-align:center}input[type=radio]{width:19px;height:19px;accent-color:#244d82}textarea,input[type=text]{width:100%;border:1px solid #cbd5e1;border-radius:9px;padding:9px}textarea{min-height:44px}.actions{text-align:center;margin:20px}.btn{border:0;border-radius:11px;background:#2f6d4b;color:#fff;font-weight:bold;padding:13px 20px;cursor:pointer}.status{margin-top:12px;padding:11px;border-radius:10px;display:none}.status.bad{display:block;background:#fff1f2;color:#991b1b}.status.good{display:block;background:#ecfdf3;color:#166534}@media(max-width:650px){.meta{grid-template-columns:1fr}}</style>


</head><body><div class="wrap"><div class="head"><h1>${esc(state.settings.org)}</h1><h2>Yemek Memnuniyet Anketi</h2><p>${esc(plan.name)} • ${trDate(start)} - ${trDate(end)}</p></div><div class="meta"><div class="card"><label>Ad Soyad (isteğe bağlı)</label><input id="respondent" type="text"></div><div class="card"><label>Birim (isteğe bağlı)</label><input id="unit" type="text"></div></div><div id="form"></div><div class="actions"><button class="btn" onclick="submitSurvey()">Yanıt Dosyasını İndir</button><div id="status" class="status"></div></div></div><script>const FORM=${JSON.stringify(payload)};const OPTS=${JSON.stringify(SURVEY_OPTIONS_V2)};function trDate(x){return new Date(x+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric',weekday:'long'})}function esc(x){return String(x||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]))}function render(){const groups={};FORM.rows.forEach((r,i)=>{r._index=i;(groups[r.tarih]||(groups[r.tarih]={Öğle:[],Akşam:[]}))[r.ogun==='Akşam'?'Akşam':'Öğle'].push(r)});document.getElementById('form').innerHTML=Object.entries(groups).map(([date,g])=>'<div class="card" style="padding:0;overflow:hidden"><div class="date">'+trDate(date)+'</div>'+['Öğle','Akşam'].map(meal=>'<div class="meal"><h3>'+meal+' Yemeği</h3>'+(g[meal].length?'<div class="tableWrap"><table><thead><tr><th>Yemek</th>'+OPTS.map(o=>'<th>'+o.label+'</th>').join('')+'<th>Yorum</th></tr></thead><tbody>'+g[meal].map(r=>'<tr><td><b>'+esc(r.yemek)+'</b>'+(Number.isFinite(+r.calorie)?'<br><small>'+Math.round(+r.calorie)+' kcal</small>':'')+'</td>'+OPTS.map(o=>'<td><input type="radio" name="q_'+r._index+'" value="'+o.score+'"></td>').join('')+'<td><textarea data-comment="'+r._index+'"></textarea></td></tr>').join('')+'</tbody></table></div>':'<p>Bu öğünde yemek bulunmuyor.</p>')+'</div>').join('')+'</div>').join('')}function submitSurvey(){const answers=[],missing=[];FORM.rows.forEach((r,i)=>{const q=document.querySelector('input[name="q_'+i+'"]:checked');if(!q){missing.push(r.ogun+' - '+r.yemek);return}const score=+q.value,op=OPTS.find(o=>o.score===score);answers.push({...r,score,secim:op?op.label:'',yorum:document.querySelector('[data-comment="'+i+'"]')?.value||''})});const status=document.getElementById('status');if(missing.length){status.className='status bad';status.textContent='Lütfen tüm yemekleri değerlendirin. Eksik: '+missing.slice(0,4).join(', ')+(missing.length>4?'...':'');return}const response={schema:'${SURVEY_SCHEMA_V2}',responseId:'resp_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8),surveyId:FORM.surveyId,planId:FORM.planId,planName:FORM.planName,respondent:document.getElementById('respondent').value||'',unit:document.getElementById('unit').value||'',submittedAt:new Date().toISOString(),rows:answers};const blob=new Blob([JSON.stringify(response,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='TBMM_Anket_Yanit_'+new Date().toISOString().slice(0,10)+'_'+response.responseId+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);status.className='status good';status.textContent='Yanıt dosyası indirildi. Bu JSON dosyasını e-posta ile yöneticiye gönderiniz.'}render();<\/script></body></html>`}
window.createSurveyForm=function(){const rows=selectedSurveyRows(),p=activePlan();if(!p||!rows.length){toast('Seçilen tarih aralığında anket oluşturulacak yemek bulunamadı.');return}const box=document.getElementById('surveyWorkspace');if(box)box.innerHTML=groupedSurveyPreview(rows);const info=document.getElementById('surveyInfo');if(info)info.textContent='Önizleme öğle ve akşam yemekleri ayrı bölümlerde hazırlandı.';toast('Öğle ve akşam ayrımlı sanal anket hazırlandı.','ok')};
window.downloadVirtualSurvey=function(){const p=activePlan(),rows=selectedSurveyRows();if(!p||!rows.length){toast('Anket dosyası oluşturulamadı.');return}const s=document.getElementById('surveyStart')?.value||p.start,e=document.getElementById('surveyEnd')?.value||p.end;downloadBlob(standaloneSurveyHtml(rows,p,s,e),`TBMM_Yemek_Anketi_${s}_${e}.html`,'text/html;charset=utf-8');toast('Öğle ve akşam bölümleri ayrı olan sanal anket indirildi.','ok')};
window.showSurveyMail=function(){const p=activePlan();if(!p){toast('Aktif plan yok.');return}const s=document.getElementById('surveyStart')?.value||p.start,e=document.getElementById('surveyEnd')?.value||p.end,body=`Sayın Katılımcı,\n\n${trDate(s)} - ${trDate(e)} tarihleri arasındaki yemek hizmetine ilişkin sanal çoktan seçmeli anket dosyası ekte gönderilmiştir.\n\nDosyada öğle yemeği ve akşam yemeği ayrı bölümler halinde gösterilmektedir. Lütfen ekteki HTML dosyasını açınız, her yemek için yalnızca bir seçenek işaretleyiniz ve “Yanıt Dosyasını İndir” düğmesine basınız.\n\nİndirilen JSON yanıt dosyasını bu e-postaya yanıt vererek geri gönderiniz.\n\nTeşekkür ederiz.\n\n${state.settings.org}`;openModal(`<div class="modalHead"><div><h3>Anket e-posta metni</h3><p class="muted">HTML anket dosyasını e-postaya ekleyiniz.</p></div><button class="close" onclick="closeModal()">✕</button></div><textarea style="min-height:280px">${esc(body)}</textarea><div class="actions"><a class="btn green" href="mailto:?subject=${encodeURIComponent('Yemek Memnuniyet Anketi')}&body=${encodeURIComponent(body)}">E-posta Programında Aç</a><button class="btn secondary" onclick="navigator.clipboard.writeText(document.querySelector('.modal textarea').value);toast('Metin kopyalandı.','ok')">Metni Kopyala</button></div>`)};
window.renderSurvey=function(){const p=activePlan(),start=p?.start||today(),end=p?.end||start;document.getElementById('survey').innerHTML=`<div class="card"><div class="cardTitle"><h3>Sanal Çoktan Seçmeli Anket</h3><span class="pill ok">Öğle ve akşam ayrı</span></div><p class="lead">Katılımcıya e-posta eki olarak bağımsız HTML dosyası gönderilir. Katılımcı öğle ve akşam yemeklerini ayrı bölümlerde değerlendirir, JSON yanıt dosyasını indirip yöneticiye geri gönderir.</p>${p?`<p><b>${esc(p.name)}</b><br><span class="muted">${planRange(p)}</span></p><div class="form two"><div><label>Başlangıç tarihi</label><input type="date" id="surveyStart" value="${start}"></div><div><label>Bitiş tarihi</label><input type="date" id="surveyEnd" value="${end}"></div></div><div class="survey-flow"><div class="survey-step"><b>1. Sanal anketi oluştur</b><span>Öğle ve akşam bölümleri otomatik hazırlanır.</span></div><div class="survey-step"><b>2. E-posta ile gönder</b><span>İndirilen HTML dosyasını ek olarak iletin.</span></div><div class="survey-step"><b>3. JSON yanıtı yükle</b><span>Geri gelen dosyaları topluca sisteme aktarın.</span></div></div><div class="virtual-survey-toolbar"><button class="btn secondary" onclick="createSurveyForm()">Anketi Önizle</button><button class="btn green" onclick="downloadVirtualSurvey()">E-posta Anket Dosyası (.html)</button><button class="btn secondary" onclick="showSurveyMail()">E-posta Metni</button></div><p class="hint" id="surveyInfo">Anket yalnızca sanal ortamda işaretlenir; fiziksel çıktı üretilmez.</p>`:'<p class="muted">Aktif plan yok.</p>'}</div><div id="surveyWorkspace"></div><div class="card" style="margin-top:16px"><div class="cardTitle"><h3>Geri Gelen Yanıtları Sisteme Aktar</h3><button class="btn secondary" onclick="exportSurveyResults()">Sonuçları CSV Al</button></div><div class="survey-file-zone"><label>Katılımcılardan gelen JSON yanıt dosyaları</label><input type="file" accept=".json,.csv" multiple onchange="importVirtualSurveyFiles(event)"><p class="hint">Birden fazla dosyayı aynı anda seçebilirsiniz. Sonuçlar Strateji bölümündeki memnuniyet grafiklerine otomatik yansır.</p></div>${state.surveys.length?surveyTable():'<p class="muted" style="margin-top:14px">Henüz sisteme aktarılmış anket yanıtı yok.</p>'}</div>`};

window.renderOutputs=function(){const p=activePlan();document.getElementById('outputs').innerHTML=`<div class="grid cols2"><div class="card"><h3>Kurumsal Çıktı Merkezi</h3><p class="lead">Tüm PDF, Word ve Excel çıktıları kurum başlığı, tarih aralığı, kalori bilgisi ve düzenli sayfa yapısıyla oluşturulur.</p><div class="actions"><button class="btn green" onclick="exportPlanCsv()">Plan Excel/CSV</button><button class="btn secondary" onclick="exportPlanWord()">Kurumsal Plan Word</button><button class="btn secondary" onclick="showAnnouncement()">Duyuru / E-posta</button><button class="btn secondary" onclick="printPersonnelPlan()">Personel Çizelgesi PDF</button><button class="btn secondary" onclick="printHomeDay()">Günlük Menü PDF</button><button class="btn secondary" onclick="printStrategyReport()">Strateji Raporu PDF</button></div></div><div class="card"><h3>Aktif Plan</h3>${p?`<p><b>${esc(p.name)}</b></p><p class="muted">${planRange(p)}</p><div class="notice oknote">Personel, günlük menü ve strateji çıktıları aktif plan veya Strateji bölümünde seçilen plan üzerinden kurumsal formatta hazırlanır.</div>`:'<p class="muted">Aktif plan yok.</p>'}</div></div>`};

window.renderGuide=function(){const el=document.getElementById('guide');if(!el)return;el.innerHTML=`<div class="card guide-hero"><h3>Akıllı Tabildot Menü Yönetim Sistemi Kullanım Kılavuzu</h3><p>Sistemin girişten plan üretimine, anketten strateji raporuna kadar tüm işlemleri aşağıda yeniden ve güncel şekilde açıklanmıştır.</p></div><div class="guide-index"><a href="#g1">1. Giriş ve Yetkiler</a><a href="#g2">2. Anasayfa</a><a href="#g3">3. Plan Oluşturma</a><a href="#g4">4. Taslak ve Kayıt</a><a href="#g5">5. Tüm Planlar</a><a href="#g6">6. Yemek Havuzu</a><a href="#g7">7. Personel Ekranı</a><a href="#g8">8. Sanal Anket</a><a href="#g9">9. Strateji</a><a href="#g10">10. Çıktılar</a><a href="#g11">11. Ayarlar</a><a href="#g12">12. Algoritma</a></div><div id="g1" class="guide-section"><h4>1. Giriş ve Yetkiler</h4><ol><li>Giriş ekranında Yönetici veya Kullanıcı hesabını seçin.</li><li>Yönetici; plan oluşturma, yemek havuzu, kullanıcı, ayar ve düzenleme işlemlerine erişir.</li><li>Kullanıcı; günlük menü, kayıtlı plan, personel ekranı, anket ve izin verilen çıktıları görüntüler.</li><li>Şifre alanındaki göz simgesiyle şifreyi gösterip gizleyebilirsiniz.</li></ol></div><div id="g2" class="guide-section"><h4>2. Anasayfa ve Günlük Çizelge</h4><ol><li>Tarih alanından görüntülenecek günü seçin.</li><li>Öğle ve akşam menüleri ayrı kartlarda, yemek kalorileri ve toplam öğün kalorisiyle görünür.</li><li>Yazdırma ikonuyla seçilen güne ait kurumsal PDF çıktısı alınır.</li><li>Seçilen tarih aktif planın dışında ise sistem bilgi mesajı gösterir.</li></ol></div><div id="g3" class="guide-section"><h4>3. Plan Oluşturma</h4><ol><li>Başlangıç ve bitiş tarihini belirleyin.</li><li>Standart, Memnuniyet Odaklı veya Hafif Menü modunu seçin.</li><li>Tatlı, ayran, salata ve öğle–akşam eşitliği seçeneklerini ayarlayın.</li><li>Tabldot uyumu ve renk çeşitliliği kurallarını açık tutmanız önerilir.</li><li>“Akıllı Plan Oluştur” düğmesi yalnızca taslak üretir.</li></ol></div><div id="g4" class="guide-section"><h4>4. Taslak, Kontrol ve Kayıt</h4><ol><li>Taslakta her yemeğin kalorisi ve öğün toplamı görünür.</li><li>Hata Raporu; tekrar, renk, tabldot uyumu, malzeme, kıvam ve pişirme sorunlarını kontrol eder.</li><li>“Düzenle” ile yönetici herhangi bir öğünü manuel değiştirebilir.</li><li>Uyumsuz manuel menüde sistem uyarır; yönetici onayıyla işlem sürdürülebilir.</li><li>Kalıcı kayıt için “Yemek Planı Kaydet” düğmesine basın.</li></ol></div><div id="g5" class="guide-section"><h4>5. Tüm Planlar</h4><ol><li>Tüm kayıtlı çizelgeler bu bölümde listelenir.</li><li>“Aktif Yap” anasayfa, personel ekranı, anket ve çıktıların kullanacağı planı belirler.</li><li>Yönetici “Son Halini Düzenle” ile kesinleşmiş planı tekrar taslağa alabilir.</li><li>Kilit, silme ve önizleme işlemleri yönetici yetkisine bağlıdır.</li></ol></div><div id="g6" class="guide-section"><h4>6. Yemek Havuzu</h4><ol><li>Yemekler yüklenen Excel listesindeki kategori, alt kategori ve kalori bilgileriyle tutulur.</li><li>Yanlış kategori veya kalori, algoritmanın sonucunu etkileyebilir; düzenli kontrol edilmelidir.</li><li>Pasifleştirilen yemek otomatik planlamaya katılmaz.</li><li>Yeni yemek eklenirken ana kategori, alt kategori, grup ve kalori eksiksiz girilmelidir.</li></ol></div><div id="g7" class="guide-section"><h4>7. Personel Yemek Çizelgesi</h4><ol><li>Öğle ve akşam menüleri geniş boşluklu, ayrı sütunlarda gösterilir.</li><li>Her yemek yanında kalori, her öğün altında toplam kalori bulunur.</li><li>“Kurumsal PDF / Yazdır” düğmesi özel çıktı alanını kullanır; boş PDF sorunu giderilmiştir.</li><li>Uzun planlar otomatik olarak birden fazla sayfaya bölünür.</li></ol></div><div id="g8" class="guide-section"><h4>8. Sanal Çoktan Seçmeli Anket</h4><ol><li>Tarih aralığını seçin ve anketi önizleyin.</li><li>Öğle Yemeği ve Akşam Yemeği ayrı bölümlerde gösterilir.</li><li>HTML anket dosyasını indirin ve e-posta eki olarak katılımcılara gönderin.</li><li>Katılımcı tüm seçenekleri işaretleyip JSON yanıt dosyasını indirir.</li><li>Geri gelen bir veya birden fazla JSON dosyasını sisteme yükleyin.</li><li>Sonuçlar yemek puanlarına ve Strateji grafiklerine otomatik yansır; mükerrer dosya ikinci kez işlenmez.</li></ol></div><div id="g9" class="guide-section"><h4>9. Strateji ve Yönetim Analizi</h4><ol><li>Analiz edilecek kayıtlı çizelgeyi açılır listeden seçin.</li><li>Tüm grafikler yalnızca seçilen çizelgenin gerçek yemek ve kalori kayıtlarından hesaplanır.</li><li>En çok ve en az çıkan yemekler, tür dağılımı, tekrar oranı, günlük ve öğün kalori ortalamaları gösterilir.</li><li>Anket geri dönüşleri, en beğenilen ve düşük puanlı yemekler ile öğle–akşam memnuniyet farkı grafiklere yansır.</li><li>Kurumsal Strateji PDF düğmesi yönetim sunumuna hazır çok sayfalı rapor üretir.</li></ol></div><div id="g10" class="guide-section"><h4>10. Kurumsal Çıktılar</h4><ul><li>Plan Excel/CSV: yemekler ve toplam kaloriler.</li><li>Kurumsal Word: tarih, öğün, yemek ve kalori çizelgesi.</li><li>Günlük Menü PDF: seçilen tarihin öğle–akşam menüsü.</li><li>Personel Çizelgesi PDF: planın tüm günleri.</li><li>Strateji Raporu PDF: yönetici özeti, grafikler, kalori ve anket analizi.</li><li>Duyuru/E-posta: planın personele bildirilmesi için hazır metin.</li></ul></div><div id="g11" class="guide-section"><h4>11. Ayarlar, Kullanıcılar ve Yedek</h4><ol><li>Kurum adı, hazırlayan, yönetici kullanıcı adı ve şifre değiştirilebilir.</li><li>Yönetici yeni kullanıcı oluşturabilir, pasifleştirebilir veya silebilir.</li><li>Sayfa teması seçilebilir.</li><li>JSON yedek düzenli alınmalı; tarayıcı verileri silinmeden önce yedekleme yapılmalıdır.</li></ol></div><div id="g12" class="guide-section"><h4>12. Algoritma Bölümü</h4><p>Sol menüdeki <b>Algoritma</b> düğmesi, otomatik yemek seçiminin tüm zorunlu kurallarını, puanlama değerlerini, renk ve uyum denetimlerini açık biçimde gösterir.</p></div>`};

window.renderAlgorithm=function(){const el=document.getElementById('algorithm');if(!el)return;el.innerHTML=`<div class="card algorithm-hero"><h3>Yemek Seçim Algoritması</h3><p>Sistem rastgele dört yemek seçmez. Adayları kategoriye ayırır, kesin uyumsuzlukları eler, her olası menüyü puanlar ve en yüksek toplam puanlı kombinasyonu seçer.</p></div><div class="algorithm-flow"><div><b>1. Havuz</b><span>Aktif yemekler</span></div><div><b>2. Eleme</b><span>Kesin kurallar</span></div><div><b>3. Puanlama</b><span>Tekrar, anket, renk</span></div><div><b>4. Kombinasyon</b><span>Çorba + ana + yardımcı + tamamlayıcı</span></div><div><b>5. Son Kontrol</b><span>Uyum ve kalori</span></div></div><div class="algorithm-section"><h4>1. Kullanılan Veriler</h4><ul><li>Yemek adı, kategori, alt kategori ve yemek grubu.</li><li>Kalori, ağırlık ve maliyet puanı.</li><li>Aktif/pasif durumu ve plan içindeki kullanım sayısı.</li><li>Anket ortalaması ve oy sayısı.</li><li>Renk ailesi, kıvam, pişirme yöntemi ve ana malzeme etiketleri.</li></ul></div><div class="algorithm-section"><h4>2. Aday Havuzlarının Oluşturulması</h4><table class="rule-table"><tr><th>Bileşen</th><th>İlk değerlendirilen aday sayısı</th><th>Kaynak</th></tr><tr><td>Çorba</td><td>En yüksek puanlı 3 aday</td><td>Çorba kategorisi</td></tr><tr><td>Ana yemek</td><td>En yüksek puanlı 7 aday</td><td>Ana Yemek kategorisi</td></tr><tr><td>Yardımcı</td><td>En yüksek puanlı 5 aday</td><td>Ana yemeğe göre uygun yardımcı havuzu</td></tr><tr><td>Tamamlayıcı</td><td>En yüksek puanlı 5 aday</td><td>Salata, yoğurt, meyve, tatlı veya ayran seçeneği</td></tr></table><p>Bu havuzlardan oluşabilecek kombinasyonlar tek tek denenir. Kesin kurala takılan kombinasyon değerlendirmeye alınmaz.</p></div><div class="algorithm-section"><h4>3. Kesin Olarak Engellenen Eşleşmeler</h4><ol><li>Aynı yemeğin aynı öğünde iki kez kullanılması.</li><li>Bir öğünde iki ana yemek bulunması.</li><li>İki tahıllı yardımcı ürünün birlikte sunulması.</li><li>Dolma veya sarma ile pilav, makarna ya da börek sunulması.</li><li>Pirinç pilavı ile sütlacın aynı öğünde bulunması.</li><li>Yayla çorbası + pirinç pilavı + sütlaç üçlüsü.</li><li>Gendime/buğday çorbası ile kuru fasulye veya nohut.</li><li>Çorba ve ana yemekte tavuk, balık, mercimek, nohut, fasulye veya mantar ana malzemesinin tekrar etmesi.</li><li>Aynı ana malzemenin bir öğünde üç kez tekrarlanması.</li><li>Aynı öğünde üç kızartma ürününün bulunması.</li></ol></div><div class="algorithm-section"><h4>4. Aday Yemek Puanı</h4><table class="rule-table"><tr><th>Kural</th><th>Puan etkisi</th></tr><tr><td>Başlangıç puanı</td><td>+55</td></tr><tr><td>Memnuniyet Odaklı modda anket puanı</td><td>Anket ortalaması × 8</td></tr><tr><td>Hafif Menü modunda ağırlık</td><td>Ağırlık puanı × −8</td></tr><tr><td>Aynı yemeğin plan içinde önceki kullanımı</td><td>Her kullanım için −21</td></tr><tr><td>Aynı grubun önceki kullanımı</td><td>Her kullanım için −8</td></tr><tr><td>Akşam ağır yemek</td><td>Ağırlık puanı × −7</td></tr><tr><td>Öğle menüsüyle aynı grup</td><td>−8</td></tr><tr><td>Seçilmiş yemeğin tekrar seçilmesi</td><td>−200</td></tr><tr><td>Dolma–tahıl, pilav–sütlaç, gendime–bakliyat çatışması</td><td>−160</td></tr><tr><td>İkinci tahıllı yardımcı</td><td>−140</td></tr><tr><td>İkinci kızartma</td><td>−22</td></tr><tr><td>İkinci ağır ürün</td><td>−10</td></tr><tr><td>Aynı ana malzeme etiketi</td><td>Her tekrar için −8</td></tr><tr><td>Menüye yeni bir renk ailesi eklemesi</td><td>+8</td></tr><tr><td>Kontrollü küçük çeşitlilik</td><td>0 ile +3 arası</td></tr></table></div><div class="algorithm-section"><h4>5. Tabldot Uyum Puanı</h4><p>Uyum değerlendirmesi 82 puandan başlar. Aşağıdaki sorunlar puanı düşürür:</p><table class="rule-table"><tr><th>Sorun</th><th>Ceza</th></tr><tr><td>Proteinli tamamlayıcının ikinci ana yemek etkisi</td><td>−24</td></tr><tr><td>Etli/tavuklu yardımcı ürün</td><td>−22</td></tr><tr><td>Etli sebze + zeytinyağlı sebze</td><td>−28</td></tr><tr><td>Zeytinyağlı yemek + yoğun salata</td><td>−16</td></tr><tr><td>Tahıllı yardımcı + şerbetli tatlı</td><td>−34</td></tr><tr><td>Turşu + tatlı</td><td>−22</td></tr><tr><td>İki kızartma</td><td>−24</td></tr><tr><td>Üç veya daha fazla ağır ürün</td><td>−28</td></tr><tr><td>Aynı kıvamdan üç ürün</td><td>−20</td></tr><tr><td>Aynı pişirme yönteminden üç ürün</td><td>−20</td></tr><tr><td>Ana malzemenin iki kez tekrarı</td><td>−10</td></tr><tr><td>Birden fazla güçlü tat</td><td>−13</td></tr></table></div><div class="algorithm-section"><h4>6. Olumlu Eşleşme Puanları</h4><table class="rule-table"><tr><th>Uygun eşleşme</th><th>Ek puan</th></tr><tr><td>Bakliyat + pilav/bulgur + yoğurt/cacık</td><td>+18</td></tr><tr><td>Balık + salata + meyve/helva</td><td>+13</td></tr><tr><td>Et/tavuk/köfte + tahıl + salata/yoğurt</td><td>+12</td></tr><tr><td>Dolma/sarma + yoğurt + meyve/komposto</td><td>+15</td></tr><tr><td>Ağır yemek + hafif tamamlayıcı</td><td>+9</td></tr><tr><td>Yumuşak + gevrek kıvam dengesi</td><td>+7</td></tr><tr><td>Sulu + kuru ürün dengesi</td><td>+6</td></tr></table></div><div class="algorithm-section"><h4>7. Renk Uyumu</h4><ul><li>Menünün tamamen beyaz-krem tonlardan oluşması engellenir.</li><li>En fazla iki beyaz-krem ürün hedeflenir.</li><li>En az bir canlı renk; mümkünse üç farklı renk ailesi aranır.</li><li>Aynı rengin üç veya daha fazla üründe yoğunlaşması puanı düşürür.</li><li>Salata Bar sabit ürün olduğu için ana renk skorunu yapay biçimde yükseltmez.</li><li>Renk skoru kombinasyon puanına %70 katsayıyla eklenir.</li></ul></div><div class="algorithm-section"><h4>8. Kombinasyon Puanı ve Seçim</h4><div class="formula-box">Kombinasyon Puanı =<br>Tabldot Uyum Puanı × 2,1<br>+ Olumlu Eşleşme Sayısı × 7<br>− Uyarı Sayısı × 5<br>+ Her Bileşenin Aday Puanı × 0,38<br>+ Renk Uyum Puanı × 0,70</div><p>Kesin hata içeren kombinasyonun puanı eksi sonsuz kabul edilir. Geriye kalan seçeneklerden en yüksek puanlı menü seçilir.</p></div><div class="algorithm-section"><h4>9. Kalori ve Öğle–Akşam Dengesi</h4><ul><li>Her yemeğin kalorisi Excel yemek verisinden alınır.</li><li>Öğün toplamı, dört temel yemeğin kalori toplamıdır.</li><li>Salata Bar gibi kalorisi belirsiz ürünler toplam dışında bırakılır.</li><li>Hafif Menü modunda yüksek ağırlıklı yemeklere ek ceza uygulanır.</li><li>Akşam öğünlerinde ağır yemek cezası daha yüksektir.</li><li>Strateji bölümü öğle, akşam, günlük ortalama ve en yüksek/düşük kalori değerlerini hesaplar.</li></ul></div><div class="algorithm-section"><h4>10. Anket Geri Beslemesi</h4><ol><li>Katılımcı yanıt dosyaları sisteme yüklendiğinde her yemek için ortalama puan ve oy sayısı güncellenir.</li><li>Memnuniyet Odaklı mod, yüksek puanlı yemeklere daha fazla öncelik verir.</li><li>Tekrar cezası kaldırılmaz; çok sevilen bir yemek de sürekli seçilemez.</li><li>Anket sonuçları Strateji bölümünde genel, öğle, akşam ve yemek bazında grafiklere dönüşür.</li></ol></div><div class="algorithm-section"><h4>11. Son Kontrol ve Yönetici Müdahalesi</h4><ol><li>Oluşturulan plan bütün günler için tekrar taranır.</li><li>Kesin uyumsuzluk, düşük renk skoru, tekrar ve kalori sorunları Hata Raporuna eklenir.</li><li>Yönetici manuel değişiklik yaptığında sistem uyum puanını yeniden hesaplar.</li><li>Çok düşük puanlı menüde onay uyarısı gösterilir.</li><li>Yönetici kuralları aşabilir; yapılan değişiklik plan kaydedilene kadar taslakta tutulur.</li></ol></div>`};

ensureFinalSections();

<script id="tbmm-climate-ready-strategy-script">
(function(){
'use strict';
const WEATHER_SOURCE='Open-Meteo';
const previousEnsureState=window.ensureState;
const previousRenderCreate=window.renderCreate;
const previousFormOptions=window.formOptions;
const previousBuildMeal=window.buildMeal;
const previousCreateDraft=window.createDraft;
const previousStartPlanGeneration=window.startPlanGeneration;
const previousRenderAlgorithm=window.renderAlgorithm;
const previousRenderStrategy=window.renderStrategy;
const previousPrintStrategyReport=window.printStrategyReport;
const previousRenderPlans=window.renderPlans;
const previousSaveDraftPlan=window.saveDraftPlan;

function quietPersist(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){console.warn(e)}}
window.ensureState=function(){
  previousEnsureState();
  state.settings={weatherLocation:'Ankara',weatherLatitude:39.9334,weatherLongitude:32.8597,climateSensitivity:'normal',...(state.settings||{})};
  if(!state.weatherData||typeof state.weatherData!=='object')state.weatherData={location:'',latitude:null,longitude:null,fetchedAt:'',days:[]};
  if(!state.pendingReadyMenuAssignments||typeof state.pendingReadyMenuAssignments!=='object')state.pendingReadyMenuAssignments={};
};
ensureState();

function seasonForDate(iso,latitude=39){
  const month=new Date((iso||today())+'T12:00:00').getMonth()+1;
  let season=month===12||month<=2?'Kış':month<=5?'İlkbahar':month<=8?'Yaz':'Sonbahar';
  if(+latitude<0)season=season==='Kış'?'Yaz':season==='Yaz'?'Kış':season==='İlkbahar'?'Sonbahar':'İlkbahar';
  return season;
}
window.seasonForDate=seasonForDate;
function weatherText(code){code=+code;if(code===0)return'Açık';if(code<=3)return'Parçalı bulutlu';if(code===45||code===48)return'Sisli';if(code>=51&&code<=67)return'Yağmurlu';if(code>=71&&code<=77)return'Karlı';if(code>=80&&code<=82)return'Sağanak';if(code>=95)return'Gök gürültülü';return'Değişken';}
function weatherIcon(code){code=+code;if(code===0)return'☀';if(code<=3)return'⛅';if(code===45||code===48)return'🌫';if((code>=51&&code<=67)||(code>=80&&code<=82))return'🌧';if(code>=71&&code<=77)return'🌨';if(code>=95)return'⛈';return'🌤';}
function selectedPlanDates(){const s=document.getElementById('startDate')?.value||today(),e=document.getElementById('endDate')?.value||addDays(s,6);return datesBetween(s,e)}
function weatherForDate(date,o={}){const data=o.weatherData?.days?.length?o.weatherData:state.weatherData;return (data?.days||[]).find(x=>x.date===date)||null}
function climateFallbackTemperature(season){return season==='Yaz'?28:season==='Kış'?7:season==='İlkbahar'?17:18}
function weatherPanelHtml(){
  const d=state.weatherData,dates=new Set(selectedPlanDates()),days=(d.days||[]).filter(x=>dates.has(x.date)).slice(0,10);
  if(!d.location||!d.days?.length)return '<div class="weather-status"><b>Hava verisi henüz alınmadı.</b><br>Konumu yazıp “İnternetten Hava Verisini Getir” düğmesine basın. Veri alınamazsa sistem tarih ve mevsim profilini kullanır.</div>';
  const seasons=[...new Set(selectedPlanDates().map(x=>seasonForDate(x,d.latitude)))];
  return `<div class="weather-status"><b>${esc(d.location)}</b> için ${new Date(d.fetchedAt).toLocaleString('tr-TR')} tarihinde alınan tahmin kullanılıyor. ${seasons.map(s=>`<span class="season-chip">${s}</span>`).join('')}<br><small>Tahmin dışındaki tarihlerde mevsimsel profil devreye girer.</small></div><div class="weather-summary" style="margin-top:10px">${days.map(x=>`<div class="weather-day"><b>${fmt(x.date)}</b><strong>${weatherIcon(x.weatherCode)} ${Math.round(x.mean)}°C</strong><small>${Math.round(x.min)}° / ${Math.round(x.max)}°<br>${weatherText(x.weatherCode)}${x.precipitation>0?` • ${x.precipitation.toFixed(1)} mm`:''}</small></div>`).join('')}</div>`;
}
window.updateWeatherPanel=function(){const p=document.getElementById('weatherPreview');if(p)p.innerHTML=weatherPanelHtml()};
window.fetchPlanWeather=async function(silent=false){
  const location=(document.getElementById('weatherLocation')?.value||state.settings.weatherLocation||'Ankara').trim();
  if(!location){toast('Hava durumu için şehir veya ilçe yazın.');return false}
  try{
    if(!silent)showCookingLoader('Haftalık hava tahmini alınıyor…');
    const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(location)}&count=5&language=tr&format=json`);
    if(!geo.ok)throw new Error('Konum servisine ulaşılamadı.');
    const gj=await geo.json(),place=gj.results?.[0];if(!place)throw new Error('Konum bulunamadı.');
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${place.latitude}&longitude=${place.longitude}&daily=weather_code,temperature_2m_max,temperature_2m_min,temperature_2m_mean,precipitation_sum&timezone=auto&forecast_days=16`;
    const res=await fetch(url);if(!res.ok)throw new Error('Hava tahmini alınamadı.');const j=await res.json(),daily=j.daily||{};
    const days=(daily.time||[]).map((date,i)=>({date,min:+daily.temperature_2m_min?.[i]||0,max:+daily.temperature_2m_max?.[i]||0,mean:Number.isFinite(+daily.temperature_2m_mean?.[i])?+daily.temperature_2m_mean[i]:((+daily.temperature_2m_min?.[i]||0)+(+daily.temperature_2m_max?.[i]||0))/2,weatherCode:+daily.weather_code?.[i]||0,precipitation:+daily.precipitation_sum?.[i]||0}));
    state.weatherData={source:WEATHER_SOURCE,location:[place.name,place.admin1,place.country].filter(Boolean).join(', '),latitude:place.latitude,longitude:place.longitude,timezone:j.timezone||'',fetchedAt:new Date().toISOString(),days};
    state.settings.weatherLocation=location;state.settings.weatherLatitude=place.latitude;state.settings.weatherLongitude=place.longitude;quietPersist();updateWeatherPanel();
    if(!silent)toast('Hava ve mevsim verisi planlamaya hazır.','ok');return true;
  }catch(err){console.error(err);if(!silent)toast(`${err.message} Mevsimsel profil kullanılacak.`);return false}finally{if(!silent)hideCookingLoader()}
};

function addModeOptions(){const sel=document.getElementById('mode');if(!sel)return;['Ekonomik','Mevsimsel','Hava Uyumlu','Düşük Kalori','Dengeli Enerji','Yüksek Protein','Sebze Ağırlıklı'].forEach(v=>{if(![...sel.options].some(o=>o.value===v)){const op=document.createElement('option');op.value=v;op.textContent=v;sel.appendChild(op)}})}
function readySummaryHtml(){const a=state.pendingReadyMenuAssignments||{},rows=[];Object.entries(a).sort().forEach(([date,slots])=>['lunch','dinner'].forEach(k=>{if(slots?.[k]){const q=findQuickMenu(slots[k]);if(q)rows.push(`<span class="ready-assignment">${fmt(date)} • ${k==='lunch'?'Öğle':'Akşam'} • ${esc(q.name)}</span>`)}}));return rows.length?rows.join(''):'<span class="muted">Henüz gün ve öğün bazında hazır menü atanmadı.</span>'}
window.refreshReadyMenuSummary=function(){const e=document.getElementById('readyMenuSummary');if(e)e.innerHTML=readySummaryHtml()};
function climateCardHtml(){return `<div class="card climate-card" id="climatePlanningCard"><div class="climate-head"><div><h3>Hava, Mevsim ve Gelişmiş Planlama</h3><p class="muted" style="margin:0">Sistem sıcaklık, yağış, mevsim, kalori hedefi ve hazır menü atamalarını seçim puanına dahil eder.</p></div><span class="climate-source">Canlı veri kaynağı: ${WEATHER_SOURCE}</span></div><div class="climate-grid"><div class="climate-controls"><div class="climate-actions"><div><label>Şehir / İlçe</label><input id="weatherLocation" value="${esc(state.settings.weatherLocation||'Ankara')}" placeholder="Örn: Ankara"></div><button class="btn secondary" onclick="fetchPlanWeather()">☁ İnternetten Hava Verisini Getir</button></div><div class="form two" style="margin-top:12px"><div><label>Hava etkisi</label><select id="climateSensitivity"><option value="low">Düşük</option><option value="normal" selected>Normal</option><option value="high">Yüksek</option></select></div><div><label>Öğle kalori hedefi</label><input id="targetLunchCalories" type="number" min="400" max="1400" value="850"></div><div><label>Akşam kalori hedefi</label><input id="targetDinnerCalories" type="number" min="350" max="1200" value="700"></div><div><label>Sıcak hava eşiği</label><input id="hotThreshold" type="number" min="20" max="40" value="27"></div><div><label>Soğuk hava eşiği</label><input id="coldThreshold" type="number" min="-10" max="18" value="10"></div></div><div class="extra-options-grid"><label class="extra-option"><input id="useWeather" type="checkbox" checked><span><b>Hava tahminini kullan</b><small>Günlük sıcaklık ve yağış puanı seçimlere yansır.</small></span></label><label class="extra-option"><input id="useSeason" type="checkbox" checked><span><b>Mevsimsel ürünlere öncelik ver</b><small>Mevsime uygun sebze ve yemeklere ek puan verir.</small></span></label><label class="extra-option"><input id="hotLightMenus" type="checkbox" checked><span><b>Sıcakta hafif menü</b><small>Kızartma ve ağır menü azalır; yoğurt, ayran ve hafif yemek artar.</small></span></label><label class="extra-option"><input id="coldWarmMenus" type="checkbox" checked><span><b>Soğukta sıcak ve doyurucu menü</b><small>Çorba, bakliyat, güveç ve sıcak yemeklere öncelik verir.</small></span></label><label class="extra-option"><input id="rainComfortMenus" type="checkbox" checked><span><b>Yağışlı havada sıcak menü</b><small>Yağmurlu ve karlı günlerde sıcak/sulu yemek puanını artırır.</small></span></label><label class="extra-option"><input id="useCalorieTarget" type="checkbox" checked><span><b>Kalori hedefini koru</b><small>Öğle ve akşam hedeflerinden aşırı sapmaları cezalandırır.</small></span></label></div><div class="ready-menu-box"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap"><div><b>Gün ve öğün bazında hazır menü</b><div class="hint">Bir hazır menüyü yalnızca seçtiğiniz günlerin öğle veya akşam öğününe uygulayın.</div></div><div class="actions"><button class="btn small green" onclick="openReadyMenuPlanner()">☷ Hazır Menü Seç</button><button class="btn small secondary" onclick="clearReadyMenuAssignments()">Atamaları Temizle</button></div></div><div id="readyMenuSummary" class="ready-menu-summary">${readySummaryHtml()}</div></div></div><div class="climate-preview" id="weatherPreview">${weatherPanelHtml()}</div></div></div>`}
window.renderCreate=function(){
  previousRenderCreate();addModeOptions();
  const grid=document.querySelector('#create .grid.cols2');if(grid&&!document.getElementById('climatePlanningCard'))grid.insertAdjacentHTML('afterend',climateCardHtml());
  const createBtn=[...document.querySelectorAll('#create .actions .btn')].find(b=>/Akıllı Plan Oluştur|Taslak Oluştur/.test(b.textContent));if(createBtn){createBtn.textContent='🍲 Taslak Oluştur';createBtn.title='Hava, mevsim, uyum ve kalori kurallarına göre taslak oluşturur.'}
  updateWeatherPanel();refreshReadyMenuSummary();
};
window.formOptions=function(){const o=previousFormOptions();return{...o,useWeather:document.getElementById('useWeather')?.checked??true,useSeason:document.getElementById('useSeason')?.checked??true,hotLightMenus:document.getElementById('hotLightMenus')?.checked??true,coldWarmMenus:document.getElementById('coldWarmMenus')?.checked??true,rainComfortMenus:document.getElementById('rainComfortMenus')?.checked??true,useCalorieTarget:document.getElementById('useCalorieTarget')?.checked??true,climateSensitivity:document.getElementById('climateSensitivity')?.value||'normal',targetLunchCalories:+document.getElementById('targetLunchCalories')?.value||850,targetDinnerCalories:+document.getElementById('targetDinnerCalories')?.value||700,hotThreshold:+document.getElementById('hotThreshold')?.value||27,coldThreshold:+document.getElementById('coldThreshold')?.value||10,weatherLocation:document.getElementById('weatherLocation')?.value||state.settings.weatherLocation,weatherData:clone(state.weatherData),readyMenuAssignments:clone(state.pendingReadyMenuAssignments||{})}};

window.openReadyMenuPlanner=function(){const menus=state.quickMenus||[];if(!menus.length){toast('Önce Ayarlar bölümünden hazır menü oluşturun.');return}const dates=selectedPlanDates(),assign=state.pendingReadyMenuAssignments||{};openModal(`<div class="modalHead"><div><h3>Hazır Menüyü Gün ve Öğüne Ata</h3><p class="muted">Menüyü seçin; kullanılacağı günlerin öğle ve/veya akşam kutularını işaretleyin.</p></div><button class="close" onclick="closeModal()">✕</button></div><div class="form two"><div><label>Hazır menü</label><select id="readyPlannerMenu">${menus.map(q=>`<option value="${q.id}">${esc(q.name)}</option>`).join('')}</select></div><div><label>Hızlı seçim</label><div class="actions"><button class="btn small secondary" onclick="markReadySlots('lunch')">Tüm Öğleler</button><button class="btn small secondary" onclick="markReadySlots('dinner')">Tüm Akşamlar</button><button class="btn small secondary" onclick="markReadySlots('both')">Tüm Öğünler</button></div></div></div><div class="tableWrap" style="margin-top:13px"><table class="ready-table"><thead><tr><th>Tarih</th><th>Öğle</th><th>Akşam</th><th>Mevcut Atama</th></tr></thead><tbody>${dates.map(d=>`<tr><td><b>${fmt(d)}</b></td><td class="ready-check"><input type="checkbox" data-ready-date="${d}" data-ready-slot="lunch"></td><td class="ready-check"><input type="checkbox" data-ready-date="${d}" data-ready-slot="dinner"></td><td>${['lunch','dinner'].map(k=>assign[d]?.[k]?`${k==='lunch'?'Öğle':'Akşam'}: ${esc(findQuickMenu(assign[d][k])?.name||'')}`:'').filter(Boolean).join('<br>')||'—'}</td></tr>`).join('')}</tbody></table></div><div class="notice">Farklı hazır menüler için bu pencereyi tekrar açarak başka gün ve öğünlere yeni atama yapabilirsiniz.</div><div class="actions"><button class="btn green" onclick="applyReadyMenuAssignments()">Seçili Öğünlere Ata</button><button class="btn secondary" onclick="closeModal()">Kapat</button></div>`)};
window.markReadySlots=function(mode){document.querySelectorAll('[data-ready-slot]').forEach(x=>x.checked=mode==='both'||x.dataset.readySlot===mode)};
window.applyReadyMenuAssignments=function(){const qid=document.getElementById('readyPlannerMenu')?.value;if(!qid)return;state.pendingReadyMenuAssignments=state.pendingReadyMenuAssignments||{};document.querySelectorAll('[data-ready-date][data-ready-slot]:checked').forEach(x=>{const d=x.dataset.readyDate,k=x.dataset.readySlot;state.pendingReadyMenuAssignments[d]=state.pendingReadyMenuAssignments[d]||{};state.pendingReadyMenuAssignments[d][k]=qid});quietPersist();closeModal();refreshReadyMenuSummary();toast('Hazır menü seçilen gün ve öğünlere atandı.','ok')};
window.clearReadyMenuAssignments=function(){state.pendingReadyMenuAssignments={};quietPersist();refreshReadyMenuSummary();toast('Hazır menü atamaları temizlendi.','ok')};

function climateProfile(record){const m=record.meal||findMealByName(record.name)||{},t=norm([record.name,m.category,m.subCategory,m.group].join(' ')),weight=+m.weight||2,calorie=Number.isFinite(+record.calorie)?+record.calorie:(+m.calorie||0);return{t,m,weight,calorie,soup:m.category==='Çorba'||/corba/.test(t),heavy:weight>=4||/kizart|tava|kavurma|borek|kebap|doner|icli kofte|lazanya|pizza|serbetli|baklava|kadayif/.test(t),fried:/kizart|tava|pane|citir/.test(t),warming:/corba|guvec|yahni|haslama|kuru fasulye|nohut|mercimek|tarhana|ezogelin|firin|kavurma|etli/.test(t),cooling:/cacik|ayran|yogurt|salata|zeytinyagli|meyve|komposto|hosaf|soguk/.test(t),light:/salata|zeytinyagli|sebze|cacik|ayran|yogurt|meyve|izgara|bugulama|haslama/.test(t)&&weight<=3,protein:/dana|kuzu|et |kofte|tavuk|pilic|hindi|balik|nohut|fasulye|mercimek/.test(t),vegetable:/sebze|zeytinyagli|kabak|patlican|fasulye|bamya|ispanak|pirasa|lahana|brokoli|karnabahar|bezelye|enginar|kereviz|semizotu/.test(t),seasonal:{Yaz:/domates|patlican|kabak|taze fasulye|bamya|biber|semizotu|karpuz|kavun|cacik|ayran/.test(t),Kış:/lahana|pirasa|karnabahar|brokoli|kereviz|ispanak|bal kabagi|tarhana|kuru fasulye|nohut/.test(t),İlkbahar:/enginar|bezelye|bakla|kuskonmaz|semizotu|taze ot/.test(t),Sonbahar:/mantar|bal kabagi|pazi|kereviz|kestane/.test(t)}}}
function climateMealPoints(record,temp,weather,season,o){const p=climateProfile(record);let score=0,notes=[];const hot=temp>=o.hotThreshold,cold=temp<=o.coldThreshold,rain=(weather?.precipitation||0)>=2||(+weather?.weatherCode>=51&&+weather?.weatherCode<=99);
  if(o.useWeather&&hot&&o.hotLightMenus){if(p.light||p.cooling){score+=14;notes.push('sıcak havaya uygun hafif ürün')}if(p.heavy||p.fried){score-=18;notes.push('sıcak havada ağır ürün')}if(p.calorie>400)score-=5}
  if(o.useWeather&&cold&&o.coldWarmMenus){if(p.warming||p.soup){score+=14;notes.push('soğuk havaya uygun sıcak ürün')}if(p.cooling&&!p.soup)score-=6}
  if(o.useWeather&&rain&&o.rainComfortMenus){if(p.soup||p.warming)score+=8;if(p.cooling&&!p.soup)score-=3}
  if(o.useSeason&&p.seasonal[season]){score+=10;notes.push(`${season.toLocaleLowerCase('tr-TR')} mevsimine uygun`)}
  if(o.mode==='Yüksek Protein'&&p.protein)score+=13;if(o.mode==='Sebze Ağırlıklı'&&p.vegetable)score+=13;if(o.mode==='Düşük Kalori'&&p.calorie>0)score+=Math.max(-12,10-p.calorie/35);if(o.mode==='Ekonomik')score-=(+p.m.cost||0)*3;if(o.mode==='Mevsimsel'&&p.seasonal[season])score+=12;if(o.mode==='Hava Uyumlu')score*=1.35;
  return{score,notes};
}
function climateMenuEvaluation(menu,date,slot,o){const weather=weatherForDate(date,o),season=seasonForDate(date,o.weatherData?.latitude??state.weatherData?.latitude??state.settings.weatherLatitude),temp=Number.isFinite(+weather?.mean)?+weather.mean:climateFallbackTemperature(season),records=menuItemRecords(menu,false);let raw=0,notes=[];records.forEach(r=>{const x=climateMealPoints(r,temp,weather,season,o);raw+=x.score;notes.push(...x.notes)});const total=menuCalorieSummary(menu).total,target=slot==='Akşam'?o.targetDinnerCalories:o.targetLunchCalories;if(o.useCalorieTarget&&total&&target){const diff=Math.abs(total-target);raw-=Math.max(0,(diff-120)/45)}const sens=o.climateSensitivity==='high'?1.35:o.climateSensitivity==='low'?.65:1;raw*=sens;return{raw:Math.round(raw),score:Math.max(0,Math.min(100,Math.round(55+raw))),season,temp:Math.round(temp),weather:weatherText(weather?.weatherCode),weatherData:weather,notes:[...new Set(notes)].slice(0,3),target,total}}
function applyClimateMeta(menu,date,slot,o){const ev=climateMenuEvaluation(menu,date,slot,o);menu.climateScore=ev.score;menu.weatherTemperature=ev.temp;menu.season=ev.season;menu.weatherSummary=`${ev.season} • ${ev.temp}°C${ev.weatherData?` • ${ev.weather}`:''}`;menu.notes=[...(menu.notes||[]),`Hava/mevsim uyumu: ${ev.score}/100 (${menu.weatherSummary}).`];return{menu,ev}}
window.buildMeal=function(date,slot,o,usage,ctx){
  const key=slot==='Akşam'?'dinner':'lunch',qid=o.readyMenuAssignments?.[date]?.[key];
  if(qid){const q=findQuickMenu(qid);if(q){const menu=quickMenuToMenu(q);menu.notes=[`Yönetici hazır menüsü: ${q.name}.`];menu.compatibilityScore=typeof evaluateMenuCompatibility==='function'?evaluateMenuCompatibility(menu).score:0;return applyClimateMeta(menu,date,slot,o).menu}}
  const climateEnabled=o.useWeather||o.useSeason||['Hava Uyumlu','Mevsimsel','Düşük Kalori','Dengeli Enerji','Yüksek Protein','Sebze Ağırlıklı','Ekonomik'].includes(o.mode);if(!climateEnabled)return previousBuildMeal(date,slot,o,usage,ctx);
  let best=null;const tries=o.mode==='Hava Uyumlu'||o.climateSensitivity==='high'?3:2;
  for(let i=0;i<tries;i++){const candidate=previousBuildMeal(date,slot,o,usage,ctx),ev=climateMenuEvaluation(candidate,date,slot,o);let modeBonus=0;if(o.mode==='Dengeli Enerji')modeBonus-=Math.abs(ev.total-ev.target)/18;const base=(candidate.compatibilityScore||candidate.score||65)*1.35+(candidate.colorScore||65)*.35;const total=base+ev.raw*1.35+modeBonus;if(!best||total>best.total)best={candidate,ev,total}}

};

window.calculateExampleScore=function(){const mode=document.getElementById('calcMode')?.value||'Standart',survey=+document.getElementById('calcSurvey')?.value||0,use=+document.getElementById('calcUse')?.value||0,group=+document.getElementById('calcGroup')?.value||0,weight=+document.getElementById('calcWeight')?.value||0,slot=document.getElementById('calcSlot')?.value||'Öğle',compat=+document.getElementById('calcCompat')?.value||0,color=+document.getElementById('calcColor')?.value||0,climate=+document.getElementById('calcClimate')?.value||0,pos=+document.getElementById('calcPositive')?.value||0,warn=+document.getElementById('calcWarnings')?.value||0,sens=+document.getElementById('calcSensitivity')?.value||1;let candidate=55,lines=[['Aday başlangıç puanı',55]];if(mode==='Memnuniyet Odaklı'){candidate+=survey*8;lines.push(['Anket katkısı',survey*8])}if(mode==='Hafif Menü'){candidate-=weight*8;lines.push(['Hafif menü ağırlık cezası',-weight*8])}candidate-=use*21;lines.push(['Yemek tekrar cezası',-use*21]);candidate-=group*8;lines.push(['Grup tekrar cezası',-group*8]);if(slot==='Akşam'){candidate-=weight*7;lines.push(['Akşam ağırlık cezası',-weight*7])}const combination=compat*2.1+pos*7-warn*5+candidate*.38+color*.70+(climate-55)*sens;lines.push(['Tabldot uyumu × 2,1',compat*2.1],['Olumlu eşleşmeler',pos*7],['Uyarılar',-warn*5],['Aday puanı × 0,38',candidate*.38],['Renk puanı × 0,70',color*.70],['Hava/mevsim katkısı',(climate-55)*sens]);const final=Math.max(0,Math.round(combination));document.getElementById('calcResult').innerHTML=`<div class="calc-total"><strong>${final}</strong><span>Örnek kombinasyon puanı<br>Yüksek puan daha uygun aday demektir.</span></div><div class="calc-breakdown">${lines.map(x=>`<div class="calc-line"><span>${esc(x[0])}</span><b>${x[1]>=0?'+':''}${x[1].toFixed(1)}</b></div>`).join('')}</div>`};
window.loadScoreExample=function(){[['calcMode','Hava Uyumlu'],['calcSurvey',4.4],['calcUse',0],['calcGroup',1],['calcWeight',2],['calcSlot','Akşam'],['calcCompat',91],['calcColor',88],['calcClimate',86],['calcPositive',3],['calcWarnings',0],['calcSensitivity','1.35']].forEach(([id,v])=>{const e=document.getElementById(id);if(e)e.value=v});calculateExampleScore()};

function aggregatePlan(){const ps=state.plans||[],all=[];ps.forEach(p=>(p.schedule||[]).forEach(d=>all.push({...clone(d),_sourcePlan:p.name,_sourcePlanId:p.id})));const starts=ps.map(p=>p.start).filter(Boolean).sort(),ends=ps.map(p=>p.end).filter(Boolean).sort();return{id:'__all__',name:'Tüm Çizelgeleri Analiz Et',start:starts[0]||'',end:ends[ends.length-1]||'',schedule:all,status:'Toplu Analiz'}}

function topEntries(obj,n=8){return Object.entries(obj).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value||a.name.localeCompare(b.name,'tr')).slice(0,n)}

function coreAnalytics(plan){const counts={Çorba:{},'Ana Yemek':{},Yardımcı:{}},dates=new Set(),planIds=new Set();if(plan.id==='__all__')(state.plans||[]).forEach(p=>planIds.add(p.id));else planIds.add(plan.id);(plan.schedule||[]).forEach(d=>{dates.add(d.date);['lunch','dinner'].forEach(k=>menuItemRecords(d[k],false).forEach(r=>{const role=roleOfName(r.name);if(counts[role])counts[role][r.name]=(counts[role][r.name]||0)+1}))});const surveys=(state.surveys||[]).filter(s=>(planIds.has(s.plan_id)||dates.has(s.tarih))&&['Çorba','Ana Yemek'].includes(roleOfName(s.yemek)));const ratings={Çorba:{},'Ana Yemek':{}};surveys.forEach(s=>{const role=roleOfName(s.yemek),score=+s.score||0;if(!ratings[role][s.yemek])ratings[role][s.yemek]={sum:0,count:0};ratings[role][s.yemek].sum+=score;ratings[role][s.yemek].count++});const rankRole=r=>Object.entries(ratings[r]).map(([name,x])=>({name,avg:x.sum/x.count,count:x.count})).sort((a,b)=>b.avg-a.avg||b.count-a.count);return{soup:topEntries(counts.Çorba),main:topEntries(counts['Ana Yemek']),side:topEntries(counts.Yardımcı),soupRatings:rankRole('Çorba'),mainRatings:rankRole('Ana Yemek')}}

function addAllOption(){const sel=document.querySelector('#strategy .strategy-control select');if(sel&&![...sel.options].some(o=>o.value==='__all__')){const op=document.createElement('option');op.value='__all__';op.textContent='Tüm Çizelgeleri Analiz Et';sel.insertBefore(op,sel.firstChild)}if(sel)sel.value=window._strategyPlanId||state.activePlanId||sel.value}

.diet-info-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:12px 0}.diet-info{border:1px solid #dbe4ef;border-radius:14px;padding:12px;background:#f8fbff}.diet-info b{display:block;color:#203a73;font-size:20px}.diet-info small{color:#667085}.diet-safety{border-left:5px solid #b15f55;background:#fff7f6;border-radius:13px;padding:12px;line-height:1.55;margin:12px 0}.diet-safe-note{border-left-color:#5b8b6b;background:#f3faf5}.special-plan-banner{border:1px solid #dac79e;background:#fff8e9;border-radius:14px;padding:12px;margin-bottom:12px;color:#684c18}
.weather-15-wrap{overflow:auto;padding-bottom:4px}.weather-15-grid{display:grid;grid-template-columns:repeat(15,minmax(112px,1fr));gap:8px;min-width:1680px}.weather-15-day{border:1px solid #dce5ef;border-radius:13px;background:#fff;padding:10px;text-align:center}.weather-15-day b{display:block;font-size:11px;color:#526176}.weather-15-day strong{display:block;font-size:18px;color:#203a73;margin:7px 0}.weather-15-day small{font-size:10px;color:#667085;line-height:1.35}
.algorithm-final{display:grid;gap:16px}.algorithm-final .alg-hero{background:linear-gradient(135deg,#17345f,#284e82);color:#fff;border-radius:22px;padding:22px}.algorithm-final .alg-hero h3{margin:0 0 8px;color:#fff}.algorithm-final .alg-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.algorithm-final .alg-card{background:#fff;border:1px solid #dce4ee;border-radius:18px;padding:16px}.algorithm-final .alg-card h4{margin:0 0 10px;color:#203a73}.algorithm-final .alg-card ol,.algorithm-final .alg-card ul{margin:0;padding-left:19px;line-height:1.65}.algorithm-final .formula{font-family:Consolas,monospace;background:#f3f6fa;border:1px solid #dce4ee;border-radius:12px;padding:12px;line-height:1.55;overflow:auto}.score-demo-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.score-output{margin-top:12px;border:1px solid #cbd8e7;background:#f8fbff;border-radius:15px;padding:14px}.score-output .total{font-size:32px;font-weight:900;color:#203a73}.score-break{display:grid;grid-template-columns:1fr auto;gap:5px 12px;margin-top:10px;font-size:12px}.score-break b{text-align:right}
.meal-actions{display:flex;gap:6px;flex-wrap:wrap}.meal-table-advanced td{vertical-align:middle}.meal-table-advanced .meal-name{min-width:220px}.meal-table-advanced .diet-cell{min-width:120px}.archive-row{opacity:.58}
@media(max-width:1050px){.home-tool-grid,.diet-info-grid,.algorithm-final .alg-grid,.score-demo-grid,.quick-center-grid{grid-template-columns:1fr}}
</style>
<script id="final-diet-weather-script">
(function(){
  const previousEnsureState=window.ensureState;
  const previousRenderHome=window.renderHome;
  const previousRenderSettings=window.renderSettings;
  const previousRenderCreate=window.renderCreate;
  const previousRenderDraft=window.renderDraft;
  const previousSaveDraftPlan=window.saveDraftPlan;
  const previousScoreCandidate=window.scoreCandidate;
  const previousBuildMeal=window.buildMeal;
  const previousOpenReadyMenuPlanner=window.openReadyMenuPlanner;

  function persistFinal(render=true){try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){console.warn('Kayıt yapılamadı',e)}if(render&&typeof renderAll==='function')renderAll(false)}
  function textOfMeal(m){return norm([m?.name,m?.category,m?.subCategory,m?.group,m?.sourceCategory].filter(Boolean).join(' '))}
  function hasWord(t,re){return re.test(t)}
  function inferVegetarian(m){
    const t=textOfMeal(m);if(/\betsiz\b|vejetaryen/.test(t))return'yes';
    const animal=/\bdana\b|\bkuzu\b|\btavuk\b|\bhindi\b|\bbalik\b|\bhamsi\b|\blevrek\b|\bsomon\b|\balabalik\b|\bton baligi\b|\bkarides\b|\bmidye\b|\bkalamar\b|\betli\b|\bkiyma\b|\bkiymali\b|\bkofte\b|\bpastirma\b|\bsucuk\b|\bsosis\b|\biskembe\b|\bsakatat\b|\bciger\b|\bet suyu\b|\btavuk suyu\b|\bkemik suyu\b/;
    if(animal.test(t)||/dana eti|kuzu eti|tavuk yemekleri|hindi yemekleri|baliklar|sakatatlar|izgaralar/.test(t))return'no';
    if(/jelatin|jole/.test(t))return'review';
    if(/sebze ve zeytinyagli|salata|meyve|komposto|hosaf|pilavlar|icecek sut urunu|tatli|yumurta|peynir|yogurt|cacik|mercimek|nohut|fasulye|bezelye|mantar|ispanak|kabak|patlican|pirasa|brokoli|enginar/.test(t))return'yes';
    if(m?.category==='Çorba')return'review';
    return'review';
  }
  function ensureDietMetadata(force=false){
    let changed=false;(state.meals||[]).forEach(m=>{
      if(force||!m.vegetarianStatus){m.vegetarianStatus=inferVegetarian(m);changed=true}
      ['glutenStatus','crossContactRisk','celiacStatus','celiacScreeningNote','celiacScreeningSource'].forEach(k=>{if(k in m){delete m[k];changed=true}});
      if(typeof m.allergenNotes!=='string'){m.allergenNotes='';changed=true}
      if(typeof m.archived!=='boolean'){m.archived=false;changed=true}
    });
    const oldPlanCount=(state.plans||[]).length;
    state.plans=(state.plans||[]).filter(p=>!['celiac-strict','gluten-sensitive'].includes(p?.settings?.specialDiet));
    if(state.plans.length!==oldPlanCount)changed=true;
    if(['celiac-strict','gluten-sensitive'].includes(state.draft?.settings?.specialDiet)){state.draft=null;changed=true}
    if(changed)state.settings.dietSchemaVersion=3;return changed;
  }
  window.ensureState=function(){previousEnsureState();state.settings={dietSchemaVersion:0,...(state.settings||{})};const changed=ensureDietMetadata(false);if(changed)persistFinal(false)};
  window.ensureDietMetadata=ensureDietMetadata;
  window.ensureState();

  function vegLabel(v){return v==='yes'?'Uygun':v==='no'?'Uygun Değil':'Kontrol Gerekli'}
  function statusClass(v){return v==='yes'?'yes':v==='no'?'no':'review'}
  function dietTag(value,label){return `<span class="diet-status ${statusClass(value)}">${esc(label)}</span>`}
  function mealUsed(id){const checkMenu=m=>(m?.items||[]).includes(id);if(state.draft&&(state.draft.schedule||[]).some(d=>checkMenu(d.lunch)||checkMenu(d.dinner)))return true;return (state.plans||[]).some(p=>(p.schedule||[]).some(d=>checkMenu(d.lunch)||checkMenu(d.dinner)))}

  window.renderMeals=function(){
    ensureDietMetadata(false);
    const rows=(state.meals||[]).map(m=>`<tr class="${m.archived?'archive-row':''}" data-meal-row data-search="${esc(norm([m.name,m.category,m.subCategory,m.group,m.vegetarianStatus].join(' ')))}" data-cat="${esc(m.category)}"><td class="meal-name"><b>${esc(m.name)}</b><br><small class="muted">${esc(m.subCategory||'')} • ${esc(m.group||'')}</small></td><td>${esc(m.category)}</td><td>${Number.isFinite(+m.calorie)?Math.round(+m.calorie)+' kcal':'—'}</td><td class="diet-cell">${dietTag(m.vegetarianStatus,vegLabel(m.vegetarianStatus))}</td><td>${m.archived?'<span class="pill bad">Arşivli</span>':m.active?'<span class="pill ok">Aktif</span>':'<span class="pill warn">Pasif</span>'}</td><td><div class="meal-actions"><button class="btn small secondary" onclick="editMealAdvanced('${m.id}')">Düzenle</button><button class="btn small ${m.active?'amber':'green'}" onclick="toggleMealAdvanced('${m.id}')">${m.active?'Pasifleştir':'Aktifleştir'}</button><button class="btn small red" onclick="deleteMealAdvanced('${m.id}')">Sil</button></div></td></tr>`).join('');
    document.getElementById('meals').innerHTML=`<div class="card"><div class="cardTitle"><h3>Yemek Havuzu</h3><div class="actions"><button class="btn green" onclick="editMealAdvanced('')">＋ Yeni Yemek Ekle</button><button class="btn secondary" onclick="exportMealsCsv()">CSV Al</button></div></div><div class="notice">Vejetaryen uygunluk alanı otomatik ön sınıflandırmadır. Et suyu, tavuk suyu, jelatin ve benzeri gizli hayvansal içerikler reçeteden yönetici tarafından doğrulanmalıdır.</div><div class="form three"><div><label>Arama</label><input id="mealSearchAdvanced" oninput="filterMealRowsAdvanced()" placeholder="Yemek adı, tür veya vejetaryen uygunluğu ara"></div><div><label>Kategori</label><select id="mealCatAdvanced" onchange="filterMealRowsAdvanced()"><option value="">Tümü</option><option>Çorba</option><option>Ana Yemek</option><option>Yardımcı</option><option>Tamamlayıcı</option></select></div><div><label>Kayıt</label><input disabled value="${state.meals.length} yemek • ${state.meals.filter(x=>x.active&&!x.archived).length} aktif"></div></div><div class="tableWrap"><table class="meal-table-advanced"><thead><tr><th>Yemek</th><th>Kategori</th><th>Kalori</th><th>Vejetaryen</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  };
  window.filterMealRowsAdvanced=function(){const q=norm(document.getElementById('mealSearchAdvanced')?.value||''),cat=document.getElementById('mealCatAdvanced')?.value||'';document.querySelectorAll('[data-meal-row]').forEach(tr=>{tr.style.display=(!q||tr.dataset.search.includes(q))&&(!cat||tr.dataset.cat===cat)?'':'none'})};
  window.editMealAdvanced=function(id=''){
    const m=id?state.meals.find(x=>x.id===id):{id:'',name:'',category:'Ana Yemek',subCategory:'',group:'',sourceCategory:'Yönetici Ekledi',gram:'',calorie:'',weight:2,cost:2,repeatDays:7,active:true,vegetarianStatus:'review',allergenNotes:''};if(!m)return;
    openModal(`<div class="modalHead"><div><h3>${id?'Yemek Kaydını Düzenle':'Yeni Yemek Ekle'}</h3><p class="muted">Vejetaryen uygunluğunu reçete ve gerçek malzeme içeriğine göre kesinleştirin.</p></div><button class="close" onclick="closeModal()">✕</button></div><div class="form three"><div><label>Yemek adı</label><input id="amName" value="${esc(m.name)}"></div><div><label>Kategori</label><select id="amCat"><option ${m.category==='Çorba'?'selected':''}>Çorba</option><option ${m.category==='Ana Yemek'?'selected':''}>Ana Yemek</option><option ${m.category==='Yardımcı'?'selected':''}>Yardımcı</option><option ${m.category==='Tamamlayıcı'?'selected':''}>Tamamlayıcı</option></select></div><div><label>Alt kategori</label><input id="amSub" value="${esc(m.subCategory||'')}"></div><div><label>Grup</label><input id="amGroup" value="${esc(m.group||'')}"></div><div><label>Porsiyon (g/ml)</label><input id="amGram" type="number" value="${esc(m.gram||'')}"></div><div><label>Kalori</label><input id="amCal" type="number" value="${esc(m.calorie||'')}"></div><div><label>Ağırlık puanı</label><input id="amWeight" type="number" min="1" max="5" value="${m.weight||2}"></div><div><label>Maliyet puanı</label><input id="amCost" type="number" min="1" max="10" value="${m.cost||2}"></div><div><label>Tekrar süresi (gün)</label><input id="amRep" type="number" min="1" max="60" value="${m.repeatDays||7}"></div><div><label>Vejetaryen uygunluğu</label><select id="amVeg"><option value="yes" ${m.vegetarianStatus==='yes'?'selected':''}>Uygun</option><option value="no" ${m.vegetarianStatus==='no'?'selected':''}>Uygun Değil</option><option value="review" ${m.vegetarianStatus==='review'?'selected':''}>Kontrol Gerekli</option></select></div><div class="full"><label>İçerik ve reçete notu</label><textarea id="amAllergen" placeholder="Et suyu, tavuk suyu, jelatin veya diğer gizli hayvansal içerikler">${esc(m.allergenNotes||'')}</textarea></div></div><div class="actions" style="margin-top:14px"><button class="btn green" onclick="saveMealAdvanced('${id}',false)">Kaydet</button>${id?`<button class="btn secondary" onclick="saveMealAdvanced('${id}',true)">Yeni Kayıt Olarak Ekle</button><button class="btn red" onclick="deleteMealAdvanced('${id}',true)">Sil</button>`:''}<button class="btn secondary" onclick="closeModal()">Vazgeç</button></div>`);
  };
  window.saveMealAdvanced=function(id,asNew=false){
    const name=(document.getElementById('amName')?.value||'').trim();if(!name){toast('Yemek adı zorunludur.');return}
    let m=!asNew&&id?state.meals.find(x=>x.id===id):null;if(!m){m={id:'m_'+uid(),active:true,ratingAvg:0,ratingCount:0,sourceCategory:'Yönetici Ekledi',archived:false};state.meals.push(m)}
    Object.assign(m,{name,category:val('amCat'),subCategory:val('amSub'),group:val('amGroup'),gram:+val('amGram')||'',calorie:+val('amCal')||'',weight:+val('amWeight')||2,cost:+val('amCost')||2,repeatDays:+val('amRep')||7,vegetarianStatus:val('amVeg'),allergenNotes:val('amAllergen'),archived:false});
    ['glutenStatus','crossContactRisk','celiacStatus','celiacScreeningNote','celiacScreeningSource'].forEach(k=>delete m[k]);
    if(typeof invalidateStateNormalization==='function')invalidateStateNormalization();if(typeof invalidateMealSuggestIndex==='function')invalidateMealSuggestIndex();persistFinal(false);closeModal();renderMeals();toast(asNew?'Yeni yemek kaydı eklendi.':'Yemek kaydı güncellendi.','ok');
  };
  window.toggleMealAdvanced=function(id){const m=state.meals.find(x=>x.id===id);if(!m)return;m.active=!m.active;if(m.active)m.archived=false;if(typeof invalidateMealSuggestIndex==='function')invalidateMealSuggestIndex();persistFinal(false);renderMeals();toast('Yemek durumu güncellendi.','ok')};
  window.deleteMealAdvanced=function(id,fromModal=false){const m=state.meals.find(x=>x.id===id);if(!m)return;if(!confirm(`“${m.name}” kaydı silinsin mi?`))return;if(mealUsed(id)){m.active=false;m.archived=true;if(typeof invalidateMealSuggestIndex==='function')invalidateMealSuggestIndex();persistFinal(false);if(fromModal)closeModal();renderMeals();toast('Yemek geçmiş çizelgelerde kullanıldığı için kalıcı silinmedi; arşivlendi.')}else{state.meals=state.meals.filter(x=>x.id!==id);if(typeof invalidateMealSuggestIndex==='function')invalidateMealSuggestIndex();persistFinal(false);if(fromModal)closeModal();renderMeals();toast('Yemek kaydı silindi.','ok')}};

  const QUICK_MENU_SLOT_META=[
    {label:'1. ürün',expected:'Çorba',hint:'Çorba'},
    {label:'2. ürün',expected:'Ana Yemek',hint:'Ana yemek'},
    {label:'3. ürün',expected:'Yardımcı',hint:'Pilav, makarna veya yardımcı'},
    {label:'4. ürün',expected:'Tamamlayıcı',hint:'Ayran, cacık, tatlı veya tamamlayıcı'}
  ];
  function exactMealByName(name){const n=norm(name);return (state.meals||[]).find(m=>m.active&&!m.archived&&norm(m.name)===n)||null}
  function quickMenuCalories(items){return(items||[]).map(exactMealByName).filter(Boolean).reduce((sum,m)=>sum+(Number.isFinite(+m.calorie)?+m.calorie:0),0)}
  function quickMenuListHtml(){return (state.quickMenus||[]).length?(state.quickMenus||[]).map(q=>{const names=safeMealNames(q.items),cal=quickMenuCalories(names),known=names.filter(exactMealByName).length;return `<div class="quick-list-item"><h4>${esc(q.name)}</h4><p>${names.map(esc).join(' • ')} • Salata Bar</p><div class="quick-list-meta"><span>${known}/${names.length} havuz eşleşmesi</span><span>${cal?Math.round(cal)+' kcal':'Kalori belirsiz'}</span></div><p>${esc(q.note||'')}</p><div class="actions"><button class="btn small secondary" onclick="openQuickMenuCenter('${q.id}')">Düzenle</button><button class="btn small red" onclick="deleteQuickMenuCenter('${q.id}')">Sil</button></div></div>`}).join(''):'<p class="muted">Henüz hazır menü bulunmuyor.</p>'}
  function quickMenuFieldHtml(i,value=''){const meta=QUICK_MENU_SLOT_META[i];return `<div class="full qm-meal-field" id="hqField${i}"><label for="hqItem${i}"><span>${meta.label}</span><span class="qm-slot-badge">${meta.expected}</span></label><div class="qm-input-wrap"><input id="hqItem${i}" value="${esc(value)}" placeholder="${esc(meta.hint)}" autocomplete="off" role="combobox" aria-autocomplete="list" aria-controls="hqSug${i}" onfocus="quickMenuSuggest(${i},true)" oninput="quickMenuSuggest(${i});quickMenuReview()" onkeydown="quickMenuSuggestKey(event,${i})" onblur="setTimeout(()=>hideQuickMenuSuggest(${i}),180)"><span class="qm-input-icon">⌕</span></div><small id="hqState${i}" class="qm-input-state">Yazmaya başlayın; yemek havuzundan öneriler gösterilir.</small><div id="hqSug${i}" class="didyou-box" role="listbox"></div></div>`}
  window.hideQuickMenuSuggest=function(i){document.getElementById('hqSug'+i)?.classList.remove('show')};
  window.closeOtherQuickMenuSuggestions=function(i){document.querySelectorAll('.didyou-box.show').forEach(box=>{if(box.id!=='hqSug'+i)box.classList.remove('show')})};
  window.quickMenuSuggest=function(i,immediate=false){
    clearTimeout(window._qmSuggestTimer?.[i]);
    window._qmSuggestTimer=window._qmSuggestTimer||{};
    const run=()=>{
      const input=document.getElementById('hqItem'+i);
      const box=document.getElementById('hqSug'+i);
      if(!input||!box)return;
      closeOtherQuickMenuSuggestions(i);
      const expected=QUICK_MENU_SLOT_META[i]?.expected||'';
      const query=input.value.trim();
      const arr=suggestMealsAdvanced(query,expected,8);
      const exact=exactMealByName(query);
      const head=query&&!exact?'Bunu mu demek istediniz?':query?'Benzer yemekler':'Havuzdan seçim önerileri';
      const options=arr.map(m=>'<button type="button" class="didyou-option" role="option" onclick="chooseQuickMenuSuggestion('+i+',\''+encodeURIComponent(m.name)+'\')"><span><b>'+esc(m.name)+'</b><small>'+esc(m.category)+(m.subCategory?' • '+esc(m.subCategory):'')+'</small></span><span class="meal-kcal">'+(Number.isFinite(+m.calorie)?Math.round(+m.calorie)+' kcal':'—')+'</span></button>').join('');
      box.innerHTML='<div class="didyou-head">'+head+'</div>'+(options||'<div class="didyou-head">Eşleşme bulunamadı; serbest metin olarak kaydedebilirsiniz.</div>');
      box.classList.add('show');
    };
    if(immediate)run();else window._qmSuggestTimer[i]=setTimeout(run,110);
  };
  window.chooseQuickMenuSuggestion=function(i,encoded){const input=document.getElementById('hqItem'+i);if(!input)return;input.value=decodeURIComponent(encoded);hideQuickMenuSuggest(i);quickMenuReview();if(i<3)document.getElementById('hqItem'+(i+1))?.focus();else input.focus()};
  window.quickMenuSuggestKey=function(e,i){const box=document.getElementById('hqSug'+i),buttons=[...(box?.querySelectorAll('.didyou-option')||[])];if(e.key==='Escape'){hideQuickMenuSuggest(i);return}if(!buttons.length||!box?.classList.contains('show'))return;let active=buttons.findIndex(b=>b.classList.contains('keyboard-active'));if(e.key==='ArrowDown'){e.preventDefault();active=(active+1)%buttons.length}else if(e.key==='ArrowUp'){e.preventDefault();active=active<=0?buttons.length-1:active-1}else if(e.key==='Enter'&&active>=0){e.preventDefault();buttons[active].click();return}else return;buttons.forEach((b,n)=>b.classList.toggle('keyboard-active',n===active));buttons[active]?.scrollIntoView({block:'nearest'})};
  window.quickMenuReview=function(){
    const values=[0,1,2,3].map(i=>(document.getElementById('hqItem'+i)?.value||'').trim());
    const normalized=values.map(norm);
    const duplicates=new Set(normalized.filter((n,i)=>n&&normalized.indexOf(n)!==i));
    const chips=[];
    let total=0,known=0;
    values.forEach((value,i)=>{
      const field=document.getElementById('hqField'+i);
      const stateEl=document.getElementById('hqState'+i);
      const meal=exactMealByName(value);
      const expected=QUICK_MENU_SLOT_META[i].expected;
      field?.classList.remove('has-warning','has-error');
      if(!value){
        if(stateEl){
          stateEl.className='qm-input-state';
          stateEl.textContent='Yazmaya başlayın; yemek havuzundan öneriler gösterilir.';
        }
        return;
      }
      if(duplicates.has(norm(value))){
        field?.classList.add('has-error');
        if(stateEl){
          stateEl.className='qm-input-state bad';
          stateEl.textContent='Aynı yemek menüde birden fazla kez seçildi.';
        }
        chips.push('<span class="qm-review-chip bad">Tekrar: '+esc(value)+'</span>');
        return;
      }
      if(!meal){
        field?.classList.add('has-warning');
        if(stateEl){
          stateEl.className='qm-input-state warn';
          stateEl.textContent='Yemek havuzunda birebir eşleşme yok; önerilerden seçim yapabilirsiniz.';
        }
        chips.push('<span class="qm-review-chip warn">Havuz dışı: '+esc(value)+'</span>');
        return;
      }
      known++;
      if(Number.isFinite(+meal.calorie))total+=+meal.calorie;
      const mismatch=meal.category!==expected;
      if(mismatch){
        field?.classList.add('has-warning');
        if(stateEl){
          stateEl.className='qm-input-state warn';
          stateEl.textContent='Havuz eşleşti; kategori '+meal.category+'. Beklenen alan: '+expected+'.';
        }
        chips.push('<span class="qm-review-chip warn">'+esc(meal.name)+': '+esc(meal.category)+'</span>');
      }else{
        if(stateEl){
          stateEl.className='qm-input-state ok';
          stateEl.textContent='Havuz eşleşmesi bulundu'+(Number.isFinite(+meal.calorie)?' • '+Math.round(+meal.calorie)+' kcal':'')+'.';
        }
        chips.push('<span class="qm-review-chip">✓ '+esc(meal.name)+'</span>');
      }
    });
    const review=document.getElementById('quickMenuLiveReview');
    if(review){
      review.innerHTML='<h5>Canlı menü kontrolü</h5><div class="qm-review-list">'+(chips.join('')||'<span class="qm-review-chip">Henüz ürün seçilmedi</span>')+'</div><div class="qm-summary-line">'+known+' ürün yemek havuzuyla eşleşiyor'+(total?' • Bilinen toplam: '+Math.round(total)+' kcal':'')+'. Salata Bar toplam kaloriye dahil edilmez.</div>';
    }
  };

  window.fetchPlanWeather=async function(silent=false){const location=(document.getElementById('weatherLocation')?.value||state.settings.weatherLocation||'Ankara').trim();if(!location){toast('Hava durumu için şehir veya ilçe yazın.');return false}try{if(!silent&&typeof showCookingLoader==='function')showCookingLoader('15 günlük hava tahmini alınıyor…');const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(location)}&count=5&language=tr&format=json`);if(!geo.ok)throw new Error('Konum servisine ulaşılamadı.');const gj=await geo.json(),place=gj.results?.[0];if(!place)throw new Error('Konum bulunamadı.');const url=`https://api.open-meteo.com/v1/forecast?latitude=${place.latitude}&longitude=${place.longitude}&daily=weather_code,temperature_2m_max,temperature_2m_min,temperature_2m_mean,precipitation_sum&timezone=auto&forecast_days=15`;const res=await fetch(url);if(!res.ok)throw new Error('Hava tahmini alınamadı.');const j=await res.json(),daily=j.daily||{},days=(daily.time||[]).slice(0,15).map((date,i)=>({date,min:+daily.temperature_2m_min?.[i]||0,max:+daily.temperature_2m_max?.[i]||0,mean:Number.isFinite(+daily.temperature_2m_mean?.[i])?+daily.temperature_2m_mean[i]:((+daily.temperature_2m_min?.[i]||0)+(+daily.temperature_2m_max?.[i]||0))/2,weatherCode:+daily.weather_code?.[i]||0,precipitation:+daily.precipitation_sum?.[i]||0}));state.weatherData={source:'Open-Meteo',location:[place.name,place.admin1,place.country].filter(Boolean).join(', '),latitude:place.latitude,longitude:place.longitude,timezone:j.timezone||'',fetchedAt:new Date().toISOString(),days};state.settings.weatherLocation=location;state.settings.weatherLatitude=place.latitude;state.settings.weatherLongitude=place.longitude;persistFinal(false);updateWeatherPanel();if(!silent)toast('15 günlük hava tahmini planlamaya yüklendi.','ok');return true}catch(err){console.error(err);if(!silent)toast(`${err.message} Mevsimsel profil kullanılacak.`);return false}finally{if(!silen
