function planSearchText(plan){return String([plan?.name,plan?.start,plan?.end,plan?.status,plan?.planType,plan?.specialDiet].filter(Boolean).join(' ')).toLocaleLowerCase('tr-TR')}
window.setPlanListQuery=function(value){__tbmmPlanListQuery=String(value||'').toLocaleLowerCase('tr-TR').trim();__tbmmPlanListPage=1;window.renderPlans?.()};
window.goPlanListPage=function(page){__tbmmPlanListPage=Math.max(1,Number(page)||1);window.renderPlans?.();document.getElementById('plans')?.scrollIntoView({block:'start'})};
window.renderPlans=function(){
 const root=document.getElementById('plans');if(!root)return;
 let admin=false;try{admin=typeof isAdmin==='function'?isAdmin():!!sessionStorage.getItem('tabildotLoggedIn')}catch(_){}
 const all=[...(state?.plans||[])].sort((a,b)=>String(b.savedAt||b.createdAt||'').localeCompare(String(a.savedAt||a.createdAt||'')));
 const filtered=__tbmmPlanListQuery?all.filter(p=>planSearchText(p).includes(__tbmmPlanListQuery)):all;
 const pageSize=12,totalPages=Math.max(1,Math.ceil(filtered.length/pageSize));__tbmmPlanListPage=Math.min(__tbmmPlanListPage,totalPages);
 const start=(__tbmmPlanListPage-1)*pageSize,plans=filtered.slice(start,start+pageSize);
 const H=v=>typeof esc==='function'?esc(v):String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
 const cards=plans.map(p=>{const veg=typeof isVegPlan==='function'?isVegPlan(p):p?.planType==='vegetarian',active=state.activePlanId===p.id&&!veg,type=typeof planTypeLabel==='function'?planTypeLabel(p):(veg?'Vejetaryen':'Normal Tabildot'),range=typeof planRange==='function'?planRange(p):`${p.start||''} - ${p.end||''}`,quality=fastPlanQuality(p);return `<div class="planCard ${active?'active-plan-card':''}"><div class="planCardHead"><div><h4 style="margin:0 0 6px">${H(p.name||'Çizelge')}</h4><span class="pill ${active?'ok':'warn'}">${active?'Aktif Plan':veg?'Ayrı Vejetaryen Plan':'Arşiv Plan'}</span> <span class="pill">${H(type)}</span> <span class="pill">${p.locked?'Kilitli':'Düzenlenebilir'}</span><p class="muted">${H(range)} • v${Number(p.currentVersion)||1}</p></div><b>${quality}</b></div><div class="planCardActions">${!veg?`<button class="btn small secondary" ${active?'disabled':''} onclick="makeActive('${p.id}')">${active?'✓ Aktif Çizelge':'Aktif Yap'}</button>`:''}<button class="btn small secondary" onclick="showPlanPreview('${p.id}')">Görüntüle</button>${admin?`<button class="btn small green" onclick="editSavedPlan('${p.id}')">Son Halini Düzenle</button><button class="btn small amber" onclick="toggleLock('${p.id}')">${p.locked?'Kilidi Aç':'Kilitle'}</button><button class="btn small red" onclick="deletePlan('${p.id}')">Sil</button>`:''}</div></div>`}).join('');
 root.innerHTML=`<div class="card"><div class="cardTitle"><div><h3>Tüm Planlar</h3><p class="muted" style="margin:4px 0 0">Performans için çizelgeler sayfalanır; ayrıntılı menü yalnızca “Görüntüle” seçildiğinde hazırlanır.</p></div>${admin?'<button class="btn green" onclick="showSection(\'create\')">Yeni Plan</button>':''}</div><div class="plan-list-toolbar"><div><label>Çizelge ara</label><input value="${H(__tbmmPlanListQuery)}" oninput="setPlanListQuery(this.value)" placeholder="Plan adı, tarih veya tür"></div><span class="pill">${filtered.length} çizelge</span></div>${cards?`<div class="planCards">${cards}</div>`:'<p class="muted">Eşleşen kayıtlı plan yok.</p>'}${totalPages>1?`<div class="plan-list-pager"><button class="btn small secondary" onclick="goPlanListPage(${__tbmmPlanListPage-1})" ${__tbmmPlanListPage<=1?'disabled':''}>‹ Önceki</button><span>Sayfa ${__tbmmPlanListPage} / ${totalPages}</span><button class="btn small secondary" onclick="goPlanListPage(${__tbmmPlanListPage+1})" ${__tbmmPlanListPage>=totalPages?'disabled':''}>Sonraki ›</button></div>`:''}</div>`;
};
const previousRenderSettingsStable=window.renderSettings;
if(typeof previousRenderSettingsStable==='function')window.renderSettings=function(){const r=previousRenderSettingsStable.apply(this,arguments);injectSyncCard();return r};
window.tbmmFirebaseSyncNow=async()=>{const ok=connected||await startFirebase(true);return ok?pushCloud(true):false};
window.tbmmFirebasePull=()=>pullCloud(true);
window.tbmmFirebaseReconnect=()=>startFirebase(true);
window.tbmmFirebaseSaveConfig=function(){
 const url=normalizeUrl(document.getElementById('tbmmFirebaseUrl')?.value||PRIMARY_DB_URL);
 const key=String(document.getElementById('tbmmFirebaseAppCheckKey')?.value||'').trim();
 if(url&&!/^https:\/\/[a-z0-9.-]+(?:firebaseio\.com|firebasedatabase\.app)$/i.test(url)){if(typeof toast==='function')toast('Geçerli bir Firebase Realtime Database adresi girin.');return}
 const oldKey=safeGet(localStorage,APP_CHECK_KEY)||'';
 safeSet(localStorage,URL_KEY,url||PRIMARY_DB_URL);if(key)safeSet(localStorage,APP_CHECK_KEY,key);else safeRemove(localStorage,APP_CHECK_KEY);
 if(key!==oldKey){if(typeof toast==='function')toast('App Check ayarı kaydedildi. Bağlantının temiz başlaması için sayfa yenileniyor.','ok');setTimeout(()=>location.reload(),250);return}
 startFirebase(true);
};
const previousShowSectionStable=window.showSection;if(typeof previousShowSectionStable==='function')window.showSection=function(id){const r=previousShowSectionStable.apply(this,arguments);const target=document.getElementById(id);const tidy=()=>{try{window.__tbmmRemoveSaladPlaceholders?.(target||document);window.__tbmmAnnotateActionTips?.(target||document)}catch(_){}};if('requestIdleCallback'in window)requestIdleCallback(tidy,{timeout:250});else requestAnimationFrame(tidy);return r};
const previousSaveStable=window.save;if(typeof previousSaveStable==='function')window.save=function(){const r=previousSaveStable.apply(this,arguments);markLocalChange();return r};
const previousPersistStable=window.persistFinal;if(typeof previousPersistStable==='function')window.persistFinal=function(){const r=previousPersistStable.apply(this,arguments);markLocalChange();return r};
const previousPersistFastStable=window.persistFast;if(typeof previousPersistFastStable==='function')window.persistFast=function(){const r=previousPersistFastStable.apply(this,arguments);markLocalChange();return r};
const previousShowAppStable=window.showApp;if(typeof previousShowAppStable==='function')window.showApp=function(){const r=previousShowAppStable.apply(this,arguments);setTimeout(()=>startFirebase(false),250);return r};
window.addEventListener('online',()=>startFirebase(true));
window.addEventListener('offline',()=>{connected=false;setStatus('warn','Çevrimdışı','İnternet bağlantısı yok; yerel kayıt kullanılmaya devam ediyor.')});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&navigator.onLine&&!connected)startFirebase(false);else if(document.visibilityState==='hidden'&&syncMeta.dirty)queuePush()});
window.addEventListener('error',e=>console.error('TBMM uygulama hatası:',e.error||e.message));
window.addEventListener('unhandledrejection',e=>console.error('TBMM beklenmeyen işlem hatası:',e.reason));
window.__tbmmFirebaseDiagnostics=()=>({connected,status:{...status},dirty:!!syncMeta.dirty,lastSyncedAt:syncMeta.lastSyncedAt||0,databaseURL:safeGet(localStorage,URL_KEY)||PRIMARY_DB_URL,appCheckConfigured:!!safeGet(localStorage,APP_CHECK_KEY)});
function scheduleInitialFirebase(){
 const logged=!!safeGet(sessionStorage,'tabildotLoggedIn');if(!logged)return;
 const run=()=>startFirebase(false);if('requestIdleCallback'in window)requestIdleCallback(run,{timeout:3500});else setTimeout(run,900);
}
function bootStable(){cleanupOldRuntime();setTimeout(()=>{try{window.hideCookingLoader?.()}catch(_){}},900);scheduleInitialFirebase();if(document.getElementById('settings')?.classList.contains('active'))injectSyncCard()}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bootStable,{once:true});else bootStable();
})();
</script>
