<style>

.grid{display:grid;gap:16px}.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}

.tableWrap{overflow:auto}.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;background:#edf3fb;color:#2c4d7b;font-size:12px;font-weight:900;border:1px solid #d7e2f1;margin:2px}.pill.ok{background:#e8f3ee;color:#286747}.pill.warn{background:#fff4de;color:#8a631c}.pill.bad{background:#fae9e4;color:#963d30}

.chartRow{display:grid;grid-template-columns:220px 1fr 60px;gap:10px;align-items:center;margin:8px 0}.notice{border-left:5px solid var(--blue);background:#f8fbff;border-radius:12px;padding:12px;margin:10px 0;line-height:1.55}.warning{border-left-color:var(--red);background:#fff7f7}.oknote{border-left-color:var(--green);background:#f6fbf8}
.guide p,.guide li{line-height:1.75}.guide .step{border:1px solid #e2e8f0;background:#fbfdff;border-radius:16px;padding:14px;margin:12px 0}
.printOnly{display:none}
@media(max-width:1100px){.app{grid-template-columns:1fr}aside{position:relative;height:auto}.form,.form.two,.form.three,.cols2,.cols3,.cols4,.checkGrid{grid-template-columns:1fr}.top{flex-direction:column}.chartRow{grid-template-columns:1fr}.actions{justify-content:flex-start}}

  table{border-collapse:collapse;border-spacing:0}td,th{border:1px solid #94a3b8;border-radius:0;background:#fff}th{background:#eaf1f8}
}

function clone(x){return JSON.parse(JSON.stringify(x))}
function uid(){return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function today(){return new Date().toISOString().slice(0,10)}
function addDays(iso,n){let d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function diffDays(a,b){return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000)}
function fmt(iso){if(!iso)return '';let d=new Date(iso+'T12:00:00');return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()+' '+DAYS[d.getDay()]}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function norm(s){return String(s||'').toLocaleLowerCase('tr-TR').replace(/[ıİ]/g,'i').replace(/[ğ]/g,'g').replace(/[ü]/g,'u').replace(/[ş]/g,'s').replace(/[ö]/g,'o').replace(/[ç]/g,'c').replace(/[^a-z0-9]+/g,' ').trim()}
let __tbmmSaveTimer=0,__tbmmRenderTimer=0;
function __tbmmSerializeState(){
 return JSON.stringify(state,(key,value)=>{
  if(key==='versionHistory'&&Array.isArray(value)&&value.length>20)return value.slice(-20);
  if(key==='logs'&&Array.isArray(value)&&value.length>500)return value.slice(-500);
  if(typeof key==='string'&&key.startsWith('__tbmm'))return undefined;
  return value;
 });
}
function __tbmmFlushSave(){
 __tbmmSaveTimer=0;
 try{localStorage.setItem(STORE_KEY,__tbmmSerializeState());}
 catch(e){console.warn('Yerel kayıt yapılamadı:',e);try{sessionStorage.setItem('tbmmStorageWarning',String(e?.name||'storage_error'))}catch(_){}}
}

function load(){

  const raw=localStorage.getItem(STORE_KEY);

   const parsed=JSON.parse(raw);
   if(parsed&&typeof parsed==='object')state={...state,...parsed};
  }
 }catch(e){
  console.warn('Kayıtlı veri okunamadı, varsayılan ayarlar kullanılacak:',e);

function datesBetween(start,end){let n=diffDays(start,end);let arr=[];for(let i=0;i<=n;i++)arr.push(addDays(start,i));return arr}
function rangesIntersect(a1,a2,b1,b2){return !(a2<b1||b2<a1)}
function getMeal(id){return state.meals.find(m=>m.id===id)}
function mealName(id){return getMeal(id)?.name||id||''}
function activeMeals(cat){return state.meals.filter(m=>m.active&&(!cat||m.category===cat))}

function ratingOf(m){return m.ratingCount?m.ratingAvg:3}

 noRepeatMain:true,noRepeatSoup:true,noSameGroupBackToBack:true,noTwoMain:true,avoidHeavyDinner:true,considerSurvey:true,preferVariety:true,balancedLunchDinner:true,limitDessert:true,limitAyran:true,avoidSameHelper:true

 start:document.getElementById('startDate').value,end:document.getElementById('endDate').value,

function validateOptions(o){
 if(!o.start||!o.end)return 'Başlangıç ve bitiş tarihi seçilmelidir.';
 if(o.end<o.start)return 'Bitiş tarihi başlangıç tarihinden önce olamaz.';
 if(diffDays(o.start,o.end)>62)return 'Tek seferde en fazla 63 günlük plan oluşturabilirsiniz.';
 let conflict=state.plans.find(p=>rangesIntersect(o.start,o.end,p.start,p.end));
 if(conflict)return `Seçilen tarih aralığı "${conflict.name}" planıyla çakışıyor. Önce farklı tarih seçin veya eski planı silin.`;
 return ''
}

function askSameDaysAndGenerate(o){
 let dates=datesBetween(o.start,o.end);
 openModal(`<div class="modalHead"><div><h3>Öğle ve akşam aynı olacak günler</h3><p class="muted">Yalnızca seçtiğiniz günlerde öğle ve akşam menüsü aynı oluşturulur.</p></div><button class="close" onclick="closeModal()">✕</button></div>
 <div class="checkGrid">${dates.map(d=>`<label class="checkLine"><input type="checkbox" data-sameday="${d}"><div><b>${fmt(d)}</b><small>Bu gün öğle ve akşam aynı olsun.</small></div></label>`).join('')}</div>
 <div class="actions" style="margin-top:14px"><button class="btn green" onclick="generateWithAskedDays()">Devam Et</button><button class="btn secondary" onclick="closeModal()">Vazgeç</button></div>`);
 window._pendingOptions=o;
}
function generateWithAskedDays(){let set={};document.querySelectorAll('[data-sameday]').forEach(x=>set[x.dataset.sameday]=x.checked);let o=window._pendingOptions;o.sameDays=set;closeModal();createDraft(o)}
function startPlanGeneration(){
 let o=formOptions(), err=validateOptions(o);if(err){toast(err);return}
 if(o.sameMode==='ask'){askSameDaysAndGenerate(o);return}
 createDraft(o);
}
function createDraft(o){
 let schedule=[];let usage={};let dessertLeft=Math.ceil((datesBetween(o.start,o.end).length/7)*(o.includeDessert?o.dessertCount:0));let ayranLeft=Math.ceil((datesBetween(o.start,o.end).length/7)*(o.includeAyran?o.ayranCount:0));let dates=datesBetween(o.start,o.end);
 dates.forEach((d,idx)=>{
   let lunch=buildMeal(d,'Öğle',o,usage,{dessertLeft,ayranLeft,idx,total:dates.length});
   registerUsage(lunch,usage);
   if(lunch.hasDessert)dessertLeft--; if(lunch.hasAyran)ayranLeft--;
   let same=o.sameMode==='same'||(o.sameMode==='ask'&&o.sameDays&&o.sameDays[d]);
   let dinner=same?cloneMeal(lunch):buildMeal(d,'Akşam',o,usage,{dessertLeft,ayranLeft,idx,total:dates.length,lunch});
   if(!same){registerUsage(dinner,usage); if(dinner.hasDessert)dessertLeft--; if(dinner.hasAyran)ayranLeft--;}
   schedule.push({date:d,day:DAYS[new Date(d+'T12:00:00').getDay()],lunch,dinner});
 });
 state.draft={id:uid(),name:`Yemek Planı ${fmt(o.start)} - ${fmt(o.end)}`,start:o.start,end:o.end,createdAt:new Date().toISOString(),settings:o,schedule,changeLog:[],status:'Taslak'};
 renderAll();showSection('create');toast('Taslak plan oluşturuldu. Kalıcı kayıt için Yemek Planı Kaydet butonuna basın.','ok');
}
function cloneMeal(m){let c=clone(m);c.notes=[...(c.notes||[]),'Öğle menüsü ile aynı oluşturuldu.'];return c}
function scoreCandidate(m,slot,o,usage,ctx){
 let score=50;
 if(o.mode==='Memnuniyet Odaklı')score+=ratingOf(m)*8;
 if(o.mode==='Hafif Menü')score-=m.weight*7;
 if(o.rules.preferVariety)score-=(usage[m.id]||0)*18;
 if(o.rules.noSameGroupBackToBack)score-=(usage['g:'+m.group]||0)*8;
 if(slot==='Akşam'&&o.rules.avoidHeavyDinner)score-=m.weight*5;
 score+=Math.random()*8;
 return score;
}
function pick(list,slot,o,usage,ctx,exclude=[]){
 let candidates=list.filter(m=>m.active&&!exclude.includes(m.id));
 if(!candidates.length)candidates=list.filter(m=>m.active);
 candidates=candidates.map(m=>({m,score:scoreCandidate(m,slot,o,usage,ctx)})).sort((a,b)=>b.score-a.score);
 return candidates[0]?.m||null;
}
function shouldUse(kind,slot,o,ctx){
 if(kind==='dessert'){if(!o.includeDessert||ctx.dessertLeft<=0)return false;return (ctx.idx%Math.max(1,Math.floor(ctx.total/Math.max(1,ctx.dessertLeft)))===0)||ctx.idx>=ctx.total-ctx.dessertLeft}
 if(kind==='ayran'){if(!o.includeAyran||ctx.ayranLeft<=0)return false;if(o.ayranSlot==='lunch'&&slot!=='Öğle')return false;if(o.ayranSlot==='dinner'&&slot!=='Akşam')return false;return (ctx.idx%Math.max(1,Math.floor(ctx.total/Math.max(1,ctx.ayranLeft)))===0)||ctx.idx>=ctx.total-ctx.ayranLeft}
 return false
}
function buildMeal(date,slot,o,usage,ctx){
 if(o.quickMenuId){let qm=null;if(o.quickMenuId==='rotate'){let list=state.quickMenus||[];if(list.length)qm=list[(ctx.idx+(slot==='Akşam'?1:0))%list.length];}else qm=findQuickMenu(o.quickMenuId);if(qm){let m=quickMenuToMenu(qm);m.notes=[`Hazır menü kullanıldı: ${qm.name}`];return m;}}
 let soup=pick(activeMeals('Çorba'),slot,o,usage,ctx);
 let main=pick(activeMeals('Ana Yemek'),slot,o,usage,ctx);
 let sideList=activeMeals('Yardımcı').filter(m=>m.category!=='Ana Yemek');
 let side=pick(sideList,slot,o,usage,ctx);
 let extra=null, notes=[];
 let hasDessert=false,hasAyran=false;
 if(shouldUse('ayran',slot,o,ctx)){extra=state.meals.find(m=>m.name==='Ayran');hasAyran=true;}
 else if(shouldUse('dessert',slot,o,ctx)){extra=pick(activeMeals('Tamamlayıcı').filter(m=>m.subCategory==='Tatlı'),slot,o,usage,ctx);hasDessert=true;}
 else if(o.includeSalad){extra=pick(activeMeals('Tamamlayıcı').filter(m=>m.subCategory==='Salata'),slot,o,usage,ctx);}
 else {extra=pick(activeMeals('Tamamlayıcı').filter(m=>!['Tatlı','Salata','Ayran'].includes(m.subCategory)),slot,o,usage,ctx);}
 if(!extra) extra=pick(activeMeals('Tamamlayıcı').filter(m=>m.name!=='Ayran'),slot,o,usage,ctx);
 let items=[soup,main,side,extra].filter(Boolean).map(m=>m.id);
 // Kesin güvence: otomatik üretimde birden fazla ana yemek olmasın.
 let mains=items.map(getMeal).filter(m=>m&&m.category==='Ana Yemek');
 if(mains.length>1){items=items.filter(id=>id===main.id||getMeal(id).category!=='Ana Yemek');notes.push('İki ana yemek oluşmaması için yardımcı seçim düzeltildi.')}
 let cost=items.map(getMeal).filter(Boolean).reduce((a,m)=>a+(m.cost||0),0);
 let weight=items.map(getMeal).filter(Boolean).reduce((a,m)=>a+(m.weight||0),0);
 return {items,manualItems:null,fixed:'Salata Bar',score:Math.max(50,100-cost*2-weight),cost,weight,notes,hasDessert,hasAyran,manual:false};
}
function registerUsage(menu,usage){(menu.items||[]).forEach(id=>{let m=getMeal(id);usage[id]=(usage[id]||0)+1;if(m)usage['g:'+m.group]=(usage['g:'+m.group]||0)+1})}
function renderDraft(){
 let el=document.getElementById('draftArea');let st=document.getElementById('draftState');if(!el)return;
 if(!state.draft){el.innerHTML='<p class="muted">Henüz taslak oluşturulmadı.</p>';if(st)st.textContent='Taslak yok';return}
 if(st)st.textContent=`${fmt(state.draft.start)} - ${fmt(state.draft.end)} • Kaydedilmedi`;
 el.innerHTML=renderPlanTable(state.draft,true)+`<div class="notice oknote"><b>Not:</b> Bu plan henüz kalıcı olarak kaydedilmedi. Değişikliklerden sonra <b>Yemek Planı Kaydet</b> butonuna basın.</div>`;
}

}
function mealText(menu){let names=(menu.manualItems&&menu.manualItems.length?menu.manualItems:menu.items.map(mealName));return [...names,menu.fixed||'Salata Bar']}
function renderMeal(day,kind,editable,planId){

function saveDraftPlan(){if(!state.draft){toast('Kaydedilecek taslak plan yok.');return}let editingId=state.draft.editingPlanId||null;let err=editingId?null:validateOptions({start:state.draft.start,end:state.draft.end});if(err){toast(err);return}let plan=clone(state.draft);plan.status='Kaydedildi';plan.savedAt=new Date().toISOString();delete plan.editingPlanId;if(editingId){let idx=state.plans.findIndex(p=>p.id===editingId);if(idx>=0){plan.id=editingId;plan.locked=!!state.plans[idx].locked;plan.changeLog=[...(state.plans[idx].changeLog||[]),...(state.draft.changeLog||[])];state.plans[idx]=plan;state.activePlanId=editingId;state.logs.push({date:new Date().toISOString(),action:'Plan düzenlendi',detail:plan.name});}else{plan.id=uid();state.plans.unshift(plan);state.activePlanId=plan.id;}}else{plan.id=uid();state.plans.unshift(plan);state.activePlanId=plan.id;state.logs.push({date:new Date().toISOString(),action:'Plan kaydedildi',detail:plan.name});}state.draft=null;save();showSection('plans');toast('Yemek planı kaydedildi.','ok');} function clearDraft(){state.draft=null;save();renderDraft();toast('Taslak silindi.','ok')}
function evaluatePlan(plan){
 let issues=[];if(!plan)return issues;
 let seenDate={};plan.schedule.forEach(d=>{
   ['lunch','dinner'].forEach(k=>{
    let menu=d[k], meals=(menu.manualItems?menu.manualItems.map(name=>findMealByName(name)).filter(Boolean):menu.items.map(getMeal).filter(Boolean));
    let mains=meals.filter(m=>m.category==='Ana Yemek');
    if(mains.length>1)issues.push(`${fmt(d.date)} ${k==='lunch'?'öğle':'akşam'} menüsünde birden fazla ana yemek var.`);
   });
   let lm=mealText(d.lunch).join('|'), dm=mealText(d.dinner).join('|'); if(lm===dm)seenDate[d.date]='Öğle ve akşam aynı menü.';
 });
 let mainCount={};plan.schedule.forEach(d=>['lunch','dinner'].forEach(k=>{let m=(d[k].manualItems?d[k].manualItems.map(findMealByName).find(x=>x&&x.category==='Ana Yemek'):d[k].items.map(getMeal).find(x=>x&&x.category==='Ana Yemek'));if(m)mainCount[m.name]=(mainCount[m.name]||0)+1}));
 Object.entries(mainCount).forEach(([n,c])=>{if(c>1)issues.push(`"${n}" aynı planda ${c} kez kullanılmış.`)});
 return issues;
}

function openManualEdit(date,kind,planId=''){if(!sessionStorage.getItem('tabildotLoggedIn')){toast('Bu işlem yalnızca yönetici girişiyle yapılabilir.');return}let target=state.draft;if(!target && planId){let p=state.plans.find(x=>x.id===planId);if(p){state.draft=clone(p);state.draft.editingPlanId=p.id;state.draft.name=p.name+' - Düzenleme';target=state.draft;}}if(!target){toast('Düzenleme için önce taslak oluşturun veya kayıtlı planı Yönetici Düzenle ile açın.');return}let day=target.schedule.find(d=>d.date===date);if(!day){toast('Düzenlenecek tarih bulunamadı.');return}let menu=day[kind];let values=mealText(menu).slice(0,4);openModal(`<div class="modalHead"><div><h3>Yönetici Menü Değişikliği</h3><p class="muted">${fmt(date)} • ${kind==='lunch'?'Öğle':'Akşam'} • Yönetici manuel işleminde kurallar engel oluşturmaz.</p></div><button class="close" onclick="closeModal()">✕</button></div><div class="quickMenuSelect"><div><label>Hazır menü ile doldur</label><select id="manualQuickMenu">${quickMenuOptions()}</select></div><button class="btn secondary" onclick="fillManualFromQuick()">Hazır Menüyü Doldur</button></div><div class="form two" style="margin-top:12px">${[0,1,2,3].map(i=>`<div><label>${i+1}. ürün</label><input id="manual${i}" value="${esc(values[i]||'')}" oninput="showSuggestions(${i})"><div id="sug${i}" class="suggestBox"></div></div>`).join('')}<div><label>5. ürün</label><input value="Salata Bar" disabled></div></div><div class="notice">Yemek adını havuzdan seçebilir veya serbest yazabilirsiniz. Havuzda olmayan adlar da manuel metin olarak plana kaydedilir.</div><div class="actions"><button class="btn green" onclick="applyManualEdit('${date}','${kind}')">Değişikliği Uygula</button><button class="btn secondary" onclick="closeModal()">Vazgeç</button></div>`);[0,1,2,3].forEach(showSuggestions);} function levenshtein(a,b){a=norm(a);b=norm(b);let dp=Array(b.length+1).fill(0).map((_,i)=>i);for(let i=1;i<=a.length;i++){let prev=dp[0];dp[0]=i;for(let j=1;j<=b.length;j++){let tmp=dp[j];dp[j]=Math.min(dp[j]+1,dp[j-1]+1,prev+(a[i-1]===b[j-1]?0:1));prev=tmp}}return dp[b.length]}
window.invalidateMealSuggestIndex=function(){window._mealSuggestIndex=null;window._mealSuggestVersion=(window._mealSuggestVersion||0)+1};
function mealSuggestIndex(){if(window._mealSuggestIndex)return window._mealSuggestIndex;window._mealSuggestIndex=(state.meals||[]).filter(m=>m.active&&!m.archived).map(m=>({m,normName:norm(m.name),tokens:norm(m.name).split(' ').filter(Boolean),cat:norm(m.category),sub:norm(m.subCategory),group:norm(m.group)}));return window._mealSuggestIndex}
function suggestMealsAdvanced(q,expectedCategory='',limit=7){const query=norm(q),expected=norm(expectedCategory);const index=mealSuggestIndex();return index.map(x=>{let score=80;if(!query)score=35;else if(x.normName===query)score=-100;else if(x.normName.startsWith(query))score=0;else if(x.tokens.some(t=>t.startsWith(query)))score=5;else if(x.normName.includes(query))score=10+x.normName.indexOf(query);else{if(query.length<2)return null;const sample=x.normName.slice(0,Math.max(query.length+3,5));score=28+levenshtein(query,sample)*4}if(expected&&x.cat===expected)score-=18;else if(expected&&(x.sub===expected||x.group===expected))score-=8;return{x,score}}).filter(Boolean).sort((a,b)=>a.score-b.score||String(a.x.m.name).localeCompare(String(b.x.m.name),'tr')).slice(0,limit).map(r=>r.x.m)}

function printSurveyForm(){let rows=selectedSurveyRows();if(!rows.length){toast('Yazdırılacak anket satırı yok.');return}let p=activePlan();let s=document.getElementById('surveyStart')?.value||p.start,e=document.getElementById('surveyEnd')?.value||p.end;let area=document.getElementById('surveyPrintArea');if(!area){area=document.createElement('div');area.id='surveyPrintArea';area.className='surveyPrintOnly';document.body.appendChild(area)}area.innerHTML=`<h2>TBMM Destek Hizmetleri Başkanlığı</h2><h3>Yemek Memnuniyet Anketi</h3><p><b>Tarih Aralığı:</b> ${fmt(s)} - ${fmt(e)}</p><p>Her yemek için bir seçenek işaretleyiniz.</p><table><tr><th>Tarih</th><th>Öğün</th><th>Yemek</th><th>Kötü</th><th>Orta</th><th>İyi</th><th>Güzel</th><th>Çok Güzel</th><th>Yorum</th></tr>${rows.map(r=>`<tr><td>${r.tarih}</td><td>${r.ogun}</td><td>${esc(r.yemek)}</td><td>☐</td><td>☐</td><td>☐</td><td>☐</td><td>☐</td><td></td></tr>`).join('')}</table>`;window.print()} function parseCsv(txt){let lines=txt.split(/\r?\n/).filter(Boolean);let headers=lines.shift().split(';').map(h=>h.trim().replace(/^"|"$/g,''));return lines.map(line=>{let vals=line.split(';').map(v=>v.replace(/^"|"$/g,'').replace(/""/g,'"'));let o={};headers.forEach((h,i)=>o[h]=vals[i]||'');return o})}
function importSurveyCsv(ev){let f=ev.target.files[0];if(!f)return;let reader=new FileReader();reader.onload=e=>{let rows=parseCsv(e.target.result);rows.forEach(r=>{let sel=r.secim||r.Seçim||r.puan||'';let score=RATING_MAP[sel]||(+sel||0);if(score>0){let rec={plan_id:r.plan_id,tarih:r.tarih,ogun:r.ogun,yemek:r.yemek,secim:sel,score,comment:r.yorum||''};state.surveys.push(rec);let m=findMealByName(rec.yemek);if(m){m.ratingAvg=((m.ratingAvg||0)*(m.ratingCount||0)+score)/((m.ratingCount||0)+1);m.ratingCount=(m.ratingCount||0)+1}}});save();toast(`${rows.length} anket satırı işlendi.`, 'ok')};reader.readAsText(f,'utf-8')}

function usageStats(plan=null){let counts={}, ratings={};let plans=plan?[plan]:state.plans;plans.forEach(p=>p.schedule.forEach(d=>['lunch','dinner'].forEach(k=>mealText(d[k]).filter(food=>norm(food)!=='salata bar').forEach(food=>{counts[food]=(counts[food]||0)+1}))));state.surveys.forEach(s=>{if(norm(s.yemek)==='salata bar')return;if(!ratings[s.yemek])ratings[s.yemek]={sum:0,count:0};ratings[s.yemek].sum+=s.score;ratings[s.yemek].count++});let usage=Object.entries(counts).map(([name,count])=>({name,count,rating:ratings[name]?ratings[name].sum/ratings[name].count:0,ratingCount:ratings[name]?.count||0})).sort((a,b)=>b.count-a.count);let liked=Object.entries(ratings).map(([name,r])=>({name,avg:r.sum/r.count,count:r.count,usage:counts[name]||0})).sort((a,b)=>b.avg-a.avg||b.count-a.count);return {usage,liked,counts,ratings};} function renderStrategy(){
 let s=usageStats();let compare=s.usage.slice(0,25);
 document.getElementById('strategy').innerHTML=`<div class="grid cols3"><div class="card kpi"><div class="badge">▦</div><div><b>${s.usage.length}</b><span>Kullanılan farklı yemek</span></div></div><div class="card kpi"><div class="badge">↻</div><div><b>${s.usage[0]?.count||0}</b><span>En yüksek tekrar</span></div></div><div class="card kpi"><div class="badge">★</div><div><b>${s.liked[0]?.avg?.toFixed(1)||'—'}</b><span>En yüksek anket puanı</span></div></div></div>
 <div class="grid cols2" style="margin-top:16px"><div class="card"><div class="cardTitle"><h3>En çok çıkan yemekler</h3><button class="btn small secondary" onclick="printStrategy()">Grafikli PDF</button></div>${barChart(s.usage.slice(0,12),'count')}</div><div class="card"><h3>Anketlerde en beğenilenler</h3>${barChart(s.liked.slice(0,12),'avg')}</div></div>
 <div class="card" style="margin-top:16px"><h3>Kullanım / beğeni karşılaştırması</h3><div class="tableWrap"><table><thead><tr><th>Yemek</th><th>Kullanım</th><th>Anket ortalaması</th><th>Anket sayısı</th><th>Yorum</th></tr></thead><tbody>${compare.map(x=>`<tr><td>${esc(x.name)}</td><td>${x.count}</td><td>${x.rating?x.rating.toFixed(2):'—'}</td><td>${x.ratingCount}</td><td>${x.rating&&x.count>3&&x.rating<3?'Sık çıkıyor, memnuniyet düşük.':x.rating>=4?'Memnuniyet yüksek.':'Takip edilebilir.'}</td></tr>`).join('')}</tbody></table></div></div>`;
}
function barChart(arr,field){if(!arr.length)return '<p class="muted">Veri yok.</p>';let max=Math.max(...arr.map(x=>field==='avg'?x.avg:x.count),1);return arr.map(x=>{let v=field==='avg'?x.avg:x.count;let w=Math.max(6,Math.round(v/max*100));return `<div class="chartRow"><b>${esc(x.name)}</b><div class="bar"><span style="width:${w}%">${field==='avg'?v.toFixed(1):v}</span></div><span>${field==='avg'?(x.count+' oy'):(x.count+' kez')}</span></div>`}).join('')}

function renderGuide(){document.getElementById('guide').innerHTML=`<div class="card"><h3>Detaylı Kullanım Kılavuzu</h3>
 <div class="step"><h4>1. Yemek havuzunu kontrol edin</h4><p>Yemek Havuzu ekranında sisteme entegre edilmiş yemekleri görebilir, düzenleyebilir, pasifleştirebilir veya yeni yemek ekleyebilirsiniz. Kategori alanı algoritma için önemlidir. Otomatik üretimde bir öğüne yalnızca bir adet <b>Ana Yemek</b> alınır.</p></div>
 <div class="step"><h4>2. Plan oluşturma</h4><p>Plan Oluştur ekranında başlangıç ve bitiş tarihini seçin. Üretim modu olarak <b>Standart</b>, <b>Memnuniyet Odaklı</b> veya <b>Hafif Menü</b> seçeneklerinden birini kullanın. Tatlı, ayran ve Salata Bar üretim ayarları yönetici tarafından belirlenir.</p><p>Ayran her güne otomatik eklenmez. Haftalık kota ve öğün tercihi seçilir. Salata Bar içeriği her öğünde ana yemeğe ve mevsime göre otomatik oluşturulur.</p></div>

 <div class="step"><h4>4. Taslak, kaydetme ve silme</h4><p>Akıllı Plan Oluştur butonu yalnızca taslak üretir. Planın kalıcı hale gelmesi için <b>Yemek Planı Kaydet</b> butonuna basılmalıdır. Hatalı taslaklar <b>Taslağı Sil</b> butonuyla kaldırılabilir.</p></div>

<script id="tbmm-output-strategy-performance-final-script">
(function(){
'use strict';

const htmlEscape=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const textNorm=v=>String(v||'').toLocaleLowerCase('tr-TR').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ı/g,'i').trim();
const cloneSafe=v=>typeof clone==='function'?clone(v):JSON.parse(JSON.stringify(v));
const isVegetarianPlan=p=>p?.settings?.specialDiet==='vegetarian'||p?.planType==='vegetarian'||p?.specialDiet==='vegetarian';
const regularPlans=()=>((state&&state.plans)||[]).filter(p=>!isVegetarianPlan(p));
const vegetarianPlans=()=>((state&&state.plans)||[]).filter(isVegetarianPlan);
function regularActivePlan(){
  const list=regularPlans();
  return list.find(p=>p.id===state.activePlanId)||list[0]||null;
}
function latestVegetarianPlan(){return vegetarianPlans().slice().sort((a,b)=>String(b.savedAt||b.createdAt||'').localeCompare(String(a.savedAt||a.createdAt||'')))[0]||null}
function trDate(v){if(!v)return'—';try{return new Date(v+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'})}catch(_){return String(v)}}
function trDateLong(v){if(!v)return'—';try{return new Date(v+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric',weekday:'long'})}catch(_){return String(v)}}
function mealByNameOrId(v){
  if(!v)return null;
  return (state.meals||[]).find(m=>m.id===v)||
    (typeof findMealByName==='function'?findMealByName(v):null)||
    (state.meals||[]).find(m=>textNorm(m.name)===textNorm(v))||null;
}
function menuNames(menu){
  if(!menu)return[];
  const source=Array.isArray(menu.manualItems)&&menu.manualItems.length?menu.manualItems:(menu.items||[]).map(x=>mealByNameOrId(x)?.name||x);
  const fixed=menu.fixed&&textNorm(menu.fixed)!=='salata bar'?menu.fixed:'';
  return [...source, ...(fixed?[fixed]:[])].filter(Boolean);
}
function menuCaloriesSafe(menu){
  if(typeof menuCalories==='function')return Number(menuCalories(menu))||0;
  if(Number.isFinite(+menu?.totalCalories))return +menu.totalCalories;
  return menuNames(menu).reduce((sum,n)=>sum+(+mealByNameOrId(n)?.calorie||0),0);
}
function menuInline(menu){
  const names=menuNames(menu);
  return names.length?`<div class="menu-inline">${names.map(htmlEscape).join('<span class="dot">•</span>')}</div>`:'<span class="muted">Menü yok</span>';
}
function downloadFile(content,name,type){
  if(typeof downloadBlob==='function'){downloadBlob(content,name,type);return}
  const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},300);
}
function reportNumber(prefix='TBMM'){return `${prefix}-${new Date().toISOString().slice(0,10).replaceAll('-','')}-${String(Date.now()).slice(-6)}`}
function reportShellV2(title,subtitle,body,options={}){
  const orientation=options.orientation==='portrait'?'portrait':'landscape';
  const compact=options.compact!==false;
  const org=htmlEscape(state.settings?.org||'TBMM Destek Hizmetleri Başkanlığı');
  const created=new Date().toLocaleString('tr-TR');
  const no=reportNumber(options.prefix||'TBMM');
  const prepared=htmlEscape(state.settings?.createdBy||'Yönetici');

function chartBars(items,valueKey='value',maxValue=null,formatter=null){
  if(!items?.length)return '<p class="muted">Gösterilecek veri bulunmuyor.</p>';
  const max=Math.max(1,maxValue||0,...items.map(x=>+x[valueKey]||0));
  return `<div class="bars">${items.map(x=>{const v=+x[valueKey]||0;const pct=Math.max(v?4:0,Math.round(v/max*100));const shown=formatter?formatter(v,x):(Number.isInteger(v)?v:v.toFixed(2));return `<div class="barrow"><span>${htmlEscape(x.name)}</span><div class="bar"><i style="width:${pct}%"></i></div><b>${htmlEscape(shown)}</b></div>`}).join('')}</div>`;
}
function chartBlock(title,items,options={}){
  return `<div class="chart-block"><h3>${htmlEscape(title)}</h3>${chartBars(items,options.valueKey||'value',options.max,options.formatter)}<div class="chart-comment">${htmlEscape(options.comment||'Grafik, seçili veri kapsamındaki dağılımı göstermektedir.')}</div></div>`;
}
function scheduleSummary(plan){

  const unique=new Set(days.flatMap(d=>[...menuNames(d.lunch),...menuNames(d.dinner)]).filter(x=>textNorm(x)!=='salata bar')).size;
  return{days:days.length,meals:days.length*2,lunchAvg:average(lunches),dinnerAvg:average(dinners),unique};
}
function planReportBodyV2(plan,options={}){

function planMetrics(plan){
  const dish=new Map(),cats=new Map(),daily=[];let lunchTotal=0,dinnerTotal=0,lunchCount=0,dinnerCount=0;
  (plan?.schedule||[]).forEach(d=>{
    const lc=menuCaloriesSafe(d.lunch),dc=menuCaloriesSafe(d.dinner);if(lc){lunchTotal+=lc;lunchCount++}if(dc){dinnerTotal+=dc;dinnerCount++}daily.push({name:trDate(d.date),value:lc+dc});
    [d.lunch,d.dinner].forEach(menu=>menuNames(menu).forEach(name=>{if(textNorm(name)==='salata bar')return;dish.set(name,(dish.get(name)||0)+1);const cat=mealByNameOrId(name)?.category||'Diğer';cats.set(cat,(cats.get(cat)||0)+1)}));
  });
  const dishes=[...dish.entries()].map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value||a.name.localeCompare(b.name,'tr'));
  const categories=[...cats.entries()].map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  return{dishes,categories,daily,lunchAvg:lunchCount?Math.round(lunchTotal/lunchCount):0,dinnerAvg:dinnerCount?Math.round(dinnerTotal/dinnerCount):0,unique:dish.size};
}
function planStrategyRecommendations(plan,m){
  const out=[];const maxRepeat=m.dishes[0];const dayCount=plan.schedule?.length||0;

  if(m.lunchAvg>1000)out.push(`Öğle ortalaması ${m.lunchAvg} kcal ile yüksek düzeydedir; yardımcı ve tamamlayıcı seçimleri hafifletilebilir.`);else if(m.lunchAvg&&m.lunchAvg<550)out.push(`Öğle ortalaması ${m.lunchAvg} kcal ile düşük düzeydedir; doyuruculuk ve porsiyon kontrolü incelenebilir.`);else out.push(`Öğle ortalaması ${m.lunchAvg||'—'} kcal ile dengeli aralıktadır.`);
  if(m.dinnerAvg>850)out.push(`Akşam ortalaması ${m.dinnerAvg} kcal olduğundan ağır akşam öğünleri azaltılabilir.`);else out.push(`Akşam ortalaması ${m.dinnerAvg||'—'} kcal; akşam hafifliği genel olarak korunmaktadır.`);
  return out;
}

function surveyRowsFor(groupId){return (state.surveys||[]).filter(r=>r.groupId===groupId&&(+r.score||0)>=1&&(+r.score||0)<=5)}
function surveyStats(group){

  rows.forEach(r=>{const score=+r.score;votes[score]=(votes[score]||0)+1;const name=r.yemek||'Belirsiz';if(!foods.has(name))foods.set(name,{name,sum:0,count:0});const f=foods.get(name);f.sum+=score;f.count++;const cat=mealByNameOrId(name)?.category||'Diğer';if(!cats.has(cat))cats.set(cat,{name:cat,sum:0,count:0});const c=cats.get(cat);c.sum+=score;c.count++});
  const foodList=[...foods.values()].map(x=>({name:x.name,value:x.sum/x.count,count:x.count})).sort((a,b)=>b.value-a.value||b.count-a.count);

}

function chartScreenComment(card){

  if(/oy dağılımı/i.test(title))return `En yüksek yanıt sayısı “${high.name}” seçeneğindedir (${high.value}). Dağılım, genel ortalamayla birlikte okunmalıdır.`;

}

rt('survey')">Anketli PDF</button><button class="btn secondary" onclick="exportStrategyWord('survey')">Anketli Word</button></div></div><div class="output-report-card"><h4>Strateji — Anketsiz</h4><p>Yalnızca aktif tabildot çizelgesinin tekrar, tür ve kalori dengesini analiz eder; başka planla kıyaslamaz.</p><div class="actions"><button class="btn green" onclick="printStrategyReport('no-survey')">Anketsiz PDF</button><button class="btn secondary" onclick="exportStrategyWord('no-survey')">Anketsiz Word</button></div></div><div class="output-report-card"><h4>Vejetaryen Çizelge — Ayrı</h4><p>${veg?htmlEscape(veg.name)+' • '+trDate(veg.start)+' – '+trDate(veg.end):'Kayıtlı vejetaryen çizelge bulunmuyor.'}</p><div class="actions"><button class="btn green" onclick="printVegetarianPlanReport()">Vejetaryen PDF</button><button class="btn secondary" onclick="exportVegetarianPlanWord()">Word</button></div></div><div class="output-report-card"><h4>Duyuru ve E-posta</h4><p>Aktif tabildot planı için personele gönderilecek kurumsal duyuru metnini hazırlar.</p><div class="actions"><button class="btn secondary" onclick="showAnnouncement()">Metni Hazırla</button></div></div><div class="output-report-card"><h4>Anket Sonuç Verisi</h4><p>Katılımcı, yemek, puan ve yorum alanlarını analiz için dışa aktarır.</p><div class="actions"><button class="btn secondary" onclick="exportSurveyResults()">Anket CSV</button></div></div></div>`;

/* Vejetaryen tarihleri normal tabildot planlarından otomatik olarak ayrılır. */
function rangeOverlap(a1,a2,b1,b2){return !!a1&&!!a2&&!!b1&&!!b2&&!(a2<b1||b2<a1)}
function durationDays(start,end){if(typeof diffDays==='function')return Math.max(0,diffDays(start,end));return Math.max(0,Math.round((new Date(end)-new Date(start))/86400000))}
function addIsoDays(date,n){if(typeof addDays==='function')return addDays(date,n);const d=new Date(date+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function nextFreeVegetarianRange(lengthDays=6){
  const regular=regularPlans();let start=regularActivePlan()?.end?addIsoDays(regularActivePlan().end,1):new Date().toISOString().slice(0,10),end=addIsoDays(start,lengthDays),guard=0;
  while(regular.some(p=>rangeOverlap(start,end,p.start,p.end))&&guard++<400){const last=regular.filter(p=>rangeOverlap(start,end,p.start,p.end)).map(p=>p.end).sort().pop();start=addIsoDays(last||start,1);end=addIsoDays(start,lengthDays)}
  return{start,end};
}
const previousOpenSpecialDietPlanner=window.openSpecialDietPlanner;
window.openSpecialDietPlanner=function(){
  const active=regularActivePlan(),len=active?Math.min(31,durationDays(active.start,active.end)):6,free=nextFreeVegetarianRange(len);
  if(previousOpenSpecialDietPlanner)previousOpenSpecialDietPlanner.apply(this,arguments);
  const s=document.getElementById('dietStart'),e=document.getElementById('dietEnd');if(s)s.value=free.start;if(e)e.value=free.end;
  const info=document.getElementById('dietPlannerInfo');if(info&&!document.getElementById('dietDateSeparationNote'))info.insertAdjacentHTML('beforebegin',`<div id="dietDateSeparationNote" class="special-plan-separation"><b>Tarih ayrımı zorunludur:</b> Vejetaryen çizelge, normal tabildot çizelgelerinin tarihleriyle çakışamaz. Sistem ilk boş aralığı otomatik seçti: ${trDate(free.start)} – ${trDate(free.end)}.</div>`);
};
const previousGenerateSpecialDietDraft=window.generateSpecialDietDraft;
window.generateSpecialDietDraft=function(){
  const start=document.getElementById('dietStart')?.value,end=document.getElementById('dietEnd')?.value;const conflict=regularPlans().find(p=>rangeOverlap(start,end,p.start,p.end));
  if(conflict){toast(`Vejetaryen çizelge tarihleri “${conflict.name}” tabildot çizelgesiyle çakışıyor. Farklı tarih seçin.`);return}
  const result=previousGenerateSpecialDietDraft?previousGenerateSpecialDietDraft.apply(this,arguments):undefined;
  if(state.draft&&isVegetarianPlan(state.draft)){state.draft.planType='vegetarian';state.draft.excludeFromStrategy=true;state.draft.allowOverlap=false;state.draft.settings={...(state.draft.settings||{}),specialDiet:'vegetarian',separateFromTabildot:true,excludeFromStrategy:true,allowOverlap:false}}
  return result;
};
const previousSaveDraftPlanFinal=window.saveDraftPlan;
window.saveDraftPlan=function(){
  const vegDraft=isVegetarianPlan(state.draft),regularBefore=regularActivePlan()?.id||'',beforeIds=new Set((state.plans||[]).map(p=>p.id));const result=previousSaveDraftPlanFinal?previousSaveDraftPlanFinal.apply(this,arguments):undefined;
  if(vegDraft){const saved=(state.plans||[]).find(p=>!beforeIds.has(p.id)&&isVegetarianPlan(p))||latestVegetarianPlan();if(saved){saved.planType='vegetarian';saved.excludeFromStrategy=true;saved.allowOverlap=false;saved.settings={...(saved.settings||{}),specialDiet:'vegetarian',separateFromTabildot:true,excludeFromStrategy:true,allowOverlap:false}}state.activePlanId=regularBefore||regularPlans()[0]?.id||'';try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(_){ }if(typeof renderPlans==='function')renderPlans();toast('Vejetaryen çizelge ayrı kaydedildi; aktif tabildot planı değiştirilmedi.','ok')}
  return result;
};
const previousMakeActiveFinal=window.makeActive;
window.makeActive=function(id){const p=(state.plans||[]).find(x=>x.id===id);if(isVegetarianPlan(p)){toast('Vejetaryen çizelge ayrı bir alternatif plandır; aktif tabildot çizelgesi yapılamaz. Çıktılar bölümünden ayrı PDF alınabilir.');return}return previousMakeActiveFinal?previousMakeActiveFinal(id):undefined};

/* Ağır üretim tek blok yerine gün bazında çalışır; ekran düzenli aralıklarla nefes alır. */
let generationRunning=false;
function updateCookingProgress(done,total,message){
  const msg=document.getElementById('cookingMessage');if(msg)msg.textContent=message||`${done}/${total} gün hazırlandı…`;
  let bar=document.querySelector('#cookingOverlay .cooking-progress');if(!bar){document.querySelector('#cookingOverlay .cooking-panel')?.insertAdjacentHTML('beforeend','<div class="cooking-progress"><i></i></div>');bar=document.querySelector('#cookingOverlay .cooking-progress')}
  const fill=bar?.querySelector('i');if(fill)fill.style.width=`${total?Math.round(done/total*100):0}%`;
}
function registerMenuUsage(menu,usage){(menu?.items||[]).forEach(id=>{const m=mealByNameOrId(id);usage[id]=(usage[id]||0)+1;if(m)usage['g:'+m.group]=(usage['g:'+m.group]||0)+1})}
window.createDraft=async function(o){
  if(generationRunning){toast('Çizelge oluşturma işlemi devam ediyor.');return}
  generationRunning=true;const dates=typeof datesBetween==='function'?datesBetween(o.start,o.end):[];
  try{
    if(typeof showCookingLoader==='function')showCookingLoader('Çizelge hazırlanıyor…');
    updateCookingProgress(0,dates.length,'Yemek havuzu ve kurallar hazırlanıyor…');
    const schedule=[],usage={};let dessertLeft=Math.ceil((dates.length/7)*(o.includeDessert?o.dessertCount:0)),ayranLeft=Math.ceil((dates.length/7)*(o.includeAyran?o.ayranCount:0));
    for(let idx=0;idx<dates.length;idx++){
      const d=dates[idx],ctx={dessertLeft,ayranLeft,idx,total:dates.length};
      const lunch=window.buildMeal(d,'Öğle',o,usage,ctx);registerMenuUsage(lunch,usage);if(lunch?.hasDessert)dessertLeft--;if(lunch?.hasAyran)ayranLeft--;
      const same=o.sameMode==='same'||(o.sameMode==='ask'&&o.sameDays&&o.sameDays[d]);
      const dinner=same?cloneSafe(lunch):window.buildMeal(d,'Akşam',o,usage,{dessertLeft,ayranLeft,idx,total:dates.length,lunch});
      if(same)dinner.notes=[...(dinner.notes||[]),'Öğle menüsü ile aynı oluşturuldu.'];else{registerMenuUsage(dinner,usage);if(dinner?.hasDessert)dessertLeft--;if(dinner?.hasAyran)ayranLeft--}
      schedule.push({date:d,day:typeof DAYS!=='undefined'?DAYS[new Date(d+'T12:00:00').getDay()]:'',lunch,dinner});
      updateCookingProgress(idx+1,dates.length,`${idx+1}/${dates.length} gün hazırlandı • ${trDateLong(d)}`);
      if(idx<dates.length-1)await new Promise(resolve=>requestAnimationFrame(()=>setTimeout(resolve,0)));
    }
    state.draft={id:typeof uid==='function'?uid():'draft_'+Date.now(),name:`Yemek Planı ${trDate(o.start)} - ${trDate(o.end)}`,start:o.start,end:o.end,createdAt:new Date().toISOString(),settings:o,schedule,changeLog:[],status:'Taslak'};
    if(typeof persistFinal==='function')persistFinal(false);else try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(_){ }
    if(document.getElementById('draftArea'))window.renderDraft();else if(typeof renderCreate==='function')renderCreate();
    toast('Taslak plan oluşturuldu. Kalıcı kayıt için Yemek Planı Kaydet butonuna basın.','ok');
  }catch(err){console.error('Çizelge üretim hatası',err);toast(`Çizelge oluşturulamadı: ${err.message||'Beklenmeyen hata'}`)}finally{generationRunning=false;if(typeof hideCookingLoader==='function')hideCookingLoader()}
};
window.startPlanGeneration=function(){
  const o=typeof formOptions==='function'?formOptions():null,err=o&&typeof validateOptions==='function'?validateOptions(o):'Plan ayarları okunamadı.';if(err){toast(err);return}
  const use=document.getElementById('useWeather')?.checked,loc=(document.getElementById('weatherLocation')?.value||'').trim(),stale=!state.weatherData?.fetchedAt||Date.now()-new Date(state.weatherData.fetchedAt).getTime()>6*3600000,different=loc&&textNorm(loc)!==textNorm(state.settings?.weatherLocation||'');
  if(use&&(stale||different||!state.weatherData?.days?.length)&&typeof fetchPlanWeather==='function')fetchPlanWeather(true).catch(e=>console.warn('Hava verisi arka planda alınamadı; mevsimsel profil kullanılacak.',e));
  if(o.sameMode==='ask'&&typeof askSameDaysAndGenerate==='function'){askSameDaysAndGenerate(o);return}
  window.createDraft(o);
};

/* İlk görüntülemelerde ayrım ve yeni düğmeler uygulanır. */
const applyFinalUi=()=>{normalizePlanSeparation();if(document.getElementById('strategy')?.classList.contains('active'))window.renderStrategy();if(document.getElementById('outputs')?.classList.contains('active'))window.renderOutputs()};
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',applyFinalUi,{once:true});else setTimeout(applyFinalUi,0);
})();

<script id="tbmm-enterprise-v3-script">
(function(){
 const DATASET_VERSION='tbmm_excel_menu_2026_06_19_v1';
 const ADMIN_SECTIONS=['create','meals','settings'];
 const oldEnsureState=window.ensureState, oldRenderAll=window.renderAll, oldShowApp=window.showApp;
 window.defaultQuickMenus=function(){return []};
 function migrateMenuRefs(){
   const oldMap={};(state.meals||[]).forEach(m=>oldMap[m.id]=m.name);
   const migrateMenu=(menu)=>{if(!menu)return; if(!menu.manualItems||!menu.manualItems.length){menu.manualItems=(menu.items||[]).map(id=>oldMap[id]||'').filter(Boolean)} menu.items=[]};
   [...(state.plans||[]),state.draft].filter(Boolean).forEach(p=>(p.schedule||[]).forEach(d=>{migrateMenu(d.lunch);migrateMenu(d.dinner)}));
 }
 window.ensureState=function(){
   oldEnsureState();
   state.settings={org:'TBMM Destek Hizmetleri Başkanlığı',createdBy:'Yönetici',adminPassword:'1234',adminUsername:'admin',lastLogin:'',theme:'corporate',users:[{id:'user1',name:'Standart Kullanıcı',username:'kullanici',password:'1234',active:true,role:'user'}],datasetVersion:'',...(state.settings||{})};
   if(!Array.isArray(state.settings.users))state.settings.users=[];
   if(state.settings.datasetVersion!==DATASET_VERSION){
      migrateMenuRefs();
      state.meals=JSON.parse(JSON.stringify(DEFAULT_MEALS));
      state.quickMenus=[];
      state.settings.datasetVersion=DATASET_VERSION;
      try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){}
   }
 }
 function role(){return sessionStorage.getItem('tabildotRole')||'admin'}
 function isAdmin(){return role()==='admin'}
 window.isAdmin=isAdmin;
 function sessionName(){return sessionStorage.getItem('tabildotUser')||(isAdmin()?(state.settings.adminUsername||'admin'):'kullanici')}
 const PAGE_META={
  home:['Anasayfa','Günlük çizelge ve sistem özeti','⌂'],create:['Plan Oluştur','Tarih aralığına göre yeni çizelge hazırlayın','✦'],plans:['Tüm Planlar','Kaydedilmiş yemek çizelgelerini yönetin','▦'],meals:['Yemek Havuzu','Excel listesinden aktarılan yemek bilgileri','☰'],survey:['Anket','Kurumsal memnuniyet formu ve sonuçları','✎'],strategy:['Strateji','Yönetim sunumu, grafikler ve yemek portföyü analizi','◎'],personnel:['Personel Ekranı','Personel için sade günlük menü görünümü','◉'],outputs:['Çıktılar','Kurumsal Word, Excel, PDF ve duyuru çıktıları','⎙'],settings:['Ayarlar','Kullanıcı, güvenlik ve görünüm yönetimi','⚙'],guide:['Kullanım Kılavuzu','Sistem kullanım adımları','?']
 };
 function updateTop(id){
   const top=document.querySelector('.top.compactTop');if(!top)return;
   let left=top.firstElementChild;if(!left)return;
   const m=PAGE_META[id]||PAGE_META.home;
   left.innerHTML='<div class="pageHeading"><div class="pageHeadingMark">'+m[2]+'</div><div><h2>'+m[0]+'</h2><p>'+m[1]+'</p></div></div>';
   let group=top.querySelector('.topIconGroup');
   let badge=document.getElementById('sessionBadge');
   if(group&&!badge){badge=document.createElement('span');badge.id='sessionBadge';badge.className='adminStatus';group.insertBefore(badge,group.firstChild)}
   if(badge)badge.textContent=(isAdmin()?'Yönetici':'Kullanıcı')+' • '+sessionName();
 }
 function applyTheme(){document.body.setAttribute('data-theme',state.settings.theme||'corporate')}
 window.togglePwd=function(id,btnId){const i=document.getElementById(id),b=document.getElementById(btnId);if(!i)return;i.type=i.type==='password'?'text':'password';if(b)b.textContent=i.type==='password'?'◉':'○'}
 function enhanceLogin(){
   const card=document.querySelector('#loginScreen .login-card');if(!card)return;
   const src=card.querySelector('img')?.src||'';
   card.innerHTML='<div class="logo-round">'+(src?'<img alt="TBMM Logo" src="'+src+'">':'')+'</div><h1>TBMM Destek Hizmetleri Başkanlığı</h1><p>Akıllı Tabildot Menü Yönetim Sistemi</p><div class="login-form-grid"><div><label>Giriş türü</label><select id="loginRole"><option value="admin">Yönetici Girişi</option><option value="user">Kullanıcı Girişi</option></select></div><div><label>Kullanıcı adı</label><input id="loginUsername" autocomplete="username" placeholder="Kullanıcı adı" onkeydown="if(event.key===\'Enter\')login()"><small class="login-help">Yönetici hesabında kullanıcı adı boş bırakılabilir.</small></div><div><label>Şifre</label><div class="passwordWrap"><input id="loginPassword" type="password" autocomplete="current-password" placeholder="Şifrenizi giriniz" onkeydown="if(event.key===\'Enter\')login()"><button id="loginEye" class="eyeBtn" type="button" title="Şifreyi göster/gizle" onclick="togglePwd(\'loginPassword\',\'loginEye\')">◉</button></div></div><button class="btn green" onclick="login()">Sisteme Giriş Yap</button><div id="loginError" class="login-error">Kullanıcı adı veya şifre hatalı.</div></div>';
 }
 window.login=function(){
   ensureState();
   const t=document.getElementById('loginRole')?.value||'admin',u=(document.getElementById('loginUsername')?.value||'').trim(),p=(document.getElementById('loginPassword')?.value||'').trim(),err=document.getElementById('loginError');
   let ok=false,who=u;
   if(t==='admin'){ok=p===String(state.settings.adminPassword||'1234')&&(!u||u===String(state.settings.adminUsername||'admin'));who=u||state.settings.adminUsername||'admin'}
   else{const f=(state.settings.users||[]).find(x=>x.active&&x.username===u&&x.password===p);ok=!!f;who=f?.username||u}
   if(!ok){if(err)err.style.display='block';return}
   if(err)err.style.display='none';
   sessionStorage.setItem('tabildotLoggedIn','1');sessionStorage.setItem('tabildotRole',t);sessionStorage.setItem('tabildotUser',who);
   state.settings.lastLogin=new Date().toLocaleString('tr-TR');try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){}
   showApp();toast(t==='admin'?'Yönetici girişi yapıldı.':'Kullanıcı girişi yapıldı.','ok');
 }
 window.logout=function(){sessionStorage.clear();document.getElementById('appShell')?.classList.add('hidden-app');document.getElementById('loginScreen').style.display='flex';enhanceLogin()}
 window.initNav=function(){const items=NAV.filter(n=>isAdmin()||!ADMIN_SECTIONS.includes(n[0]));document.getElementById('nav').innerHTML=items.map(n=>'<button data-id="'+n[0]+'" onclick="showSection(\''+n[0]+'\')"><i>'+n[1]+'</i>'+n[2]+'</button>').join('')}
 window.showSection=function(id){
   if(!isAdmin()&&ADMIN_SECTIONS.includes(id)){toast('Bu bölüm yalnızca yönetici hesabıyla kullanılabilir.');id='home'}
   document.querySelectorAll('.section').forEach(s=>s.classList.remove('active','printTarget'));const el=document.getElementById(id);if(el)el.classList.add('active','printTarget');
   document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
   updateTop(id);renderAll(false);
 }
 window.showApp=function(){document.getElementById('loginScreen').style.display='none';document.getElementById('appShell')?.classList.remove('hidden-app');applyTheme();initNav();const id=document.querySelector('.section.active')?.id||'home';updateTop(id);renderAll()}
 function dateLabel(iso){if(!iso)return '';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric',weekday:'long'})}
 function dayForDate(plan,date){return plan?(plan.schedule||[]).find(d=>d.date===date):null}
 function homeDefaultDate(p){const t=today();return p&&(p.schedule||[]).some(d=>d.date===t)?t:(p?.schedule?.[0]?.date||t)}
 function mealList(menu){return mealText(menu).map(x=>'<li>'+esc(x)+'</li>').join('')}
 function dailyInner(p,date){
   const d=dayForDate(p,date);
   if(!p)return '<div class="daily-empty">Henüz aktif yemek çizelgesi yok.</div>';
   if(!d)return '<div class="daily-empty">Seçilen tarih aktif çizelge kapsamında değil.</div>';
   return '<div class="daily-date-title"><strong>'+dateLabel(date)+'</strong><span>'+esc(p.name)+'</span></div><div class="daily-meals"><div class="meal-panel"><div class="meal-panel-title">Öğle Menüsü</div><ol>'+mealList(d.lunch)+'</ol></div><div class="meal-panel"><div class="meal-panel-title">Akşam Menüsü</div><ol>'+mealList(d.dinner)+'</ol></div></div>';
 }
 window.updateHomeDay=function(date){window._homeDay=date;const p=activePlan(),box=document.getElementById('homeDailyContent');if(box)box.innerHTML=dailyInner(p,date)}
 function dailyPrintSheet(p,date){
   const d=dayForDate(p,date);if(!p||!d)return '';
   const make=(title,m)=>'<div class="print-menu"><h3>'+title+'</h3><ol>'+mealText(m).map(x=>'<li>'+esc(x)+'</li>').join('')+'</ol></div>';

 function catalogStats(){

.virtual-survey-table textarea{min-height:42px;padding:7px;border-radius:8px}
.survey-file-zone{border:1px dashed #9fb0c5;border-radius:14px;padding:14px;background:#f8fafc}

.survey-flow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}

.survey-step b{display:block;color:#17345f;margin-bottom:4px}

.color-analysis-fill{height:100%;border-radius:99px}
.color-score-card{border:1px solid #dce4ee;border-radius:14px;padding:14px;background:#fbfdff}

.daily-content .simple-menu-list li{padding:7px 0}

.printDailyOnly .simple-menu-list li{display:grid;grid-template-columns:1fr auto;border-bottom:1px solid #bbb;padding:6px 0}

 .simple-menu-list li{-webkit-print-color-adjust:exact;print-color-adjust:exact}
